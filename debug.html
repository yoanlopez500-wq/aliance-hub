<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body>
<pre id="log"></pre>
<script>
// Timestamp para cache busting
var ts = '?v=' + Date.now();
document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>');
document.write('<script src="assets/js/config.js' + ts + '"><\/script>');
document.write('<script src="assets/js/base.js' + ts + '"><\/script>');
</script>
<script>
setTimeout(function() {
    var log = document.getElementById('log');
    function write(msg) { log.textContent += msg + '\n'; }

    write('=== DIAGNOSTICO v2 ===');
    write('Cache bust: ' + ts);
    write('1. getPlayerData exists: ' + (typeof getPlayerData === 'function'));
    write('2. isLazyLoggedIn exists: ' + (typeof isLazyLoggedIn === 'function'));
    write('3. clearAppCache exists: ' + (typeof clearAppCache === 'function'));
    write('4. showLoading exists: ' + (typeof showLoading === 'function'));
    write('5. getStatusBadge exists: ' + (typeof getStatusBadge === 'function'));
    write('6. getTypeBadge exists: ' + (typeof getTypeBadge === 'function'));
    write('7. formatDate exists: ' + (typeof formatDate === 'function'));
    write('8. supabase exists: ' + (typeof supabase !== 'undefined'));
    write('9. supabase.from exists: ' + (typeof supabase !== 'undefined' && typeof supabase.from === 'function'));

    if (typeof getPlayerData === 'function') {
        write('10. getPlayerData() = ' + JSON.stringify(getPlayerData()));
    }

    if (typeof supabase !== 'undefined') {
        write('11. Testing Supabase query...');
        supabase.from('matches').select('*,alliance:alliances!matches_alliance_id_fkey(name,tag)').eq('is_private', false).limit(1)
            .then(function(r) {
                write('12. Query OK: ' + JSON.stringify(r.data ? r.data.length + ' rows' : 'null'));
                if (r.error) write('13. Error: ' + r.error.message);
                else write('13. Match: ' + (r.data && r.data[0] ? r.data[0].name : 'no data'));
            })
            .catch(function(e) {
                write('12. Query FAIL: ' + e.message);
            });
    }
}, 500);

window.onerror = function(msg, url, line) {
    document.getElementById('log').textContent += 'ONERROR: ' + msg + ' at ' + url + ':' + line + '\n';
};
</script>
</body>
</html>
