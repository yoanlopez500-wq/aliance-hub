<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="../manifest.json">
</head>
<body class="bg-slate-900 min-h-screen" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-md mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
            <div class="text-center mb-6">
                <div class="text-3xl mb-2" id="header-icon">📝</div>
                <h1 class="text-xl font-bold text-slate-800" id="header-title">Pre-registro</h1>
                <p class="text-slate-500 text-sm" id="game-name">Cargando...</p>
            </div>

            <!-- ESTADO 1: Formulario de registro -->
            <div id="state-form">
                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tu ID de jugador (del juego) *</label>
                        <input type="number" id="reg-id" required
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none"
                            placeholder="Ej: 99702975">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tu username *</label>
                        <input type="text" id="reg-username" required
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none"
                            placeholder="Ej: Tlaloc27">
                    </div>
                    <div class="flex items-start gap-3">
                        <input type="checkbox" id="reg-rules" required class="mt-1 w-5 h-5 rounded border-slate-300 text-amber-500 focus:ring-amber-500">
                        <label class="text-sm text-slate-600">
                            Acepto las <a id="rules-link" href="#" target="_blank" class="text-amber-600 font-bold">reglas y términos</a> de esta partida
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 transition">
                        Confirmar Registro
                    </button>
                </form>

                <div id="error-display" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-sm text-red-700 font-medium" id="error-text"></p>
                </div>
            </div>

            <!-- ESTADO 2: Ya inscrito (muestra datos de la partida) -->
            <div id="state-registered" class="hidden">
                <div class="text-center py-6">
                    <div class="text-5xl mb-3">✅</div>
                    <p class="font-bold text-green-600 text-lg">¡Ya estás inscrito!</p>
                    <p class="text-sm text-slate-500 mt-1">Estás registrado en esta partida</p>
                </div>

                <!-- Datos de la partida -->
                <div id="game-credentials" class="hidden mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl">
                    <h3 class="font-bold text-amber-800 mb-3 text-center">🎮 Datos de la Partida</h3>

                    <div id="cred-game-id" class="hidden mb-3">
                        <label class="text-xs font-bold text-amber-700 uppercase">ID de la partida</label>
                        <div class="flex items-center gap-2 mt-1">
                            <code id="cred-game-id-value" class="flex-1 bg-white px-3 py-2 rounded-lg font-mono text-sm text-slate-800 border border-amber-200"></code>
                            <button onclick="copyToClipboard('cred-game-id-value')" class="px-3 py-2 bg-amber-500 text-slate-900 rounded-lg text-sm font-bold hover:bg-amber-400">📋</button>
                        </div>
                    </div>

                    <div id="cred-password" class="hidden mb-3">
                        <label class="text-xs font-bold text-amber-700 uppercase">Contraseña</label>
                        <div class="flex items-center gap-2 mt-1">
                            <code id="cred-password-value" class="flex-1 bg-white px-3 py-2 rounded-lg font-mono text-sm text-slate-800 border border-amber-200"></code>
                            <button onclick="copyToClipboard('cred-password-value')" class="px-3 py-2 bg-amber-500 text-slate-900 rounded-lg text-sm font-bold hover:bg-amber-400">📋</button>
                        </div>
                    </div>

                    <div id="cred-no-data" class="hidden text-center py-3">
                        <p class="text-sm text-amber-700">Los datos de la partida aún no están disponibles</p>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <a href="../game.html?id=' + gameId + '" class="inline-block bg-slate-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-700 transition text-sm">
                        Ver página de la partida →
                    </a>
                </div>
            </div>

            <!-- ESTADO 3: Partida cerrada -->
            <div id="state-closed" class="hidden">
                <div class="text-center py-6">
                    <div class="text-5xl mb-3">🔒</div>
                    <p class="font-bold text-slate-600 text-lg">Registro cerrado</p>
                    <p class="text-sm text-slate-500 mt-1">Esta partida ya no acepta nuevos registros</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');

        if (!gameId) {
            location.href = '../index.html';
        }

        var currentGame = null;
        var savedPlayerId = null;
        var savedUsername = null;

        // Cargar datos guardados del localStorage
        function loadSavedData() {
            var saved = getPlayerData();
            savedPlayerId = saved.playerId ? parseInt(saved.playerId) : null;
            savedUsername = saved.username || null;
        }

        // Mostrar/ocultar estados
        function showState(state) {
            document.getElementById('state-form').classList.add('hidden');
            document.getElementById('state-registered').classList.add('hidden');
            document.getElementById('state-closed').classList.add('hidden');
            document.getElementById('state-' + state).classList.remove('hidden');
        }

        function showError(msg) {
            var errDiv = document.getElementById('error-display');
            var errText = document.getElementById('error-text');
            errText.textContent = msg;
            errDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-display').classList.add('hidden');
        }

        function copyToClipboard(elementId) {
            var text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(function() {
                showToast('Copiado al portapapeles', 'success');
            });
        }

        // Mostrar credenciales de la partida
        function showGameCredentials() {
            if (!currentGame) return;

            var credDiv = document.getElementById('game-credentials');
            credDiv.classList.remove('hidden');

            // ID de partida
            if (currentGame.show_game_id && currentGame.game_id) {
                document.getElementById('cred-game-id').classList.remove('hidden');
                document.getElementById('cred-game-id-value').textContent = currentGame.game_id;
            } else {
                document.getElementById('cred-game-id').classList.add('hidden');
            }

            // Contraseña
            if (currentGame.password) {
                document.getElementById('cred-password').classList.remove('hidden');
                document.getElementById('cred-password-value').textContent = currentGame.password;
            } else {
                document.getElementById('cred-password').classList.add('hidden');
            }

            // Si no hay nada que mostrar
            if ((!currentGame.show_game_id || !currentGame.game_id) && !currentGame.password) {
                document.getElementById('cred-no-data').classList.remove('hidden');
            } else {
                document.getElementById('cred-no-data').classList.add('hidden');
            }
        }

        // FLUJO PRINCIPAL: Determinar qué mostrar
        async function initPage() {
            loadSavedData();

            // 1. Cargar datos de la partida
            var { data: game, error: gameError } = await supabase
                .from('games')
                .select('*')
                .eq('id', gameId)
                .single();

            if (gameError || !game) {
                document.querySelector('.bg-white').innerHTML = '<div class="text-center py-8 text-red-500">Partida no encontrada</div>';
                return;
            }

            currentGame = game;
            document.getElementById('game-name').textContent = game.name;

            if (game.rules_pdf_url) {
                document.getElementById('rules-link').href = game.rules_pdf_url;
            }

            // 2. Si la partida NO está abierta, mostrar cerrado
            if (game.status !== 'open') {
                // PERO: si ya está registrado, mostrarle sus datos igual
                if (savedPlayerId) {
                    var { data: existing } = await supabase
                        .from('registrations')
                        .select('id')
                        .eq('game_id', gameId)
                        .eq('player_id', savedPlayerId);

                    if (existing && existing.length > 0) {
                        showState('registered');
                        showGameCredentials();
                        return;
                    }
                }
                showState('closed');
                return;
            }

            // 3. Partida ABIERTA: ¿Ya está registrado?
            if (savedPlayerId) {
                var { data: existing, error: checkError } = await supabase
                    .from('registrations')
                    .select('id')
                    .eq('game_id', gameId)
                    .eq('player_id', savedPlayerId);

                if (checkError) {
                    console.error('Error verificando registro:', checkError);
                }

                if (existing && existing.length > 0) {
                    // ✅ YA ESTÁ REGISTRADO - mostrar datos
                    showState('registered');
                    showGameCredentials();
                    return;
                }
                // No está registrado (o fue eliminado) - continuar al formulario
            }

            // 4. Mostrar formulario
            showState('form');
            if (savedPlayerId) document.getElementById('reg-id').value = savedPlayerId;
            if (savedUsername) document.getElementById('reg-username').value = savedUsername;
        }

        // Manejar submit del formulario
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();

            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Procesando...';

            var playerId = parseInt(document.getElementById('reg-id').value);
            var username = document.getElementById('reg-username').value.trim();

            if (!playerId || playerId <= 0) {
                showError('El ID de jugador debe ser un número válido');
                btn.disabled = false;
                btn.textContent = 'Confirmar Registro';
                return;
            }

            if (!username || username.length < 2) {
                showError('El username debe tener al menos 2 caracteres');
                btn.disabled = false;
                btn.textContent = 'Confirmar Registro';
                return;
            }

            // Guardar en localStorage para futuro
            savePlayerData(playerId, username);
            savedPlayerId = playerId;
            savedUsername = username;

            try {
                // Verificar si ya está registrado (doble check)
                var { data: existing } = await supabase
                    .from('registrations')
                    .select('id')
                    .eq('game_id', gameId)
                    .eq('player_id', playerId);

                if (existing && existing.length > 0) {
                    showToast('Ya estás registrado en esta partida', 'warning');
                    showState('registered');
                    showGameCredentials();
                    return;
                }

                // Crear/actualizar jugador
                var { error: playerError } = await supabase
                    .from('players')
                    .upsert({
                        id: playerId,
                        current_username: username,
                        last_seen: new Date().toISOString()
                    }, { onConflict: 'id' });

                if (playerError) {
                    showError('Error guardando jugador: ' + playerError.message);
                    btn.disabled = false;
                    btn.textContent = 'Confirmar Registro';
                    return;
                }

                // Insertar registro
                var { error: regError } = await supabase
                    .from('registrations')
                    .insert({
                        game_id: gameId,
                        player_id: playerId,
                        username: username,
                        accepted_rules: true
                    });

                if (regError) {
                    showError('Error en registro: ' + regError.message);
                    btn.disabled = false;
                    btn.textContent = 'Confirmar Registro';
                    return;
                }

                // ÉXITO - mostrar estado registrado con credenciales
                showToast('¡Registro exitoso!', 'success');
                showState('registered');
                showGameCredentials();

            } catch (err) {
                console.error('Error inesperado:', err);
                showError('Error inesperado: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Confirmar Registro';
            }
        });

        // Iniciar
        initPage();
    </script>
</body>
</html>
