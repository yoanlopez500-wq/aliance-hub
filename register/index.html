<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=11"></script>
    <script src="../assets/js/base.js?v=11"></script>
    <script src="../assets/js/auth.js?v=11"></script>
    <script src="../assets/js/pwa-utils.js?v=11"></script>
    <meta name="theme-color" content="#0a0e27">
</head>
<body class="min-h-screen" style="background: #0a0e27;" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-lg mx-auto px-4 py-8">
        <div id="register-container" class="rounded-2xl p-8" style="background: #11183a; border: 1px solid #1a237e;">
            <div class="text-center mb-6">
                <div class="text-4xl mb-3">&#128221;</div>
                <h1 class="text-2xl font-bold text-white">Registro a Partida</h1>
                <p style="color: #9fa8da;" id="match-info">Cargando...</p>
            </div>

            <!-- Banner de esperando aprobacion -->
            <div id="waiting-approval-banner" class="hidden rounded-xl p-6 mb-6 text-center" style="background: rgba(255,143,0,0.1); border: 1px solid rgba(255,143,0,0.2);">
                <div class="text-4xl mb-3">&#9203;</div>
                <h2 class="font-bold" style="color: #ff8f00;">Esperando aprobacion del admin</h2>
                <p class="text-sm mt-2" style="color: #9fa8da;">Tu registro esta pendiente. Cuando el admin te apruebe, veras aqui el ID y contrasena.</p>
            </div>

            <!-- Datos de partida (solo visibles si aprobado) -->
            <div id="match-credentials" class="hidden rounded-xl p-6 mb-6" style="background: rgba(46,125,50,0.1); border: 1px solid rgba(46,125,50,0.2);">
                <h2 class="font-bold mb-3" style="color: #4caf50;">&#128275; Datos de Acceso</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="rounded-lg p-3" style="background: #0a0e27; border: 1px solid #1a237e;">
                        <p class="text-xs uppercase font-bold" style="color: #4caf50;">ID de Partida</p>
                        <p id="cred-game-id" class="text-lg font-mono font-bold text-white">---</p>
                    </div>
                    <div class="rounded-lg p-3" style="background: #0a0e27; border: 1px solid #1a237e;">
                        <p class="text-xs uppercase font-bold" style="color: #4caf50;">Contrasena</p>
                        <p id="cred-password" class="text-lg font-mono font-bold text-white">---</p>
                    </div>
                </div>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: #9fa8da;">Tu ID de Jugador</label>
                    <input type="number" id="reg-player-id" required
                        class="w-full px-4 py-3 rounded-lg text-white text-sm cursor-not-allowed"
                        style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e;"
                        readonly>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: #9fa8da;">Tu Username</label>
                    <input type="text" id="reg-username" required
                        class="w-full px-4 py-3 rounded-lg text-white text-sm cursor-not-allowed"
                        style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e;"
                        readonly>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: #9fa8da;">Nacion que elegiras *</label>
                    <input type="text" id="reg-nation" required
                        class="w-full px-4 py-3 rounded-lg text-white text-sm"
                        style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e;"
                        placeholder="Ej: Imperio Aleman">
                </div>

                <button type="submit" class="w-full font-bold py-3 rounded-lg transition active:scale-[0.98]" style="background: linear-gradient(135deg, #ff6f00, #ff8f00); color: white;">
                    Confirmar Registro
                </button>
            </form>

            <div id="error-msg" class="mt-4 text-sm text-center hidden" style="color: #ef5350;"></div>
            <div id="success-msg" class="mt-4 text-sm text-center hidden" style="color: #4caf50;"></div>
        </div>
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var matchId = urlParams.get('match');
        var playerData = getPlayerData();

        if (!matchId) { window.location.href = '../index.html'; }
        if (!playerData.playerId) { window.location.href = '../login-player.html'; }

        var currentMatch = null;
        var myRegistration = null;

        async function init() {
            document.getElementById('reg-player-id').value = playerData.playerId;
            document.getElementById('reg-username').value = playerData.displayName || '';

            var { data: reg, error: regError } = await supabase
                .from('match_registrations')
                .select('*')
                .eq('match_id', matchId)
                .eq('player_id', parseInt(playerData.playerId))
                .maybeSingle();

            if (regError) { console.error('Error verificando registro:', regError); }

            myRegistration = reg;

            if (reg && (reg.status === 'confirmed' || reg.status === 'approved')) {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('success-msg').textContent = '&#10003; Ya estas registrado en esta partida.';
                document.getElementById('success-msg').classList.remove('hidden');
                saveLastRegisteredMatch(matchId);
                showCredentialsIfApproved();
                return;
            }

            if (reg && reg.status === 'pending_approval') {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('waiting-approval-banner').classList.remove('hidden');
                return;
            }

            if (reg && reg.status === 'rejected') {
                document.getElementById('error-msg').textContent = '&#10060; Tu solicitud fue rechazada.';
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
                return;
            }

            var { data: match, error: matchError } = await supabase
                .from('matches')
                .select('*, alliances(name, tag)')
                .eq('id', matchId)
                .maybeSingle();

            if (!match) { document.getElementById('match-info').textContent = 'Partida no encontrada'; return; }
            currentMatch = match;

            document.getElementById('match-info').innerHTML = getStatusBadge(match.status) + ' ' + getTypeBadge(match.match_type) + ' &#8226; ' + match.name;

            if (match.status !== 'open') {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('error-msg').textContent = '&#10060; Esta partida no esta abierta para registro.';
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        async function showCredentialsIfApproved() {
            var { data: match } = await supabase
                .from('matches')
                .select('game_id, password, requires_approval')
                .eq('id', matchId)
                .maybeSingle();

            if (match) {
                currentMatch = match;
                if (!match.requires_approval || (myRegistration && myRegistration.status === 'approved')) {
                    document.getElementById('match-credentials').classList.remove('hidden');
                    document.getElementById('cred-game-id').textContent = match.game_id || '---';
                    document.getElementById('cred-password').textContent = match.password || '---';
                }
                if (match.requires_approval && myRegistration && myRegistration.status === 'pending_approval') {
                    document.getElementById('waiting-approval-banner').classList.remove('hidden');
                }
            }
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            var nation = document.getElementById('reg-nation').value.trim();
            if (!nation) { errorMsg.textContent = '&#10060; Elige una nacion'; errorMsg.classList.remove('hidden'); return; }

            var { error } = await supabase.from('match_registrations').upsert({
                match_id: matchId,
                player_id: parseInt(playerData.playerId),
                nation: nation,
                username: playerData.displayName || 'Jugador',
                status: currentMatch && currentMatch.requires_approval ? 'pending_approval' : 'confirmed',
                registered_at: new Date().toISOString()
            }, { onConflict: 'match_id,player_id' });

            if (error) { errorMsg.textContent = '&#10060; Error: ' + error.message; errorMsg.classList.remove('hidden'); }
            else {
                saveLastRegisteredMatch(matchId);

                if (currentMatch && currentMatch.requires_approval) {
                    successMsg.textContent = '&#10003; Solicitud enviada. Espera aprobacion del admin.';
                    successMsg.classList.remove('hidden');
                    document.getElementById('register-form').classList.add('hidden');
                    document.getElementById('waiting-approval-banner').classList.remove('hidden');
                } else {
                    successMsg.textContent = '&#10003; Registrado! Redirigiendo...';
                    successMsg.classList.remove('hidden');
                    setTimeout(function() { window.location.href = '../game.html?id=' + matchId; }, 1500);
                }
            }
        });

        init();
    </script>
</body>
</html>
