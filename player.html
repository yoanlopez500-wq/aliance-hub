<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugador - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/ui-utils.js"></script>
    <script src="assets/js/pwa-utils.js"></script>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="manifest.json"">

</head>
<body class="bg-slate-900 min-h-screen" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div id="player-header" class="text-center py-12 text-slate-400">Cargando...</div>

        <div id="player-stats" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-blue-600" id="p-games">-</div>
                <div class="text-xs text-slate-500">Partidas</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-green-600" id="p-kills">-</div>
                <div class="text-xs text-slate-500">Bajas</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-red-500" id="p-deaths">-</div>
                <div class="text-xs text-slate-500">Muertes</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-amber-600" id="p-kd">-</div>
                <div class="text-xs text-slate-500">KD Global</div>
            </div>
        </div>

        <h2 class="font-bold text-slate-800 mb-3">📜 Historial de Partidas</h2>
        <div id="player-history" class="space-y-3">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <script>
        const playerId = new URLSearchParams(window.location.search).get('id');
        if (!playerId) location.href = 'index.html';

        async function loadPlayer() {
            const { data: player } = await supabase
                .from('players')
                .select('*, alliances(name, tag)')
                .eq('id', playerId)
                .single();

            if (!player) {
                document.getElementById('player-header').innerHTML = '<div class="text-red-500">Jugador no encontrado</div>';
                return;
            }

            const kd = player.total_deaths > 0 ? (player.total_kills / player.total_deaths).toFixed(2) : player.total_kills;

            document.getElementById('player-header').innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 p-8 text-center mb-6">
                    <div class="text-5xl mb-4">🎖️</div>
                    <h1 class="text-3xl font-bold text-slate-800">${player.current_username}</h1>
                    <p class="text-slate-500 mt-2">
                        ID: ${player.id}
                        ${player.alliances ? `• ${player.alliances.name} [${player.alliances.tag}]` : ''}
                    </p>
                </div>
            `;

            document.getElementById('player-stats').classList.remove('hidden');
            document.getElementById('p-games').textContent = player.games_played || 0;
            document.getElementById('p-kills').textContent = (player.total_kills || 0).toLocaleString();
            document.getElementById('p-deaths').textContent = (player.total_deaths || 0).toLocaleString();
            document.getElementById('p-kd').textContent = kd;
            document.getElementById('p-kd').className = `text-2xl font-bold ${kd >= 1 ? 'text-green-600' : 'text-orange-500'}`;

            // Historial
            const { data: history } = await supabase
                .from('game_results')
                .select('*, games(name, game_id, created_at)')
                .eq('player_id', playerId)
                .order('imported_at', { ascending: false });

            const container = document.getElementById('player-history');
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">Sin historial</div>';
            } else {
                container.innerHTML = history.map(h => `
                    <div class="bg-white rounded-xl border border-slate-200 p-4 flex items-center justify-between">
                        <div>
                            <a href="game.html?id=${h.game_id}" class="font-bold text-slate-800 hover:text-amber-600">${h.games.name}</a>
                            <p class="text-xs text-slate-500">${h.nation} • ${formatDate(h.games.created_at)}</p>
                        </div>
                        <div class="text-right">
                            <div class="font-bold ${h.kd_ratio >= 1 ? 'text-green-600' : 'text-orange-500'}">${h.kd_ratio} KD</div>
                            <div class="text-xs text-slate-500">${h.kills.toLocaleString()} / ${h.deaths.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        loadPlayer();
    </script>
</body>
</html>
