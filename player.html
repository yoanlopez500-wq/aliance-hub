<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jugador - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=11"></script>
<script src="assets/js/base.js?v=11"></script>
<script src="assets/js/auth.js?v=11"></script>
<meta name="theme-color" content="#0a0e27">
</head>
<body class="min-h-screen" style="background: #0a0e27;" data-role="public">
<div id="admin-nav"></div>

<div class="max-w-4xl mx-auto px-4 py-8">
<div id="player-header" class="text-center py-12" style="color: #9fa8da;">Cargando...</div>

<div id="player-stats" class="hidden grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
<div class="rounded-xl p-4 text-center" style="background: #11183a; border: 1px solid #1a237e;">
<div class="text-2xl font-bold" style="color: #2196f3;" id="p-games">-</div>
<div class="text-xs" style="color: #9fa8da;">Partidas</div>
</div>
<div class="rounded-xl p-4 text-center" style="background: #11183a; border: 1px solid #1a237e;">
<div class="text-2xl font-bold" style="color: #4caf50;" id="p-kills">-</div>
<div class="text-xs" style="color: #9fa8da;">Bajas</div>
</div>
<div class="rounded-xl p-4 text-center" style="background: #11183a; border: 1px solid #1a237e;">
<div class="text-2xl font-bold" style="color: #ef5350;" id="p-deaths">-</div>
<div class="text-xs" style="color: #9fa8da;">Muertes</div>
</div>
<div class="rounded-xl p-4 text-center" style="background: #11183a; border: 1px solid #1a237e;">
<div class="text-2xl font-bold" style="color: #ff8f00;" id="p-kd">-</div>
<div class="text-xs" style="color: #9fa8da;">KD Global</div>
</div>
<div class="rounded-xl p-4 text-center" style="background: #11183a; border: 1px solid #1a237e;">
<div class="text-2xl font-bold" style="color: #ff6f00;" id="p-strikes">-</div>
<div class="text-xs" style="color: #9fa8da;">Strikes</div>
</div>
</div>

<div class="flex gap-2 mb-4 flex-wrap">
<button onclick="filterHistory('all')" class="hist-filter px-3 py-1.5 text-sm rounded-lg font-medium" data-filter="all" style="background: linear-gradient(135deg,#ff6f00,#ff8f00); color: white;">Todas</button>
<button onclick="filterHistory('internal')" class="hist-filter px-3 py-1.5 text-sm rounded-lg font-medium" data-filter="internal" style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e; color: #9fa8da;">Internas</button>
<button onclick="filterHistory('duel')" class="hist-filter px-3 py-1.5 text-sm rounded-lg font-medium" data-filter="duel" style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e; color: #9fa8da;">Duelos</button>
<button onclick="filterHistory('public_31')" class="hist-filter px-3 py-1.5 text-sm rounded-lg font-medium" data-filter="public_31" style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e; color: #9fa8da;">Publicas 31</button>
<button onclick="filterHistory('public_500')" class="hist-filter px-3 py-1.5 text-sm rounded-lg font-medium" data-filter="public_500" style="background: rgba(255,255,255,0.05); border: 1px solid #1a237e; color: #9fa8da;">Eventos 500</button>
</div>

<h2 class="font-bold text-white mb-3">&#128220; Historial de Partidas</h2>
<div id="player-history"><div class="text-center py-8" style="color: #9fa8da;">Cargando...</div></div>
</div>

<script>
var playerId = new URLSearchParams(window.location.search).get('id');
if (!playerId) location.href = 'index.html';
var allHistory = [];

async function loadPlayer() {
var { data: player } = await supabase.from('players').select('*, alliances(name, tag)').eq('id', playerId).single();
if (!player) { document.getElementById('player-header').innerHTML = '<div style="color: #ef5350;">Jugador no encontrado</div>'; return; }
var kd = player.total_deaths > 0 ? (player.total_kills / player.total_deaths).toFixed(2) : player.total_kills;
var statusBorder = player.status === 'active' ? '' : 'border: 1px solid rgba(198,40,40,0.3);';

document.getElementById('player-header').innerHTML =
'<div class="rounded-2xl p-8 text-center mb-6" style="background: #11183a; border: 1px solid #1a237e; ' + statusBorder + '">' +
'<div class="text-5xl mb-4">&#127891;</div>' +
'<h1 class="text-3xl font-bold text-white">' + player.current_username + '</h1>' +
'<p class="mt-2" style="color: #9fa8da;">ID: ' + player.id +
(player.alliances ? ' &bull; ' + player.alliances.name + ' [' + player.alliances.tag + ']' : '') +
(player.status !== 'active' ? ' &bull; ' + getStatusBadgePlayer(player.status) : '') +
'</p></div>';

document.getElementById('player-stats').classList.remove('hidden');
document.getElementById('p-games').textContent = player.games_played || 0;
document.getElementById('p-kills').textContent = (player.total_kills || 0).toLocaleString();
document.getElementById('p-deaths').textContent = (player.total_deaths || 0).toLocaleString();
document.getElementById('p-kd').textContent = kd;
document.getElementById('p-kd').style.color = kd >= 1 ? '#4caf50' : '#ff8f00';
document.getElementById('p-strikes').textContent = player.strikes || 0;
document.getElementById('p-strikes').style.color = (player.strikes || 0) >= 2 ? '#ef5350' : '#ff8f00';
loadHistory();
}

async function loadHistory() {
var { data: history } = await supabase.from('match_results').select('*, matches(name, match_type, game_id, created_at)').eq('player_id', playerId).order('imported_at', { ascending: false });
allHistory = history || []; renderHistory(allHistory);
}

function renderHistory(history) {
var c = document.getElementById('player-history');
if (!history || history.length === 0) { c.innerHTML = '<div class="text-center py-8 rounded-xl" style="background: #11183a; border: 1px solid #1a237e; color: #9fa8da;">Sin historial</div>'; return; }
c.innerHTML = history.map(function(h) {
return '<div class="rounded-xl p-4 mb-3 flex items-center justify-between" style="background: #11183a; border: 1px solid #1a237e;">' +
'<div><a href="game.html?id=' + h.match_id + '" class="font-bold text-white hover:opacity-80">' + h.matches.name + '</a>' +
'<div class="flex gap-2 mt-1">' + getTypeBadge(h.matches.match_type) + '<span class="text-xs" style="color: #9fa8da;">' + h.nation + ' &bull; ' + formatDate(h.matches.created_at) + '</span></div></div>' +
'<div class="text-right"><div class="font-bold" style="color: ' + (h.kd_ratio >= 1 ? '#4caf50' : '#ff8f00') + ';">' + h.kd_ratio + ' KD</div>' +
'<div class="text-xs" style="color: #9fa8da;">' + h.kills.toLocaleString() + ' / ' + h.deaths.toLocaleString() + '</div></div></div>';
}).join('');
}

function filterHistory(type) {
document.querySelectorAll('.hist-filter').forEach(function(btn) {
if (btn.dataset.filter === type) { btn.style.background = 'linear-gradient(135deg,#ff6f00,#ff8f00)'; btn.style.color = 'white'; btn.style.border = 'none'; }
else { btn.style.background = 'rgba(255,255,255,0.05)'; btn.style.color = '#9fa8da'; btn.style.border = '1px solid #1a237e'; }
});
renderHistory(type === 'all' ? allHistory : allHistory.filter(function(h) { return h.matches.match_type === type; }));
}

loadPlayer();
</script>
</body>
</html>
