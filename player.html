<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugador - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js?v=3"></script>
    <script src="assets/js/base.js?v=3"></script>
    <script src="assets/js/auth.js?v=3"></script>
    <script src="assets/js/pwa-utils.js?v=3"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div id="player-header" class="text-center py-12 text-slate-400">Cargando...</div>

        <div id="player-stats" class="hidden grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-blue-600" id="p-games">-</div>
                <div class="text-xs text-slate-500">Partidas</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-green-600" id="p-kills">-</div>
                <div class="text-xs text-slate-500">Bajas</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-red-500" id="p-deaths">-</div>
                <div class="text-xs text-slate-500">Muertes</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-amber-600" id="p-kd">-</div>
                <div class="text-xs text-slate-500">KD Global</div>
            </div>
            <div class="bg-white rounded-xl p-4 border text-center">
                <div class="text-2xl font-bold text-orange-500" id="p-strikes">-</div>
                <div class="text-xs text-slate-500">Strikes</div>
            </div>
        </div>

        <!-- Filtros de historial -->
        <div class="flex gap-2 mb-4 flex-wrap">
            <button onclick="filterHistory('all')" class="hist-filter px-3 py-1.5 text-sm rounded-lg bg-amber-500 text-white font-medium" data-filter="all">Todas</button>
            <button onclick="filterHistory('internal')" class="hist-filter px-3 py-1.5 text-sm rounded-lg bg-white text-slate-600 border border-slate-200" data-filter="internal">Internas</button>
            <button onclick="filterHistory('duel')" class="hist-filter px-3 py-1.5 text-sm rounded-lg bg-white text-slate-600 border border-slate-200" data-filter="duel">Duelos</button>
            <button onclick="filterHistory('public_31')" class="hist-filter px-3 py-1.5 text-sm rounded-lg bg-white text-slate-600 border border-slate-200" data-filter="public_31">Publicas 31</button>
            <button onclick="filterHistory('public_500')" class="hist-filter px-3 py-1.5 text-sm rounded-lg bg-white text-slate-600 border border-slate-200" data-filter="public_500">Eventos 500</button>
        </div>

        <h2 class="font-bold text-slate-800 mb-3">Historial de Partidas</h2>
        <div id="player-history" class="space-y-3">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <script>
        var playerId = new URLSearchParams(window.location.search).get('id');
        if (!playerId) location.href = 'index.html';

        var allHistory = [];

        async function loadPlayer() {
            // Cargar player sin nested relation
            var { data: player } = await supabase.from('players').select('*').eq('id', playerId).single();
            if (!player) {
                document.getElementById('player-header').innerHTML = '<div class="text-red-500">Jugador no encontrado</div>';
                return;
            }

            // Cargar alliance manualmente
            var alliance = null;
            if (player.current_alliance_id) {
                var { data: alli } = await supabase.from('alliances').select('name, tag').eq('id', player.current_alliance_id).single();
                alliance = alli;
            }

            var kd = player.total_deaths > 0 ? (player.total_kills / player.total_deaths).toFixed(2) : player.total_kills;
            var statusClass = player.status === 'active' ? '' : 'bg-red-50 border-red-200';

            document.getElementById('player-header').innerHTML = 
                '<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center mb-6 ' + statusClass + '">' +
                    '<div class="text-5xl mb-4">🎖️</div>' +
                    '<h1 class="text-3xl font-bold text-slate-800">' + player.current_username + '</h1>' +
                    '<p class="text-slate-500 mt-2">ID: ' + player.id +
                        (alliance ? ' • ' + alliance.name + ' [' + alliance.tag + ']' : '') +
                        (player.status !== 'active' ? ' • ' + getStatusBadgePlayer(player.status) : '') +
                    '</p>' +
                '</div>';

            document.getElementById('player-stats').classList.remove('hidden');
            document.getElementById('p-games').textContent = player.games_played || 0;
            document.getElementById('p-kills').textContent = (player.total_kills || 0).toLocaleString();
            document.getElementById('p-deaths').textContent = (player.total_deaths || 0).toLocaleString();
            document.getElementById('p-kd').textContent = kd;
            document.getElementById('p-kd').className = 'text-2xl font-bold ' + (kd >= 1 ? 'text-green-600' : 'text-orange-500');
            document.getElementById('p-strikes').textContent = player.strikes || 0;
            document.getElementById('p-strikes').className = 'text-2xl font-bold ' + ((player.strikes || 0) >= 2 ? 'text-red-600' : 'text-orange-500');

            loadHistory();
        }

        async function loadHistory() {
            // Cargar resultados sin nested relation
            var { data: history } = await supabase.from('match_results').select('*').eq('player_id', playerId).order('created_at', { ascending: false });
            allHistory = history || [];
            
            // Cargar matches relacionados manualmente
            var matchIds = allHistory.map(function(h) { return h.match_id; }).filter(function(v, i, a) { return a.indexOf(v) === i; });
            if (matchIds.length > 0) {
                var { data: matches } = await supabase.from('matches').select('id, name, match_type, game_id, created_at').in('id', matchIds);
                var matchesMap = {};
                (matches || []).forEach(function(m) { matchesMap[m.id] = m; });
                allHistory.forEach(function(h) { h.match = matchesMap[h.match_id] || null; });
            }
            
            renderHistory(allHistory);
        }

        function renderHistory(history) {
            var container = document.getElementById('player-history');
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">Sin historial</div>';
                return;
            }

            container.innerHTML = history.map(function(h) {
                var match = h.match || {};
                var typeLabel = getTypeBadge(match.match_type);
                return '<div class="bg-white rounded-xl border border-slate-200 p-4 flex items-center justify-between">' +
                    '<div>' +
                        '<a href="game.html?id=' + h.match_id + '" class="font-bold text-slate-800 hover:text-amber-600">' + (match.name || 'Partida ' + h.match_id) + '</a>' +
                        '<div class="flex gap-2 mt-1">' + typeLabel + '<span class="text-xs text-slate-500">' + (h.nation || '-') + ' • ' + formatDate(match.created_at) + '</span></div>' +
                    '</div>' +
                    '<div class="text-right">' +
                        '<div class="font-bold ' + ((h.kd_ratio || 0) >= 1 ? 'text-green-600' : 'text-orange-500') + '">' + (h.kd_ratio || 0) + ' KD</div>' +
                        '<div class="text-xs text-slate-500">' + (h.kills || 0).toLocaleString() + ' / ' + (h.deaths || 0).toLocaleString() + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function filterHistory(type) {
            document.querySelectorAll('.hist-filter').forEach(function(btn) {
                btn.className = btn.dataset.filter === type 
                    ? 'hist-filter px-3 py-1.5 text-sm rounded-lg bg-amber-500 text-white font-medium'
                    : 'hist-filter px-3 py-1.5 text-sm rounded-lg bg-white text-slate-600 border border-slate-200';
            });
            renderHistory(type === 'all' ? allHistory : allHistory.filter(function(h) { return h.match && h.match.match_type === type; }));
        }

        loadPlayer();
    </script>
</body>
</html>
