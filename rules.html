<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reglamento - Alliance Hub</title>
<script src="assets/js/theme.js?v=17"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=17"></script>
<script src="assets/js/base.js?v=17"></script>
<script src="assets/js/auth.js?v=17"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold mb-2">&#128220; Reglamento de Alliance Hub</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Normativa oficial para partidas, torneos y comportamiento de jugadores.</p>
<div class="mb-4"><input type="text" id="search-rules" placeholder="Buscar en el reglamento..." class="w-full px-4 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" oninput="filterRules(this.value)"></div>
<div id="rules-container" class="space-y-4">
<div class="text-center py-8" style="color:#9fa8da;">Cargando reglamento...</div>
</div>
<div class="mt-8 pt-6" style="border-top:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9878;&#65039; Precedentes y Jurisprudencia</h2>
<div id="precedents-container" class="space-y-3">
<div class="text-center py-4 text-sm" style="color:#9fa8da;">Cargando precedentes...</div>
</div>
</div>
</div>
<script src="sw-register.js?v=17"></script>
<script>
// v17: Carga reglas y precedentes de forma independiente
async function loadRules() {
    try {
        var { data, error } = await supabase.from('rule_sections').select('*').eq('is_active', true).order('order_index');
        if (error) throw error;
        var container = document.getElementById('rules-container');
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay reglas configuradas. Contacta a un administrador.</div>';
            return;
        }
        container.innerHTML = data.map(function(s) {
            var badge = s.visibility === 'officials_only' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#ff6f00;color:white;">OFICIALES</span>' :
                        s.visibility === 'training' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#2196f3;color:white;">CAPACITACION</span>' : '';
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;" data-search="' + ((s.title || '') + ' ' + (s.content || '')).toLowerCase() + '"><h3 class="font-bold text-lg mb-2" style="color:#ff8f00;">' + (s.order_index + 1) + '. ' + s.title + badge + '</h3><div class="text-sm leading-relaxed" style="color:#e8eaf6;">' + (s.content || '').replace(/\n/g, '<br>') + '</div></div>';
        }).join('');
    } catch(e) {
        console.error('[Rules]', e);
        document.getElementById('rules-container').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando reglamento: ' + (e.message || e) + '</div>';
    }
}

// v17: Carga precedentes de forma independiente, no depende de loadRules
async function loadPrecedents() {
    try {
        var { data, error } = await supabase.from('rule_precedents').select('*').eq('is_active', true).order('created_at', { ascending: false });
        if (error) throw error;
        var container = document.getElementById('precedents-container');
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">No hay precedentes registrados aun.</div>';
            return;
        }
        // Renderizado robusto que maneja campos opcionales
        container.innerHTML = data.map(function(p) {
            var severityLabel = '';
            if (p.severity === 'high') severityLabel = '<span class="text-[10px] px-1.5 py-0.5 rounded font-bold ml-2" style="background:rgba(198,40,40,0.2);color:#ef5350;">ALTO</span>';
            else if (p.severity === 'medium') severityLabel = '<span class="text-[10px] px-1.5 py-0.5 rounded font-bold ml-2" style="background:rgba(255,143,0,0.2);color:#ff8f00;">MEDIO</span>';
            else if (p.severity === 'low') severityLabel = '<span class="text-[10px] px-1.5 py-0.5 rounded font-bold ml-2" style="background:rgba(76,175,80,0.2);color:#4caf50;">LEVE</span>';

            var strikeInfo = p.strike_type ? '<p class="text-xs mt-1" style="color:#ff8f00;">Strike: ' + p.strike_type + '</p>' : '';
            var resolutionInfo = p.resolution ? '<p class="text-xs mt-1" style="color:#4caf50;">Resolucion: ' + p.resolution + '</p>' : '';
            var sectionRef = p.rule_section_id ? '<span class="text-[10px] ml-1" style="color:#9fa8da;">(Sec. #' + p.rule_section_id + ')</span>' : '';
            var dateStr = '';
            try { dateStr = formatDate(p.created_at); } catch(e) { dateStr = '-'; }

            return '<div class="rounded-lg p-4" style="background:#0a0e27;border:1px solid #1a237e;"><div class="flex items-start gap-3"><span class="text-2xl">&#9878;&#65039;</span><div class="flex-1"><h4 class="font-bold text-sm mb-1" style="color:#ff8f00;">' + p.title + sectionRef + severityLabel + '</h4><p class="text-sm mb-2" style="color:#e8eaf6;">' + p.description + '</p>' + strikeInfo + resolutionInfo + '<p class="text-xs mt-2" style="color:#9fa8da;">Aplicado: ' + dateStr + '</p></div></div></div>';
        }).join('');
    } catch(e) {
        console.error('[Precedents]', e);
        var container = document.getElementById('precedents-container');
        var errMsg = (e && e.message) ? e.message : String(e);
        container.innerHTML = '<div class="text-center py-4 text-sm text-red-400">Error cargando precedentes: ' + errMsg + '</div>';
    }
}

function filterRules(query) {
    var items = document.querySelectorAll('#rules-container > div[data-search]');
    var q = query.toLowerCase();
    items.forEach(function(item) { item.style.display = item.dataset.search.includes(q) ? '' : 'none'; });
}

// Cargar ambos de forma independiente
loadRules();
loadPrecedents();
</script>
</body>
</html>
