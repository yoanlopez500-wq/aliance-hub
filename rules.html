<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reglamento - Alliance Hub</title>
<!-- v18: Modular Architecture -->
<script src="assets/js/theme.js?v=18"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=18"></script>
<script src="assets/js/base.js?v=18"></script>
<!-- v18: DB Schema Centralizer -->
<script src="assets/js/db-schema.js?v=18"></script>
<script src="assets/js/roles-data.js?v=18"></script>
<script src="assets/js/auth-core.js?v=18"></script>
<script src="assets/js/messaging.js?v=18"></script>
<script src="assets/js/notifications.js?v=18"></script>
<script src="assets/js/nav-engine.js?v=18"></script>
<script src="assets/js/training.js?v=18"></script>
<script src="assets/js/components.js?v=18"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold mb-2">&#128220; Reglamento de Alliance Hub</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Normativa oficial para partidas, torneos y comportamiento de jugadores.</p>
<div class="flex flex-col sm:flex-row gap-3 mb-4">
<input type="text" id="search-rules" placeholder="Buscar en el reglamento..." class="flex-1 px-4 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" oninput="filterRules(this.value)">
</div>
<div id="rules-container" class="space-y-4">
<div class="text-center py-8" style="color:#9fa8da;">Cargando reglamento...</div>
</div>
<div class="mt-8 pt-6" style="border-top:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9878;&#65039; Precedentes y Jurisprudencia</h2>
<div id="precedents-container" class="space-y-3">
<div class="text-center py-4 text-sm" style="color:#9fa8da;">Cargando precedentes...</div>
</div>
</div>
</div>
<script src="sw-register.js?v=18"></script>
<script>
// v18: Load rules using centralized DB schema
async function loadRules() {
    try {
        // Use DB_SCHEMA centralized table/column definitions
        var { data, error } = await DB.from('ruleSections').select(DB.cols.ruleSections.basic);
        if (error) throw error;
        var container = document.getElementById('rules-container');
        if (!data || data.length === 0) {
            AhComponents.inject('empty-state', { message: 'No hay reglas configuradas. Contacta a un administrador.' }, 'rules-container');
            return;
        }
        container.innerHTML = data.map(function(s) {
            var badge = s[DB.tableCols('ruleSections').visibility] === 'officials_only' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#ff6f00;color:white;">OFICIALES</span>' :
                        s[DB.tableCols('ruleSections').visibility] === 'training' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#2196f3;color:white;">CAPACITACION</span>' : '';
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;" data-search="' + ((s[DB.tableCols('ruleSections').title] || '') + ' ' + (s[DB.tableCols('ruleSections').content] || '')).toLowerCase() + '"><h3 class="font-bold text-lg mb-2" style="color:#ff8f00;">' + (s[DB.tableCols('ruleSections').orderIndex] + 1) + '. ' + s[DB.tableCols('ruleSections').title] + badge + '</h3><div class="text-sm leading-relaxed" style="color:#e8eaf6;">' + (s[DB.tableCols('ruleSections').content] || '').replace(/\n/g, '<br>') + '</div></div>';
        }).join('');
    } catch(e) {
        console.error('[Rules]', e);
        AhComponents.inject('error-state', { message: 'Error cargando reglamento' }, 'rules-container');
    }
}

// v18: Load precedents using centralized DB schema
async function loadPrecedents() {
    try {
        var { data, error } = await DB.from('rulePrecedents').select(DB.cols.rulePrecedents.basic);
        if (error) throw error;
        var container = document.getElementById('precedents-container');
        if (!data || data.length === 0) {
            AhComponents.inject('empty-state', { message: 'No hay precedentes registrados aun.' }, 'precedents-container');
            return;
        }
        var pcols = DB.tableCols('rulePrecedents');
        container.innerHTML = data.map(function(p) {
            var severityLabel = '';
            if (p[pcols.severity] === 'high') severityLabel = '<span class="text-[10px] px-1.5 py-0.5 rounded font-bold ml-2" style="background:rgba(198,40,40,0.2);color:#ef5350;">ALTO</span>';
            else if (p[pcols.severity] === 'medium') severityLabel = '<span class="text-[10px] px-1.5 py-0.5 rounded font-bold ml-2" style="background:rgba(255,143,0,0.2);color:#ff8f00;">MEDIO</span>';
            else if (p[pcols.severity] === 'low') severityLabel = '<span class="text-[10px] px-1.5 py-0.5 rounded font-bold ml-2" style="background:rgba(76,175,80,0.2);color:#4caf50;">LEVE</span>';

            var strikeInfo = p[pcols.strikeType] ? '<p class="text-xs mt-1" style="color:#ff8f00;">Strike: ' + p[pcols.strikeType] + '</p>' : '';
            var resolutionInfo = p[pcols.resolution] ? '<p class="text-xs mt-1" style="color:#4caf50;">Resolucion: ' + p[pcols.resolution] + '</p>' : '';
            var sectionRef = p[pcols.ruleSectionId] ? '<span class="text-[10px] ml-1" style="color:#9fa8da;">(Sec. #' + p[pcols.ruleSectionId] + ')</span>' : '';
            var dateStr = '';
            try { dateStr = formatDate(p[pcols.createdAt]); } catch(e) { dateStr = '-'; }

            return '<div class="rounded-lg p-4" style="background:#0a0e27;border:1px solid #1a237e;"><div class="flex items-start gap-3"><span class="text-2xl">&#9878;&#65039;</span><div class="flex-1"><h4 class="font-bold text-sm mb-1" style="color:#ff8f00;">' + p[pcols.title] + sectionRef + severityLabel + '</h4><p class="text-sm mb-2" style="color:#e8eaf6;">' + p[pcols.description] + '</p>' + strikeInfo + resolutionInfo + '<p class="text-xs mt-2" style="color:#9fa8da;">Aplicado: ' + dateStr + '</p></div></div></div>';
        }).join('');
    } catch(e) {
        console.error('[Precedents]', e);
        AhComponents.inject('error-state', { message: 'Error cargando precedentes' }, 'precedents-container');
    }
}

function filterRules(query) {
    var items = document.querySelectorAll('#rules-container > div[data-search]');
    var q = query.toLowerCase();
    items.forEach(function(item) { item.style.display = item.dataset.search.includes(q) ? '' : 'none'; });
}

// Cargar ambos de forma independiente
loadRules();
loadPrecedents();
</script>
</body>
</html>
