<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reglamento - Alliance Hub</title>
<script src="assets/js/theme.js?v=27"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=27"></script>
<script src="assets/js/base.js?v=27"></script>
<script src="assets/js/roles-data.js?v=27"></script>
<script src="assets/js/auth-core.js?v=27"></script>
<script src="assets/js/db-schema.js?v=27"></script>
<script src="assets/js/messaging.js?v=27"></script>
<script src="assets/js/notifications.js?v=27"></script>
<script src="assets/js/nav-engine.js?v=27"></script>
<script src="assets/js/training.js?v=27"></script>
<script src="assets/js/components.js?v=27"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
.severity-high{background:rgba(198,40,40,0.15);color:#ef5350;border:1px solid rgba(198,40,40,0.3);}
.severity-medium{background:rgba(255,143,0,0.15);color:#ff8f00;border:1px solid rgba(255,143,0,0.3);}
.severity-low{background:rgba(76,175,80,0.15);color:#4caf50;border:1px solid rgba(76,175,80,0.3);}
.precedent-card{transition:all .2s ease}
.precedent-card:hover{border-color:#ff6f00!important}
/* Fix D: Hierarchical rule section styles */
.rule-subsection { margin-left: 1.5rem; border-left: 2px solid #1a237e; padding-left: 1rem; margin-top: 0.5rem; }
.rule-subsection .rule-subsection { margin-left: 1rem; border-left-color: #ff6f00; }
</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<div class="flex items-center justify-between mb-6">
<div>
<h1 class="text-3xl font-bold">&#128220; Reglamento</h1>
<p class="text-sm mt-1" style="color:#9fa8da;">Normas, sanciones, precedentes y jurisprudencia de Alliance Hub</p>
</div>
</div>
<div id="rules-content" class="space-y-4">Cargando reglamento...</div>
<div class="mt-8 pt-6" style="border-top:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9878;&#65039; Precedentes y Jurisprudencia</h2>
<div id="precedents-content" class="grid md:grid-cols-2 gap-3">Cargando...</div>
</div>
</div>
<script>
async function loadRules() {
    try {
        var { data, error } = await supabase.from('rule_sections').select('*').order('order_index');
        if (error) throw error;
        var container = document.getElementById('rules-content');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">No hay reglas configuradas.</div>'; return; }

        // Build hierarchy: parent sections first, then subsections
        var sectionsById = {};
        var rootSections = [];
        data.forEach(function(s) { sectionsById[s.id] = s; });

        // First pass: identify root sections (no parent or parent not found)
        data.forEach(function(s) {
            if (!s.parent_id || !sectionsById[s.parent_id]) { rootSections.push(s); }
        });

        function renderSection(s, level) {
            var indentClass = level > 0 ? 'rule-subsection' : '';
            var num = s.section_number || (s.order_index + 1);
            var sevClass = s.severity === 'high' ? 'severity-high' : s.severity === 'medium' ? 'severity-medium' : 'severity-low';
            var sevLabel = s.severity === 'high' ? 'GRAVE' : s.severity === 'medium' ? 'MEDIO' : 'LEVE';
            var html = '<div class="rounded-xl p-5 ' + indentClass + '" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-start justify-between gap-3"><div class="flex-1"><h3 class="font-bold text-sm" style="color:#ff8f00;">' + num + '. ' + s.title + '</h3><p class="text-sm mt-1" style="color:#e8eaf6;">' + (s.content || '').replace(/\n/g, '<br>') + '</p></div><span class="text-[10px] px-2 py-0.5 rounded font-bold shrink-0 ' + sevClass + '">' + sevLabel + '</span></div></div>';

            // Find and render children
            var children = data.filter(function(c) { return c.parent_id === s.id; });
            if (children.length > 0) {
                html += '<div class="rule-children">' + children.sort(function(a,b) { return (a.section_number || '') > (b.section_number || '') ? 1 : -1; }).map(function(c) { return renderSection(c, level + 1); }).join('') + '</div>';
            }
            return html;
        }

        container.innerHTML = rootSections.sort(function(a,b) { return (a.section_number || '') > (b.section_number || '') ? 1 : -1; }).map(function(s) { return renderSection(s, 0); }).join('');
    } catch(e) {
        console.error('[Rules]', e);
        document.getElementById('rules-content').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando reglamento: ' + e.message + '</div>';
    }
}

async function loadPrecedents() {
    try {
        var { data, error } = await supabase.from('rule_precedents').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        var container = document.getElementById('precedents-content');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">No hay precedentes registrados aun.</div>'; return; }
        container.innerHTML = data.map(function(p) {
            var sevClass = p.severity === 'high' ? 'severity-high' : p.severity === 'medium' ? 'severity-medium' : 'severity-low';
            return '<div class="precedent-card rounded-lg p-4" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-start gap-2"><span class="text-lg">&#9878;&#65039;</span><div class="flex-1"><h4 class="font-bold text-sm" style="color:#ff8f00;">' + p.title + '</h4><p class="text-xs mt-1" style="color:#e8eaf6;">' + p.description + '</p>' + (p.sanction ? '<p class="text-[10px] mt-2 px-2 py-0.5 rounded inline-block ' + sevClass + '">Sancion: ' + p.sanction + '</p>' : '') + '</div></div></div>';
        }).join('');
    } catch(e) {
        console.error('[Precedents]', e);
        document.getElementById('precedents-content').innerHTML = '<div class="text-center py-4 text-red-400">Error: ' + e.message + '</div>';
    }
}

loadRules();
loadPrecedents();
</script>
</body>
</html>
