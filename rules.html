<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reglamento - Alliance Hub</title>
<script src="assets/js/theme.js?v=16"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=16"></script>
<script src="assets/js/base.js?v=16"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold mb-2">&#128220; Reglamento de Alliance Hub</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Normativa oficial para partidas, torneos y comportamiento de jugadores.</p>
<div class="mb-4"><input type="text" id="search-rules" placeholder="Buscar en el reglamento..." class="w-full px-4 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" oninput="filterRules(this.value)"></div>
<div id="rules-container" class="space-y-4">
<div class="text-center py-8" style="color:#9fa8da;">Cargando reglamento...</div>
</div>
<div class="mt-8 pt-6" style="border-top:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9878;&#65039; Precedentes y Jurisprudencia</h2>
<div id="precedents-container" class="space-y-3">
<div class="text-center py-4 text-sm" style="color:#9fa8da;">Cargando precedentes...</div>
</div>
</div>
</div>
<script>
async function loadRules() {
    try {
        var { data, error } = await supabase.from('rule_sections').select('*').eq('is_active', true).order('order_index');
        if (error) throw error;
        var container = document.getElementById('rules-container');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay reglas configuradas. Contacta a un administrador.</div>'; return; }
        container.innerHTML = data.map(function(s) {
            var badge = s.visibility === 'officials_only' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#ff6f00;color:white;">OFICIALES</span>' : s.visibility === 'training' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#2196f3;color:white;">CAPACITACION</span>' : '';
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;" data-search="' + (s.title + ' ' + s.content).toLowerCase() + '"><h3 class="font-bold text-lg mb-2" style="color:#ff8f00;">' + (s.order_index + 1) + '. ' + s.title + badge + '</h3><div class="text-sm leading-relaxed" style="color:#e8eaf6;">' + (s.content || '').replace(/\n/g, '<br>') + '</div></div>';
        }).join('');
        var { data: latest } = await supabase.from('rule_sections').select('updated_at').eq('is_active', true).order('updated_at', { ascending: false }).limit(1);
        if (latest && latest[0]) {
            container.insertAdjacentHTML('afterbegin', '<p class="text-xs mb-4" style="color:#9fa8da;">Ultima actualizacion: ' + formatDateTime(latest[0].updated_at) + '</p>');
        }
        loadPrecedents();
    } catch(e) { console.error('[Rules]', e); document.getElementById('rules-container').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando reglamento: ' + e.message + '</div>'; }
}
async function loadPrecedents() {
    try {
        var { data, error } = await supabase.from('rule_precedents').select('*').eq('is_active', true).order('created_at', { ascending: false });
        if (error) throw error;
        var container = document.getElementById('precedents-container');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">No hay precedentes registrados aun.</div>'; return; }
        container.innerHTML = data.map(function(p) {
            return '<div class="rounded-lg p-4" style="background:#0a0e27;border:1px solid #1a237e;"><div class="flex items-start gap-3"><span class="text-2xl">&#9878;&#65039;</span><div class="flex-1"><h4 class="font-bold text-sm mb-1" style="color:#ff8f00;">' + p.title + '</h4><p class="text-sm mb-2" style="color:#e8eaf6;">' + p.description + '</p><p class="text-xs" style="color:#9fa8da;">Aplicado en: ' + formatDate(p.created_at) + '</p></div></div></div>';
        }).join('');
    } catch(e) { console.error('[Precedents]', e); document.getElementById('precedents-container').innerHTML = '<div class="text-center py-4 text-sm text-red-400">Error cargando precedentes</div>'; }
}
function filterRules(query) {
    var items = document.querySelectorAll('#rules-container > div[data-search]');
    var q = query.toLowerCase();
    items.forEach(function(item) { item.style.display = item.dataset.search.includes(q) ? '' : 'none'; });
}
loadRules();
</script>
</body>
</html>
