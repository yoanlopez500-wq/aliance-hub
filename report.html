<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Jugador - Alliance Hub</title>
    <script src="assets/js/theme.js?v=15"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="assets/js/config.js?v=15"></script>
    <script src="assets/js/base.js?v=15"></script>
    <script src="assets/js/auth.js?v=15"></script>
    <meta name="theme-color" content="#0a0e27">
    <style>
        .report-type-btn.selected { border-color: #ff8f00; background: rgba(255,143,0,0.1); color: #ffb74d; }
        .evidence-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #1a237e; }
        .search-result { cursor: pointer; padding: 8px 12px; border-bottom: 1px solid #1a237e; font-size: 13px; color: #e0e0e0; }
        .search-result:hover { background: #11183a; }
    </style>
</head>
<body class="bg-ah-bg min-h-screen text-ah-text" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-lg mx-auto px-4 py-6">
        <div class="mb-6">
            <a href="#" id="back-link" class="text-ah-accent font-bold text-sm hover:text-ah-accent/80">&#8592; Volver a la partida</a>
            <h1 class="text-2xl font-bold text-ah-text mt-2">&#128680; Reportar Jugador</h1>
            <p class="text-sm text-ah-muted mt-1">Reporta comportamiento sospechoso o trampas. Selecciona que regla se violo.</p>
        </div>

        <div id="reporter-info" class="bg-blue-900/20 border border-blue-800/30 rounded-xl p-3 mb-4">
            <p class="text-xs text-blue-400">Reportando como: <span id="reporter-name" class="font-bold">-</span></p>
        </div>

        <form id="report-form" class="bg-ah-card rounded-xl border border-ah-border p-5 space-y-4">
            <input type="hidden" id="match-id">

            <!-- NEW: Rule Section Selector -->
            <div>
                <label class="block text-xs font-medium text-ah-muted mb-1">&#128220; Regla violada *</label>
                <select id="rule-section-id" required class="w-full px-3 py-2 rounded-lg border border-ah-border bg-ah-bg text-ah-text focus:border-amber-500 outline-none text-sm">
                    <option value="">-- Selecciona la regla que se violo --</option>
                </select>
                <p class="text-xs mt-1" style="color:#9fa8da;opacity:0.6">Ayuda a los admins a clasificar y resolver mas rapido.</p>
            </div>

            <div>
                <label class="block text-xs font-medium text-ah-muted mb-1">Jugador a reportar *</label>
                <input type="text" id="reported-search" required class="w-full px-3 py-2 rounded-lg border border-ah-border bg-ah-bg text-ah-text focus:border-red-500 outline-none text-sm" placeholder="Escribe el nombre del jugador..." oninput="searchReportedPlayer(this.value)">
                <input type="hidden" id="reported-player-id" required>
                <div id="reported-results" class="mt-1 max-h-40 overflow-y-auto bg-ah-bg rounded-lg border border-ah-border hidden"></div>
                <p id="reported-selected" class="text-xs text-green-400 mt-1 font-bold hidden"></p>
            </div>

            <div>
                <label class="block text-xs font-medium text-ah-muted mb-2">Tipo de reporte *</label>
                <div class="grid grid-cols-2 gap-2" id="report-types">
                    <button type="button" onclick="selectReportType(this, 'gold_boost')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#128178; Oro, potenciadores o heroes</button>
                    <button type="button" onclick="selectReportType(this, 'multis')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#128101; Multi-cuentas</button>
                    <button type="button" onclick="selectReportType(this, 'team_kill')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#9876;&#65039; Team Kill</button>
                    <button type="button" onclick="selectReportType(this, 'abandono')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#127988;&#65039; Abandono</button>
                    <button type="button" onclick="selectReportType(this, 'toxico')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#128172; Comportamiento toxico</button>
                    <button type="button" onclick="selectReportType(this, 'bugs')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#128027; Bugs / Exploits</button>
                    <button type="button" onclick="selectReportType(this, 'colusion')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#129309; Colusion</button>
                    <button type="button" onclick="selectReportType(this, 'spam')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#128226; Spam / Flood</button>
                    <button type="button" onclick="selectReportType(this, 'otro')" class="report-type-btn px-3 py-2 rounded-lg border border-ah-border text-xs font-medium text-ah-muted hover:border-ah-accent/50">&#10067; Otro</button>
                </div>
                <input type="hidden" id="report-type" required>
            </div>

            <div>
                <label class="block text-xs font-medium text-ah-muted mb-1">Descripcion *</label>
                <textarea id="report-description" required rows="4" class="w-full px-3 py-2 rounded-lg border border-ah-border bg-ah-bg text-ah-text focus:border-red-500 outline-none text-sm" placeholder="Describe lo que viste con el mayor detalle posible..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-medium text-ah-muted mb-2">Evidencia (opcional, max 5 imagenes)</label>
                <div class="border-2 border-dashed border-ah-border rounded-xl p-4 text-center hover:border-red-400 transition cursor-pointer" onclick="document.getElementById('evidence-input').click()">
                    <div class="text-2xl mb-1">&#128247;</div>
                    <p class="text-xs text-ah-muted">Toca para subir imagenes</p>
                    <input type="file" id="evidence-input" accept="image/*" multiple class="hidden" onchange="handleEvidence(this)">
                </div>
                <div id="evidence-preview" class="flex gap-2 mt-2 flex-wrap"></div>
                <p class="text-xs text-ah-muted/70 mt-1">Max 5MB por imagen. Se comprimen automaticamente.</p>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-500 transition text-sm">
                &#128680; Enviar Reporte
            </button>
        </form>
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var matchId = urlParams.get('match_id');
        var playerData = getPlayerData();
        var registeredPlayersCache = [];
        var evidenceFiles = [];
        var ruleSectionsCache = [];

        if (!matchId) {
            showToast('No se especifico partida', 'error');
            setTimeout(function() { location.href = 'index.html'; }, 2000);
        }
        if (!isLazyLoggedIn()) {
            showToast('Debes iniciar sesion como jugador para reportar', 'error');
            setTimeout(function() { location.href = 'login-player.html'; }, 2000);
        }

        document.getElementById('match-id').value = matchId;
        document.getElementById('back-link').href = 'game.html?id=' + matchId;
        document.getElementById('reporter-name').textContent = playerData.displayName || 'Jugador ' + playerData.playerId;

        // Load rule sections for dropdown
        async function loadRuleSections() {
            try {
                var { data } = await supabase.from('rule_sections').select('*').eq('is_active', true).order('order_index');
                ruleSectionsCache = data || [];
                var sel = document.getElementById('rule-section-id');
                var opts = '<option value="">-- Selecciona la regla que se violo --</option>';
                // Group by parent
                var roots = ruleSectionsCache.filter(function(s) { return !s.parent_id; });
                var childMap = {};
                ruleSectionsCache.filter(function(s) { return s.parent_id; }).forEach(function(s) {
                    if (!childMap[s.parent_id]) childMap[s.parent_id] = [];
                    childMap[s.parent_id].push(s);
                });
                roots.forEach(function(r) {
                    opts += '<optgroup label="' + (r.section_number ? r.section_number + ' ' : '') + r.title + '">';
                    var children = childMap[r.id] || [];
                    children.forEach(function(c) {
                        opts += '<option value="' + c.id + '">' + (c.section_number ? c.section_number + ' ' : '') + c.title + '</option>';
                    });
                    // If no children, add root itself
                    if (children.length === 0) {
                        opts += '<option value="' + r.id + '">' + (r.section_number ? r.section_number + ' ' : '') + r.title + '</option>';
                    }
                    opts += '</optgroup>';
                });
                sel.innerHTML = opts;
            } catch(e) { console.error('[Report] Error cargando reglas:', e); }
        }
        loadRuleSections();

        async function loadRegisteredPlayers() {
            try {
                var { data: regs } = await supabase.from('match_registrations')
                    .select('player_id')
                    .eq('match_id', matchId)
                    .eq('status', 'confirmed');
                if (!regs || regs.length === 0) return;

                var playerIds = regs.map(function(r) { return r.player_id; }).filter(function(v, i, a) { return a.indexOf(v) === i; });
                var myId = parseInt(playerData.playerId);
                playerIds = playerIds.filter(function(id) { return id !== myId; });

                var { data: players } = await supabase.from('players').select('id, current_username').in('id', playerIds).order('current_username');
                registeredPlayersCache = players || [];
            } catch(e) { console.error('Error cargando jugadores:', e); }
        }
        loadRegisteredPlayers();

        function searchReportedPlayer(query) {
            var resultsDiv = document.getElementById('reported-results');
            if (!query || query.trim().length < 2) { resultsDiv.classList.add('hidden'); return; }

            var cleanQuery = query.trim().toLowerCase();
            var matches = registeredPlayersCache.filter(function(p) {
                return p.current_username && p.current_username.toLowerCase().indexOf(cleanQuery) !== -1;
            }).slice(0, 10);

            if (matches.length === 0) { resultsDiv.innerHTML = '<div class="p-3 text-xs text-ah-muted/70 text-center">Sin resultados</div>'; resultsDiv.classList.remove('hidden'); return; }

            resultsDiv.innerHTML = matches.map(function(p) {
                return '<div class="search-result" onclick="selectReportedPlayer(' + p.id + ', \'' + p.current_username.replace(/\\'/g, "\\\\'") + '\')">' +
                    '<span class="font-medium">' + p.current_username + '</span>' +
                    '<span class="text-ah-muted ml-2">ID: ' + p.id + '</span>' +
                '</div>';
            }).join('');
            resultsDiv.classList.remove('hidden');
        }

        function selectReportedPlayer(id, name) {
            document.getElementById('reported-player-id').value = id;
            document.getElementById('reported-search').value = name;
            document.getElementById('reported-results').classList.add('hidden');
            document.getElementById('reported-selected').textContent = '&#10003; Seleccionado: ' + name + ' (ID: ' + id + ')';
            document.getElementById('reported-selected').classList.remove('hidden');
        }

        function selectReportType(btn, type) {
            document.querySelectorAll('.report-type-btn').forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            document.getElementById('report-type').value = type;
        }

        async function handleEvidence(input) {
            var files = Array.from(input.files);
            if (evidenceFiles.length + files.length > 5) {
                showToast('Maximo 5 imagenes', 'warning');
                files = files.slice(0, 5 - evidenceFiles.length);
            }

            for (var i = 0; i < files.length; i++) {
                try {
                    var file = files[i];
                    if (file.size > 500 * 1024) {
                        file = await imageCompression(file, {
                            maxWidthOrHeight: 1280,
                            maxSizeMB: 0.8,
                            useWebWorker: true
                        });
                    }
                    evidenceFiles.push(file);
                } catch(e) {
                    showToast('Error comprimiendo imagen: ' + e.message, 'error');
                }
            }
            renderEvidencePreview();
        }

        function renderEvidencePreview() {
            var container = document.getElementById('evidence-preview');
            container.innerHTML = evidenceFiles.map(function(file, idx) {
                var url = URL.createObjectURL(file);
                return '<div class="relative"><img src="' + url + '" class="evidence-thumb"><button type="button" onclick="removeEvidence(' + idx + ')" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs font-bold">&#10005;</button></div>';
            }).join('');
        }

        function removeEvidence(idx) {
            evidenceFiles.splice(idx, 1);
            renderEvidencePreview();
        }

        document.getElementById('report-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                var ruleSectionId = document.getElementById('rule-section-id').value;
                var reportedId = parseInt(document.getElementById('reported-player-id').value);
                var type = document.getElementById('report-type').value;
                var description = document.getElementById('report-description').value.trim();

                if (!ruleSectionId) { showToast('Selecciona la regla que se violo', 'warning'); btn.disabled = false; btn.innerHTML = '&#128680; Enviar Reporte'; return; }
                if (!reportedId) { showToast('Selecciona un jugador', 'warning'); btn.disabled = false; btn.innerHTML = '&#128680; Enviar Reporte'; return; }
                if (!type) { showToast('Selecciona un tipo de reporte', 'warning'); btn.disabled = false; btn.innerHTML = '&#128680; Enviar Reporte'; return; }
                if (!description) { showToast('Escribe una descripcion', 'warning'); btn.disabled = false; btn.innerHTML = '&#128680; Enviar Reporte'; return; }

                var reportedName = '';
                var found = registeredPlayersCache.find(function(p) { return p.id === reportedId; });
                if (found) reportedName = found.current_username;

                var evidenceUrls = [];
                for (var i = 0; i < evidenceFiles.length; i++) {
                    var file = evidenceFiles[i];
                    var fileName = matchId + '_' + Date.now() + '_' + i + '.jpg';
                    var { data: uploadData, error: uploadError } = await supabase.storage
                        .from('report-evidence')
                        .upload(fileName, file, { contentType: file.type });
                    if (uploadError) { console.error('Error subiendo imagen:', uploadError); continue; }
                    var { data: urlData } = supabase.storage.from('report-evidence').getPublicUrl(fileName);
                    evidenceUrls.push(urlData.publicUrl);
                }

                var { error } = await supabase.from('player_reports').insert({
                    match_id: matchId,
                    player_id: parseInt(playerData.playerId),
                    player_name: playerData.displayName,
                    reported_player_id: reportedId,
                    reported_player_name: reportedName,
                    rule_section_id: ruleSectionId,
                    report_type: type,
                    description: description,
                    evidence_urls: evidenceUrls.length > 0 ? evidenceUrls : null,
                    status: 'pending'
                });

                if (error) throw error;

                showToast('Reporte enviado correctamente', 'success');
                setTimeout(function() { location.href = 'game.html?id=' + matchId; }, 1500);
            } catch(err) {
                showToast('Error: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '&#128680; Enviar Reporte';
            }
        });
    </script>
</body>
</html>
