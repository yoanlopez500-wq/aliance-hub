<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Jugador - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="assets/js/config.js?v=3"></script>
    <script src="assets/js/base.js?v=3"></script>
    <script src="assets/js/auth.js?v=3"></script>
    <meta name="theme-color" content="#0f172a">
    <style>
        .report-type-btn.selected { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
        .evidence-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; }
        .search-result { cursor: pointer; padding: 8px 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .search-result:hover { background: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-lg mx-auto px-4 py-6">
        <!-- Header -->
        <div class="mb-6">
            <a href="" id="back-link" class="text-amber-600 font-bold text-sm hover:text-amber-700">← Volver a la partida</a>
            <h1 class="text-2xl font-bold text-slate-800 mt-2">🚨 Reportar Jugador</h1>
            <p class="text-sm text-slate-500 mt-1">Reporta comportamiento sospechoso o trampas en la partida.</p>
        </div>

        <!-- Info del reportero -->
        <div id="reporter-info" class="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4">
            <p class="text-xs text-blue-600">Reportando como: <span id="reporter-name" class="font-bold">-</span></p>
        </div>

        <!-- Formulario -->
        <form id="report-form" class="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
            <!-- Partida (auto) -->
            <input type="hidden" id="match-id">

            <!-- Buscador de jugador reportado -->
            <div>
                <label class="block text-xs font-medium text-slate-700 mb-1">Jugador a reportar *</label>
                <input type="text" id="reported-search" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-red-500 outline-none text-sm" placeholder="Escribe el nombre del jugador..." oninput="searchReportedPlayer(this.value)">
                <input type="hidden" id="reported-player-id" required>
                <div id="reported-results" class="mt-1 max-h-40 overflow-y-auto bg-slate-50 rounded-lg border border-slate-200 hidden"></div>
                <p id="reported-selected" class="text-xs text-green-600 mt-1 font-bold hidden"></p>
            </div>

            <!-- Tipo de reporte -->
            <div>
                <label class="block text-xs font-medium text-slate-700 mb-2">Tipo de reporte *</label>
                <div class="grid grid-cols-2 gap-2" id="report-types">
                    <button type="button" onclick="selectReportType(this, 'gold_boost')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">💰 Oro, potenciadores o heroes</button>
                    <button type="button" onclick="selectReportType(this, 'multis')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">👥 Multi-cuentas</button>
                    <button type="button" onclick="selectReportType(this, 'team_kill')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">⚔️ Team Kill</button>
                    <button type="button" onclick="selectReportType(this, 'abandono')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">🏳️ Abandono</button>
                    <button type="button" onclick="selectReportType(this, 'toxico')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">💬 Comportamiento toxico</button>
                    <button type="button" onclick="selectReportType(this, 'bugs')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">🐛 Bugs / Exploits</button>
                    <button type="button" onclick="selectReportType(this, 'colusion')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">🤝 Colusion</button>
                    <button type="button" onclick="selectReportType(this, 'spam')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">📢 Spam / Flood</button>
                    <button type="button" onclick="selectReportType(this, 'otro')" class="report-type-btn px-3 py-2 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:border-amber-300">❓ Otro</button>
                </div>
                <input type="hidden" id="report-type" required>
            </div>

            <!-- Descripcion -->
            <div>
                <label class="block text-xs font-medium text-slate-700 mb-1">Descripcion *</label>
                <textarea id="report-description" required rows="4" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-red-500 outline-none text-sm" placeholder="Describe lo que viste con el mayor detalle posible..."></textarea>
            </div>

            <!-- Evidencia (imagenes) -->
            <div>
                <label class="block text-xs font-medium text-slate-700 mb-2">Evidencia (opcional, max 5 imagenes)</label>
                <div class="border-2 border-dashed border-slate-300 rounded-xl p-4 text-center hover:border-red-300 transition cursor-pointer" onclick="document.getElementById('evidence-input').click()">
                    <div class="text-2xl mb-1">📷</div>
                    <p class="text-xs text-slate-500">Toca para subir imagenes</p>
                    <input type="file" id="evidence-input" accept="image/*" multiple class="hidden" onchange="handleEvidence(this)">
                </div>
                <div id="evidence-preview" class="flex gap-2 mt-2 flex-wrap"></div>
                <p class="text-xs text-slate-400 mt-1">Max 5MB por imagen. Se comprimen automaticamente.</p>
            </div>

            <!-- Submit -->
            <button type="submit" id="submit-btn" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-500 transition text-sm">
                🚨 Enviar Reporte
            </button>
        </form>
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var matchId = urlParams.get('match_id');
        var playerData = getPlayerData();
        var registeredPlayersCache = [];
        var evidenceFiles = [];

        if (!matchId) {
            showToast('No se especifico partida', 'error');
            setTimeout(function() { location.href = 'index.html'; }, 2000);
        }
        if (!isLazyLoggedIn()) {
            showToast('Debes iniciar sesion como jugador para reportar', 'error');
            setTimeout(function() { location.href = 'login-player.html'; }, 2000);
        }

        document.getElementById('match-id').value = matchId;
        document.getElementById('back-link').href = 'game.html?id=' + matchId;
        document.getElementById('reporter-name').textContent = playerData.displayName || 'Jugador ' + playerData.playerId;

        // Cargar jugadores registrados en la partida para el buscador
        async function loadRegisteredPlayers() {
            try {
                var { data: regs } = await supabase.from('match_registrations')
                    .select('player_id')
                    .eq('match_id', matchId)
                    .eq('status', 'confirmed');
                if (!regs || regs.length === 0) return;

                var playerIds = regs.map(function(r) { return r.player_id; }).filter(function(v, i, a) { return a.indexOf(v) === i; });
                // Excluir al reportero
                var myId = parseInt(playerData.playerId);
                playerIds = playerIds.filter(function(id) { return id !== myId; });

                var { data: players } = await supabase.from('players').select('id, current_username').in('id', playerIds).order('current_username');
                registeredPlayersCache = players || [];
            } catch(e) { console.error('Error cargando jugadores:', e); }
        }
        loadRegisteredPlayers();

        function searchReportedPlayer(query) {
            var resultsDiv = document.getElementById('reported-results');
            if (!query || query.trim().length < 2) { resultsDiv.classList.add('hidden'); return; }

            var cleanQuery = query.trim().toLowerCase();
            var matches = registeredPlayersCache.filter(function(p) {
                return p.current_username && p.current_username.toLowerCase().indexOf(cleanQuery) !== -1;
            }).slice(0, 10);

            if (matches.length === 0) { resultsDiv.innerHTML = '<div class="p-3 text-xs text-slate-400 text-center">Sin resultados</div>'; resultsDiv.classList.remove('hidden'); return; }

            resultsDiv.innerHTML = matches.map(function(p) {
                return '<div class="search-result" onclick="selectReportedPlayer(' + p.id + ', \'' + p.current_username.replace(/\\'/g, "\\\\'") + '\')">' +
                    '<span class="font-medium">' + p.current_username + '</span>' +
                    '<span class="text-slate-400 ml-2">ID: ' + p.id + '</span>' +
                '</div>';
            }).join('');
            resultsDiv.classList.remove('hidden');
        }

        function selectReportedPlayer(id, name) {
            document.getElementById('reported-player-id').value = id;
            document.getElementById('reported-search').value = name;
            document.getElementById('reported-results').classList.add('hidden');
            document.getElementById('reported-selected').textContent = '✓ Seleccionado: ' + name + ' (ID: ' + id + ')';
            document.getElementById('reported-selected').classList.remove('hidden');
        }

        function selectReportType(btn, type) {
            document.querySelectorAll('.report-type-btn').forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            document.getElementById('report-type').value = type;
        }

        async function handleEvidence(input) {
            var files = Array.from(input.files);
            if (evidenceFiles.length + files.length > 5) {
                showToast('Maximo 5 imagenes', 'warning');
                files = files.slice(0, 5 - evidenceFiles.length);
            }

            for (var i = 0; i < files.length; i++) {
                try {
                    var file = files[i];
                    // Comprimir imagen
                    if (file.size > 500 * 1024) {
                        file = await imageCompression(file, {
                            maxWidthOrHeight: 1280,
                            maxSizeMB: 0.8,
                            useWebWorker: true
                        });
                    }
                    evidenceFiles.push(file);
                } catch(e) {
                    showToast('Error comprimiendo imagen: ' + e.message, 'error');
                }
            }
            renderEvidencePreview();
        }

        function renderEvidencePreview() {
            var container = document.getElementById('evidence-preview');
            container.innerHTML = evidenceFiles.map(function(file, idx) {
                var url = URL.createObjectURL(file);
                return '<div class="relative"><img src="' + url + '" class="evidence-thumb"><button type="button" onclick="removeEvidence(' + idx + ')" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs font-bold">✕</button></div>';
            }).join('');
        }

        function removeEvidence(idx) {
            evidenceFiles.splice(idx, 1);
            renderEvidencePreview();
        }

        document.getElementById('report-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                var reportedId = parseInt(document.getElementById('reported-player-id').value);
                var type = document.getElementById('report-type').value;
                var description = document.getElementById('report-description').value.trim();

                if (!reportedId) { showToast('Selecciona un jugador', 'warning'); btn.disabled = false; btn.textContent = '🚨 Enviar Reporte'; return; }
                if (!type) { showToast('Selecciona un tipo de reporte', 'warning'); btn.disabled = false; btn.textContent = '🚨 Enviar Reporte'; return; }
                if (!description) { showToast('Escribe una descripcion', 'warning'); btn.disabled = false; btn.textContent = '🚨 Enviar Reporte'; return; }

                // Subir imagenes a Supabase Storage
                var evidenceUrls = [];
                for (var i = 0; i < evidenceFiles.length; i++) {
                    var file = evidenceFiles[i];
                    var fileName = matchId + '_' + Date.now() + '_' + i + '.jpg';
                    var { data: uploadData, error: uploadError } = await supabase.storage
                        .from('report-evidence')
                        .upload(fileName, file, { contentType: file.type });
                    if (uploadError) {
                        console.error('Error subiendo imagen:', uploadError);
                        continue;
                    }
                    var { data: urlData } = supabase.storage.from('report-evidence').getPublicUrl(fileName);
                    evidenceUrls.push(urlData.publicUrl);
                }

                // Insertar reporte
                var { error } = await supabase.from('player_reports').insert({
                    match_id: matchId,
                    reporter_id: parseInt(playerData.playerId),
                    reporter_name: playerData.displayName,
                    reported_id: reportedId,
                    report_type: type,
                    description: description,
                    evidence_urls: evidenceUrls.length > 0 ? evidenceUrls : null,
                    status: 'pending'
                });

                if (error) throw error;

                showToast('Reporte enviado correctamente', 'success');
                setTimeout(function() { location.href = 'game.html?id=' + matchId; }, 1500);
            } catch(err) {
                showToast('Error: ' + err.message, 'error');
                btn.disabled = false;
                btn.textContent = '🚨 Enviar Reporte';
            }
        });
    </script>
</body>
</html>
