<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reportar Jugador - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/theme.js?v=18"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=18"></script>
<script src="assets/js/base.js?v=18"></script>
<script src="assets/js/components.js?v=18"></script>
<script src="assets/js/auth.js?v=18"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-2xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#128680; Reportar Jugador</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Reporta una infraccion del reglamento. Selecciona la seccion de la regla que fue violada.</p>
<div id="error-banner" class="hidden mb-4 p-3 rounded-lg text-sm font-bold" style="background:rgba(198,40,40,0.15);color:#ef5350;"></div>
<div id="success-msg" class="hidden mb-4 p-3 rounded-lg text-sm font-bold" style="background:rgba(46,125,50,0.15);color:#4caf50;"></div>
<form id="report-form" class="space-y-4">
<div><label class="block text-sm font-medium mb-1" style="color:#9fa8da;">ID del jugador reportado *</label><input type="number" id="r-player-id" required class="w-full px-3 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" placeholder="Ej: 24549130"></div>
<div><label class="block text-sm font-medium mb-1" style="color:#9fa8da;">Seccion del reglamento violada *</label><select id="r-rule" required class="w-full px-3 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;"><option value="">Seleccionar seccion...</option></select></div>
<div><label class="block text-sm font-medium mb-1" style="color:#9fa8da;">Descripcion de la infraccion *</label><textarea id="r-desc" rows="4" required class="w-full px-3 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" placeholder="Describe lo que ocurrio..."></textarea></div>
<div><label class="block text-sm font-medium mb-1" style="color:#9fa8da;">Evidencia (URL de imagen/video, opcional)</label><input type="url" id="r-evidence" class="w-full px-3 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" placeholder="https://..."></div>
<button type="submit" id="submit-btn" class="w-full py-3 rounded-lg font-bold text-sm transition active:scale-[0.98]" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white;">&#128680; Enviar Reporte</button>
</form>
</div>
<script src="sw-register.js?v=18"></script>
<script>
async function loadRules() {
    try {
        var { data, error } = await supabase.from('rule_sections').select('id, title').order('order_index');
        var select = document.getElementById('r-rule');
        select.innerHTML = '<option value="">Seleccionar seccion...</option>';
        if (data) data.forEach(function(r) { select.innerHTML += '<option value="' + r.id + '">' + r.title + '</option>'; });
    } catch(e) { console.error('[Rules]', e); }
}

document.getElementById('report-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submit-btn'); btn.disabled = true; btn.textContent = 'Enviando...';
    document.getElementById('error-banner').classList.add('hidden'); document.getElementById('success-msg').classList.add('hidden');
    try {
        var playerId = parseInt(document.getElementById('r-player-id').value);
        var ruleId = document.getElementById('r-rule').value;
        var desc = document.getElementById('r-desc').value.trim();
        var evidence = document.getElementById('r-evidence').value.trim() || null;
        if (!playerId || !ruleId || !desc) throw new Error('Completa todos los campos obligatorios');
        var reporterId = null; var playerData = getPlayerData(); if (playerData) reporterId = parseInt(playerData.playerId);
        var { error } = await supabase.from('player_reports').insert({ reported_player_id: playerId, reporter_player_id: reporterId, rule_section_id: ruleId, description: desc, evidence_url: evidence, status: 'open' });
        if (error) throw new Error(error.message);
        document.getElementById('success-msg').textContent = 'Reporte enviado correctamente. Un admin lo revisara pronto.';
        document.getElementById('success-msg').classList.remove('hidden');
        document.getElementById('report-form').reset();
    } catch(err) { document.getElementById('error-banner').textContent = err.message; document.getElementById('error-banner').classList.remove('hidden'); }
    btn.disabled = false; btn.textContent = '\uD83D\DEA8 Enviar Reporte';
});
loadRules();
</script>
</body>
</html>
