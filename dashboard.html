<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dashboard - Alliance Hub</title>
<!-- v18: Modular Architecture -->
<script src="assets/js/theme.js?v=18"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=18"></script>
<script src="assets/js/base.js?v=18"></script>
<script src="assets/js/roles-data.js?v=18"></script>
<script src="assets/js/auth-core.js?v=18"></script>
<script src="assets/js/messaging.js?v=18"></script>
<script src="assets/js/notifications.js?v=18"></script>
<script src="assets/js/nav-engine.js?v=18"></script>
<script src="assets/js/training.js?v=18"></script>
<script src="assets/js/components.js?v=18"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#127918; Partidas</h1>
<div id="matches-list">Cargando partidas...</div>
</div>
<script>
async function loadMatches() {
    try {
        var { data, error } = await supabase.from('matches').select('*, alliances(name, tag)').order('created_at', { ascending: false }).limit(50);
        if (error) throw error;
        if (!data || data.length === 0) {
            AhComponents.inject('empty-state', { message: 'No hay partidas registradas', icon: '&#127918;' }, 'matches-list');
            return;
        }
        // v18: Usa componente match-card reutilizable
        document.getElementById('matches-list').innerHTML = '<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">' + data.map(function(m) {
            return AhComponents.render('match-card', {
                match: m,
                alliance: m.alliances || null,
                href: 'game.html?id=' + m.id
            });
        }).join('') + '</div>';
    } catch(e) {
        console.error('[Dashboard]', e);
        AhComponents.inject('error-state', { message: 'Error cargando partidas', retry: true, onRetry: 'loadMatches()' }, 'matches-list');
    }
}
loadMatches();
</script>
</body>
</html>
