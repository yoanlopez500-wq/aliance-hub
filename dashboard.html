<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dashboard - Alliance Hub</title>
<!-- v18: Modular Architecture -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/theme.js?v=27"></script>
<script src="assets/js/config.js?v=27"></script>
<script src="assets/js/base.js?v=27"></script>
<!-- v18: DB Schema Centralizer -->
<script src="assets/js/db-schema.js?v=27"></script>
<script src="assets/js/roles-data.js?v=27"></script>
<script src="assets/js/auth-core.js?v=27"></script>
<script src="assets/js/messaging.js?v=27"></script>
<script src="assets/js/notifications.js?v=27"></script>
<script src="assets/js/nav-engine.js?v=27"></script>
<script src="assets/js/training.js?v=27"></script>
<script src="assets/js/components.js?v=27"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#127918; Partidas</h1>
<div id="matches-list">Cargando partidas...</div>
</div>
<script>
var allAlliances = [];

// Load alliances using centralized DB schema
async function loadAlliancesMap() {
    try {
        var { data, error } = await DB.from('alliances').select(DB.select('alliances', 'basic'));
        if (error) throw error;
        allAlliances = data || [];
    } catch(e) { console.error('[Dashboard] Error cargando alliances:', e); }
}

function getAlliance(allianceId) {
    if (!allianceId || !allAlliances.length) return null;
    return allAlliances.find(function(a) { return a.id === allianceId; }) || null;
}

async function loadMatches() {
    try {
        await loadAlliancesMap();
        var mc = DB.tableCols('matches');
        var { data, error } = await DB.from('matches').select(DB.select('matches', 'basic')).order(DB.col('matches', 'createdAt'), { ascending: false }).limit(50);
        if (error) throw error;
        if (!data || data.length === 0) {
            document.getElementById('matches-list').innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay partidas registradas</div>';
            return;
        }
        var ac = DB.tableCols('alliances');
        document.getElementById('matches-list').innerHTML = '<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">' + data.map(function(m) {
            var alliance = getAlliance(m[mc.allianceId]);
            var allianceLabel = alliance ? ' [' + alliance[ac.tag] + ']' : '';
            var statusBadge = m[mc.status] === 'open' ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(76,175,80,0.15);color:#4caf50;">ABIERTA</span>' : m[mc.status] === 'in_progress' ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(33,150,243,0.15);color:#2196f3;">EN CURSO</span>' : m[mc.status] === 'finished' ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(156,39,176,0.15);color:#ce93d8;">FINALIZADA</span>' : '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(255,143,0,0.15);color:#ff8f00;">BORRADOR</span>';
            var typeBadge = m[mc.matchType] === 'duel' ? '<span class="px-2 py-0.5 rounded text-xs font-bold ml-1" style="background:rgba(198,40,40,0.15);color:#ef5350;">DUELO</span>' : m[mc.matchType] === 'internal' ? '<span class="px-2 py-0.5 rounded text-xs font-bold ml-1" style="background:rgba(33,150,243,0.15);color:#2196f3;">INTERNA</span>' : '';
            return '<a href="game.html?id=' + (m[mc.id] || m.id) + '" class="block rounded-xl p-4 transition hover:opacity-90" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between mb-2"><div>' + statusBadge + typeBadge + '</div></div><h3 class="font-bold text-lg" style="color:#e8eaf6;">' + (m[mc.name] || 'Partida') + allianceLabel + '</h3><p class="text-xs mt-1" style="color:#9fa8da;">' + formatDate(m[mc.createdAt]) + ' | Max: ' + (m[mc.maxPlayers] || '-') + '</p></a>';
        }).join('') + '</div>';
    } catch(e) {
        console.error('[Dashboard]', e);
        document.getElementById('matches-list').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando partidas: ' + e.message + '<br><button onclick="loadMatches()" class="mt-3 px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Reintentar</button></div>';
    }
}
loadMatches();
</script>
</body>
</html>
