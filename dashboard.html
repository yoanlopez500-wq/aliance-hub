<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dashboard - Alliance Hub</title>
<script src="assets/js/theme.js?v=16"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=16"></script>
<script src="assets/js/base.js?v=16"></script>
<script src="assets/js/auth.js?v=16"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#127918; Partidas</h1>
<div id="matches-list">Cargando partidas...</div>
</div>
<script>
async function loadMatches() {
    try {
        var { data, error } = await supabase.from('matches').select('*, alliances(name, tag)').order('created_at', { ascending: false }).limit(50);
        if (error) throw error;
        var list = document.getElementById('matches-list');
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay partidas registradas</div>'; return; }
        list.innerHTML = '<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">' + data.map(function(m) { return '<a href="game.html?id=' + m.id + '" class="rounded-xl p-5 transition hover:opacity-90" style="background:#11183a;border:1px solid #1a237e;display:block;"><div class="flex items-center justify-between mb-2"><h3 class="font-bold">' + (m.name || 'Partida') + '</h3>' + getStatusBadge(m.status) + '</div><p class="text-xs" style="color:#9fa8da;">' + (m.alliances ? m.alliances.name : 'Sin alianza') + '</p><p class="text-xs mt-2" style="color:#9fa8da;">' + formatDate(m.created_at) + '</p></a>'; }).join('') + '</div>';
    } catch(e) { console.error('[Dashboard]', e); document.getElementById('matches-list').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando partidas</div>'; }
}
loadMatches();
</script>
</body>
</html>
