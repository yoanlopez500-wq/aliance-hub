<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Detalle de Partida - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/theme.js?v=17"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=17"></script>
<script src="assets/js/base.js?v=17"></script>
<script src="assets/js/auth.js?v=17"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
input,select,textarea{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}
input:focus,select:focus,textarea:focus{border-color:#ff6f00!important;outline:none!important;}
</style>
</head>
<body class="min-h-screen">

<!-- Player Nav -->
<div id="player-nav" class="sticky top-0 z-40 backdrop-blur-md border-b" style="background:rgba(10,14,39,0.8);border-color:#1a237e;">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="dashboard.html" class="text-lg font-bold" style="color:#ff8f00;">&#127918; Alliance Hub</a>
<div class="flex items-center gap-2" id="nav-actions"></div>
</div></div>

<div class="max-w-6xl mx-auto px-4 py-8">

<!-- Match Header -->
<div id="match-header"><div class="text-center py-8" style="color:#9fa8da;">Cargando...</div></div>

<!-- Player Actions (register/unregister) -->
<div id="player-actions-section" class="mt-6 hidden">
<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="font-bold mb-3 text-sm" style="color:#ff8f00;">&#9889; Tu Participacion</h2>
<div id="player-action-content"></div>
</div></div>

<!-- Game Credentials (only if registered) -->
<div id="credentials-section" class="mt-6 hidden">
<div class="rounded-xl p-4" style="background:rgba(76,175,80,0.05);border:1px solid rgba(76,175,80,0.2);">
<h2 class="font-bold mb-3 text-sm" style="color:#4caf50;">&#128272; Credenciales del Juego</h2>
<div class="grid grid-cols-2 gap-3">
<div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">ID del Juego</p><p class="font-bold" style="color:#e8eaf6;" id="cred-game-id">-</p></div>
<div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Contrasena</p><p class="font-bold" style="color:#e8eaf6;" id="cred-password">-</p></div>
</div>
</div></div>

<!-- Registrations -->
<div id="registrations-section" class="mt-6 mb-6">
<h2 class="text-xl font-bold mb-3">&#128100; Registrados (<span id="reg-count">0</span>)</h2>
<div id="reg-desktop" class="hidden md:block rounded-xl overflow-hidden" style="background:#11183a;border:1px solid #1a237e;"><div class="text-center py-4 text-sm" style="color:#9fa8da;">Cargando...</div></div>
<div id="reg-mobile" class="md:hidden space-y-2"></div>
</div>

<!-- Results -->
<div id="results-section" class="mb-6">
<h2 class="text-xl font-bold mb-3">&#128202; Resultados</h2>
<div id="results-desktop" class="hidden md:block rounded-xl overflow-hidden" style="background:#11183a;border:1px solid #1a237e;"><div class="text-center py-4 text-sm" style="color:#9fa8da;">Sin resultados</div></div>
<div id="results-mobile" class="md:hidden space-y-2"></div>
</div>

</div><!-- /max-w-6xl -->

<script>
var matchId = new URLSearchParams(window.location.search).get('id');
var currentMatch = null;
var isRegistered = false;
var currentPlayerId = null;

async function initPage() {
    var playerData = getPlayerData();
    if (playerData) {
        currentPlayerId = parseInt(playerData.playerId);
        renderPlayerNav(playerData.displayName);
    } else {
        renderGuestNav();
    }
    if (!matchId) {
        document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">No se especifico ID de partida</div>';
        return;
    }
    await loadMatch();
}

function renderPlayerNav(name) {
    document.getElementById('nav-actions').innerHTML =
        '<span class="text-xs font-medium hidden sm:inline" style="color:#9fa8da;">' + name + '</span>' +
        '<button onclick="logoutPlayer()" class="px-3 py-1.5 rounded-lg text-xs font-bold hover:opacity-80 transition" style="background:#1a237e;color:#ef5350;">Salir</button>';
}
function renderGuestNav() {
    document.getElementById('nav-actions').innerHTML =
        '<a href="login-player.html" class="px-3 py-1.5 rounded-lg text-xs font-bold hover:opacity-80 transition" style="background:#1a237e;color:#e8eaf6;">Iniciar Sesion</a>' +
        '<a href="login.html" class="px-3 py-1.5 rounded-lg text-xs font-bold hover:opacity-80 transition" style="background:rgba(255,143,0,0.15);color:#ff8f00;">Admin</a>';
}

async function loadMatch() {
    try {
        var { data: match, error } = await supabase.from('matches').select('*').eq('id', matchId).single();
        if (error || !match) {
            document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">Partida no encontrada</div>';
            return;
        }
        currentMatch = match;

        var alliance = null;
        if (match.alliance_id) {
            var { data: alli } = await supabase.from('alliances').select('name, tag').eq('id', match.alliance_id).single();
            alliance = alli;
        }
        currentMatch.alliance = alliance;

        var allianceInfo = alliance ? ' [' + alliance.tag + ']' : '';
        var statusBadge = getStatusBadge(match.status);
        var typeBadge = getTypeBadge(match.match_type || match.type);

        var descSection = match.description ? '<div class="mt-3 p-3 rounded-lg text-sm" style="background:#0a0e27;color:#9fa8da;">' + match.description + '</div>' : '';

        document.getElementById('match-header').innerHTML =
            '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;">' +
            '<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3">' +
            '<div><h1 class="text-2xl font-bold" style="color:#e8eaf6;">&#127918; ' + (match.name || 'Partida') + allianceInfo + '</h1>' +
            '<div class="flex gap-2 mt-1 flex-wrap">' + statusBadge + ' ' + typeBadge + '</div></div>' +
            '<a href="dashboard.html" class="px-3 py-1.5 rounded-lg font-bold text-sm hover:opacity-80 transition self-start" style="background:#1a237e;color:#e8eaf6;">&larr; Volver</a></div>' +
            '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">' +
            '<div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">ID Juego</p><p class="font-bold" style="color:#e8eaf6;">' + (match.game_id || '-') + '</p></div>' +
            '<div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Max Jugadores</p><p class="font-bold" style="color:#e8eaf6;">' + (match.max_players || '-') + '</p></div>' +
            '<div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Creada</p><p class="font-bold" style="color:#e8eaf6;">' + formatDate(match.created_at) + '</p></div>' +
            '<div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Alianza</p><p class="font-bold" style="color:#e8eaf6;">' + (alliance ? alliance.name : 'Ninguna') + '</p></div>' +
            '</div>' + descSection + '</div>';

        await Promise.all([checkRegistration(), loadRegistrations(), loadResults()]);
    } catch(e) {
        console.error(e);
        document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>';
    }
}

async function checkRegistration() {
    if (!currentPlayerId || !matchId) return;
    try {
        var { data: reg, error } = await supabase.from('match_registrations')
            .select('*')
            .eq('match_id', matchId)
            .eq('player_id', currentPlayerId)
            .maybeSingle();
        if (error) throw error;

        isRegistered = !!reg;
        var section = document.getElementById('player-actions-section');
        var content = document.getElementById('player-action-content');
        var creds = document.getElementById('credentials-section');
        section.classList.remove('hidden');

        if (isRegistered) {
            content.innerHTML =
                '<p class="text-sm mb-2" style="color:#4caf50;">&#10003; Estas registrado en esta partida</p>' +
                '<button onclick="unregisterFromMatch(\'' + matchId + '\')" class="px-3 py-2 rounded-lg text-xs font-bold hover:opacity-80 transition" style="background:rgba(198,40,40,0.2);color:#ef5350;border:1px solid rgba(198,40,40,0.3);">&#128465; Cancelar mi registro</button>';

            if (currentMatch && (currentMatch.status === 'in_progress' || currentMatch.status === 'finished')) {
                creds.classList.remove('hidden');
                document.getElementById('cred-game-id').textContent = currentMatch.game_id || '-';
                document.getElementById('cred-password').textContent = currentMatch.game_password || '-';
            } else {
                creds.classList.add('hidden');
            }
        } else {
            content.innerHTML =
                '<p class="text-sm mb-2" style="color:#9fa8da;">Aun no estas registrado en esta partida.</p>' +
                '<button onclick="handleRegister()" class="px-4 py-2 rounded-lg text-xs font-bold hover:opacity-80 transition" style="background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff;">&#10133; Registrarme</button>';
            creds.classList.add('hidden');
        }
    } catch(e) { console.error('checkRegistration error:', e); }
}

async function handleRegister() {
    if (!currentPlayerId) { showToast('Inicia sesion como jugador primero', 'warning'); return; }
    try {
        var { error } = await supabase.from('match_registrations').insert({
            match_id: matchId,
            player_id: currentPlayerId,
            status: 'confirmed'
        });
        if (error) { showToast('Error: ' + error.message, 'error'); return; }
        showToast('Registrado correctamente', 'success');
        checkRegistration();
        loadRegistrations();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function loadRegistrations() {
    try {
        var { data: registrations, error } = await supabase.from('match_registrations').select('*').eq('match_id', matchId).order('registered_at', { ascending: false });
        if (error) throw error;
        var regs = registrations || [];
        document.getElementById('reg-count').textContent = regs.length;
        if (regs.length === 0) {
            document.getElementById('reg-desktop').innerHTML = '<div class="text-center py-6 text-sm" style="color:#9fa8da;">Sin registrados aun</div>';
            document.getElementById('reg-mobile').innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">Sin registrados aun</div>';
            return;
        }

        var playerIds = regs.map(function(r) { return r.player_id; }).filter(function(v, i, a) { return a.indexOf(v) === i; });
        var { data: players } = await supabase.from('players').select('id, current_username, total_kills, total_deaths, games_played').in('id', playerIds);
        var playersMap = {};
        (players || []).forEach(function(p) { playersMap[p.id] = p; });

        var html = '<div class="divide-y" style="border-color:#1a237e;">' + regs.map(function(r) {
            var p = playersMap[r.player_id] || {};
            var kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills || 0;
            var isMe = currentPlayerId && r.player_id === currentPlayerId;
            var meBadge = isMe ? '<span class="px-1.5 py-0.5 rounded text-[10px] font-bold" style="background:rgba(76,175,80,0.2);color:#4caf50;">TU</span>' : '';
            return '<div class="p-3 hover:bg-white/5 transition-colors flex items-center gap-3">' +
                '<div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0" style="background:rgba(33,150,243,0.15);color:#2196f3;">' + (p.current_username ? p.current_username.charAt(0).toUpperCase() : '?') + '</div>' +
                '<div class="min-w-0 flex-1">' +
                '<div class="flex items-center gap-1 flex-wrap">' +
                '<span class="font-bold text-sm" style="color:#e8eaf6;">' + (p.current_username || 'Jugador ' + r.player_id) + '</span>' + meBadge +
                '</div>' +
                '<div class="text-xs" style="color:#9fa8da;">KD: ' + kd + ' | ' + (p.games_played || 0) + ' partidas</div>' +
                '</div></div>';
        }).join('') + '</div>';
        document.getElementById('reg-desktop').innerHTML = html;
        document.getElementById('reg-mobile').innerHTML = html;
    } catch(e) {
        console.error('Error en loadRegistrations:', e);
        document.getElementById('reg-desktop').innerHTML = '<div class="text-center py-4 text-red-400 text-sm">Error cargando registrados</div>';
    }
}

async function loadResults() {
    try {
        var { data: results, error } = await supabase.from('match_results').select('*').eq('match_id', matchId).order('imported_at', { ascending: false });
        if (error) throw error;
        var res = results || [];
        if (res.length === 0) {
            document.getElementById('results-desktop').innerHTML = '<div class="text-center py-6 text-sm" style="color:#9fa8da;">Sin resultados aun</div>';
            document.getElementById('results-mobile').innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">Sin resultados aun</div>';
            return;
        }

        var playerIds = res.map(function(r) { return r.player_id; }).filter(function(v, i, a) { return a.indexOf(v) === i; });
        var { data: players } = await supabase.from('players').select('id, current_username').in('id', playerIds);
        var playersMap = {};
        (players || []).forEach(function(p) { playersMap[p.id] = p; });

        var html = '<div class="divide-y" style="border-color:#1a237e;">' + res.map(function(r) {
            var p = playersMap[r.player_id] || {};
            var isMe = currentPlayerId && r.player_id === currentPlayerId;
            var meBadge = isMe ? '<span class="ml-1 px-1.5 py-0.5 rounded text-[10px] font-bold" style="background:rgba(76,175,80,0.2);color:#4caf50;">TU</span>' : '';
            return '<div class="p-3 flex items-center justify-between hover:bg-white/5 transition-colors">' +
                '<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold" style="background:rgba(76,175,80,0.15);color:#4caf50;">' + (p.current_username ? p.current_username.charAt(0).toUpperCase() : '?') + '</div>' +
                '<div><p class="font-medium text-sm" style="color:#e8eaf6;">' + (p.current_username || 'Jugador ' + r.player_id) + meBadge + '</p><p class="text-xs" style="color:#9fa8da;">' + (r.nation || '-') + '</p></div></div>' +
                '<div class="text-right text-xs"><p style="color:#4caf50;font-weight:bold;">' + (r.kills || 0) + ' bajas</p><p style="color:#ef5350;">' + (r.deaths || 0) + ' muertes</p><p class="font-bold" style="color:#e8eaf6;">KD: ' + (r.kd_ratio || 0) + '</p></div></div>';
        }).join('') + '</div>';
        document.getElementById('results-desktop').innerHTML = html;
        document.getElementById('results-mobile').innerHTML = html;
    } catch(e) {
        console.error('Error en loadResults:', e);
        document.getElementById('results-desktop').innerHTML = '<div class="text-center py-4 text-red-400 text-sm">Error cargando resultados</div>';
    }
}

initPage();
</script>
</body>
</html>
