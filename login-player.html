<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - Alliance Hub</title>
<script src="assets/js/theme.js?v=13"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=13"></script>
<script src="assets/js/base.js?v=13"></script>
<script src="assets/js/auth.js?v=13"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
input:focus{outline:none;border-color:#ff6f00!important}
</style>
<meta name="theme-color" content="#0a0e27">
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8" data-role="public">

<div class="w-full max-w-md">
<!-- Logo -->
<div class="text-center mb-8">
<div class="text-5xl mb-3">&#9876;&#65039;</div>
<h1 class="text-2xl font-bold" style="color:#ff8f00">Alliance Hub</h1>
<p class="text-sm mt-1" style="color:#9fa8da">Entra con tu ID de Supremacy 1914</p>
</div>

<!-- VIEW: Login -->
<div id="view-login" class="rounded-2xl p-8" style="background:#11183a;border:1px solid #1a237e">
<form id="login-form" class="space-y-4">
<div><label class="block text-sm font-medium mb-1" style="color:#9fa8da">ID del Jugador (numero)</label>
<input type="number" id="player-id" required class="w-full px-4 py-3 rounded-xl text-white text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e" placeholder="Ej: 99702975"></div>
<div><label class="block text-sm font-medium mb-1" style="color:#9fa8da">Username de Supremacy 1914</label>
<input type="text" id="username" required class="w-full px-4 py-3 rounded-xl text-white text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e" placeholder="Ej: Tlaloc27"></div>
<button type="submit" class="w-full font-bold py-3 rounded-xl transition active:scale-[0.98]" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white">Entrar</button>
</form>
<div id="error-msg" class="mt-4 text-sm text-center hidden" style="color:#ef5350"></div>
<div class="mt-6 text-center space-y-2">
<a href="login.html" class="text-sm font-bold block" style="color:#ff8f00">Soy Admin &rarr; Login Admin</a>
<a href="index.html" class="text-sm block" style="color:#9fa8da;opacity:0.6">&larr; Volver al inicio</a>
</div>
</div>

<!-- VIEW: Security Questions Setup (first time) -->
<div id="view-setup-security" class="hidden rounded-2xl p-8" style="background:#11183a;border:1px solid #1a237e">
<div class="text-center mb-4">
<div class="text-3xl mb-2">&#128272;</div>
<h2 class="text-lg font-bold text-white">Configura tu Seguridad</h2>
<p class="text-sm" style="color:#9fa8da">Estas preguntas se usaran solo si entras desde otro dispositivo.</p>
</div>
<form id="security-setup-form" class="space-y-4">
<div>
    <label class="block text-xs font-medium mb-1" style="color:#9fa8da">Pregunta 1: &#191;Cual es el nombre de tu primera alianza en Supremacy 1914?</label>
    <input type="text" id="sec-ans-1" required class="w-full px-4 py-3 rounded-xl text-white text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e" placeholder="Tu respuesta">
</div>
<div>
    <label class="block text-xs font-medium mb-1" style="color:#9fa8da">Pregunta 2: &#191;Cual es tu pais favorito en Supremacy 1914?</label>
    <input type="text" id="sec-ans-2" required class="w-full px-4 py-3 rounded-xl text-white text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e" placeholder="Tu respuesta">
</div>
<button type="submit" class="w-full font-bold py-3 rounded-xl transition active:scale-[0.98]" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white">Guardar y Entrar</button>
</form>
<div id="setup-error" class="mt-3 text-sm text-center hidden" style="color:#ef5350"></div>
</div>

<!-- VIEW: Security Check (new device) -->
<div id="view-security-check" class="hidden rounded-2xl p-8" style="background:#11183a;border:1px solid #1a237e">
<div class="text-center mb-4">
<div class="text-3xl mb-2">&#128373;&#65039;</div>
<h2 class="text-lg font-bold text-white">Verificacion de Seguridad</h2>
<p class="text-sm" style="color:#9fa8da">Parece que estas en un dispositivo nuevo. Responde tus preguntas.</p>
<p class="text-xs mt-1" style="color:#9fa8da;opacity:0.6">Jugador: <strong id="sec-check-name" class="text-white">-</strong></p>
</div>
<form id="security-check-form" class="space-y-4">
<div>
    <label id="sec-q-1" class="block text-xs font-medium mb-1" style="color:#9fa8da">Pregunta 1</label>
    <input type="text" id="sec-check-ans-1" required class="w-full px-4 py-3 rounded-xl text-white text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e" placeholder="Tu respuesta">
</div>
<div>
    <label id="sec-q-2" class="block text-xs font-medium mb-1" style="color:#9fa8da">Pregunta 2</label>
    <input type="text" id="sec-check-ans-2" required class="w-full px-4 py-3 rounded-xl text-white text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e" placeholder="Tu respuesta">
</div>
<button type="submit" class="w-full font-bold py-3 rounded-xl transition active:scale-[0.98]" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white">Verificar y Entrar</button>
</form>
<div id="sec-check-error" class="mt-3 text-sm text-center hidden" style="color:#ef5350"></div>
<button onclick="resetToLogin()" class="w-full mt-3 py-2 rounded-lg text-sm transition" style="background:rgba(255,255,255,0.03);color:#9fa8da">&larr; Usar otra cuenta</button>
</div>

</div>

<script>
var pendingPlayerId = null;
var pendingUsername = null;

// Device ID: se guarda en localStorage y en player_tokens.token
function getDeviceId() {
    var stored = localStorage.getItem('ah_device_id');
    if (stored) return stored;
    var id = 'dvc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem('ah_device_id', id);
    return id;
}

function showView(view) {
    ['login','setup-security','security-check'].forEach(function(v){
        var el = document.getElementById('view-'+v);
        if(el) el.classList.add('hidden');
    });
    document.getElementById('view-'+view).classList.remove('hidden');
}
function showError(id, msg) { var el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); }
function hideError(id) { var el = document.getElementById(id); if(el) el.classList.add('hidden'); }

function resetToLogin() {
    pendingPlayerId = null; pendingUsername = null;
    localStorage.removeItem('ah_v2_player_id');
    localStorage.removeItem('ah_v2_display_name');
    document.getElementById('login-form').reset();
    hideError('error-msg'); hideError('setup-error'); hideError('sec-check-error');
    showView('login');
}

// ====== AUTO-LOGIN (PWA + Browser) ======
async function autoLoginPlayer() {
    var savedId = localStorage.getItem('ah_v2_player_id');
    var savedName = localStorage.getItem('ah_v2_display_name');
    if (!savedId || !savedName) return;
    try {
        var { data: tok } = await supabase.from('player_tokens').select('token').eq('player_id', parseInt(savedId)).maybeSingle();
        var currentDevice = getDeviceId();
        if (tok && tok.token === currentDevice) {
            window.location.href = 'dashboard.html';
        }
    } catch(e) {
        console.log('[AutoLogin] No se pudo verificar:', e);
    }
}

// pageshow handler para bfcache (PWA)
window.addEventListener('pageshow', function(event) {
    if (event.persisted) autoLoginPlayer();
});

// ====== LOGIN ======
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var playerId = document.getElementById('player-id').value;
    var username = document.getElementById('username').value.trim();
    hideError('error-msg'); hideError('setup-error');

    try {
        var { data: player, error: pErr } = await supabase.from('players').select('id').eq('id', parseInt(playerId)).maybeSingle();
        if (pErr) throw pErr;
        if (!player) {
            var { error: createErr } = await supabase.from('players').insert({
                id: parseInt(playerId), current_username: username, status: 'active'
            });
            if (createErr && createErr.code !== '23505') throw createErr;
        }

        localStorage.setItem('ah_v2_player_id', playerId);
        localStorage.setItem('ah_v2_display_name', username);
        pendingPlayerId = playerId;
        pendingUsername = username;

        var { data: sec, error: sErr } = await supabase.from('player_security').select('*').eq('player_id', parseInt(playerId)).maybeSingle();
        if (sErr && sErr.code !== 'PGRST116') throw sErr;

        if (!sec) { showView('setup-security'); return; }

        var { data: tok, error: tErr } = await supabase.from('player_tokens').select('token').eq('player_id', parseInt(playerId)).maybeSingle();
        if (tErr && tErr.code !== 'PGRST116') throw tErr;

        var currentDevice = getDeviceId();
        if (tok && tok.token && tok.token !== currentDevice) {
            document.getElementById('sec-check-name').textContent = username + ' (ID: ' + playerId + ')';
            document.getElementById('sec-q-1').textContent = 'Pregunta 1: ' + sec.question_1;
            document.getElementById('sec-q-2').textContent = 'Pregunta 2: ' + sec.question_2;
            showView('security-check');
            return;
        }

        await doLogin(playerId, username);

    } catch(e) {
        console.error('[Login] Error:', e);
        showError('error-msg', 'Error: ' + (e.message || 'No se pudo conectar'));
    }
});

// ====== SETUP SECURITY ======
document.getElementById('security-setup-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError('setup-error');
    if (!pendingPlayerId) { showError('setup-error', 'Error de sesion'); return; }

    var ans1 = document.getElementById('sec-ans-1').value.trim().toLowerCase();
    var ans2 = document.getElementById('sec-ans-2').value.trim().toLowerCase();

    try {
        var { error: s1 } = await supabase.from('player_security').insert({
            player_id: parseInt(pendingPlayerId), question_1: 'Cual es el nombre de tu primera alianza en Supremacy 1914?', answer_1: ans1,
            question_2: 'Cual es tu pais favorito en Supremacy 1914?', answer_2: ans2
        });
        if (s1) throw s1;

        var deviceId = getDeviceId();
        var { error: s2 } = await supabase.from('player_tokens').upsert({
            player_id: parseInt(pendingPlayerId), token: deviceId
        }, { onConflict: 'player_id' });
        if (s2) throw s2;

        await doLogin(pendingPlayerId, pendingUsername);
    } catch(e) {
        console.error('[Login] Setup:', e);
        showError('setup-error', 'Error: ' + (e.message || 'intenta de nuevo'));
    }
});

// ====== SECURITY CHECK ======
document.getElementById('security-check-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError('sec-check-error');
    if (!pendingPlayerId) { showError('sec-check-error', 'Error de sesion'); return; }

    var ans1 = document.getElementById('sec-check-ans-1').value.trim().toLowerCase();
    var ans2 = document.getElementById('sec-check-ans-2').value.trim().toLowerCase();

    try {
        var { data: sec, error: sErr } = await supabase.from('player_security').select('*').eq('player_id', parseInt(pendingPlayerId)).single();
        if (sErr) throw sErr;

        if (sec.answer_1 !== ans1 || sec.answer_2 !== ans2) {
            showError('sec-check-error', 'Respuestas incorrectas.');
            return;
        }

        var deviceId = getDeviceId();
        var { error: tokErr } = await supabase.from('player_tokens').upsert({
            player_id: parseInt(pendingPlayerId), token: deviceId
        }, { onConflict: 'player_id' });
        if (tokErr) throw tokErr;

        await doLogin(pendingPlayerId, pendingUsername);
    } catch(e) {
        console.error('[Login] Check:', e);
        showError('sec-check-error', 'Error: ' + (e.message || 'intenta de nuevo'));
    }
});

async function doLogin(playerId, username) {
    var result = await lazyLogin(playerId, username);
    if (result.success) {
        window.location.href = 'dashboard.html';
    } else {
        showError('error-msg', result.message || 'Error en login');
        showView('login');
    }
}

document.addEventListener('DOMContentLoaded', autoLoginPlayer);
</script>
</body>
</html>
