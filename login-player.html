<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Alliance Hub V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/base.js"></script>
    <script src="assets/js/pwa-utils.js"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">⚔️</div>
            <h1 class="text-2xl font-bold text-slate-800">Alliance Hub V2</h1>
            <p class="text-slate-500 text-sm mt-1">Entra con tu ID de Supremacy 1914</p>
        </div>

        <form id="lazy-login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ID del Jugador (número)</label>
                <input type="number" id="player-id" required
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                    placeholder="Ej: 99702975">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="username" required
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                    placeholder="Ej: Tlaloc27">
            </div>
            <button type="submit" 
                class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 transition">
                Entrar
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        <div id="success-msg" class="mt-4 text-green-600 text-sm text-center hidden"></div>

        <div class="mt-6 text-center space-y-2">
            <a href="login.html" class="text-sm text-amber-600 hover:text-amber-700 font-medium block">Soy Admin → Login Admin</a>
            <a href="index.html" class="text-sm text-slate-400 hover:text-slate-600 block">← Volver al inicio</a>
        </div>
    </div>

    <script>
        if (isLazyLoggedIn()) {
            var lastMatch = getLastRegisteredMatch();
            if (lastMatch) {
                window.location.href = 'game.html?id=' + lastMatch;
            } else {
                window.location.href = 'index.html';
            }
        }

        document.getElementById('lazy-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var playerId = document.getElementById('player-id').value;
            var username = document.getElementById('username').value.trim();
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            var result = await lazyLogin(playerId, username);

            if (result.success) {
                successMsg.textContent = '✅ ' + result.message;
                successMsg.classList.remove('hidden');

                if ('Notification' in window && Notification.permission === 'granted') {
                    await subscribeToPush();
                } else if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission().then(function(permission) {
                        if (permission === 'granted') {
                            subscribeToPush();
                        }
                    });
                }

                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                errorMsg.textContent = '❌ ' + result.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
