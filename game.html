<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partida - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/base.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/pwa-utils.js"></script>
<!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-900 min-h-screen" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div id="game-header" class="mb-6">
            <div class="text-center py-12 text-slate-400">Cargando...</div>
        </div>

        <!-- Reglas PDF -->
        <div id="rules-section" class="hidden mb-6">
            <h2 class="font-bold text-slate-800 mb-3">📜 Reglas</h2>
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden" style="height: 500px;">
                <iframe id="rules-iframe" class="w-full h-full" frameborder="0"></iframe>
            </div>
        </div>

        <!-- Resultados -->
        <div id="results-section" class="hidden">
            <h2 class="font-bold text-slate-800 mb-3">🏆 Resultados</h2>
            <div class="bg-white rounded-xl border border-slate-200 overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="text-left p-3">#</th>
                            <th class="text-left p-3">Nación</th>
                            <th class="text-left p-3">Jugador</th>
                            <th class="text-right p-3">Bajas</th>
                            <th class="text-right p-3">Muertes</th>
                            <th class="text-right p-3">KD</th>
                        </tr>
                    </thead>
                    <tbody id="results-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="no-results" class="hidden text-center py-12 bg-white rounded-xl border border-slate-200">
            <div class="text-4xl mb-3">⏳</div>
            <p class="text-slate-500">Resultados no disponibles aún</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        if (!gameId) {
            location.href = 'index.html';
        }

        async function loadGame() {
            const { data: game } = await supabase
                .from('games')
                .select('*, alliances(name, tag)')
                .eq('id', gameId)
                .single();

            if (!game) {
                document.getElementById('game-header').innerHTML = '<div class="text-center text-red-500">Partida no encontrada</div>';
                return;
            }

            document.getElementById('game-header').innerHTML = `
                <div class="flex items-center gap-2 mb-2">
                    ${getStatusBadge(game.status)}
                    ${getTypeBadge(game.type)}
                    ${game.password ? '<span class="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded">🔒 Privada</span>' : ''}
                </div>
                <h1 class="text-3xl font-bold text-slate-800">${game.name}</h1>
                <p class="text-slate-500 mt-1">${game.description || ''}</p>
                <div class="flex flex-wrap gap-4 mt-3 text-sm text-slate-400">
                    <span>📅 ${formatDate(game.created_at)}</span>
                    ${game.alliances ? `<span>🏴 ${game.alliances.name} [${game.alliances.tag}]</span>` : '<span>🌍 Global</span>'}
                    <span>👥 Max ${game.max_players}</span>
                    ${game.show_game_id ? `<span class="font-mono bg-slate-100 px-2 py-0.5 rounded">ID: ${game.game_id}</span>` : ''}
                </div>
                ${game.status === 'open' ? `
                    <div class="mt-4">
                        <a href="register/index.html?game=${game.id}" class="inline-block bg-amber-500 text-slate-900 px-6 py-3 rounded-lg font-bold hover:bg-amber-400 transition">
                            Registrarme en esta partida
                        </a>
                    </div>
                ` : ''}
            `;

            if (game.rules_pdf_url) {
                document.getElementById('rules-section').classList.remove('hidden');
                document.getElementById('rules-iframe').src = game.rules_pdf_url.replace('/view', '/preview').replace('/edit', '/preview');
            }

            if (game.csv_imported) {
                const { data: results } = await supabase
                    .from('game_results')
                    .select('*, players(current_username)')
                    .eq('game_id', gameId)
                    .order('kd_ratio', { ascending: false });

                if (results && results.length > 0) {
                    document.getElementById('results-section').classList.remove('hidden');
                    document.getElementById('results-tbody').innerHTML = results.map((r, i) => `
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-3 font-bold ${i < 3 ? 'text-amber-600' : 'text-slate-400'}">${i + 1}</td>
                            <td class="p-3">${r.nation}</td>
                            <td class="p-3 font-medium">
                                <a href="player.html?id=${r.player_id}" class="hover:text-amber-600">${r.players?.current_username || '?'}</a>
                            </td>
                            <td class="p-3 text-right text-green-600 font-bold">${r.kills.toLocaleString()}</td>
                            <td class="p-3 text-right text-red-500">${r.deaths.toLocaleString()}</td>
                            <td class="p-3 text-right font-bold ${r.kd_ratio >= 1 ? 'text-green-600' : 'text-orange-500'}">${r.kd_ratio}</td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('no-results').classList.remove('hidden');
                }
            } else {
                document.getElementById('no-results').classList.remove('hidden');
            }
        }

        loadGame();
    </script>
</body>
</html>
