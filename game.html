<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Partida - Alliance Hub</title>
<script src="assets/js/theme.js?v=16"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=16"></script>
<script src="assets/js/base.js?v=16"></script>
<script src="assets/js/auth.js?v=16"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div id="match-header"></div>
<div id="match-details" class="mt-6"></div>
<div id="rules-section" class="hidden mt-6">
<h2 class="text-xl font-bold mb-3">&#128220; Reglamento</h2>
<div id="rules-container" class="space-y-3"></div>
</div>
<div id="players-section" class="mt-6">
<h2 class="text-xl font-bold mb-3">&#128100; Jugadores</h2>
<div id="players-list">Cargando...</div>
</div>
</div>
<script>
async function loadMatch() {
    var params = new URLSearchParams(window.location.search);
    var matchId = params.get('id');
    if (!matchId) { document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">ID de partida no especificado</div>'; return; }
    try {
        var { data: match, error } = await supabase.from('matches').select('*, alliances(name, tag)').eq('id', matchId).single();
        if (error) throw error;
        if (!match) { document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">Partida no encontrada</div>'; return; }
        document.getElementById('match-header').innerHTML = '<div class="flex flex-wrap items-center justify-between gap-3 mb-4"><div><h1 class="text-2xl font-bold">&#127918; ' + (match.name || 'Partida') + '</h1><p class="text-sm" style="color:#9fa8da;">' + getStatusBadge(match.status) + ' ' + (match.alliances ? match.alliances.name : '') + '</p></div></div>';
        loadNativeRules();
        loadPlayers(matchId);
    } catch(e) { console.error('[Game]', e); document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}
async function loadNativeRules() {
    try {
        var { data: sections } = await supabase.from('rule_sections').select('*').eq('is_active', true).order('order_index');
        if (!sections || sections.length === 0) return;
        document.getElementById('rules-section').classList.remove('hidden');
        document.getElementById('rules-container').innerHTML = sections.map(function(s) {
            return '<div class="rounded-lg p-4" style="background:#11183a;border:1px solid #1a237e;"><h3 class="font-bold text-sm mb-1" style="color:#ff8f00;">' + s.title + '</h3><p class="text-sm" style="color:#e8eaf6;">' + (s.content || '').substring(0, 200) + (s.content.length > 200 ? '...' : '') + '</p></div>';
        }).join('');
    } catch(e) { console.error('[Rules]', e); }
}
async function loadPlayers(matchId) {
    try {
        var { data, error } = await supabase.from('match_registrations').select('*, players(id, current_username, current_alliance_id, status)').eq('match_id', matchId);
        if (error) throw error;
        var list = document.getElementById('players-list');
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin jugadores registrados</div>'; return; }
        list.innerHTML = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">' + data.map(function(r) { return '<div class="rounded-lg p-3" style="background:#11183a;border:1px solid #1a237e;"><div class="font-medium">' + (r.players?.current_username || '?') + '</div><div class="text-xs" style="color:#9fa8da;">' + getStatusBadgePlayer(r.players?.status || 'active') + '</div></div>'; }).join('') + '</div>';
    } catch(e) { console.error('[Players]', e); document.getElementById('players-list').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando jugadores</div>'; }
}
loadMatch();
</script>
</body>
</html>
