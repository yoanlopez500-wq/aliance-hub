<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin V2 - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=10"></script>
<script src="assets/js/base.js?v=10"></script>
<script src="assets/js/auth.js?v=10"></script>
<script src="assets/js/pwa-utils.js?v=10"></script>
<meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4" data-role="admin">
<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
<div class="text-center mb-8">
<div class="text-4xl mb-3">&#9876;&#65039;</div>
<h1 class="text-2xl font-bold text-slate-800">Alliance Hub V2</h1>
<p class="text-slate-500 text-sm mt-1">Panel de Administracion</p>
</div>

<div class="flex mb-6 border-b border-slate-200">
<button onclick="showTab('login')" id="tab-login" class="flex-1 pb-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500">Login</button>
<button onclick="showTab('signup')" id="tab-signup" class="flex-1 pb-3 text-sm font-bold text-slate-500 hover:text-slate-700">Nuevo Admin</button>
<button onclick="showTab('reset')" id="tab-reset" class="flex-1 pb-3 text-sm font-bold text-slate-500 hover:text-slate-700">Recuperar</button>
</div>

<div id="form-login">
<form id="login-form" class="space-y-4">
<div><label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
<input type="email" id="login-email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="admin@ejemplo.com"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Contrasena</label>
<input type="password" id="login-password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="Tu contrasena"></div>
<button type="submit" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 transition">Entrar al Panel</button>
</form></div>

<div id="form-signup" class="hidden">
<form id="signup-form" class="space-y-4">
<div><label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
<input type="email" id="signup-email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="nuevo@ejemplo.com"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Contrasena</label>
<input type="password" id="signup-password" required minlength="6" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="Minimo 6 caracteres"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">ID de Supremacy 1914 *</label>
<input type="number" id="signup-supremacy-id" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="Ej: 99702975"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Username en Supremacy *</label>
<input type="text" id="signup-display-name" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="Ej: Tlaloc27"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Codigo de invitacion</label>
<input type="text" id="signup-code" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition uppercase" placeholder="Ej: A3B7C9D2"></div>
<button type="submit" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-400 transition">Crear Cuenta Admin</button>
</form></div>

<div id="form-reset" class="hidden">
<form id="reset-form" class="space-y-4">
<div><label class="block text-sm font-medium text-slate-700 mb-1">Email de tu cuenta</label>
<input type="email" id="reset-email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition" placeholder="tu-email@ejemplo.com"></div>
<p class="text-xs text-slate-500">Te enviaremos un enlace para restablecer tu contrasena.</p>
<button type="submit" class="w-full bg-blue-500 text-white font-bold py-3 rounded-lg hover:bg-blue-400 transition">Enviar Enlace de Recuperacion</button>
</form></div>

<div id="error-msg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
<div id="success-msg" class="mt-4 text-green-600 text-sm text-center hidden"></div>

<div class="mt-6 text-center space-y-2">
<a href="login-player.html" class="text-sm text-green-600 hover:text-green-700 font-medium block">Soy Jugador &rarr; Entrar sin contrasena</a>
<a href="index.html" class="text-sm text-slate-400 hover:text-slate-600 block">&larr; Volver al inicio</a>
</div></div>

<script>
function showTab(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('form-reset').classList.toggle('hidden', tab !== 'reset');
    ['login', 'signup', 'reset'].forEach(function(t) {
        var btn = document.getElementById('tab-' + t);
        btn.className = t === tab ? 'flex-1 pb-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500' : 'flex-1 pb-3 text-sm font-bold text-slate-500 hover:text-slate-700';
    });
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errorMsg = document.getElementById('error-msg');
    var successMsg = document.getElementById('success-msg');
    errorMsg.classList.add('hidden'); successMsg.classList.add('hidden');
    var success = await login(document.getElementById('login-email').value, document.getElementById('login-password').value);
    if (success) window.location.href = 'admin/index.html';
    else { errorMsg.textContent = 'Email o contrasena incorrectos'; errorMsg.classList.remove('hidden'); }
});

document.getElementById('signup-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errorMsg = document.getElementById('error-msg');
    var successMsg = document.getElementById('success-msg');
    errorMsg.classList.add('hidden'); successMsg.classList.add('hidden');
    var result = await signupWithInvite(document.getElementById('signup-email').value, document.getElementById('signup-password').value, document.getElementById('signup-code').value, document.getElementById('signup-supremacy-id').value, document.getElementById('signup-display-name').value.trim());
    if (result.success) { successMsg.textContent = result.message; successMsg.classList.remove('hidden'); this.reset(); setTimeout(function() { showTab('login'); }, 2000); }
    else { errorMsg.textContent = result.message; errorMsg.classList.remove('hidden'); }
});

document.getElementById('reset-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errorMsg = document.getElementById('error-msg');
    var successMsg = document.getElementById('success-msg');
    errorMsg.classList.add('hidden'); successMsg.classList.add('hidden');
    var result = await sendPasswordReset(document.getElementById('reset-email').value);
    if (result.success) { successMsg.textContent = result.message; successMsg.classList.remove('hidden'); this.reset(); }
    else { errorMsg.textContent = result.message; errorMsg.classList.remove('hidden'); }
});
</script>
</body>
</html>
