<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/base.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/pwa-utils.js"></script>
<!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4" data-role="admin">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">⚔️</div>
            <h1 class="text-2xl font-bold text-slate-800">Alliance Hub</h1>
            <p class="text-slate-500 text-sm mt-1">Panel de Administración</p>
        </div>

        <!-- Tabs -->
        <div class="flex mb-6 border-b border-slate-200">
            <button onclick="showTab('login')" id="tab-login" class="flex-1 pb-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500">Login</button>
            <button onclick="showTab('signup')" id="tab-signup" class="flex-1 pb-3 text-sm font-bold text-slate-500 hover:text-slate-700">Nuevo Admin (código)</button>
        </div>

        <!-- Login -->
        <div id="form-login">
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="login-email" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                        placeholder="admin@ejemplo.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                    <input type="password" id="login-password" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                        placeholder="Tu contraseña">
                </div>
                <button type="submit" 
                    class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 transition">
                    Entrar al Panel
                </button>
            </form>
        </div>

        <!-- Signup con código -->
        <div id="form-signup" class="hidden">
            <form id="signup-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="signup-email" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                        placeholder="nuevo@ejemplo.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                    <input type="password" id="signup-password" required minlength="6"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                        placeholder="Mínimo 6 caracteres">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Código de invitación</label>
                    <input type="text" id="signup-code" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition uppercase"
                        placeholder="Ej: A3B7C9D2">
                    <p class="text-xs text-slate-400 mt-1">El código se convertirá automáticamente a mayúsculas</p>
                </div>
                <button type="submit" 
                    class="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-400 transition">
                    Crear Cuenta Admin
                </button>
            </form>
        </div>

        <div id="error-msg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        <div id="success-msg" class="mt-4 text-green-600 text-sm text-center hidden"></div>

        <div class="mt-6 text-center">
            <a href="./" class="text-sm text-slate-400 hover:text-slate-600 transition">← Volver al inicio</a>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
            document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');

            document.getElementById('tab-login').className = tab === 'login' 
                ? 'flex-1 pb-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500'
                : 'flex-1 pb-3 text-sm font-bold text-slate-500 hover:text-slate-700';
            document.getElementById('tab-signup').className = tab === 'signup'
                ? 'flex-1 pb-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500'
                : 'flex-1 pb-3 text-sm font-bold text-slate-500 hover:text-slate-700';
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            console.log('Intentando login con:', email);
            const success = await login(email, password);
            if (success) {
                window.location.href = 'admin/index.html';
            } else {
                errorMsg.textContent = '❌ Email o contraseña incorrectos. Si acabas de crear la cuenta, asegúrate de haber confirmado tu email.';
                errorMsg.classList.remove('hidden');
            }
        });

        // Signup con código
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const code = document.getElementById('signup-code').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            console.log('Intentando signup con email:', email, 'código:', code);

            const result = await signupWithInvite(email, password, code);
            console.log('Resultado signup:', result);

            if (result.success) {
                successMsg.textContent = '✅ ' + result.message + ' Ahora puedes iniciar sesión.';
                successMsg.classList.remove('hidden');
                this.reset();
                setTimeout(() => showTab('login'), 2000);
            } else {
                errorMsg.textContent = '❌ ' + result.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
