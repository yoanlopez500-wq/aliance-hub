<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Alliance Hub V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/base.js"></script>
    <script src="assets/js/auth.js"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">🔐</div>
            <h1 class="text-2xl font-bold text-slate-800">Nueva Contraseña</h1>
            <p class="text-slate-500 text-sm mt-1">Ingresa tu nueva contraseña</p>
        </div>

        <form id="reset-password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nueva Contraseña</label>
                <input type="password" id="new-password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                    placeholder="Mínimo 6 caracteres">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"
                    placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 transition">
                Actualizar Contraseña
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        <div id="success-msg" class="mt-4 text-green-600 text-sm text-center hidden"></div>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-slate-400 hover:text-slate-600">← Volver al login</a>
        </div>
    </div>

    <script>
        // Verificar que viene de un email de reset (Supabase pone tokens en la URL)
        async function init() {
            var sessionData = await supabase.auth.getSession();
            if (!sessionData.data.session) {
                // Intentar recuperar sesión del hash de URL (Supabase lo pone ahí)
                var hash = window.location.hash;
                if (hash && hash.includes('access_token')) {
                    // Supabase maneja esto automáticamente al cargar
                } else {
                    document.getElementById('error-msg').textContent = '❌ Enlace inválido o expirado. Solicita uno nuevo.';
                    document.getElementById('error-msg').classList.remove('hidden');
                    document.getElementById('reset-password-form').style.display = 'none';
                }
            }
        }

        document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var newPass = document.getElementById('new-password').value;
            var confirmPass = document.getElementById('confirm-password').value;
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (newPass !== confirmPass) {
                errorMsg.textContent = '❌ Las contraseñas no coinciden';
                errorMsg.classList.remove('hidden');
                return;
            }

            var result = await updatePassword(newPass);
            if (result.success) {
                successMsg.textContent = '✅ ' + result.message + '. Redirigiendo...';
                successMsg.classList.remove('hidden');
                setTimeout(function() {
                    window.location.href = 'admin/index.html';
                }, 2000);
            } else {
                errorMsg.textContent = '❌ ' + result.message;
                errorMsg.classList.remove('hidden');
            }
        });

        init();
    </script>
</body>
</html>
