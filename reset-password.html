<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contrasena - Alliance Hub</title>
    <script src="assets/js/theme.js?v=11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js?v=11"></script>
    <script src="assets/js/base.js?v=11"></script>
    <script src="assets/js/auth.js?v=11"></script>
    <meta name="theme-color" content="#0a0e27">
</head>
<body class="bg-ah-bg min-h-screen flex items-center justify-center px-4 text-ah-text">
    <div class="bg-ah-card rounded-2xl shadow-2xl p-8 w-full max-w-md border border-ah-border">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">🔐</div>
            <h1 class="text-2xl font-bold text-ah-text">Nueva Contrasena</h1>
            <p class="text-ah-muted text-sm mt-1">Ingresa tu nueva contrasena</p>
        </div>

        <form id="reset-password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-ah-muted mb-1">Nueva Contrasena</label>
                <input type="password" id="new-password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg border border-ah-border bg-ah-bg text-ah-text focus:border-ah-accent focus:ring-2 focus:ring-ah-accent/20 outline-none transition"
                    placeholder="Minimo 6 caracteres">
            </div>
            <div>
                <label class="block text-sm font-medium text-ah-muted mb-1">Confirmar Contrasena</label>
                <input type="password" id="confirm-password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg border border-ah-border bg-ah-bg text-ah-text focus:border-ah-accent focus:ring-2 focus:ring-ah-accent/20 outline-none transition"
                    placeholder="Repite la contrasena">
            </div>
            <button type="submit" class="w-full bg-ah-accent text-white font-bold py-3 rounded-lg hover:bg-ah-accent/80 transition">
                Actualizar Contrasena
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-red-400 text-sm text-center hidden"></div>
        <div id="success-msg" class="mt-4 text-green-400 text-sm text-center hidden"></div>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-ah-muted hover:text-ah-text">← Volver al login</a>
        </div>
    </div>

    <script>
        async function init() {
            var sessionData = await supabase.auth.getSession();
            if (!sessionData.data.session) {
                var hash = window.location.hash;
                if (hash && hash.includes('access_token')) {
                    // Supabase maneja esto automaticamente al cargar
                } else {
                    document.getElementById('error-msg').textContent = '❌ Enlace invalido o expirado. Solicita uno nuevo.';
                    document.getElementById('error-msg').classList.remove('hidden');
                    document.getElementById('reset-password-form').style.display = 'none';
                }
            }
        }

        document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var newPass = document.getElementById('new-password').value;
            var confirmPass = document.getElementById('confirm-password').value;
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (newPass !== confirmPass) {
                errorMsg.textContent = '❌ Las contrasenas no coinciden';
                errorMsg.classList.remove('hidden');
                return;
            }

            var result = await updatePassword(newPass);
            if (result.success) {
                successMsg.textContent = '✅ ' + result.message + '. Redirigiendo...';
                successMsg.classList.remove('hidden');
                setTimeout(function() {
                    window.location.href = 'admin/index.html';
                }, 2000);
            } else {
                errorMsg.textContent = '❌ ' + result.message;
                errorMsg.classList.remove('hidden');
            }
        });

        init();
    </script>
</body>
</html>
