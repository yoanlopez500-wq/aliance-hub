<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contrasena - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/theme.js?v=27"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js?v=27"></script>
    <script src="assets/js/base.js?v=27"></script>
    <script src="assets/js/components.js?v=27"></script>
    <script src="assets/js/auth.js?v=27"></script>
    <meta name="theme-color" content="#0a0e27">
</head>
<body style="background:#0a0e27; color:#e8eaf6; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div class="rounded-2xl shadow-2xl p-8 w-full max-w-md" style="background:#11183a; border:1px solid #1a237e;">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">&#128272;</div>
            <h1 class="text-2xl font-bold">Nueva Contrasena</h1>
            <p class="text-sm mt-1" style="color:#9fa8da;">Ingresa tu nueva contrasena</p>
        </div>

        <form id="reset-password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1" style="color:#9fa8da;">Nueva Contrasena</label>
                <input type="password" id="new-password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg text-sm outline-none transition"
                    style="background:#0a0e27; border:1px solid #1a237e; color:#e8eaf6;"
                    placeholder="Minimo 6 caracteres">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" style="color:#9fa8da;">Confirmar Contrasena</label>
                <input type="password" id="confirm-password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg text-sm outline-none transition"
                    style="background:#0a0e27; border:1px solid #1a237e; color:#e8eaf6;"
                    placeholder="Repite la contrasena">
            </div>
            <button type="submit" class="w-full py-3 rounded-lg font-bold text-sm transition active:scale-[0.98]" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white;">
                Actualizar Contrasena
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-sm text-center hidden" style="color:#ef5350;"></div>
        <div id="success-msg" class="mt-4 text-sm text-center hidden" style="color:#4caf50;"></div>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm" style="color:#9fa8da;">&#8592; Volver al login</a>
        </div>
    </div>

    <script>
        async function init() {
            var sessionData = await supabase.auth.getSession();
            if (!sessionData.data.session) {
                var hash = window.location.hash;
                if (!hash || !hash.includes('access_token')) {
                    document.getElementById('error-msg').textContent = 'Enlace invalido o expirado. Solicita uno nuevo.';
                    document.getElementById('error-msg').classList.remove('hidden');
                    document.getElementById('reset-password-form').style.display = 'none';
                }
            }
        }

        document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var newPass = document.getElementById('new-password').value;
            var confirmPass = document.getElementById('confirm-password').value;
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (newPass !== confirmPass) {
                errorMsg.textContent = 'Las contrasenas no coinciden';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                var { error } = await supabase.auth.updateUser({ password: newPass });
                if (error) throw error;
                successMsg.textContent = 'Contrasena actualizada. Redirigiendo...';
                successMsg.classList.remove('hidden');
                setTimeout(function() { window.location.href = 'admin/index.html'; }, 2000);
            } catch(err) {
                errorMsg.textContent = 'Error: ' + err.message;
                errorMsg.classList.remove('hidden');
            }
        });

        init();
    </script>
</body>
</html>
