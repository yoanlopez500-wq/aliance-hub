<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gestion de Admins - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128373; Administradores</h1>
<div class="flex gap-2 mb-4">
<select id="filter-role" onchange="loadAdmins()" class="px-3 py-2 rounded-lg border text-sm"><option value="">Todos los roles</option><option value="superadmin">Super Admin</option><option value="event_admin">Admin Eventos</option><option value="moderator">Moderador</option><option value="alliance_leader">Lider</option></select>
</div>
<div class="overflow-x-auto rounded-xl" style="background:#11183a;border:1px solid #1a237e;">
<table class="w-full text-sm">
<thead><tr style="background:rgba(255,255,255,0.02);"><th class="text-left p-3" style="color:#9fa8da;">Admin</th><th class="text-left p-3" style="color:#9fa8da;">Rol</th><th class="text-left p-3" style="color:#9fa8da;">Alianza</th><th class="text-left p-3" style="color:#9fa8da;">Estado</th></tr></thead>
<tbody id="admins-tbody"></tbody>
</table>
</div>
</div>
<script>
async function loadAdmins() {
    try {
        var role = document.getElementById('filter-role').value;
        var q = supabase.from('admin_users').select('*, alliances(name)').order('created_at', { ascending: false });
        if (role) q = q.eq('role', role);
        var { data, error } = await q;
        if (error) throw error;
        var tbody = document.getElementById('admins-tbody');
        if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8" style="color:#9fa8da;">No hay admins</td></tr>'; return; }
        tbody.innerHTML = data.map(function(a) {
            var roleLabel = { superadmin: 'Super Admin', event_admin: 'Admin Eventos', moderator: 'Moderador', alliance_leader: 'Lider', co_leader: 'Co-Lider', officer: 'Oficial' }[a.role] || a.role;
            var roleColor = { superadmin: '#ef5350', event_admin: '#42a5f5', moderator: '#ab47bc', alliance_leader: '#66bb6a', co_leader: '#26a69a', officer: '#26c6da' }[a.role] || '#9fa8da';
            return '<tr style="border-bottom:1px solid #1a237e;"><td class="p-3 font-medium">' + (a.display_name || 'Admin') + '</td><td class="p-3"><span class="text-xs px-2 py-0.5 rounded font-bold" style="background:' + roleColor + '20;color:' + roleColor + ';">' + roleLabel + '</span></td><td class="p-3" style="color:#9fa8da;">' + (a.alliances ? a.alliances.name : '-') + '</td><td class="p-3">' + getStatusBadge(a.status) + '</td></tr>';
        }).join('');
    } catch(e) { console.error('[Admins]', e); document.getElementById('admins-tbody').innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-400">Error</td></tr>'; }
}
requireAdmin();
loadAdmins();
</script>
</body>
</html>
