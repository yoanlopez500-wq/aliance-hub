<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=16"></script>
    <script src="../assets/js/base.js?v=16"></script>
    <script src="../assets/js/auth.js?v=16"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-white mb-6">&#9881; Administradores</h1>
        <div id="admins-list" class="space-y-3">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <script>
        if (!hasAdminSession()) { window.location.href = 'login.html'; }

        async function loadAdmins() {
            var { data: admins, error } = await supabase
                .from('admin_users')
                .select('*, alliances(name, tag)')
                .order('created_at', { ascending: false });

            var container = document.getElementById('admins-list');
            if (error || !admins || admins.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">No hay admins registrados</div>';
                return;
            }

            container.innerHTML = admins.map(function(a) {
                var roleBadge = a.role === 'superadmin' ? '<span class="px-2 py-0.5 rounded text-xs bg-red-100 text-red-700 font-bold">SUPERADMIN</span>' :
                                a.role === 'event_admin' ? '<span class="px-2 py-0.5 rounded text-xs bg-purple-100 text-purple-700 font-bold">EVENT ADMIN</span>' :
                                '<span class="px-2 py-0.5 rounded text-xs bg-blue-100 text-blue-700 font-bold">' + a.role + '</span>';

                return '<div class="bg-white rounded-xl border border-slate-200 p-4">' +
                    '<div class="flex items-center justify-between">' +
                        '<div>' +
                            '<h3 class="font-bold text-slate-800">' + (a.display_name || 'Admin ' + a.id.substring(0, 8)) + '</h3>' +
                            '<p class="text-xs text-slate-500">' + (a.alliances?.name || 'Sin alianza') + ' | ' + roleBadge + '</p>' +
                        '</div>' +
                        '<div class="flex gap-2">' +
                            '<button onclick="changeRole(\'' + a.id + '\', \'' + a.role + '\')" class="px-2 py-1 text-xs bg-slate-100 rounded hover:bg-slate-200">Cambiar rol</button>' +
                            '<button onclick="toggleStatus(\'' + a.id + '\', \'' + a.status + '\')" class="px-2 py-1 text-xs ' + (a.status === 'active' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700') + ' rounded hover:bg-opacity-80">' + (a.status === 'active' ? 'Suspender' : 'Activar') + '</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        async function changeRole(adminId, currentRole) {
            var roles = ['superadmin', 'event_admin', 'alliance_leader', 'moderator'];
            var newRole = prompt('Nuevo rol (' + roles.join(', ') + '):', currentRole);
            if (!newRole || newRole === currentRole) return;
            if (roles.indexOf(newRole) === -1) { showToast('Rol invalido', 'error'); return; }

            var { error } = await supabase.from('admin_users').update({ role: newRole }).eq('id', adminId);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Rol actualizado', 'success');
            loadAdmins();
        }

        async function toggleStatus(adminId, currentStatus) {
            var newStatus = currentStatus === 'active' ? 'suspended' : 'active';
            if (!confirm('¿' + (newStatus === 'active' ? 'Activar' : 'Suspender') + ' este administrador?')) return;

            var { error } = await supabase.from('admin_users').update({ status: newStatus }).eq('id', adminId);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Estado actualizado', 'success');
            loadAdmins();
        }

        loadAdmins();
    </script>
</body>
</html>
