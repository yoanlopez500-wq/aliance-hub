<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">👥 Administradores</h1>
        <div id="admins-list" class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>
    <script>
        requireAdmin();
        async function loadAdmins() {
            var { data, error } = await supabase.from('admin_users').select('*, alliance:alliances(name, tag)').order('approved_at', { ascending: false });
            var container = document.getElementById('admins-list');
            if (error) { container.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + error.message + '</div>'; return; }
            var admins = data || [];
            if (admins.length === 0) { container.innerHTML = '<div class="text-center py-8 text-slate-400">Sin admins</div>'; return; }
            container.innerHTML = '<div class="space-y-3 p-4">' +
                admins.map(function(a) {
                    var roleBadge = getRoleBadge(a.role);
                    var statusBadge = a.status === 'active' ? '<span class="px-2 py-0.5 rounded text-xs bg-green-100 text-green-700 font-bold">ACTIVO</span>' : a.status === 'suspended' ? '<span class="px-2 py-0.5 rounded text-xs bg-yellow-100 text-yellow-700 font-bold">SUSPENDIDO</span>' : '<span class="px-2 py-0.5 rounded text-xs bg-slate-100 text-slate-600">' + (a.status || '?') + '</span>';
                    return '<div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">' +
                        '<div class="flex items-center gap-3">' +
                            '<div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-lg font-bold text-amber-700">' + (a.display_name ? a.display_name.charAt(0).toUpperCase() : '?') + '</div>' +
                            '<div>' +
                                '<div class="font-bold text-slate-800">' + (a.display_name || 'Admin') + '</div>' +
                                '<div class="text-xs text-slate-500">' + (a.email || '') + (a.alliance ? ' | ' + a.alliance.name : '') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="flex items-center gap-2">' + roleBadge + statusBadge + '</div>' +
                    '</div>';
                }).join('') + '</div>';
        }
        loadAdmins();
    </script>
</body>
</html>
