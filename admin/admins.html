<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">&#128737;&#65039; Administradores</h1>
        <div id="admins-list" class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>
    <script>
        requireAdmin();
        async function loadAdmins() {
            var { data, error } = await supabase.schema('v2').from('admins').select('*, player:players(id, current_username)').order('created_at', { ascending: false });
            var container = document.getElementById('admins-list');
            if (error) { container.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + error.message + '</div>'; return; }
            var admins = data || [];
            if (admins.length === 0) { container.innerHTML = '<div class="text-center py-8 text-slate-400">Sin admins</div>'; return; }
            container.innerHTML = '<table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="text-left p-3">Username</th><th class="text-left p-3">Rol</th><th class="text-left p-3">Estado</th><th class="text-left p-3">Creado</th></tr></thead><tbody>' +
                admins.map(function(a) {
                    var roleBadge = a.role === 'superadmin' ? '<span class="px-2 py-0.5 rounded text-xs bg-red-100 text-red-700 font-bold">SUPERADMIN</span>' : a.role === 'admin' ? '<span class="px-2 py-0.5 rounded text-xs bg-blue-100 text-blue-700 font-bold">ADMIN</span>' : '<span class="px-2 py-0.5 rounded text-xs bg-slate-100 text-slate-600">' + a.role + '</span>';
                    return '<tr class="border-b"><td class="p-3 font-medium">' + (a.player?.current_username || a.email || '?') + '</td><td class="p-3">' + roleBadge + '</td><td class="p-3">' + (a.is_active !== false ? '<span class="text-green-600 font-bold">Activo</span>' : '<span class="text-slate-400">Inactivo</span>') + '</td><td class="p-3 text-slate-400 text-xs">' + formatDate(a.created_at) + '</td></tr>';
                }).join('') + '</tbody></table>';
        }
        loadAdmins();
    </script>
</body>
</html>
