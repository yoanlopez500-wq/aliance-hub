<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Sanciones - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=16"></script>
    <script src="../assets/js/base.js?v=16"></script>
    <script src="../assets/js/auth.js?v=16"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-white mb-6">&#128737; Motor de Sanciones</h1>

        <!-- Calcular sancion -->
        <div class="bg-white rounded-xl border border-slate-200 p-5 mb-6">
            <h2 class="font-bold text-slate-800 mb-3">Calcular Sancion</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">ID del Jugador</label>
                    <input type="number" id="s-player-id" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Kills actuales</label>
                    <input type="number" id="s-kills" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Penalidad (%)</label>
                    <input type="number" id="s-penalty" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" value="10">
                </div>
            </div>
            <button onclick="calculateSanction()" class="mt-3 px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">Calcular</button>
            <div id="s-result" class="mt-3 hidden p-3 bg-slate-50 rounded-lg"></div>
        </div>

        <!-- Aplicar sancion -->
        <div class="bg-white rounded-xl border border-slate-200 p-5 mb-6">
            <h2 class="font-bold text-slate-800 mb-3">Aplicar Sancion Manual</h2>
            <form id="sanction-form" class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">ID del Jugador *</label>
                        <input type="number" id="sm-player-id" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Penalidad % *</label>
                        <select id="sm-penalty" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                            <option value="10">10% (1 strike)</option>
                            <option value="30">30% (2 strikes)</option>
                            <option value="50">50% (3+ strikes)</option>
                            <option value="custom">Personalizado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Kills antes</label>
                        <input type="number" id="sm-kills-before" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                    </div>
                </div>
                <button type="submit" class="px-4 py-2 bg-red-500 text-white rounded-lg font-bold text-sm hover:bg-red-400">Aplicar Sancion</button>
            </form>
        </div>

        <!-- Sanciones recientes -->
        <h2 class="text-lg font-bold text-white mb-3">&#128203; Sanciones Recientes</h2>
        <div id="sanctions-list" class="space-y-2">
            <div class="text-center py-4 text-slate-400">Cargando...</div>
        </div>
    </div>

    <script>
        if (!hasAdminSession()) { window.location.href = 'login.html'; }

        async function calculateSanction() {
            var playerId = parseInt(document.getElementById('s-player-id').value);
            var kills = parseInt(document.getElementById('s-kills').value);
            var penalty = parseInt(document.getElementById('s-penalty').value);
            var resultDiv = document.getElementById('s-result');

            if (!playerId || isNaN(kills) || isNaN(penalty)) {
                showToast('Completa todos los campos', 'error');
                return;
            }

            var killsAfter = Math.round(kills * (1 - penalty / 100));
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<p class="text-sm"><strong>Kills originales:</strong> ' + kills + '</p>' +
                '<p class="text-sm"><strong>Penalidad:</strong> -' + penalty + '%</p>' +
                '<p class="text-sm"><strong>Kills despues:</strong> <span class="text-green-600 font-bold">' + killsAfter + '</span></p>' +
                '<p class="text-sm"><strong>Kills perdidas:</strong> <span class="text-red-500">' + (kills - killsAfter) + '</span></p>';
        }

        document.getElementById('sanction-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            var playerId = parseInt(document.getElementById('sm-player-id').value);
            var penaltySelect = document.getElementById('sm-penalty').value;
            var penaltyPct = penaltySelect === 'custom' ? parseInt(prompt('Penalidad %:') || 0) : parseInt(penaltySelect);
            var killsBefore = parseInt(document.getElementById('sm-kills-before').value) || 0;

            if (!playerId || !penaltyPct) { showToast('Datos incompletos', 'error'); return; }

            // Si no se proporcionaron kills, obtenerlas de la BD
            if (!killsBefore) {
                var { data: player } = await supabase.from('players').select('total_kills').eq('id', playerId).single();
                killsBefore = player ? player.total_kills : 0;
            }

            var killsAfter = Math.round(killsBefore * (1 - penaltyPct / 100));

            var sessionData = await supabase.auth.getSession();
            var adminId = sessionData.data.session ? sessionData.data.session.user.id : null;

            var { error } = await supabase.from('player_sanctions').insert({
                player_id: playerId,
                kills_before: killsBefore,
                kills_after: killsAfter,
                penalty_pct: penaltyPct,
                formula_used: 'Manual: kills * (1 - ' + penaltyPct + '/100)',
                applied_by: adminId
            });

            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Sancion aplicada', 'success');
            loadSanctions();
        });

        async function loadSanctions() {
            var { data: sanctions, error } = await supabase
                .from('player_sanctions')
                .select('*, player:players(current_username)')
                .order('created_at', { ascending: false })
                .limit(50);

            var container = document.getElementById('sanctions-list');
            if (error || !sanctions || sanctions.length === 0) {
                container.innerHTML = '<div class="text-center py-6 text-slate-400 bg-white rounded-xl border">Sin sanciones registradas</div>';
                return;
            }

            container.innerHTML = sanctions.map(function(s) {
                return '<div class="bg-white rounded-xl border border-slate-200 p-4">' +
                    '<div class="flex items-center justify-between">' +
                        '<div>' +
                            '<p class="font-bold text-slate-800 text-sm">' + (s.player?.current_username || 'ID:' + s.player_id) + '</p>' +
                            '<p class="text-sm text-slate-600">Kills: ' + s.kills_before + ' &rarr; <span class="text-green-600 font-bold">' + s.kills_after + '</span> (-' + s.penalty_pct + '%)</p>' +
                            '<p class="text-xs text-slate-400">' + (s.formula_used || 'Manual') + '</p>' +
                        '</div>' +
                        '<button onclick="revertSanction(\'' + s.id + '\', ' + s.player_id + ', ' + s.kills_before + ')" class="px-3 py-1 bg-slate-200 text-slate-600 rounded text-xs font-bold hover:bg-slate-300">Revertir</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        async function revertSanction(id, playerId, originalKills) {
            if (!confirm('¿Revertir esta sancion? Las kills volveran a ' + originalKills)) return;

            var { error } = await supabase.from('player_sanctions').delete().eq('id', id);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }

            showToast('Sancion revertida', 'success');
            loadSanctions();
        }

        loadSanctions();
    </script>
</body>
</html>
