<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Alianzas - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=17"></script>
<script src="../assets/js/base.js?v=17"></script>
<script src="../assets/js/auth.js?v=17"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-7xl mx-auto px-4 py-8">
<div class="flex items-center justify-between mb-6">
<h1 class="text-2xl font-bold">&#127988; Alianzas</h1>
<button onclick="openModal()" class="px-4 py-2 rounded-lg font-bold text-sm" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">&#10133; Nueva Alianza</button>
</div>
<div id="alliances-list" class="space-y-3"><div class="text-center py-8" style="color:#9fa8da;">Cargando...</div></div>
</div>

<div id="alliance-modal" class="fixed inset-0 hidden items-center justify-center z-50" style="background:rgba(0,0,0,0.5);">
<div class="rounded-xl p-6 max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto" style="background:#11183a;border:1px solid #1a237e;">
<h2 id="modal-title" class="text-xl font-bold mb-4">Nueva Alianza</h2>
<input type="hidden" id="edit-id">
<div class="mb-3"><label class="block text-sm mb-1" style="color:#9fa8da;">Nombre *</label><input type="text" id="alliance-name" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
<div class="mb-3"><label class="block text-sm mb-1" style="color:#9fa8da;">Tag (2-10 caracteres) *</label><input type="text" id="alliance-tag" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
<div class="mb-3"><label class="block text-sm mb-1" style="color:#9fa8da;">Descripcion</label><textarea id="alliance-desc" class="w-full px-3 py-2 rounded-lg border text-sm" rows="3"></textarea></div>
<div class="flex gap-2 justify-end"><button onclick="closeModal()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Cancelar</button><button onclick="saveAlliance()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Guardar</button></div>
</div></div>

<script>
requireAdmin();

async function loadAlliances() {
    try {
        // v17 FIX: Query simple sin relaciones FK que pueden fallar
        var { data: alliances, error } = await supabase.from('alliances').select('id, name, tag, description, member_count, total_kills').order('name');
        var container = document.getElementById('alliances-list');
        if (error) { container.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + error.message + '</div>'; return; }
        if (!alliances || alliances.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">No hay alianzas registradas</div>'; return; }

        container.innerHTML = alliances.map(function(a) {
            return '<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between flex-wrap gap-2"><div><h3 class="font-bold">' + a.name + ' <span style="color:#9fa8da;">[' + (a.tag || '-') + ']</span></h3><p class="text-xs" style="color:#9fa8da;">' + (a.description || 'Sin descripcion') + '</p><p class="text-xs mt-1" style="color:#9fa8da;">' + (a.member_count || 0) + ' miembros | ' + (a.total_kills || 0) + ' bajas</p></div><div class="flex gap-2"><button onclick="editAlliance(\'' + a.id + '\')" class="px-3 py-1 rounded text-xs font-bold" style="background:#1a237e;color:#e8eaf6;">Editar</button><button onclick="deleteAlliance(\'' + a.id + '\')" class="px-3 py-1 rounded text-xs font-bold" style="background:rgba(198,40,40,0.2);color:#ef5350;">Eliminar</button></div></div></div>';
        }).join('');
    } catch(e) { document.getElementById('alliances-list').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}

function openModal() {
    document.getElementById('alliance-modal').classList.remove('hidden');
    document.getElementById('alliance-modal').classList.add('flex');
    document.getElementById('modal-title').textContent = 'Nueva Alianza';
    document.getElementById('edit-id').value = '';
    document.getElementById('alliance-name').value = '';
    document.getElementById('alliance-tag').value = '';
    document.getElementById('alliance-desc').value = '';
}
function closeModal() {
    document.getElementById('alliance-modal').classList.add('hidden');
    document.getElementById('alliance-modal').classList.remove('flex');
}

async function editAlliance(id) {
    var { data: a } = await supabase.from('alliances').select('*').eq('id', id).single();
    if (!a) return;
    document.getElementById('alliance-modal').classList.remove('hidden');
    document.getElementById('alliance-modal').classList.add('flex');
    document.getElementById('modal-title').textContent = 'Editar Alianza';
    document.getElementById('edit-id').value = a.id;
    document.getElementById('alliance-name').value = a.name;
    document.getElementById('alliance-tag').value = a.tag;
    document.getElementById('alliance-desc').value = a.description || '';
}

async function saveAlliance() {
    var id = document.getElementById('edit-id').value;
    var name = document.getElementById('alliance-name').value.trim();
    var tag = document.getElementById('alliance-tag').value.trim();
    var desc = document.getElementById('alliance-desc').value.trim();
    if (!name || !tag) { showToast('Nombre y tag son requeridos', 'error'); return; }
    if (tag.length < 2 || tag.length > 10) { showToast('Tag debe tener 2-10 caracteres', 'error'); return; }
    var data = { name: name, tag: tag, description: desc || null };
    var result = id ? await supabase.from('alliances').update(data).eq('id', id) : await supabase.from('alliances').insert([data]);
    if (result.error) { showToast('Error: ' + result.error.message, 'error'); return; }
    showToast('Alianza guardada', 'success');
    closeModal();
    loadAlliances();
}

async function deleteAlliance(id) {
    if (!confirm('Eliminar esta alianza?')) return;
    var { error } = await supabase.from('alliances').delete().eq('id', id);
    if (error) { showToast('Error: ' + error.message, 'error'); return; }
    showToast('Alianza eliminada', 'success');
    loadAlliances();
}

loadAlliances();
</script>
</body>
</html>
