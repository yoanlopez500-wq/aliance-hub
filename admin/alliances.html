<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gestion de Alianzas - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#127988; Alianzas</h1>
<div id="alliances-list">Cargando...</div>
</div>
<script>
async function loadAlliances() {
    try {
        var { data, error } = await supabase.from('alliances').select('*, players(current_username)').order('name');
        if (error) throw error;
        var container = document.getElementById('alliances-list');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin alianzas registradas</div>'; return; }
        container.innerHTML = '<div class="grid md:grid-cols-2 gap-4">' + data.map(function(a) {
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center gap-3"><div class="text-3xl">&#127988;</div><div class="flex-1"><h3 class="font-bold text-lg">' + a.name + '</h3><p class="text-sm" style="color:#9fa8da;">[' + (a.tag || '---') + ']</p></div>' + getStatusBadge(a.status) + '</div>' + (a.description ? '<p class="text-sm mt-2" style="color:#9fa8da;">' + a.description + '</p>' : '') + '<div class="flex gap-3 mt-3 text-xs" style="color:#9fa8da;"><span>Lider: ' + (a.players ? a.players.current_username : 'N/A') + '</span><span>ID: ' + a.id + '</span></div></div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Alliances]', e); document.getElementById('alliances-list').innerHTML = '<div class="text-center py-8 text-red-400">Error</div>'; }
}
requireAdmin();
loadAlliances();
</script>
</body>
</html>
