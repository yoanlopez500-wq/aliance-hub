<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alianzas - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=16"></script>
    <script src="../assets/js/base.js?v=16"></script>
    <script src="../assets/js/auth.js?v=16"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-white">&#127942; Alianzas</h1>
            <button onclick="openModal()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">+ Nueva Alianza</button>
        </div>
        <div id="alliances-list" class="space-y-3">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <!-- Modal -->
    <div id="alliance-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-xl font-bold text-slate-800 mb-4">Nueva Alianza</h2>
            <input type="hidden" id="edit-id">
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Nombre</label>
                <input type="text" id="alliance-name" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Tag (2-10 caracteres)</label>
                <input type="text" id="alliance-tag" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Descripcion</label>
                <textarea id="alliance-desc" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" rows="3"></textarea>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 text-sm hover:text-slate-800">Cancelar</button>
                <button onclick="saveAlliance()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        if (!hasAdminSession()) { window.location.href = 'login.html'; }

        async function loadAlliances() {
            var { data: alliances, error } = await supabase
                .from('alliances')
                .select('*, players(current_username)')
                .order('name');

            var container = document.getElementById('alliances-list');
            if (error || !alliances || alliances.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">No hay alianzas registradas</div>';
                return;
            }

            container.innerHTML = alliances.map(function(a) {
                var memberCount = a.players ? a.players.length : 0;
                return '<div class="bg-white rounded-xl border border-slate-200 p-4">' +
                    '<div class="flex items-center justify-between">' +
                        '<div>' +
                            '<h3 class="font-bold text-slate-800">' + a.name + ' <span class="text-slate-400">[' + a.tag + ']</span></h3>' +
                            '<p class="text-xs text-slate-500">' + (a.description || 'Sin descripcion') + '</p>' +
                            '<p class="text-xs text-slate-400 mt-1">' + memberCount + ' miembros</p>' +
                        '</div>' +
                        '<div class="flex gap-2">' +
                            '<button onclick="editAlliance(\'' + a.id + '\')" class="px-2 py-1 text-xs bg-slate-100 rounded hover:bg-slate-200">Editar</button>' +
                            '<button onclick="deleteAlliance(\'' + a.id + '\')" class="px-2 py-1 text-xs bg-red-100 text-red-700 rounded hover:bg-red-200">Eliminar</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function openModal() {
            document.getElementById('alliance-modal').classList.remove('hidden');
            document.getElementById('alliance-modal').classList.add('flex');
            document.getElementById('modal-title').textContent = 'Nueva Alianza';
            document.getElementById('edit-id').value = '';
            document.getElementById('alliance-name').value = '';
            document.getElementById('alliance-tag').value = '';
            document.getElementById('alliance-desc').value = '';
        }

        function closeModal() {
            document.getElementById('alliance-modal').classList.add('hidden');
            document.getElementById('alliance-modal').classList.remove('flex');
        }

        async function editAlliance(id) {
            var { data: a } = await supabase.from('alliances').select('*').eq('id', id).single();
            if (!a) return;

            document.getElementById('alliance-modal').classList.remove('hidden');
            document.getElementById('alliance-modal').classList.add('flex');
            document.getElementById('modal-title').textContent = 'Editar Alianza';
            document.getElementById('edit-id').value = a.id;
            document.getElementById('alliance-name').value = a.name;
            document.getElementById('alliance-tag').value = a.tag;
            document.getElementById('alliance-desc').value = a.description || '';
        }

        async function saveAlliance() {
            var id = document.getElementById('edit-id').value;
            var name = document.getElementById('alliance-name').value.trim();
            var tag = document.getElementById('alliance-tag').value.trim();
            var desc = document.getElementById('alliance-desc').value.trim();

            if (!name || !tag) { showToast('Nombre y tag son requeridos', 'error'); return; }
            if (tag.length < 2 || tag.length > 10) { showToast('Tag debe tener 2-10 caracteres', 'error'); return; }

            var data = { name: name, tag: tag, description: desc || null };
            var result;

            if (id) {
                result = await supabase.from('alliances').update(data).eq('id', id);
            } else {
                result = await supabase.from('alliances').insert([data]);
            }

            if (result.error) { showToast('Error: ' + result.error.message, 'error'); return; }
            showToast('Alianza guardada', 'success');
            closeModal();
            loadAlliances();
        }

        async function deleteAlliance(id) {
            if (!confirm('¿Eliminar esta alianza?')) return;
            var { error } = await supabase.from('alliances').delete().eq('id', id);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Alianza eliminada', 'success');
            loadAlliances();
        }

        loadAlliances();
    </script>
</body>
</html>
