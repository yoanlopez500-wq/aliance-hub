<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Solicitudes de Liderazgo - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#127941; Solicitudes de Liderazgo</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Revision y aprobacion de solicitudes para liderar alianzas.</p>
<div class="flex gap-2 mb-6">
<select id="filter-status" onchange="loadRequests()" class="px-3 py-2 rounded-lg text-sm" style="background:#11183a;border:1px solid #1a237e;color:#e8eaf6;">
<option value="all">Todos</option>
<option value="pending" selected>Pendientes</option>
<option value="under_review">En revision</option>
<option value="approved">Aprobados</option>
<option value="rejected">Rechazados</option>
</select>
<button onclick="loadRequests()" class="px-3 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#fff;">&#128260; Recargar</button>
</div>
<div id="requests-list">Cargando...</div>
</div>
<script>
async function loadRequests() {
    var list = document.getElementById('requests-list');
    list.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Cargando...</div>';
    try {
        var status = document.getElementById('filter-status').value;
        var q = supabase.from('alliance_leader_requests').select('*').order('created_at', { ascending: false });
        if (status !== 'all') q = q.eq('status', status);
        var { data, error } = await q;
        if (error) throw error;
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay solicitudes</div>'; return; }
        list.innerHTML = '<div class="space-y-3">' + data.map(function(r) {
            var statusBadge = r.status === 'pending' ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(255,143,0,0.15);color:#ff8f00;">PENDIENTE</span>' : r.status === 'under_review' ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(33,150,243,0.15);color:#2196f3;">EN REVISION</span>' : r.status === 'approved' ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(76,175,80,0.15);color:#4caf50;">APROBADO</span>' : '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(198,40,40,0.15);color:#ef5350;">RECHAZADO</span>';
            var actions = r.status === 'pending' || r.status === 'under_review' ? '<div class="flex gap-2 mt-3"><button onclick="approveRequest(' + r.requester_player_id + ', \'' + r.alliance_name.replace(/'/g, "\\'") + '\', \'' + r.alliance_tag + '\', ' + r.id + ')" class="px-3 py-1.5 rounded-lg text-xs font-bold" style="background:#2e7d32;color:#fff;">Aprobar</button><button onclick="rejectRequest(' + r.id + ')" class="px-3 py-1.5 rounded-lg text-xs font-bold" style="background:rgba(198,40,40,0.8);color:#fff;">Rechazar</button></div>' : '';
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-start justify-between"><div><h3 class="font-bold text-lg">' + r.alliance_name + ' [' + r.alliance_tag + ']</h3><p class="text-sm" style="color:#9fa8da;">Solicitante: ' + r.requester_username + ' (ID: ' + r.requester_player_id + ')</p><p class="text-xs mt-1" style="color:#9fa8da;">' + (r.alliance_description || 'Sin descripcion') + '</p></div>' + statusBadge + '</div><p class="text-xs mt-2" style="color:#9fa8da;">Miembros: ' + (r.member_count || '?') + ' | Discord: ' + (r.discord_handle || '-') + ' | ' + formatDate(r.created_at) + '</p>' + actions + '</div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Requests]', e); list.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}
async function approveRequest(playerId, allianceName, allianceTag, requestId) {
    if (!confirm('Aprobar esta solicitud? Se creara la alianza y se asignara al jugador como lider.')) return;
    try {
        var { data: existing } = await supabase.from('alliances').select('id').eq('name', allianceName).maybeSingle();
        var allianceId;
        if (existing) { allianceId = existing.id; }
        else {
            var { data: newAlliance, error: ae } = await supabase.from('alliances').insert({ name: allianceName, tag: allianceTag, status: 'active' }).select('id').single();
            if (ae) throw ae;
            allianceId = newAlliance.id;
        }
        await supabase.from('players').update({ current_alliance_id: allianceId }).eq('id', playerId);
        var { data: { session } } = await supabase.auth.getSession();
        await supabase.from('alliance_leader_requests').update({ status: 'approved', reviewed_by: session.user.id, reviewed_at: new Date().toISOString() }).eq('id', requestId);
        showToast('Solicitud aprobada. Alianza creada y lider asignado.', 'success');
        loadRequests();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
async function rejectRequest(requestId) {
    var reason = prompt('Motivo del rechazo (opcional):');
    try {
        var { data: { session } } = await supabase.auth.getSession();
        await supabase.from('alliance_leader_requests').update({ status: 'rejected', reviewed_by: session.user.id, reviewed_at: new Date().toISOString(), rejection_reason: reason || null }).eq('id', requestId);
        showToast('Solicitud rechazada.', 'info');
        loadRequests();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
requireAdmin();
loadRequests();
</script>
</body>
</html>
