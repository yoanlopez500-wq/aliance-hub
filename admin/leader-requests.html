<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e27">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="../manifest.json">
<title>Solicitudes de Liderazgo - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}
input:focus,select:focus{border-color:#ff6f00!important;outline:none!important;}
</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#127941; Solicitudes de Liderazgo</h1>
<p class="text-sm mb-6 text-slate-400">Revision y aprobacion de solicitudes para liderar alianzas.</p>
<div class="flex flex-col sm:flex-row gap-2 mb-6">
<select id="filter-status" onchange="loadRequests()" class="px-3 py-2 rounded-lg text-sm min-h-[44px] bg-slate-900 border border-indigo-900 text-slate-100 focus:border-amber-500 outline-none">
<option value="all">Todos</option>
<option value="pending" selected>Pendientes</option>
<option value="under_review">En revision</option>
<option value="approved">Aprobados</option>
<option value="rejected">Rechazados</option>
</select>
<button onclick="loadRequests()" class="px-3 py-2 rounded-lg text-sm font-bold min-h-[44px] bg-indigo-900 text-white">&#128260; Recargar</button>
</div>
<div id="requests-list">Cargando...</div>
</div>
<script>
requireAdmin();
var currentAdminId = null;

async function init() {
    try { var s = await supabase.auth.getSession(); currentAdminId = s.data.session.user.id; } catch(e){}
    loadRequests();
}

async function loadRequests() {
    var list = document.getElementById('requests-list');
    list.innerHTML = '<div class="text-center py-8 text-slate-400">Cargando...</div>';
    try {
        var status = document.getElementById('filter-status').value;
        var q = supabase.from('alliance_leader_requests').select('*').order('created_at', { ascending: false });
        if (status !== 'all') q = q.eq('status', status);
        var { data, error } = await q;
        if (error) throw error;
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl bg-slate-900 border border-indigo-900 text-slate-400">No hay solicitudes</div>'; return; }
        list.innerHTML = '<div class="space-y-3">' + data.map(function(r) {
            var statusBadge = r.status === 'pending' ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-amber-500/15 text-amber-400">PENDIENTE</span>' : r.status === 'under_review' ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-blue-500/15 text-blue-500">EN REVISION</span>' : r.status === 'approved' ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-green-500/15 text-green-500">APROBADO</span>' : '<span class="px-2 py-0.5 rounded text-xs font-bold bg-red-500/15 text-red-400">RECHAZADO</span>';
            var actions = r.status === 'pending' || r.status === 'under_review' ? '<div class="flex gap-2 mt-3"><button onclick="approveRequest(' + r.player_id + ', \'' + r.alliance_name.replace(/\'/g, "\\'") + '\', \'' + r.alliance_tag + '\', \'' + r.id + '\', \'' + (r.alliance_description || '').replace(/\'/g, "\\'") + '\')" class="px-3 py-1.5 rounded-lg text-xs font-bold min-h-[32px] bg-green-700 text-white">Aprobar</button><button onclick="rejectRequest(\'' + r.id + '\')" class="px-3 py-1.5 rounded-lg text-xs font-bold min-h-[32px] bg-red-500/80 text-white">Rechazar</button></div>' : '';
            return '<div class="rounded-xl p-5 bg-slate-900 border border-indigo-900"><div class="flex flex-col sm:flex-row sm:items-start justify-between gap-2"><div><h3 class="font-bold text-lg text-slate-100">' + r.alliance_name + ' [' + r.alliance_tag + ']</h3><p class="text-sm text-slate-400">Solicitante: ' + (r.display_name || 'N/A') + ' (ID: ' + r.player_id + ')</p><p class="text-xs mt-1 text-slate-400">' + (r.alliance_description || 'Sin descripcion') + '</p></div>' + statusBadge + '</div><p class="text-xs mt-2 text-slate-400">Miembros: ' + (r.member_count || '?') + ' | Discord: ' + (r.discord_handle || '-') + ' | ' + formatDate(r.created_at) + '</p>' + actions + '</div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Requests]', e); list.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}

// ============================================================
// approveRequest — FIXED:
// 1. Uses correct column: current_alliance_id (not alliance_id)
// 2. Creates alliance_memberships with role='leader'
// 3. Passes alliance_description to alliances insert
// 4. Added transaction-like error handling
// ============================================================
async function approveRequest(playerId, allianceName, allianceTag, requestId, allianceDescription) {
    if (!confirm('Aprobar esta solicitud? Se creara la alianza y se asignara al jugador como lider.')) return;
    try {
        // 1. Check if alliance already exists
        var { data: existing } = await supabase.from('alliances').select('id').eq('name', allianceName).maybeSingle();
        var allianceId;
        if (existing) {
            allianceId = existing.id;
        } else {
            // 2. Create the alliance with description
            var { data: newAlliance, error: ae } = await supabase.from('alliances').insert({
                name: allianceName,
                tag: allianceTag,
                description: allianceDescription || '',
                leader_id: playerId,
                status: 'active'
            }).select('id').single();
            if (ae) throw ae;
            allianceId = newAlliance.id;
        }

        // 3. FIX: Use correct column current_alliance_id (not alliance_id)
        var { error: pe } = await supabase.from('players').update({ current_alliance_id: allianceId }).eq('id', playerId);
        if (pe) throw pe;

        // 4. Create alliance_memberships with role='leader'
        var { error: me } = await supabase.from('alliance_memberships').insert({
            player_id: playerId,
            alliance_id: allianceId,
            role: 'leader',
            status: 'active'
        });
        if (me) throw me;

        // 5. Mark request as approved
        var { data: { session } } = await supabase.auth.getSession();
        var { error: re } = await supabase.from('alliance_leader_requests').update({
            status: 'approved',
            reviewed_by: session.user.id,
            reviewed_at: new Date().toISOString()
        }).eq('id', requestId);
        if (re) throw re;

        showToast('Solicitud aprobada. Alianza creada y lider asignado.', 'success');
        loadRequests();
    } catch(e) {
        console.error('[approveRequest]', e);
        showToast('Error: ' + e.message, 'error');
    }
}

async function rejectRequest(requestId) {
    var reason = prompt('Motivo del rechazo (opcional):');
    try {
        var { data: { session } } = await supabase.auth.getSession();
        await supabase.from('alliance_leader_requests').update({
            status: 'rejected',
            reviewed_by: session.user.id,
            reviewed_at: new Date().toISOString(),
            rejection_reason: reason || null
        }).eq('id', requestId);
        showToast('Solicitud rechazada.', 'info');
        loadRequests();
    } catch(e) {
        console.error('[rejectRequest]', e);
        showToast('Error: ' + e.message, 'error');
    }
}

init();
</script>
</body>
</html>
