<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e27">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="../manifest.json">
<title>Solicitudes de Liderazgo - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}
input:focus,select:focus{border-color:#ff6f00!important;outline:none!important;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:50;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.active{display:flex;}
</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#127941; Solicitudes de Liderazgo</h1>
<p class="text-sm mb-6 text-slate-400">Revision y aprobacion de solicitudes para liderar alianzas.</p>
<div class="flex flex-col sm:flex-row gap-2 mb-6">
<select id="filter-status" onchange="loadRequests()" class="px-3 py-2 rounded-lg text-sm min-h-[44px] bg-slate-900 border border-indigo-900 text-slate-100 focus:border-amber-500 outline-none">
<option value="all">Todos</option>
<option value="pending" selected>Pendientes</option>
<option value="under_review">En revision</option>
<option value="approved">Aprobados</option>
<option value="rejected">Rechazados</option>
</select>
<button onclick="loadRequests()" class="px-3 py-2 rounded-lg text-sm font-bold min-h-[44px] bg-indigo-900 text-white">&#128260; Recargar</button>
</div>
<div id="requests-list">Cargando...</div>
</div>

<!-- ===== MODAL: Aprobar Solicitud ===== -->
<div id="approve-modal" class="modal-overlay">
<div class="rounded-xl w-full max-w-sm p-6 bg-slate-900 border border-indigo-900">
<h3 class="text-xl font-bold mb-1 text-amber-400">&#127941; Aprobar Solicitud</h3>
<div class="w-full h-px bg-indigo-900 my-3"></div>
<p id="approve-modal-text" class="text-sm text-slate-300 mb-6 leading-relaxed"></p>
<div class="flex gap-3">
<button onclick="closeApproveModal()" class="flex-1 py-3 rounded-lg text-sm font-bold min-h-[48px] bg-slate-800 text-slate-300 hover:bg-slate-700 transition">Cancelar</button>
<button onclick="confirmApprove()" class="flex-1 py-3 rounded-lg text-sm font-bold min-h-[48px] bg-green-700 text-white hover:bg-green-600 transition">&#10003; Aprobar</button>
</div>
</div>
</div>

<!-- ===== MODAL: Rechazar Solicitud ===== -->
<div id="reject-modal" class="modal-overlay">
<div class="rounded-xl w-full max-w-sm p-6 bg-slate-900 border border-indigo-900">
<h3 class="text-xl font-bold mb-1 text-red-400">&#128683; Rechazar Solicitud</h3>
<div class="w-full h-px bg-indigo-900 my-3"></div>
<p id="reject-modal-text" class="text-sm text-slate-300 mb-4 leading-relaxed"></p>
<div class="mb-4">
<label class="block text-xs font-medium mb-1 text-slate-400">Motivo del rechazo (opcional)</label>
<input type="text" id="reject-reason-input" class="w-full px-3 py-2 rounded-lg border text-sm min-h-[44px] bg-slate-950 border-indigo-900 text-slate-100 focus:border-amber-500 outline-none" placeholder="Ej: Nombre inapropiado">
</div>
<div class="flex gap-3">
<button onclick="closeRejectModal()" class="flex-1 py-3 rounded-lg text-sm font-bold min-h-[48px] bg-slate-800 text-slate-300 hover:bg-slate-700 transition">Cancelar</button>
<button onclick="confirmReject()" class="flex-1 py-3 rounded-lg text-sm font-bold min-h-[48px] bg-red-600 text-white hover:bg-red-500 transition">Rechazar</button>
</div>
</div>
</div>

<script>
requireAdmin();
var currentAdminId = null;
var pendingApprove = null;
var pendingReject = null;

async function init() {
    try { var s = await supabase.auth.getSession(); currentAdminId = s.data.session.user.id; } catch(e){}
    loadRequests();
}

function generateInviteCode() {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var result = 'AH';
    for (var i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
    return result;
}

async function loadRequests() {
    var list = document.getElementById('requests-list');
    list.innerHTML = '<div class="text-center py-8 text-slate-400">Cargando...</div>';
    try {
        var status = document.getElementById('filter-status').value;
        var q = supabase.from('alliance_leader_requests').select('*').order('created_at', { ascending: false });
        if (status !== 'all') q = q.eq('status', status);
        var { data, error } = await q;
        if (error) throw error;
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl bg-slate-900 border border-indigo-900 text-slate-400">No hay solicitudes</div>'; return; }
        list.innerHTML = '<div class="space-y-3">' + data.map(function(r) {
            var statusBadge = r.status === 'pending' ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-amber-500/15 text-amber-400">PENDIENTE</span>' : r.status === 'under_review' ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-blue-500/15 text-blue-500">EN REVISION</span>' : r.status === 'approved' ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-green-500/15 text-green-500">APROBADO</span>' : '<span class="px-2 py-0.5 rounded text-xs font-bold bg-red-500/15 text-red-400">RECHAZADO</span>';
            var playerName = r.display_name || 'Jugador ' + r.player_id;
            var actions = '';
            if (r.status === 'pending' || r.status === 'under_review') {
                var descEscaped = (r.alliance_description || '').replace(/'/g, "\\'");
                var nameEscaped = r.alliance_name.replace(/'/g, "\\'");
                actions = '<div class="flex gap-2 mt-3">' +
                    '<button onclick="openApproveModal(' + r.player_id + ', \'' + nameEscaped + '\', \'' + r.alliance_tag + '\', \'' + r.id + '\', \'' + descEscaped + '\', \'' + playerName.replace(/'/g, "\\'") + '\')" class="px-3 py-1.5 rounded-lg text-xs font-bold min-h-[32px] bg-green-700 text-white hover:bg-green-600 transition">&#10003; Aprobar</button>' +
                    '<button onclick="openRejectModal(\'' + r.id + '\', \'' + playerName.replace(/'/g, "\\'") + '\', \'' + nameEscaped + '\')" class="px-3 py-1.5 rounded-lg text-xs font-bold min-h-[32px] bg-red-600 text-white hover:bg-red-500 transition">&#10005; Rechazar</button>' +
                    '</div>';
            }
            return '<div class="rounded-xl p-5 bg-slate-900 border border-indigo-900"><div class="flex flex-col sm:flex-row sm:items-start justify-between gap-2"><div><h3 class="font-bold text-lg text-slate-100">' + r.alliance_name + ' [' + r.alliance_tag + ']</h3><p class="text-sm text-slate-400">Solicitante: ' + playerName + ' (ID: ' + r.player_id + ')</p><p class="text-xs mt-1 text-slate-400">' + (r.alliance_description || 'Sin descripcion') + '</p></div>' + statusBadge + '</div><p class="text-xs mt-2 text-slate-400">Miembros: ' + (r.member_count || '?') + ' | Discord: ' + (r.discord_handle || '-') + ' | ' + formatDate(r.created_at) + '</p>' + actions + '</div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Requests]', e); list.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}

function openApproveModal(playerId, allianceName, allianceTag, requestId, allianceDescription, playerName) {
    pendingApprove = { playerId: playerId, allianceName: allianceName, allianceTag: allianceTag, requestId: requestId, allianceDescription: allianceDescription, playerName: playerName };
    document.getElementById('approve-modal-text').innerHTML =
        'Aprobar a <strong class="text-amber-400">' + playerName + '</strong> como lider de <strong class="text-amber-400">' + allianceName + ' [' + allianceTag + ']</strong>?<br><br>' +
        '<span class="text-slate-400">Se creara la alianza y el jugador podra completar su registro automaticamente.</span>';
    document.getElementById('approve-modal').classList.add('active');
}

function closeApproveModal() {
    document.getElementById('approve-modal').classList.remove('active');
    pendingApprove = null;
}

async function confirmApprove() {
    if (!pendingApprove) return;
    var playerId = pendingApprove.playerId;
    var allianceName = pendingApprove.allianceName;
    var allianceTag = pendingApprove.allianceTag;
    var requestId = pendingApprove.requestId;
    var allianceDescription = pendingApprove.allianceDescription;
    closeApproveModal();

    showToast('Procesando aprobacion...', 'info');

    try {
        // 1. Check if alliance already exists
        var { data: existing } = await supabase.from('alliances').select('id').eq('name', allianceName).maybeSingle();
        var allianceId;
        if (existing) {
            allianceId = existing.id;
        } else {
            var { data: newAlliance, error: ae } = await supabase.from('alliances').insert({
                name: allianceName, tag: allianceTag, description: allianceDescription || '',
                leader_id: playerId, status: 'active'
            }).select('id').single();
            if (ae) throw ae;
            allianceId = newAlliance.id;
        }

        // 2. Update player
        var { error: pe } = await supabase.from('players').update({ current_alliance_id: allianceId }).eq('id', playerId);
        if (pe) throw pe;

        // 3. Create membership
        var { error: me } = await supabase.from('alliance_memberships').insert({
            player_id: playerId, alliance_id: allianceId,
            role: 'leader', status: 'approved', requested_by: 'leader'
        });
        if (me && me.code !== '23505') throw me;

        // 4. Mark request approved
        var { data: { session } } = await supabase.auth.getSession();
        var { error: re } = await supabase.from('alliance_leader_requests').update({
            status: 'approved', reviewed_by: session.user.id, reviewed_at: new Date().toISOString()
        }).eq('id', requestId);
        if (re) throw re;

        // 5. Generate invite code VINCULADO al player_id y alliance_id (NO se muestra al admin)
        var inviteCode = generateInviteCode();
        var { error: ie } = await supabase.from('admin_invites').insert({
            code: inviteCode, role: 'alliance_leader', created_by: session.user.id,
            player_id: playerId, alliance_id: allianceId, used: false
        });
        if (ie) console.error('[Invite] Error:', ie);

        showToast('Solicitud aprobada. El jugador puede completar su registro.', 'success');
        loadRequests();
    } catch(e) {
        console.error('[confirmApprove]', e);
        showToast('Error: ' + (e.message || e), 'error');
    }
}

function openRejectModal(requestId, playerName, allianceName) {
    pendingReject = { requestId: requestId };
    document.getElementById('reject-modal-text').innerHTML =
        'Rechazar la solicitud de <strong class="text-red-400">' + playerName + '</strong> para liderar <strong class="text-red-400">' + allianceName + '</strong>?';
    document.getElementById('reject-reason-input').value = '';
    document.getElementById('reject-modal').classList.add('active');
}

function closeRejectModal() {
    document.getElementById('reject-modal').classList.remove('active');
    pendingReject = null;
}

async function confirmReject() {
    if (!pendingReject) return;
    var reason = document.getElementById('reject-reason-input').value.trim() || null;
    var requestId = pendingReject.requestId;
    closeRejectModal();
    try {
        var { data: { session } } = await supabase.auth.getSession();
        var { error } = await supabase.from('alliance_leader_requests').update({
            status: 'rejected', reviewed_by: session.user.id,
            reviewed_at: new Date().toISOString(), rejection_reason: reason
        }).eq('id', requestId);
        if (error) throw error;
        showToast('Solicitud rechazada.', 'info');
        loadRequests();
    } catch(e) { showToast('Error: ' + (e.message || e), 'error'); }
}

init();
</script>
</body>
</html>
