<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Mensajes - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128231; Mensajes</h1>
<div id="messages-list">Cargando...</div>
</div>
<script>
async function loadMessages() {
    try {
        var { data, error } = await supabase.from('inbox_messages').select('*').order('created_at', { ascending: false }).limit(50);
        if (error) throw error;
        var container = document.getElementById('messages-list');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin mensajes</div>'; return; }
        container.innerHTML = '<div class="space-y-3">' + data.map(function(m) {
            return '<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;"><p class="font-bold">' + (m.title || 'Sin titulo') + '</p><p class="text-sm" style="color:#e8eaf6;">' + (m.content || '') + '</p><p class="text-xs mt-1" style="color:#9fa8da;">' + formatDate(m.created_at) + '</p></div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Messages]', e); document.getElementById('messages-list').innerHTML = '<div class="text-center py-8 text-red-400">Error</div>'; }
}
requireAdmin();
loadMessages();
</script>
</body>
</html>
