<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Inbox - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128172; Inbox</h1>
<div id="messages-list">Cargando...</div>
</div>
<script>
async function loadMessages() {
    try { var { data: { session } } = await supabase.auth.getSession(); if (!session) return; var { data, error } = await supabase.from('direct_messages').select('*').eq('recipient_admin_id', session.user.id).order('created_at', { ascending: false }).limit(50); if (error) throw error; var list = document.getElementById('messages-list'); if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay mensajes</div>'; return; } list.innerHTML = '<div class="space-y-3">' + data.map(function(m) { var isUnread = !m.read_at ? '<span class="px-2 py-0.5 rounded text-xs font-bold ml-2" style="background:rgba(255,143,0,0.15);color:#ff8f00;">NUEVO</span>' : ''; return '<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between"><div><h3 class="font-bold">' + (m.subject || 'Sin asunto') + '</h3><p class="text-sm" style="color:#9fa8da;">De: ' + (m.sender_name || 'Admin') + '</p></div>' + isUnread + '</div><p class="text-sm mt-2">' + m.message + '</p><p class="text-xs mt-2" style="color:#9fa8da;">' + formatDateTime(m.created_at) + '</p></div>'; }).join('') + '</div>'; } catch(e) { console.error('[Inbox]', e); }
}
requireAdmin();
loadMessages();
</script>
</body>
</html>
