<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Partida V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <style>.modal { display: none; } .modal.active { display: flex; }</style>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div id="match-header" class="mb-6">
            <div class="text-center py-12 text-slate-400">Cargando...</div>
        </div>

        <!-- Acciones del Admin -->
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
            <h2 class="font-bold text-slate-800 mb-3">⚡ Acciones</h2>
            <div class="flex flex-wrap gap-2" id="admin-actions">
                <button onclick="updateStatus('open')" class="px-3 py-1.5 bg-green-500 text-white rounded text-sm font-bold hover:bg-green-400">Abrir Registro</button>
                <button onclick="updateStatus('in_progress')" class="px-3 py-1.5 bg-blue-500 text-white rounded text-sm font-bold hover:bg-blue-400">Iniciar</button>
                <button onclick="updateStatus('finished')" class="px-3 py-1.5 bg-purple-500 text-white rounded text-sm font-bold hover:bg-purple-400">Finalizar</button>
                <button onclick="updateStatus('archived')" class="px-3 py-1.5 bg-slate-600 text-white rounded text-sm font-bold hover:bg-slate-500">Archivar</button>
                <button onclick="openWinnersModal()" class="px-3 py-1.5 bg-yellow-500 text-slate-900 rounded text-sm font-bold hover:bg-yellow-400">🏆 Declarar Ganadores</button>
                <button onclick="openCSVModal()" class="px-3 py-1.5 bg-amber-500 text-slate-900 rounded text-sm font-bold hover:bg-amber-400">📊 Importar CSV</button>
                <button onclick="openEditModal()" class="px-3 py-1.5 bg-slate-500 text-white rounded text-sm font-bold hover:bg-slate-400">✏️ Editar</button>
                <button onclick="deleteMatch()" class="px-3 py-1.5 bg-red-500 text-white rounded text-sm font-bold hover:bg-red-400">🗑️ Eliminar</button>
            </div>
        </div>

        <!-- Enlace compartido -->
        <div id="share-section" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <h2 class="font-bold text-blue-800 mb-2">🔗 Enlace Compartido</h2>
            <div class="flex gap-2">
                <input type="text" id="share-link" readonly class="flex-1 px-3 py-2 rounded-lg border border-blue-300 bg-white text-sm">
                <button onclick="copyShareLink()" class="px-4 py-2 bg-blue-500 text-white rounded-lg font-bold hover:bg-blue-400">Copiar</button>
            </div>
        </div>

        <!-- Solicitudes pendientes -->
        <div id="pending-section" class="hidden mb-6">
            <h2 class="font-bold text-slate-800 mb-3">⏳ Solicitudes Pendientes</h2>
            <div id="pending-list" class="bg-white rounded-xl border border-slate-200 overflow-hidden"></div>
        </div>

        <!-- Registrados -->
        <div id="registrations-section" class="mb-6">
            <h2 class="font-bold text-slate-800 mb-3">👥 Registrados</h2>
            <div id="registrations-list" class="bg-white rounded-xl border border-slate-200 overflow-hidden"></div>
        </div>

        <!-- Resultados -->
        <div id="results-section" class="mb-6">
            <h2 class="font-bold text-slate-800 mb-3">📊 Resultados</h2>
            <div class="bg-white rounded-xl border border-slate-200 overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50"><tr><th class="text-left p-3">Nación</th><th class="text-left p-3">Jugador</th><th class="text-right p-3">Bajas</th><th class="text-right p-3">Muertes</th><th class="text-right p-3">KD</th></tr></thead>
                    <tbody id="results-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Chat entre alianzas -->
        <div id="chat-section" class="hidden mb-6">
            <h2 class="font-bold text-slate-800 mb-3">💬 Chat entre Alianzas</h2>
            <div class="bg-white rounded-xl border border-slate-200 p-4">
                <div id="chat-messages" class="h-64 overflow-y-auto mb-3 bg-slate-50 rounded-lg p-3"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Mensaje como admin..." class="flex-1 px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    <button onclick="sendChat()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold hover:bg-amber-400">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Ganadores -->
    <div id="winners-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold mb-4">🏆 Declarar Ganadores</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">🥇 1° Lugar (ID Jugador)</label>
                    <input type="number" id="w-1" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">🥈 2° Lugar (ID Jugador)</label>
                    <input type="number" id="w-2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">🥉 3° Lugar (ID Jugador)</label>
                    <input type="number" id="w-3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                </div>
                <div class="flex gap-3 pt-3">
                    <button onclick="saveWinners()" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Guardar</button>
                    <button onclick="closeWinnersModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal CSV -->
    <div id="csv-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl p-6">
            <h2 class="text-xl font-bold mb-4">📊 Importar Resultados CSV</h2>
            <p class="text-sm text-slate-500 mb-3">Pega el resultado del reporte del juego:</p>
            <textarea id="csv-input" rows="10" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none font-mono text-xs" placeholder="Nacion&#9;Jugador&#9;Bajas&#9;Muertes&#10;Indias Britanicas&#9;Tlaloc27&#9;15497&#9;8020&#10;..."></textarea>
            <div class="flex gap-3 mt-4">
                <button onclick="importCSV()" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Importar</button>
                <button onclick="closeCSVModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        requireAdmin();

        var matchId = new URLSearchParams(window.location.search).get('id');
        if (!matchId) location.href = 'matches.html';

        var currentMatch = null;

        async function loadMatch() {
            // FIX: Especificar FK explicita para evitar ambiguedad con alliances
            var { data: match } = await supabase
                .from('matches')
                .select('*, alliance:alliances!matches_alliance_id_fkey(name, tag), alliance_a:alliances!matches_alliance_a_id_fkey(name, tag), alliance_b:alliances!matches_alliance_b_id_fkey(name, tag)')
                .eq('id', matchId)
                .single();

            if (!match) { document.getElementById('match-header').innerHTML = '<div class="text-red-500">No encontrada</div>'; return; }
            currentMatch = match;

            // FIX: usar 'alliance' en lugar de 'alliances'
            var allianceLabel = '';
            if (match.match_type === 'internal' && match.alliance) allianceLabel = '🏴 ' + match.alliance.name;
            else if (match.match_type === 'duel' && match.alliance_a && match.alliance_b) allianceLabel = '⚔️ ' + match.alliance_a.name + ' vs ' + match.alliance_b.name;

            document.getElementById('match-header').innerHTML =
                '<div class="bg-white rounded-xl border border-slate-200 p-6">' +
                    '<div class="flex items-center gap-2 mb-2 flex-wrap">' + getStatusBadge(match.status) + ' ' + getTypeBadge(match.match_type) + (match.password ? '<span class="px-2 py-1 rounded text-xs bg-orange-100 text-orange-700">🔒</span>' : '') + (match.winners_declared ? '<span class="px-2 py-1 rounded text-xs bg-yellow-100 text-yellow-700">🏆</span>' : '') + '</div>' +
                    '<h1 class="text-2xl font-bold text-slate-800">' + match.name + '</h1>' +
                    '<p class="text-slate-500">' + (match.description || '') + (allianceLabel ? ' • ' + allianceLabel : '') + '</p>' +
                    '<div class="flex flex-wrap gap-4 mt-3 text-sm text-slate-400">' +
                        '<span>👥 Max ' + match.max_players + '</span>' +
                        '<span>📅 ' + formatDate(match.created_at) + '</span>' +
                        (match.game_id ? '<span>🎮 ID: ' + match.game_id + '</span>' : '') +
                    '</div>' +
                '</div>';

            if (match.is_private) {
                document.getElementById('share-section').classList.remove('hidden');
                var baseUrl = window.location.origin + window.__AH_BASE_PATH;
                document.getElementById('share-link').value = baseUrl + 'game.html?id=' + match.id + '&token=' + match.share_token;
            }

            if (match.match_type === 'duel') {
                document.getElementById('chat-section').classList.remove('hidden');
                loadChat();
            }

            loadRegistrations();
            loadResults();
        }

        async function loadRegistrations() {
            var { data: regs } = await supabase
                .from('match_registrations')
                .select('*, players(current_username)')
                .eq('match_id', matchId)
                .order('registered_at', { ascending: false });

            var pending = (regs || []).filter(function(r) { return r.status === 'pending_approval'; });
            var confirmed = (regs || []).filter(function(r) { return r.status === 'confirmed' || r.status === 'approved' || r.status === 'pending'; });

            // Solicitudes pendientes
            if (pending.length > 0 && currentMatch && currentMatch.requires_approval) {
                document.getElementById('pending-section').classList.remove('hidden');
                document.getElementById('pending-list').innerHTML = pending.map(function(r) {
                    return '<div class="flex items-center justify-between p-4 border-b">' +
                        '<div>' +
                            '<p class="font-medium">' + (r.players?.current_username || r.username) + ' (ID: ' + r.player_id + ')</p>' +
                            '<p class="text-xs text-slate-500">Registrado: ' + formatDateTime(r.registered_at) + '</p>' +
                        '</div>' +
                        '<div class="flex gap-2">' +
                            '<button onclick="approveRegistration(' + r.player_id + ')" class="px-3 py-1 bg-green-500 text-white rounded text-sm font-bold hover:bg-green-400">✓ Aprobar</button>' +
                            '<button onclick="rejectRegistration(' + r.player_id + ')" class="px-3 py-1 bg-red-100 text-red-600 rounded text-sm hover:bg-red-200">✕ Rechazar</button>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } else {
                document.getElementById('pending-section').classList.add('hidden');
            }

            // Registrados
            var container = document.getElementById('registrations-list');
            if (confirmed.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">Sin registrados</div>';
            } else {
                container.innerHTML = '<table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="text-left p-3">Jugador</th><th class="text-left p-3">Nación</th><th class="text-left p-3">Estado</th><th class="text-left p-3">Registro</th><th class="p-3">Acciones</th></tr></thead><tbody>' +
                    confirmed.map(function(r) {
                        return '<tr class="border-b">' +
                            '<td class="p-3 font-medium">' + (r.players?.current_username || r.username) + '</td>' +
                            '<td class="p-3">' + (r.nation || '-') + '</td>' +
                            '<td class="p-3">' + getStatusBadge(r.status) + '</td>' +
                            '<td class="p-3 text-slate-500">' + formatDateTime(r.registered_at) + '</td>' +
                            '<td class="p-3"><button onclick="removeRegistration(' + r.player_id + ')" class="text-red-500 hover:text-red-700 text-sm">🗑️</button></td>' +
                        '</tr>';
                    }).join('') + '</tbody></table>';
            }
        }

        async function approveRegistration(playerId) {
            var { error } = await supabase.from('match_registrations')
                .update({ status: 'approved', confirmed_at: new Date().toISOString() })
                .eq('match_id', matchId).eq('player_id', playerId);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Aprobado', 'success'); loadRegistrations(); }
        }

        async function rejectRegistration(playerId) {
            var { error } = await supabase.from('match_registrations')
                .update({ status: 'rejected' })
                .eq('match_id', matchId).eq('player_id', playerId);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Rechazado', 'success'); loadRegistrations(); }
        }

        async function removeRegistration(playerId) {
            if (!confirmAction('Eliminar este registro?')) return;
            var { error } = await supabase.from('match_registrations').delete().eq('match_id', matchId).eq('player_id', playerId);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Eliminado', 'success'); loadRegistrations(); }
        }

        async function loadResults() {
            var { data: results } = await supabase
                .from('match_results')
                .select('*, players(current_username)')
                .eq('match_id', matchId)
                .order('kd_ratio', { ascending: false });

            var tbody = document.getElementById('results-tbody');
            if (!results || results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-400">Sin resultados</td></tr>';
            } else {
                tbody.innerHTML = results.map(function(r, i) {
                    return '<tr class="border-b hover:bg-slate-50"><td class="p-3">' + r.nation + '</td><td class="p-3 font-medium">' + (r.players?.current_username || '?') + '</td><td class="p-3 text-right text-green-600 font-bold">' + r.kills.toLocaleString() + '</td><td class="p-3 text-right text-red-500">' + r.deaths.toLocaleString() + '</td><td class="p-3 text-right font-bold ' + (r.kd_ratio >= 1 ? 'text-green-600' : 'text-orange-500') + '">' + r.kd_ratio + '</td></tr>';
                }).join('');
            }
        }

        async function loadChat() {
            var { data: messages } = await supabase
                .from('alliance_chat')
                .select('*, players(current_username), alliances(name)')
                .eq('match_id', matchId)
                .order('sent_at', { ascending: true })
                .limit(50);

            var container = document.getElementById('chat-messages');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 text-sm">Sin mensajes</div>';
                return;
            }

            container.innerHTML = messages.map(function(m) {
                return '<div class="mb-2"><span class="text-xs font-bold text-amber-700">' + (m.alliances?.name || '?') + ' - ' + (m.players?.current_username || '?') + '</span><div class="text-sm bg-white rounded-lg p-2 mt-0.5 border">' + m.message + '</div></div>';
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendChat() {
            var input = document.getElementById('chat-input');
            var message = input.value.trim();
            if (!message) return;

            var admin = await getAdminRole();
            var { error } = await supabase.from('alliance_chat').insert({
                match_id: matchId,
                sender_id: admin.supremacy_player_id,
                message: message
            });

            if (error) showToast('Error: ' + error.message, 'error');
            else { input.value = ''; loadChat(); }
        }

        async function updateStatus(status) {
            var { error } = await supabase.from('matches').update({ status: status }).eq('id', matchId);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Estado actualizado a ' + status, 'success'); loadMatch(); }
        }

        function openWinnersModal() { document.getElementById('winners-modal').classList.add('active'); }
        function closeWinnersModal() { document.getElementById('winners-modal').classList.remove('active'); }

        async function saveWinners() {
            var w1 = document.getElementById('w-1').value;
            var w2 = document.getElementById('w-2').value;
            var w3 = document.getElementById('w-3').value;

            if (!w1 || !w2 || !w3) { showToast('Completa los 3 ganadores', 'warning'); return; }

            var winners = [
                { match_id: matchId, player_id: parseInt(w1), position: 1 },
                { match_id: matchId, player_id: parseInt(w2), position: 2 },
                { match_id: matchId, player_id: parseInt(w3), position: 3 }
            ];

            var { error } = await supabase.from('match_winners').insert(winners);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Ganadores declarados', 'success'); closeWinnersModal(); loadMatch(); }
        }

        function openCSVModal() { document.getElementById('csv-modal').classList.add('active'); }
        function closeCSVModal() { document.getElementById('csv-modal').classList.remove('active'); }

        async function importCSV() {
            var raw = document.getElementById('csv-input').value.trim();
            if (!raw) { showToast('Pega el CSV', 'warning'); return; }

            var lines = raw.split('\n').filter(function(l) { return l.trim(); });
            var results = [];

            for (var i = 0; i < lines.length; i++) {
                var parts = lines[i].split('\t');
                if (parts.length >= 4) {
                    var kills = parseInt(parts[2].replace(/,/g, '')) || 0;
                    var deaths = parseInt(parts[3].replace(/,/g, '')) || 0;
                    var kd = deaths > 0 ? (kills / deaths).toFixed(2) : kills;
                    results.push({ match_id: matchId, nation: parts[0].trim(), kills: kills, deaths: deaths, kd_ratio: kd, raw_csv_data: parts });
                }
            }

            if (results.length === 0) { showToast('No se pudo parsear el CSV', 'error'); return; }

            // Upsert
            for (var i = 0; i < results.length; i++) {
                await supabase.from('match_results').upsert(results[i], { onConflict: 'match_id,nation' });
            }

            await supabase.from('matches').update({ csv_imported: true, status: 'finished' }).eq('id', matchId);

            // Recalcular stats de jugadores
            var { data: players } = await supabase.from('match_results').select('match_id, player_id').eq('match_id', matchId);
            if (players) {
                for (var i = 0; i < players.length; i++) {
                    if (players[i].player_id) {
                        await supabase.rpc('recalc_player_stats', { p_player_id: players[i].player_id });
                    }
                }
            }

            showToast(results.length + ' resultados importados', 'success');
            closeCSVModal();
            loadResults();
            loadMatch();
        }

        function copyShareLink() {
            var el = document.getElementById('share-link');
            el.select();
            document.execCommand('copy');
            showToast('Enlace copiado', 'success');
        }

        async function deleteMatch() {
            if (!confirmAction('Eliminar permanentemente esta partida y todos sus datos?')) return;
            var { error } = await supabase.from('matches').delete().eq('id', matchId);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Eliminada', 'success'); setTimeout(function() { location.href = 'matches.html'; }, 1000); }
        }

        function openEditModal() {
            if (!currentMatch) return;
            location.href = 'matches.html?edit=' + matchId;
        }

        loadMatch();
    </script>
</body>
</html>
