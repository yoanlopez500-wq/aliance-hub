<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Detalle de Partida - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input,select,textarea{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;} input:focus,select:focus,textarea:focus{border-color:#ff6f00!important;outline:none!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div id="match-header">Cargando...</div>
<div id="match-form" class="hidden mt-6">
<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9998; Editar Partida</h2>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Nombre *</label><input type="text" id="m-name" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Alianza</label><select id="m-alliance" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="">Seleccionar...</option></select></div>
</div>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Estado</label><select id="m-status" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="draft">Borrador</option><option value="open">Abierta</option><option value="in_progress">En curso</option><option value="finished">Finalizada</option><option value="archived">Archivada</option></select></div>
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Tipo</label><select id="m-type" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="internal">Interna</option><option value="duel">Duelo</option><option value="public_31">Publica 31</option><option value="public_500">Evento 500</option></select></div>
</div>
<div class="mb-4"><label class="block text-sm mb-1" style="color:#9fa8da;">Descripcion</label><textarea id="m-desc" rows="3" class="w-full px-3 py-2 rounded-lg border text-sm"></textarea></div>
<div class="flex gap-2"><button onclick="saveMatch()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Guardar</button><button onclick="cancelEdit()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Cancelar</button></div>
</div></div>
<div id="match-players" class="mt-6"><h2 class="text-xl font-bold mb-3">&#128100; Jugadores Registrados</h2><div id="players-list">Cargando...</div></div>
<div class="mt-6"><h2 class="text-xl font-bold mb-3">&#128229; Importar Resultados CSV</h2>
<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;">
<div class="border-2 border-dashed rounded-xl p-6 text-center" style="border-color:#1a237e;" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
<p style="color:#9fa8da;">Arrastra un archivo CSV aqui o <input type="file" id="csv-file" accept=".csv" onchange="handleFile(this.files[0])" class="hidden"><button onclick="document.getElementById('csv-file').click()" class="px-3 py-1 rounded text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Seleccionar archivo</button></p>
<p class="text-xs mt-2" style="color:#9fa8da;">Formato: player_id,kills,deaths</p>
</div>
<div id="csv-preview" class="hidden mt-4"></div>
</div></div>
</div>
<script>
var currentMatchId = null;
var currentMatch = null;
async function loadMatch() {
    var params = new URLSearchParams(window.location.search);
    var matchId = params.get('id');
    var action = params.get('action');
    if (action === 'new') { showCreateForm(); return; }
    if (!matchId) { document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">ID no especificado</div>'; return; }
    currentMatchId = matchId;
    try {
        var { data: match, error } = await supabase.from('matches').select('*, alliances(name, tag)').eq('id', matchId).single();
        if (error) throw error;
        if (!match) { document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">Partida no encontrada</div>'; return; }
        currentMatch = match;
        document.getElementById('match-header').innerHTML = '<div class="flex items-center justify-between"><div><h1 class="text-2xl font-bold">&#127918; ' + (match.name || 'Partida') + '</h1><p class="text-sm" style="color:#9fa8da;">' + (match.alliances ? match.alliances.name : 'Sin alianza') + ' | ' + getTypeBadge(match.type) + ' ' + getStatusBadge(match.status) + '</p></div><button onclick="showEditForm()" class="px-3 py-1.5 rounded-lg text-xs font-bold" style="background:#1a237e;color:#e8eaf6;">Editar</button></div>';
        document.getElementById('match-form').classList.add('hidden');
        loadPlayers(matchId);
        loadAlliancesDropdown();
    } catch(e) { console.error('[MatchDetail]', e); document.getElementById('match-header').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}
async function loadPlayers(matchId) {
    try { var { data, error } = await supabase.from('match_registrations').select('*, players(id, current_username, current_alliance_id, status)').eq('match_id', matchId); if (error) throw error; var list = document.getElementById('players-list'); if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin jugadores registrados</div>'; return; } list.innerHTML = '<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">' + data.map(function(r) { return '<div class="rounded-lg p-3 flex items-center justify-between" style="background:#11183a;border:1px solid #1a237e;"><div><div class="font-medium">' + (r.players ? r.players.current_username : '?') + '</div><div class="text-xs" style="color:#9fa8da;">' + getStatusBadgePlayer(r.players ? r.players.status : 'active') + '</div></div><button onclick="removePlayer(' + r.id + ')" class="px-2 py-1 rounded text-xs" style="background:rgba(198,40,40,0.3);color:#ef5350;">Quitar</button></div>'; }).join('') + '</div>'; } catch(e) { console.error('[Players]', e); }
}
async function loadAlliancesDropdown() { try { var { data } = await supabase.from('alliances').select('id, name').order('name'); var select = document.getElementById('m-alliance'); if (data) select.innerHTML = '<option value="">Seleccionar...</option>' + data.map(function(a) { return '<option value="' + a.id + '">' + a.name + '</option>'; }).join(''); } catch(e) {} }
function showCreateForm() { document.getElementById('match-header').innerHTML = '<h1 class="text-2xl font-bold">&#10133; Nueva Partida</h1>'; document.getElementById('match-form').classList.remove('hidden'); document.getElementById('match-players').classList.add('hidden'); loadAlliancesDropdown(); }
function showEditForm() { if (!currentMatch) return; document.getElementById('match-form').classList.remove('hidden'); document.getElementById('m-name').value = currentMatch.name || ''; document.getElementById('m-status').value = currentMatch.status || 'draft'; document.getElementById('m-type').value = currentMatch.type || 'internal'; document.getElementById('m-desc').value = currentMatch.description || ''; document.getElementById('m-alliance').value = currentMatch.alliance_id || ''; }
function cancelEdit() { document.getElementById('match-form').classList.add('hidden'); }
async function saveMatch() {
    var name = document.getElementById('m-name').value.trim();
    var allianceId = document.getElementById('m-alliance').value || null;
    var status = document.getElementById('m-status').value;
    var type = document.getElementById('m-type').value;
    var desc = document.getElementById('m-desc').value.trim() || null;
    if (!name) { showToast('Nombre obligatorio', 'error'); return; }
    try { if (currentMatchId) { var { error } = await supabase.from('matches').update({ name, alliance_id: allianceId, status, type, description: desc }).eq('id', currentMatchId); } else { var { data: newMatch, error } = await supabase.from('matches').insert({ name, alliance_id: allianceId, status, type, description: desc }).select('id').single(); if (newMatch) currentMatchId = newMatch.id; } if (error) throw error; showToast('Guardado', 'success'); if (!currentMatch) window.location.href = 'match-detail.html?id=' + currentMatchId; else { cancelEdit(); loadMatch(); } } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
async function removePlayer(regId) { if (!confirm('Quitar este jugador?')) return; try { var { error } = await supabase.from('match_registrations').delete().eq('id', regId); if (error) throw error; showToast('Jugador quitado', 'success'); loadPlayers(currentMatchId); } catch(e) { showToast('Error: ' + e.message, 'error'); } }
function handleDrop(e) { e.preventDefault(); var file = e.dataTransfer.files[0]; if (file) handleFile(file); }
function handleFile(file) { if (!file || !file.name.endsWith('.csv')) { showToast('Solo archivos CSV', 'error'); return; } var reader = new FileReader(); reader.onload = function(e) { parseCSV(e.target.result); }; reader.readAsText(file); }
function parseCSV(csvText) { var lines = csvText.split('\n').filter(function(l) { return l.trim(); }); var preview = document.getElementById('csv-preview'); preview.classList.remove('hidden'); var html = '<table class="w-full text-sm"><thead><tr style="background:#11183a;"><th class="p-2">Player ID</th><th class="p-2">Kills</th><th class="p-2">Deaths</th></tr></thead><tbody>'; var results = []; for (var i = 1; i < lines.length; i++) { var cols = lines[i].split(','); if (cols.length >= 3) { var pid = parseInt(cols[0].trim()); var kills = parseInt(cols[1].trim()) || 0; var deaths = parseInt(cols[2].trim()) || 0; if (pid) { results.push({ player_id: pid, kills: kills, deaths: deaths }); html += '<tr style="border-bottom:1px solid #1a237e;"><td class="p-2">' + pid + '</td><td class="p-2">' + kills + '</td><td class="p-2">' + deaths + '</td></tr>'; } } } html += '</tbody></table><button onclick="importResults(' + JSON.stringify(results).replace(/"/g, '&quot;') + ')" class="mt-3 px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Importar ' + results.length + ' resultados</button>'; preview.innerHTML = html; }
async function importResults(results) { if (!currentMatchId) { showToast('Primero guarda la partida', 'error'); return; } if (!results || results.length === 0) { showToast('No hay resultados para importar', 'error'); return; } try { for (var i = 0; i < results.length; i++) { var r = results[i]; await supabase.from('match_results').upsert({ match_id: currentMatchId, player_id: r.player_id, kills: r.kills, deaths: r.deaths }, { onConflict: 'match_id,player_id' }); await supabase.rpc('increment_player_stats', { p_player_id: r.player_id, p_kills: r.kills, p_deaths: r.deaths }); } showToast(results.length + ' resultados importados', 'success'); document.getElementById('csv-preview').classList.add('hidden'); loadPlayers(currentMatchId); } catch(e) { showToast('Error: ' + e.message, 'error'); } }
requireAdmin();
loadMatch();
</script>
</body>
</html>
