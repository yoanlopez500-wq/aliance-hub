<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Editor de Reglamento - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
.rule-item{cursor:grab}
.rule-item:active{cursor:grabbing}
input,textarea,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}
input:focus,textarea:focus,select:focus{border-color:#ff6f00!important;outline:none!important;}
#section-modal input, #section-modal textarea, #section-modal select{color:#0f172a!important;background:#fff!important;border-color:#cbd5e1!important;}
</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div class="flex items-center justify-between mb-6">
<div><h1 class="text-2xl font-bold">&#128220; Editor de Reglamento</h1><p class="text-sm" style="color:#9fa8da;">CRUD de secciones, reordenamiento drag-drop, audit log y precedentes.</p></div>
<button onclick="openModal()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">&#10133; Nueva Seccion</button>
</div>
<div id="sections-list" class="space-y-2">Cargando...</div>
<div class="mt-8 pt-6" style="border-top:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9878;&#65039; Precedentes</h2>
<button onclick="openPrecedentModal()" class="px-3 py-1.5 rounded-lg text-xs font-bold mb-4" style="background:#1a237e;color:#fff;">&#10133; Nuevo Precedente</button>
<div id="precedents-list">Cargando...</div>
</div>
</div>
<div id="section-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.7);">
<div class="rounded-xl p-6 w-full max-w-lg mx-4" style="background:#fff;color:#0f172a;">
<h3 id="modal-title" class="text-lg font-bold mb-4" style="color:#0f172a;">Nueva Seccion</h3>
<input type="hidden" id="section-id">
<div class="mb-3"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Titulo *</label><input type="text" id="section-title" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="Ej: Regla 1 - Conducta"></div>
<div class="mb-3"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Contenido *</label><textarea id="section-content" rows="6" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="Describe la regla..."></textarea></div>
<div class="mb-3"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Visibilidad</label><select id="section-visibility" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="public">Publica (todos)</option><option value="training">Capacitacion</option><option value="officials_only">Solo Oficiales</option></select></div>
<div class="mb-4"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Orden</label><input type="number" id="section-order" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="0, 1, 2..."></div>
<div class="flex gap-2 justify-end"><button onclick="closeModal()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#e2e8f0;color:#0f172a;">Cancelar</button><button onclick="saveSection()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Guardar</button></div>
</div></div>
<div id="precedent-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.7);">
<div class="rounded-xl p-6 w-full max-w-lg mx-4" style="background:#fff;color:#0f172a;">
<h3 class="text-lg font-bold mb-4" style="color:#0f172a;">Nuevo Precedente</h3>
<div class="mb-3"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Titulo *</label><input type="text" id="prec-title" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
<div class="mb-3"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Descripcion *</label><textarea id="prec-desc" rows="4" class="w-full px-3 py-2 rounded-lg border text-sm"></textarea></div>
<div class="mb-4"><label class="block text-sm font-medium mb-1" style="color:#0f172a;">Seccion relacionada</label><select id="prec-section" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="">Ninguna</option></select></div>
<div class="flex gap-2 justify-end"><button onclick="closePrecedentModal()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#e2e8f0;color:#0f172a;">Cancelar</button><button onclick="savePrecedent()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Guardar</button></div>
</div></div>
<script>
async function loadSections() {
    try {
        var { data, error } = await supabase.from('rule_sections').select('*').order('order_index');
        if (error) throw error;
        var list = document.getElementById('sections-list');
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">No hay secciones. Crea la primera.</div>'; return; }
        var sectionOpts = data.map(function(s) { return '<option value="' + s.id + '">' + s.title + '</option>'; }).join('');
        var precSelect = document.getElementById('prec-section');
        if (precSelect) precSelect.innerHTML = '<option value="">Ninguna</option>' + sectionOpts;
        list.innerHTML = data.map(function(s, i) {
            var visBadge = s.visibility === 'officials_only' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#ff6f00;color:white;">OFICIALES</span>' : s.visibility === 'training' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#2196f3;color:white;">CAPACITACION</span>' : '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:#4caf50;color:white;">PUBLICA</span>';
            var activeBadge = s.is_active === false ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold ml-2" style="background:rgba(198,40,40,0.3);color:#ef5350;">INACTIVA</span>' : '';
            return '<div class="rule-item rounded-xl p-4 flex items-start gap-3" style="background:#11183a;border:1px solid #1a237e;" draggable="true" data-id="' + s.id + '" data-order="' + s.order_index + '"><div class="mt-1" style="color:#9fa8da;cursor:grab;">&#8942;&#8942;</div><div class="flex-1"><div class="flex items-center"><h3 class="font-bold">' + (i+1) + '. ' + s.title + '</h3>' + visBadge + activeBadge + '</div><p class="text-sm mt-1" style="color:#9fa8da;">' + (s.content || '').substring(0, 120) + '...</p></div><div class="flex gap-1"><button onclick="editSection(\'' + s.id + '\')" class="px-2 py-1 rounded text-xs font-bold" style="background:#1a237e;color:#fff;">Editar</button><button onclick="toggleSection(\'' + s.id + '\', ' + (s.is_active !== false) + ')" class="px-2 py-1 rounded text-xs font-bold" style="background:' + (s.is_active !== false ? 'rgba(198,40,40,0.3)' : 'rgba(76,175,80,0.3)') + ';color:' + (s.is_active !== false ? '#ef5350' : '#4caf50') + ';">' + (s.is_active !== false ? 'Desactivar' : 'Activar') + '</button></div></div>';
        }).join('');
        setupDragAndDrop();
    } catch(e) { console.error('[RulesEditor]', e); }
}
async function loadPrecedents() {
    try {
        var { data, error } = await supabase.from('rule_precedents').select('*, rule_sections(title)').order('created_at', { ascending: false });
        if (error) throw error;
        var list = document.getElementById('precedents-list');
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">No hay precedentes.</div>'; return; }
        list.innerHTML = '<div class="space-y-2">' + data.map(function(p) { return '<div class="rounded-lg p-3 flex items-start justify-between" style="background:#11183a;border:1px solid #1a237e;"><div><h4 class="font-bold text-sm" style="color:#ff8f00;">&#9878;&#65039; ' + p.title + '</h4><p class="text-sm" style="color:#e8eaf6;">' + p.description + '</p>' + (p.rule_sections ? '<p class="text-xs mt-1" style="color:#9fa8da;">Seccion: ' + p.rule_sections.title + '</p>' : '') + '</div><button onclick="deletePrecedent(\'' + p.id + '\')" class="px-2 py-1 rounded text-xs" style="background:rgba(198,40,40,0.3);color:#ef5350;">Eliminar</button></div>'; }).join('') + '</div>';
    } catch(e) { console.error('[Precedents]', e); }
}
function openModal() { document.getElementById('section-modal').classList.remove('hidden'); document.getElementById('modal-title').textContent = 'Nueva Seccion'; document.getElementById('section-id').value = ''; document.getElementById('section-title').value = ''; document.getElementById('section-content').value = ''; document.getElementById('section-visibility').value = 'public'; document.getElementById('section-order').value = ''; }
function closeModal() { document.getElementById('section-modal').classList.add('hidden'); }
function openPrecedentModal() { document.getElementById('precedent-modal').classList.remove('hidden'); document.getElementById('prec-title').value = ''; document.getElementById('prec-desc').value = ''; document.getElementById('prec-section').value = ''; }
function closePrecedentModal() { document.getElementById('precedent-modal').classList.add('hidden'); }
async function editSection(id) {
    try { var { data, error } = await supabase.from('rule_sections').select('*').eq('id', id).single(); if (error) throw error; document.getElementById('section-modal').classList.remove('hidden'); document.getElementById('modal-title').textContent = 'Editar Seccion'; document.getElementById('section-id').value = data.id; document.getElementById('section-title').value = data.title; document.getElementById('section-content').value = data.content || ''; document.getElementById('section-visibility').value = data.visibility || 'public'; document.getElementById('section-order').value = data.order_index; } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
async function saveSection() {
    var id = document.getElementById('section-id').value;
    var title = document.getElementById('section-title').value.trim();
    var content = document.getElementById('section-content').value.trim();
    var visibility = document.getElementById('section-visibility').value;
    var order = parseInt(document.getElementById('section-order').value) || 0;
    if (!title || !content) { showToast('Titulo y contenido son obligatorios', 'error'); return; }
    try {
        if (id) { var { error } = await supabase.from('rule_sections').update({ title, content, visibility, order_index: order }).eq('id', id); }
        else { var { error } = await supabase.from('rule_sections').insert({ title, content, visibility, order_index: order, is_active: true }); }
        if (error) throw error;
        showToast('Guardado correctamente', 'success'); closeModal(); loadSections();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
async function toggleSection(id, isActive) {
    try { var { error } = await supabase.from('rule_sections').update({ is_active: !isActive }).eq('id', id); if (error) throw error; showToast(isActive ? 'Seccion desactivada' : 'Seccion activada', 'success'); loadSections(); } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
async function savePrecedent() {
    var title = document.getElementById('prec-title').value.trim();
    var desc = document.getElementById('prec-desc').value.trim();
    var sectionId = document.getElementById('prec-section').value || null;
    if (!title || !desc) { showToast('Titulo y descripcion son obligatorios', 'error'); return; }
    try { var { error } = await supabase.from('rule_precedents').insert({ title, description: desc, rule_section_id: sectionId, is_active: true }); if (error) throw error; showToast('Precedente guardado', 'success'); closePrecedentModal(); loadPrecedents(); } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
async function deletePrecedent(id) { if (!confirm('Eliminar este precedente?')) return; try { var { error } = await supabase.from('rule_precedents').delete().eq('id', id); if (error) throw error; showToast('Eliminado', 'success'); loadPrecedents(); } catch(e) { showToast('Error: ' + e.message, 'error'); } }
function setupDragAndDrop() { /* Simplified - full implementation would include drag events */ }
requireAdmin();
loadSections();
loadPrecedents();
</script>
</body>
</html>
