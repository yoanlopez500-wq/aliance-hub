<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Reglas - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=13"></script>
<script src="../assets/js/base.js?v=13"></script>
<script src="../assets/js/auth.js?v=13"></script>
<meta name="theme-color" content="#0a0e27">
<style>
.drag-over{border:2px dashed #ff6f00!important}
.rule-item{cursor:grab}
.rule-item:active{cursor:grabbing}
</style>
</head>
<body class="min-h-screen" style="background:#0a0e27;color:#e8eaf6" data-role="admin">
<div id="admin-nav"></div>

<div class="max-w-7xl mx-auto px-4 py-8">
<div class="flex items-center justify-between mb-6">
<div><h1 class="text-2xl font-bold text-white">&#128220; Editor de Reglas</h1><p class="text-sm" style="color:#9fa8da">Crear, editar y seccionar las reglas de Alliance Hub. Cada cambio queda auditado.</p></div>
<div class="flex gap-2">
<a href="strikes.html" class="px-4 py-2 rounded-lg text-xs font-bold transition" style="background:#1a237e;color:white">&#9889; Panel Strikes</a>
<button onclick="openSectionModal()" class="px-4 py-2 rounded-lg text-xs font-bold transition" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white">&#10133; Nueva Seccion</button>
</div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
<!-- LEFT: Section List -->
<div class="lg:col-span-1">
<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e">
<h2 class="font-bold text-white mb-3 text-sm">&#128203; Secciones</h2>
<div id="sections-list" class="space-y-2 max-h-[70vh] overflow-y-auto">
<div class="text-center py-4 text-sm" style="color:#9fa8da">Cargando...</div>
</div>
</div>
</div>

<!-- CENTER: Editor -->
<div class="lg:col-span-2">
<div id="editor-panel" class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e">
<div class="text-center py-8">
<div class="text-4xl mb-3">&#128221;</div>
<p style="color:#9fa8da">Selecciona una seccion para editar, o crea una nueva.</p>
</div>
</div>

<!-- History panel -->
<div id="history-panel" class="hidden mt-4 rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e">
<h3 class="font-bold text-white mb-3 text-sm">&#128341; Historial de Cambios</h3>
<div id="history-list" class="space-y-2 max-h-48 overflow-y-auto text-sm"></div>
</div>

<!-- Precedents panel -->
<div id="precedents-panel" class="hidden mt-4 rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e">
<h3 class="font-bold text-white mb-3 text-sm">&#9878;&#65039; Precedentes Vinculados</h3>
<div id="precedents-list" class="space-y-2 text-sm"></div>
<button onclick="openPrecedentModal()" class="mt-3 px-3 py-1.5 rounded-lg text-xs font-bold" style="background:rgba(255,111,0,0.15);color:#ff8f00">&#10133; Crear Precedente</button>
</div>
</div>
</div>
</div>

<!-- MODAL: Section -->
<div id="section-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4 hidden">
<div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
<div class="p-6 border-b flex items-center justify-between">
<h2 class="text-xl font-bold text-slate-800" id="sec-modal-title">Nueva Seccion</h2>
<button onclick="closeSectionModal()" class="text-slate-400 hover:text-slate-600 text-xl">&#10005;</button>
</div>
<form id="section-form" class="p-6 space-y-4">
<input type="hidden" id="sec-id">
<div class="grid grid-cols-2 gap-4">
<div><label class="block text-sm font-medium text-slate-700 mb-1">Numero de Seccion *</label>
<input type="text" id="sec-number" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: 1, 2.1, 3.a"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Orden</label>
<input type="number" id="sec-order" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" value="0"></div>
</div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Titulo *</label>
<input type="text" id="sec-title" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: Uso de Goldmark"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Contenido *</label>
<textarea id="sec-content" required rows="8" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" placeholder="Texto completo de la regla..."></textarea></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Seccion Padre (opcional)</label>
<select id="sec-parent" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"><option value="">-- Ninguna (capitulo raiz) --</option></select></div>
<div class="flex items-center gap-2">
<input type="checkbox" id="sec-active" checked class="rounded"><label class="text-sm text-slate-700">Activa</label>
</div>
<div class="flex gap-3 pt-4">
<button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Guardar</button>
<button type="button" onclick="closeSectionModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
</div>
</form>
</div></div>

<!-- MODAL: Precedent -->
<div id="precedent-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4 hidden">
<div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
<div class="p-6 border-b flex items-center justify-between">
<h2 class="text-xl font-bold text-slate-800">Nuevo Precedente</h2>
<button onclick="closePrecedentModal()" class="text-slate-400 hover:text-slate-600 text-xl">&#10005;</button>
</div>
<form id="precedent-form" class="p-6 space-y-4">
<input type="hidden" id="prec-rule-id">
<div><label class="block text-sm font-medium text-slate-700 mb-1">Titulo del Caso *</label>
<input type="text" id="prec-title" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: Uso de goldmark en partida #123"></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Descripcion *</label>
<textarea id="prec-desc" required rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm"></textarea></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Resolucion *</label>
<textarea id="prec-resolution" required rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm"></textarea></div>
<div class="grid grid-cols-2 gap-4">
<div><label class="block text-sm font-medium text-slate-700 mb-1">Severidad</label>
<select id="prec-severity" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"><option value="minor">Leve</option><option value="moderate">Moderada</option><option value="severe">Severa</option></select></div>
<div><label class="block text-sm font-medium text-slate-700 mb-1">Tipo de Strike</label>
<select id="prec-strike-type" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"><option value="">-- Ninguno --</option><option value="no_show">No-Show</option><option value="gold_use">Uso Goldmark</option><option value="multi_account">Multicuenta</option><option value="spy">Espionaje</option><option value="cheating">Trampa</option><option value="toxicity">Toxicidad</option></select></div>
</div>
<div class="flex gap-3 pt-4">
<button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Crear Precedente</button>
<button type="button" onclick="closePrecedentModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
</div>
</form>
</div></div>

<script>
requireAdmin();
requireMinRole('superadmin');
var allSections = [];
var editingId = null;

async function loadSections() {
    try {
        var { data, error } = await supabase.from('rule_sections').select('*').order('order_index');
        if (error) throw error;
        allSections = data || [];
        renderSectionList();
        updateParentDropdown();
    } catch(e) { console.error('[Rules] Error cargando:', e); }
}

function renderSectionList() {
    var container = document.getElementById('sections-list');
    if (allSections.length === 0) {
        container.innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da">Sin secciones. Crea la primera.</div>';
        return;
    }
    container.innerHTML = allSections.map(function(s) {
        var indent = s.parent_id ? 'pl-6 border-l-2 border-orange-500/30' : '';
        var num = s.section_number ? '<span class="text-amber-400 font-bold mr-2">' + s.section_number + '</span>' : '';
        var inactive = s.is_active ? '' : '<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-900/30 text-red-400 ml-2">INACTIVA</span>';
        return '<div class="rule-item ' + indent + ' rounded-lg p-3 transition hover:bg-white/5 flex items-center justify-between group" style="background:rgba(255,255,255,0.03);border:1px solid #1a237e" data-id="' + s.id + '" draggable="true">' +
            '<div class="flex-1 min-w-0 cursor-pointer" onclick="editSection(\'' + s.id + '\')">' +
                '<div class="text-sm font-medium truncate">' + num + s.title + inactive + '</div>' +
                '<div class="text-xs mt-0.5 truncate" style="color:#9fa8da;opacity:0.6">' + (s.content.substring(0, 60) + '...') + '</div>' +
            '</div>' +
            '<div class="flex items-center gap-1 ml-2 opacity-0 group-hover:opacity-100 transition">' +
                '<button onclick="editSection(\'' + s.id + '\')" class="text-xs px-2 py-1 rounded hover:bg-white/10" style="color:#ff8f00">&#9999;&#65039;</button>' +
                '<button onclick="deleteSection(\'' + s.id + '\')" class="text-xs px-2 py-1 rounded hover:bg-white/10" style="color:#ef5350">&#128465;&#65039;</button>' +
            '</div>' +
        '</div>';
    }).join('');

    // Drag events
    document.querySelectorAll('.rule-item').forEach(function(el) {
        el.addEventListener('dragstart', function(e) { e.dataTransfer.setData('text/plain', el.dataset.id); el.style.opacity = '0.5'; });
        el.addEventListener('dragend', function() { this.style.opacity = '1'; document.querySelectorAll('.rule-item').forEach(function(x) { x.classList.remove('drag-over'); }); });
        el.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('drag-over'); });
        el.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
        el.addEventListener('drop', function(e) { e.preventDefault(); var draggedId = e.dataTransfer.getData('text/plain'); var targetId = this.dataset.id; if (draggedId !== targetId) reorderSection(draggedId, targetId); });
    });
}

function updateParentDropdown() {
    var sel = document.getElementById('sec-parent');
    var opts = '<option value="">-- Ninguna (capitulo raiz) --</option>';
    allSections.filter(function(s) { return !s.parent_id; }).forEach(function(s) {
        opts += '<option value="' + s.id + '">' + s.section_number + ' ' + s.title + '</option>';
    });
    sel.innerHTML = opts;
}

async function reorderSection(draggedId, targetId) {
    var dragged = allSections.find(function(s) { return s.id === draggedId; });
    var target = allSections.find(function(s) { return s.id === targetId; });
    if (!dragged || !target) return;
    var newOrder = target.order_index + 1;
    try {
        await supabase.from('rule_sections').update({ order_index: newOrder }).eq('id', draggedId);
        loadSections();
        showToast('Orden actualizado', 'success');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function openSectionModal() {
    editingId = null;
    document.getElementById('section-form').reset();
    document.getElementById('sec-id').value = '';
    document.getElementById('sec-modal-title').textContent = '&#10133; Nueva Seccion';
    document.getElementById('section-modal').classList.remove('hidden');
    document.getElementById('section-modal').classList.add('flex');
}

function closeSectionModal() { document.getElementById('section-modal').classList.add('hidden'); document.getElementById('section-modal').classList.remove('flex'); }

function editSection(id) {
    var s = allSections.find(function(x) { return x.id === id; });
    if (!s) return;
    editingId = id;
    document.getElementById('sec-id').value = s.id;
    document.getElementById('sec-number').value = s.section_number || '';
    document.getElementById('sec-order').value = s.order_index;
    document.getElementById('sec-title').value = s.title;
    document.getElementById('sec-content').value = s.content;
    document.getElementById('sec-parent').value = s.parent_id || '';
    document.getElementById('sec-active').checked = s.is_active;
    document.getElementById('sec-modal-title').textContent = '&#9999;&#65039; Editar Seccion';
    document.getElementById('section-modal').classList.remove('hidden');
    document.getElementById('section-modal').classList.add('flex');
    loadHistory(id);
    loadPrecedents(id);
}

async function deleteSection(id) {
    if (!confirmAction('Eliminar esta seccion?')) return;
    try { await supabase.from('rule_sections').delete().eq('id', id); loadSections(); showToast('Eliminada', 'success'); }
    catch(e) { showToast('Error: ' + e.message, 'error'); }
}

document.getElementById('section-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var data = {
        section_number: document.getElementById('sec-number').value.trim(),
        order_index: parseInt(document.getElementById('sec-order').value) || 0,
        title: document.getElementById('sec-title').value.trim(),
        content: document.getElementById('sec-content').value.trim(),
        parent_id: document.getElementById('sec-parent').value || null,
        is_active: document.getElementById('sec-active').checked
    };
    try {
        if (editingId) {
            await supabase.from('rule_sections').update(data).eq('id', editingId);
            showToast('Seccion actualizada', 'success');
        } else {
            await supabase.from('rule_sections').insert([data]);
            showToast('Seccion creada', 'success');
        }
        closeSectionModal(); loadSections();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
});

async function loadHistory(sectionId) {
    try {
        var { data } = await supabase.from('rule_section_history').select('*').eq('section_id', sectionId).order('changed_at', { ascending: false }).limit(10);
        var panel = document.getElementById('history-panel');
        var list = document.getElementById('history-list');
        if (data && data.length > 0) {
            panel.classList.remove('hidden');
            list.innerHTML = data.map(function(h) {
                return '<div class="p-2 rounded" style="background:rgba(255,255,255,0.03)">' +
                    '<span class="text-xs font-bold" style="color:#ff8f00">' + formatDateTime(h.changed_at) + '</span>' +
                    '<span class="text-xs ml-2" style="color:#9fa8da">' + h.title + '</span></div>';
            }).join('');
        } else { panel.classList.add('hidden'); }
    } catch(e) { console.error('[Rules] History:', e); }
}

async function loadPrecedents(sectionId) {
    try {
        var { data } = await supabase.from('rule_precedents').select('*').eq('rule_section_id', sectionId).order('created_at', { ascending: false });
        var panel = document.getElementById('precedents-panel');
        var list = document.getElementById('precedents-list');
        document.getElementById('prec-rule-id').value = sectionId;
        if (data && data.length > 0) {
            panel.classList.remove('hidden');
            list.innerHTML = data.map(function(p) {
                var sevColor = p.severity === 'severe' ? 'text-red-400' : (p.severity === 'moderate' ? 'text-orange-400' : 'text-yellow-400');
                return '<div class="p-3 rounded" style="background:rgba(255,255,255,0.03);border:1px solid #1a237e">' +
                    '<div class="font-medium text-white text-sm">' + p.title + ' <span class="text-xs ' + sevColor + '">[' + p.severity + ']</span></div>' +
                    '<div class="text-xs mt-1" style="color:#9fa8da">' + p.description + '</div>' +
                    '<div class="text-xs mt-1 font-medium" style="color:#4caf50">Resolucion: ' + p.resolution + '</div></div>';
            }).join('');
        } else {
            panel.classList.remove('hidden');
            list.innerHTML = '<div class="text-xs py-2" style="color:#9fa8da">Sin precedentes para esta seccion.</div>';
        }
    } catch(e) { console.error('[Rules] Precedents:', e); }
}

function openPrecedentModal() {
    document.getElementById('precedent-form').reset();
    document.getElementById('precedent-modal').classList.remove('hidden');
    document.getElementById('precedent-modal').classList.add('flex');
}
function closePrecedentModal() { document.getElementById('precedent-modal').classList.add('hidden'); document.getElementById('precedent-modal').classList.remove('flex'); }

document.getElementById('precedent-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var data = {
        rule_section_id: document.getElementById('prec-rule-id').value,
        title: document.getElementById('prec-title').value.trim(),
        description: document.getElementById('prec-desc').value.trim(),
        resolution: document.getElementById('prec-resolution').value.trim(),
        severity: document.getElementById('prec-severity').value,
        strike_type: document.getElementById('prec-strike-type').value || null
    };
    try { await supabase.from('rule_precedents').insert([data]); showToast('Precedente creado', 'success'); closePrecedentModal(); loadPrecedents(data.rule_section_id); }
    catch(e) { showToast('Error: ' + e.message, 'error'); }
});

loadSections();
</script>
</body>
</html>
