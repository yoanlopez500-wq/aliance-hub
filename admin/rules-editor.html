<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Reglas - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=16"></script>
    <script src="../assets/js/base.js?v=16"></script>
    <script src="../assets/js/auth.js?v=16"></script>
    <style>
        .rule-section { border-left: 3px solid #e2e8f0; }
        .rule-section:hover { border-left-color: #f59e0b; }
    </style>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-white">&#128221; Editor de Reglas</h1>
            <button onclick="openModal()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">+ Nueva Seccion</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Lista de reglas -->
            <div>
                <h2 class="text-lg font-bold text-white mb-3">&#128220; Secciones</h2>
                <div id="rules-list" class="space-y-3">
                    <div class="text-center py-8 text-slate-400">Cargando...</div>
                </div>
            </div>

            <!-- Precedentes -->
            <div>
                <h2 class="text-lg font-bold text-white mb-3">&#9878; Precedentes</h2>
                <button onclick="openPrecedentModal()" class="mb-3 px-3 py-1.5 bg-blue-500 text-white rounded text-xs font-bold hover:bg-blue-400">+ Nuevo Precedente</button>
                <div id="precedents-list" class="space-y-3">
                    <div class="text-center py-8 text-slate-400">Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Seccion -->
    <div id="section-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-xl font-bold text-slate-800 mb-4">Nueva Seccion</h2>
            <input type="hidden" id="edit-id">
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Numero de seccion (ej: 1.2)</label>
                <input type="text" id="r-number" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" placeholder="1.1">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Titulo *</label>
                <input type="text" id="r-title" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Contenido</label>
                <textarea id="r-content" rows="5" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm"></textarea>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Seccion padre (opcional)</label>
                <select id="r-parent" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                    <option value="">Ninguna (raiz)</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Orden</label>
                <input type="number" id="r-order" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" value="0">
            </div>
            <div class="flex items-center gap-2 mb-4">
                <input type="checkbox" id="r-active" checked class="rounded">
                <label class="text-sm text-slate-700">Activa</label>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 text-sm hover:text-slate-800">Cancelar</button>
                <button onclick="saveSection()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Precedente -->
    <div id="precedent-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-lg w-full mx-4">
            <h2 class="text-xl font-bold text-slate-800 mb-4">Nuevo Precedente</h2>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Titulo *</label>
                <input type="text" id="p-title" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Descripcion</label>
                <textarea id="p-desc" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm"></textarea>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Resolucion</label>
                <textarea id="p-resolution" rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm"></textarea>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Severidad</label>
                <select id="p-severity" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                    <option value="minor">Leve</option>
                    <option value="moderate">Moderada</option>
                    <option value="severe">Grave</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-bold text-slate-700 mb-1">Seccion relacionada</label>
                <select id="p-section" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm">
                    <option value="">Ninguna</option>
                </select>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="closePrecedentModal()" class="px-4 py-2 text-slate-600 text-sm hover:text-slate-800">Cancelar</button>
                <button onclick="savePrecedent()" class="px-4 py-2 bg-blue-500 text-white rounded-lg font-bold text-sm hover:bg-blue-400">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        if (!hasAdminSession()) { window.location.href = 'login.html'; }

        async function loadRules() {
            var { data: rules } = await supabase
                .from('rule_sections')
                .select('*')
                .order('order_index', { ascending: true });

            var container = document.getElementById('rules-list');
            if (!rules || rules.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">No hay secciones configuradas</div>';
                populateParentSelect([]);
                return;
            }

            // Build tree
            var byId = {};
            var roots = [];
            rules.forEach(function(r) { byId[r.id] = r; r.children = []; });
            rules.forEach(function(r) {
                if (r.parent_id && byId[r.parent_id]) byId[r.parent_id].children.push(r);
                else roots.push(r);
            });

            container.innerHTML = roots.map(function(r) { return renderRule(r, 0); }).join('');
            populateParentSelect(rules);
            populateSectionSelect(rules);
        }

        function renderRule(r, level) {
            var indent = level * 16;
            var num = r.section_number ? '<span class="text-xs font-mono bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded mr-2">' + r.section_number + '</span>' : '';
            var activeBadge = r.is_active === false ? '<span class="px-2 py-0.5 rounded text-xs bg-slate-200 text-slate-500 ml-2">INACTIVA</span>' : '';
            var children = r.children || [];

            var html = '<div class="rule-section bg-white rounded-xl border border-slate-200 p-4 mb-2" style="margin-left:' + indent + 'px">' +
                '<div class="flex items-start justify-between">' +
                    '<div class="flex-1">' +
                        '<h3 class="font-bold text-slate-800 text-sm">' + num + r.title + activeBadge + '</h3>' +
                        '<p class="text-xs text-slate-500 mt-1">' + (r.content || '').substring(0, 100) + (r.content && r.content.length > 100 ? '...' : '') + '</p>' +
                    '</div>' +
                    '<div class="flex gap-2 ml-2">' +
                        '<button onclick="editSection(\'' + r.id + '\')" class="px-2 py-1 text-xs bg-slate-100 rounded hover:bg-slate-200">Editar</button>' +
                        '<button onclick="toggleSection(\'' + r.id + '\', ' + (r.is_active === false) + ')" class="px-2 py-1 text-xs ' + (r.is_active === false ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600') + ' rounded hover:bg-opacity-80">' + (r.is_active === false ? 'Activar' : 'Desactivar') + '</button>' +
                    '</div>' +
                '</div>';

            if (children.length > 0) {
                html += '<div class="mt-2 pt-2 border-t border-slate-100">';
                children.forEach(function(c) { html += renderRule(c, level + 1); });
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function populateParentSelect(rules) {
            var sel = document.getElementById('r-parent');
            var opts = '<option value="">Ninguna (raiz)</option>';
            rules.forEach(function(r) {
                opts += '<option value="' + r.id + '">' + (r.section_number ? '[' + r.section_number + '] ' : '') + r.title + '</option>';
            });
            sel.innerHTML = opts;
        }

        function populateSectionSelect(rules) {
            var sel = document.getElementById('p-section');
            var opts = '<option value="">Ninguna</option>';
            rules.forEach(function(r) {
                opts += '<option value="' + r.id + '">' + (r.section_number ? '[' + r.section_number + '] ' : '') + r.title + '</option>';
            });
            sel.innerHTML = opts;
        }

        function openModal() {
            document.getElementById('section-modal').classList.remove('hidden');
            document.getElementById('section-modal').classList.add('flex');
            document.getElementById('modal-title').textContent = 'Nueva Seccion';
            document.getElementById('edit-id').value = '';
            document.getElementById('r-number').value = '';
            document.getElementById('r-title').value = '';
            document.getElementById('r-content').value = '';
            document.getElementById('r-parent').value = '';
            document.getElementById('r-order').value = '0';
            document.getElementById('r-active').checked = true;
        }

        function closeModal() {
            document.getElementById('section-modal').classList.add('hidden');
            document.getElementById('section-modal').classList.remove('flex');
        }

        async function editSection(id) {
            var { data: r } = await supabase.from('rule_sections').select('*').eq('id', id).single();
            if (!r) return;

            document.getElementById('section-modal').classList.remove('hidden');
            document.getElementById('section-modal').classList.add('flex');
            document.getElementById('modal-title').textContent = 'Editar Seccion';
            document.getElementById('edit-id').value = r.id;
            document.getElementById('r-number').value = r.section_number || '';
            document.getElementById('r-title').value = r.title;
            document.getElementById('r-content').value = r.content || '';
            document.getElementById('r-parent').value = r.parent_id || '';
            document.getElementById('r-order').value = r.order_index;
            document.getElementById('r-active').checked = r.is_active !== false;
        }

        async function saveSection() {
            var id = document.getElementById('edit-id').value;
            var data = {
                section_number: document.getElementById('r-number').value.trim() || null,
                title: document.getElementById('r-title').value.trim(),
                content: document.getElementById('r-content').value.trim() || null,
                parent_id: document.getElementById('r-parent').value || null,
                order_index: parseInt(document.getElementById('r-order').value) || 0,
                is_active: document.getElementById('r-active').checked
            };

            if (!data.title) { showToast('Titulo es requerido', 'error'); return; }

            var result;
            if (id) {
                result = await supabase.from('rule_sections').update(data).eq('id', id);
            } else {
                result = await supabase.from('rule_sections').insert([data]);
            }

            if (result.error) { showToast('Error: ' + result.error.message, 'error'); return; }
            showToast('Seccion guardada', 'success');
            closeModal();
            loadRules();
        }

        async function toggleSection(id, activate) {
            var { error } = await supabase.from('rule_sections').update({ is_active: activate }).eq('id', id);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast(activate ? 'Seccion activada' : 'Seccion desactivada', 'success');
            loadRules();
        }

        // Precedentes
        function openPrecedentModal() {
            document.getElementById('precedent-modal').classList.remove('hidden');
            document.getElementById('precedent-modal').classList.add('flex');
            document.getElementById('p-title').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-resolution').value = '';
            document.getElementById('p-severity').value = 'minor';
            document.getElementById('p-section').value = '';
        }

        function closePrecedentModal() {
            document.getElementById('precedent-modal').classList.add('hidden');
            document.getElementById('precedent-modal').classList.remove('flex');
        }

        async function savePrecedent() {
            var data = {
                title: document.getElementById('p-title').value.trim(),
                description: document.getElementById('p-desc').value.trim() || null,
                resolution: document.getElementById('p-resolution').value.trim() || null,
                severity: document.getElementById('p-severity').value,
                rule_section_id: document.getElementById('p-section').value || null
            };

            if (!data.title) { showToast('Titulo es requerido', 'error'); return; }

            var { error } = await supabase.from('rule_precedents').insert([data]);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Precedente guardado', 'success');
            closePrecedentModal();
            loadPrecedents();
        }

        async function loadPrecedents() {
            var { data: precedents } = await supabase
                .from('rule_precedents')
                .select('*, rule_section:rule_sections(title)')
                .order('created_at', { ascending: false })
                .limit(50);

            var container = document.getElementById('precedents-list');
            if (!precedents || precedents.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">Sin precedentes registrados</div>';
                return;
            }

            container.innerHTML = precedents.map(function(p) {
                var sevColor = p.severity === 'minor' ? 'bg-yellow-100 text-yellow-700' :
                               p.severity === 'moderate' ? 'bg-orange-100 text-orange-700' :
                               'bg-red-100 text-red-700';
                return '<div class="bg-white rounded-xl border border-slate-200 p-4">' +
                    '<div class="flex items-center gap-2 mb-1">' +
                        '<span class="px-2 py-0.5 rounded text-xs ' + sevColor + ' font-bold">' + p.severity + '</span>' +
                        '<span class="text-xs text-slate-400">' + (p.rule_section?.title || 'General') + '</span>' +
                    '</div>' +
                    '<h3 class="font-bold text-slate-800 text-sm">' + p.title + '</h3>' +
                    '<p class="text-xs text-slate-600 mt-1">' + (p.description || '') + '</p>' +
                    '<p class="text-xs text-amber-600 mt-1">&#9878; ' + (p.resolution || '') + '</p>' +
                '</div>';
            }).join('');
        }

        loadRules();
        loadPrecedents();
    </script>
</body>
</html>
