<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Importar CSV - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128229; Importar CSV</h1>
<p class="text-sm mb-4" style="color:#9fa8da;">Sube un archivo CSV con los resultados de una partida.</p>
<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;">
<div class="border-2 border-dashed rounded-xl p-8 text-center" style="border-color:#1a237e;" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
<div class="text-4xl mb-3">&#128193;</div>
<p class="text-sm mb-2" style="color:#9fa8da;">Arrastra un archivo CSV aqui o</p>
<input type="file" id="csv-file" accept=".csv" class="hidden" onchange="handleFile(this.files[0])">
<button onclick="document.getElementById('csv-file').click()" class="px-4 py-2 rounded-lg font-bold text-sm" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white;">Seleccionar archivo</button>
<p class="text-xs mt-3" style="color:#9fa8da;">Formato: player_id,kills,deaths,nation</p>
</div>
<div id="preview" class="hidden mt-4"></div>
</div>
</div>
<script>
function handleDrop(e) { e.preventDefault(); var f = e.dataTransfer.files[0]; if (f) handleFile(f); }
function handleFile(file) {
    if (!file || !file.name.endsWith('.csv')) { showToast('Solo archivos CSV', 'error'); return; }
    var reader = new FileReader();
    reader.onload = function(e) { parseCSV(e.target.result); };
    reader.readAsText(file);
}
function parseCSV(csv) {
    var lines = csv.split('\n').filter(function(l){return l.trim()});
    var preview = document.getElementById('preview');
    preview.classList.remove('hidden');
    var html = '<table class="w-full text-sm"><thead><tr style="background:rgba(255,255,255,0.02);"><th class="p-2 text-left" style="color:#9fa8da;">Player ID</th><th class="p-2 text-right" style="color:#9fa8da;">Kills</th><th class="p-2 text-right" style="color:#9fa8da;">Deaths</th></tr></thead><tbody>';
    for (var i = 1; i < lines.length && i < 11; i++) {
        var cols = lines[i].split(',');
        html += '<tr style="border-bottom:1px solid #1a237e;"><td class="p-2">' + (cols[0]||'') + '</td><td class="p-2 text-right" style="color:#4caf50;">' + (cols[1]||0) + '</td><td class="p-2 text-right" style="color:#ef5350;">' + (cols[2]||0) + '</td></tr>';
    }
    html += '</tbody></table>';
    if (lines.length > 11) html += '<p class="text-xs mt-2" style="color:#9fa8da;">... y ' + (lines.length - 11) + ' filas mas</p>';
    preview.innerHTML = html;
}
requireAdmin();
</script>
</body>
</html>
