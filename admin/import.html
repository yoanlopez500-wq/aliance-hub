<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">&#128229; Importar Datos</h1>
        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h2 class="font-bold text-slate-800 mb-4">Importar Jugadores desde CSV</h2>
            <p class="text-sm text-slate-500 mb-4">Formato: <code class="bg-slate-100 px-2 py-1 rounded text-xs">id,username,alianza_id</code> (una fila por jugador)</p>
            <textarea id="import-text" rows="10" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 outline-none font-mono text-sm" placeholder="Ejemplo:
99702975,Jugador1,alianza-uuid-aqui
99876543,Jugador2,"></textarea>
            <div class="flex gap-3 mt-4">
                <button onclick="previewImport()" class="px-4 py-2 bg-blue-500 text-white rounded-lg font-bold text-sm hover:bg-blue-400">Vista previa</button>
                <button onclick="importPlayers()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">&#128229; Importar</button>
            </div>
            <div id="import-preview" class="mt-4 hidden"></div>
        </div>
    </div>
    <script>
        requireAdmin();
        function previewImport() {
            var text = document.getElementById('import-text').value.trim();
            if (!text) { showToast('Pega los datos primero', 'warning'); return; }
            var lines = text.split('\n').filter(function(l) { return l.trim(); });
            var preview = document.getElementById('import-preview');
            preview.classList.remove('hidden');
            preview.innerHTML = '<h3 class="font-bold text-sm mb-2">Vista previa (' + lines.length + ' jugadores)</h3>' +
                '<table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="text-left p-2">ID</th><th class="text-left p-2">Username</th><th class="text-left p-2">Alianza ID</th></tr></thead><tbody>' +
                lines.slice(0, 10).map(function(line) {
                    var parts = line.split(',');
                    return '<tr class="border-b"><td class="p-2">' + (parts[0] || '') + '</td><td class="p-2">' + (parts[1] || '') + '</td><td class="p-2 text-slate-400">' + (parts[2] || '-') + '</td></tr>';
                }).join('') + '</tbody></table>' +
                (lines.length > 10 ? '<p class="text-xs text-slate-400 mt-2">... y ' + (lines.length - 10) + ' mas</p>' : '');
        }
        async function importPlayers() {
            var text = document.getElementById('import-text').value.trim();
            if (!text) { showToast('Pega los datos primero', 'warning'); return; }
            var lines = text.split('\n').filter(function(l) { return l.trim(); });
            var players = [];
            lines.forEach(function(line) {
                var parts = line.split(',');
                if (parts[0] && parts[1]) {
                    players.push({
                        id: parseInt(parts[0].trim()),
                        current_username: parts[1].trim(),
                        current_alliance_id: parts[2] ? parts[2].trim() : null
                    });
                }
            });
            if (players.length === 0) { showToast('No hay datos validos', 'warning'); return; }
            var { error } = await supabase.schema('v2').from('players').insert(players);
            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast(players.length + ' jugadores importados', 'success'); document.getElementById('import-text').value = ''; document.getElementById('import-preview').classList.add('hidden'); }
        }
    </script>
</body>
</html>
