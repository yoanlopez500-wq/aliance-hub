<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Importar CSV - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<script src="../assets/js/csv-parser.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#128229; Importar Resultados</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Importa estadisticas desde CSV de Supremacy 1914.</p>
<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;">
<div class="border-2 border-dashed rounded-xl p-6 text-center" style="border-color:#1a237e;" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
<p style="color:#9fa8da;">Arrastra un archivo CSV aqui o <input type="file" id="csv-file" accept=".csv" onchange="handleFile(this.files[0])" class="hidden"><button onclick="document.getElementById('csv-file').click()" class="px-3 py-1 rounded text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Seleccionar archivo</button></p>
<p class="text-xs mt-2" style="color:#9fa8da;">Formato: player_id,kills,deaths,match_id</p>
</div>
<div id="csv-preview" class="hidden mt-4"></div>
</div>
</div>
<script>
function handleDrop(e) { e.preventDefault(); var file = e.dataTransfer.files[0]; if (file) handleFile(file); }
function handleFile(file) { if (!file || !file.name.endsWith('.csv')) { showToast('Solo archivos CSV', 'error'); return; } var reader = new FileReader(); reader.onload = function(e) { parseAndPreview(e.target.result); }; reader.readAsText(file); }
function parseAndPreview(csvText) { var lines = csvText.split('\n').filter(function(l) { return l.trim(); }); var preview = document.getElementById('csv-preview'); preview.classList.remove('hidden'); var html = '<table class="w-full text-sm"><thead><tr style="background:#11183a;"><th class="p-2">Player ID</th><th class="p-2">Kills</th><th class="p-2">Deaths</th><th class="p-2">Match ID</th></tr></thead><tbody>'; var results = []; for (var i = 1; i < Math.min(lines.length, 21); i++) { var cols = lines[i].split(','); if (cols.length >= 3) { var pid = parseInt(cols[0].trim()); var kills = parseInt(cols[1].trim()) || 0; var deaths = parseInt(cols[2].trim()) || 0; var mid = cols[3] ? cols[3].trim() : null; if (pid) { results.push({ player_id: pid, kills: kills, deaths: deaths, match_id: mid }); html += '<tr style="border-bottom:1px solid #1a237e;"><td class="p-2">' + pid + '</td><td class="p-2">' + kills + '</td><td class="p-2">' + deaths + '</td><td class="p-2">' + (mid || '-') + '</td></tr>'; } } } if (lines.length > 21) html += '<tr><td colspan="4" class="p-2 text-center" style="color:#9fa8da;">... y ' + (lines.length - 21) + ' filas mas</td></tr>'; html += '</tbody></table>'; if (results.length > 0) { html += '<button onclick="importAll(' + JSON.stringify(results).replace(/"/g, '&quot;') + ')" class="mt-3 px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Importar ' + results.length + ' resultados</button>'; } preview.innerHTML = html; }

async function importAll(results) {
    try {
        for (var i = 0; i < results.length; i++) {
            var r = results[i];
            var matchId = r.match_id || currentMatchId;
            if (!matchId) continue;
            await supabase.from('match_results').upsert({ match_id: matchId, player_id: r.player_id, kills: r.kills, deaths: r.deaths }, { onConflict: 'match_id,player_id' });
            try {
                await supabase.rpc('increment_player_stats', { p_player_id: r.player_id, p_kills: r.kills, p_deaths: r.deaths });
            } catch(rpcErr) {
                console.warn('[Import] RPC increment_player_stats no disponible, actualizando manualmente');
                await supabase.from('players').update({ total_kills: r.kills, total_deaths: r.deaths }).eq('id', r.player_id);
            }
        }
        showToast(results.length + ' resultados importados', 'success');
        document.getElementById('csv-preview').classList.add('hidden');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

requireAdmin();
</script>
</body>
</html>
