<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=16"></script>
    <script src="../assets/js/base.js?v=16"></script>
    <script src="../assets/js/auth.js?v=16"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-white mb-6">&#128229; Importar Resultados</h1>

        <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
            <h3 class="font-bold text-slate-800 mb-3">Importar CSV</h3>
            <p class="text-sm text-slate-500 mb-4">Formato: jugador,nacion,kills,muertes (una linea por jugador)</p>

            <div class="mb-4">
                <label class="block text-sm font-bold text-slate-700 mb-1">Partida</label>
                <select id="import-match" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm"></select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold text-slate-700 mb-1">Datos CSV</label>
                <textarea id="csv-data" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm font-mono" rows="10" placeholder="jugador1,Francia,15,3&#10;jugador2,Alemania,8,12"></textarea>
            </div>

            <button onclick="importCSV()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-400">Importar</button>
        </div>

        <div id="import-result" class="hidden bg-green-50 rounded-xl border border-green-200 p-4">
            <p id="import-message" class="text-sm text-green-700 font-bold"></p>
        </div>
    </div>

    <script>
        if (!hasAdminSession()) { window.location.href = 'login.html'; }

        async function loadMatches() {
            var { data: matches } = await supabase
                .from('matches')
                .select('id, name, status')
                .order('created_at', { ascending: false });

            var sel = document.getElementById('import-match');
            sel.innerHTML = (matches || []).map(function(m) {
                return '<option value="' + m.id + '">' + m.name + ' (' + m.status + ')</option>';
            }).join('');
        }

        async function importCSV() {
            var matchId = document.getElementById('import-match').value;
            var csv = document.getElementById('csv-data').value.trim();
            var result = document.getElementById('import-result');
            var msg = document.getElementById('import-message');

            if (!matchId || !csv) { showToast('Selecciona una partida y pega los datos CSV', 'error'); return; }

            var lines = csv.split('\n').filter(function(l) { return l.trim(); });
            var results = [];
            var errors = [];

            for (var i = 0; i < lines.length; i++) {
                var parts = lines[i].split(',').map(function(p) { return p.trim(); });
                if (parts.length < 4) { errors.push('Linea ' + (i+1) + ': formato invalido'); continue; }

                var playerName = parts[0];
                var nation = parts[1];
                var kills = parseInt(parts[2]) || 0;
                var deaths = parseInt(parts[3]) || 0;

                // Buscar o crear jugador
                var { data: player } = await supabase.from('players').select('id').eq('current_username', playerName).single();
                var playerId;

                if (!player) {
                    var { data: newPlayer, error: createErr } = await supabase.from('players').insert({
                        current_username: playerName,
                        status: 'active'
                    }).select('id').single();
                    if (createErr) { errors.push('Linea ' + (i+1) + ': ' + createErr.message); continue; }
                    playerId = newPlayer.id;
                } else {
                    playerId = player.id;
                }

                // Insertar resultado
                var { error: resultErr } = await supabase.from('match_results').upsert({
                    match_id: matchId,
                    player_id: playerId,
                    nation: nation,
                    kills: kills,
                    deaths: deaths,
                    kd_ratio: deaths > 0 ? (kills / deaths) : kills
                }, { onConflict: 'match_id,player_id' });

                if (resultErr) { errors.push('Linea ' + (i+1) + ': ' + resultErr.message); continue; }
                results.push(playerName + ': ' + kills + ' kills, ' + deaths + ' deaths');
            }

            // Actualizar stats de jugadores
            for (var j = 0; j < lines.length; j++) {
                var parts = lines[j].split(',').map(function(p) { return p.trim(); });
                if (parts.length < 4) continue;
                var playerName = parts[0];
                var kills = parseInt(parts[2]) || 0;
                var deaths = parseInt(parts[3]) || 0;

                await supabase.rpc('increment_player_stats', {
                    p_player_id: null,
                    p_username: playerName,
                    p_kills: kills,
                    p_deaths: deaths
                });
            }

            // Marcar partida como finalizada
            await supabase.from('matches').update({ csv_imported: true, status: 'finished' }).eq('id', matchId);

            result.classList.remove('hidden');
            msg.textContent = 'Importados ' + results.length + ' resultados' + (errors.length > 0 ? '. Errores: ' + errors.length : '');
            if (errors.length > 0) console.error(errors);
        }

        loadMatches();
    </script>
</body>
</html>
