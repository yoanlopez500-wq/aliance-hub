<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Certificaciones - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>
body { font-family: 'Inter', system-ui, sans-serif; background: #0a0e27; color: #e8eaf6; }
.fade-in { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.status-pending { background: rgba(255,143,0,0.12); color: #ff8f00; border: 1px solid rgba(255,143,0,0.25); }
.status-approved { background: rgba(76,175,80,0.12); color: #4caf50; border: 1px solid rgba(76,175,80,0.25); }
.status-rejected { background: rgba(239,83,80,0.12); color: #ef5350; border: 1px solid rgba(239,83,80,0.25); }
.status-review { background: rgba(33,150,243,0.12); color: #2196f3; border: 1px solid rgba(33,150,243,0.25); }
input:focus, textarea:focus, select:focus { outline: none; border-color: #ff6f00 !important; }
</style>
</head>
<body style="min-height: 100vh;" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-6 fade-in">
    <div class="flex flex-wrap items-center justify-between mb-6 gap-3">
        <div>
            <h1 class="text-2xl font-bold text-white">&#127891; Certificaciones</h1>
            <p style="color: #9fa8da;" class="text-sm">Solicitudes de lideres de alianza pendientes de revision</p>
        </div>
        <div class="flex gap-2">
            <select id="filter-status" onchange="loadRequests()" class="px-3 py-2 rounded-lg text-sm text-white" style="background: #11183a; border: 1px solid #1a237e;">
                <option value="all">Todos los estados</option>
                <option value="pending" selected>Pendientes</option>
                <option value="under_review">En revision</option>
                <option value="approved">Aprobados</option>
                <option value="rejected">Rechazados</option>
            </select>
            <button onclick="loadRequests()" class="px-3 py-2 rounded-lg text-sm font-bold text-white transition active:scale-[0.98]" style="background: #1a237e;">&#128260; Recargar</button>
        </div>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="rounded-xl p-4" style="background: #11183a; border: 1px solid #1a237e;">
            <p class="text-xs uppercase tracking-wider mb-1" style="color: #9fa8da;">Pendientes</p>
            <p class="text-2xl font-bold" style="color: #ff8f00;" id="stat-pending">-</p>
        </div>
        <div class="rounded-xl p-4" style="background: #11183a; border: 1px solid #1a237e;">
            <p class="text-xs uppercase tracking-wider mb-1" style="color: #9fa8da;">En revision</p>
            <p class="text-2xl font-bold" style="color: #2196f3;" id="stat-review">-</p>
        </div>
        <div class="rounded-xl p-4" style="background: #11183a; border: 1px solid #1a237e;">
            <p class="text-xs uppercase tracking-wider mb-1" style="color: #9fa8da;">Aprobados</p>
            <p class="text-2xl font-bold" style="color: #4caf50;" id="stat-approved">-</p>
        </div>
        <div class="rounded-xl p-4" style="background: #11183a; border: 1px solid #1a237e;">
            <p class="text-xs uppercase tracking-wider mb-1" style="color: #9fa8da;">Rechazados</p>
            <p class="text-2xl font-bold" style="color: #ef5350;" id="stat-rejected">-</p>
        </div>
    </div>
    <div id="requests-list">Cargando...</div>
</div>
<script>
async function loadRequests() {
    var list = document.getElementById('requests-list');
    list.innerHTML = '<div class="text-center py-8" style="color: #9fa8da;">Cargando...</div>';
    try {
        var status = document.getElementById('filter-status').value;
        var q = supabase.from('alliance_leader_requests').select('*', { count: 'exact' }).order('created_at', { ascending: false });
        if (status !== 'all') q = q.eq('status', status);
        var { data, error, count } = await q;
        if (error) throw error;
        document.getElementById('stat-pending').textContent = '-';
        document.getElementById('stat-review').textContent = '-';
        document.getElementById('stat-approved').textContent = '-';
        document.getElementById('stat-rejected').textContent = '-';
        var stats = await supabase.from('alliance_leader_requests').select('status');
        if (stats.data) {
            var counts = { pending: 0, under_review: 0, approved: 0, rejected: 0 };
            stats.data.forEach(function(s) { if (counts[s.status] !== undefined) counts[s.status]++; });
            document.getElementById('stat-pending').textContent = counts.pending;
            document.getElementById('stat-review').textContent = counts.under_review;
            document.getElementById('stat-approved').textContent = counts.approved;
            document.getElementById('stat-rejected').textContent = counts.rejected;
        }
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl" style="background: #11183a; border: 1px solid #1a237e; color: #9fa8da;">No hay solicitudes</div>'; return; }
        list.innerHTML = '<div class="space-y-3">' + data.map(function(r) {
            var statusClass = r.status === 'pending' ? 'status-pending' : r.status === 'under_review' ? 'status-review' : r.status === 'approved' ? 'status-approved' : 'status-rejected';
            var statusLabel = r.status === 'pending' ? 'PENDIENTE' : r.status === 'under_review' ? 'EN REVISION' : r.status === 'approved' ? 'APROBADO' : 'RECHAZADO';
            return '<div class="rounded-xl p-5" style="background: #11183a; border: 1px solid #1a237e;"><div class="flex items-start justify-between gap-3"><div class="flex-1"><h3 class="font-bold text-lg text-white">' + r.alliance_name + ' <span style="color: #9fa8da;">[' + r.alliance_tag + ']</span></h3><p class="text-sm mt-1" style="color: #9fa8da;">Solicitante: <strong class="text-white">' + r.requester_username + '</strong> (ID: ' + r.requester_player_id + ')</p>' + (r.alliance_description ? '<p class="text-sm mt-2" style="color: #9fa8da;">' + r.alliance_description + '</p>' : '') + '<div class="flex gap-4 mt-2 text-xs" style="color: #9fa8da;"><span>&#128101; Miembros: ' + (r.member_count || '?') + '</span><span>&#128172; Discord: ' + (r.discord_handle || '-') + '</span><span>&#128197; ' + formatDate(r.created_at) + '</span></div></div><span class="px-3 py-1 rounded-full text-xs font-bold ' + statusClass + '">' + statusLabel + '</span></div>' + (r.rejection_reason ? '<p class="text-sm mt-2" style="color: #ef5350;">Motivo: ' + r.rejection_reason + '</p>' : '') + '</div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Certifications]', e); list.innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}
requireAdmin();
loadRequests();
</script>
</body>
</html>
