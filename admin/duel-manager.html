<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Duel Manager - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#9876;&#65039; Duel Manager</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Prepara equipos de 5 jugadores y desafia a otras alianzas.</p>
<div class="grid md:grid-cols-2 gap-6">
<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-lg font-bold mb-3">Tu Alianza</h2>
<select id="my-alliance" class="w-full px-3 py-2 rounded-lg border text-sm mb-3" onchange="loadMyPlayers()"><option value="">Seleccionar alianza...</option></select>
<div id="my-players" class="space-y-2 max-h-64 overflow-y-auto"></div>
</div>
<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-lg font-bold mb-3">Rival</h2>
<select id="rival-alliance" class="w-full px-3 py-2 rounded-lg border text-sm mb-3"><option value="">Seleccionar rival...</option></select>
<div class="flex gap-2 mt-4"><button onclick="createDuel()" class="flex-1 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">&#9876;&#65039; Desafiar</button></div>
</div>
</div>
<div class="mt-6"><h2 class="text-lg font-bold mb-3">Equipo Seleccionado (<span id="team-count">0</span>/5)</h2>
<div id="selected-team" class="flex gap-2 flex-wrap"></div>
<button onclick="saveTeam()" id="save-team-btn" class="mt-3 px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;" disabled>&#128190; Guardar Equipo</button>
</div>
</div>
<script>
var selectedPlayers = [];
async function loadAlliances() {
    try { var { data, error } = await supabase.from('alliances').select('id, name').eq('status', 'active').order('name'); if (error) throw error; var mySelect = document.getElementById('my-alliance'); var rivalSelect = document.getElementById('rival-alliance'); var opts = '<option value="">Seleccionar...</option>' + (data || []).map(function(a) { return '<option value="' + a.id + '">' + a.name + '</option>'; }).join(''); mySelect.innerHTML = opts; rivalSelect.innerHTML = opts; } catch(e) { console.error('[Alliances]', e); }
}
async function loadMyPlayers() {
    var allianceId = document.getElementById('my-alliance').value;
    if (!allianceId) { document.getElementById('my-players').innerHTML = ''; return; }
    try { var { data, error } = await supabase.from('players').select('id, current_username, total_kills, total_deaths').eq('current_alliance_id', allianceId).eq('status', 'active').order('total_kills', { ascending: false }); if (error) throw error; var list = document.getElementById('my-players'); if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-4 text-sm" style="color:#9fa8da;">Sin jugadores</div>'; return; } list.innerHTML = data.map(function(p) { var isSelected = selectedPlayers.indexOf(p.id) !== -1; return '<div class="rounded-lg border p-3 cursor-pointer transition hover:shadow-md ' + (isSelected ? 'border-amber-500 bg-amber-50' : 'border-slate-200') + '" onclick="togglePlayerSelection(' + p.id + ', \'' + p.current_username.replace(/'/g, "\\'") + '\')"><div class="font-medium">' + p.current_username + '</div><div class="text-xs text-slate-500">Kills: ' + (p.total_kills || 0) + ' | Muertes: ' + (p.total_deaths || 0) + '</div></div>'; }).join(''); } catch(e) { console.error('[Players]', e); }
}
function togglePlayerSelection(playerId, playerName) { var idx = selectedPlayers.indexOf(playerId); if (idx !== -1) { selectedPlayers.splice(idx, 1); } else { if (selectedPlayers.length >= 5) { showToast('Maximo 5 jugadores', 'warning'); return; } selectedPlayers.push(playerId); } renderTeam(); loadMyPlayers(); }
function renderTeam() { document.getElementById('team-count').textContent = selectedPlayers.length; document.getElementById('save-team-btn').disabled = selectedPlayers.length === 0; }
async function createDuel() { var myAlliance = document.getElementById('my-alliance').value; var rivalAlliance = document.getElementById('rival-alliance').value; if (!myAlliance || !rivalAlliance) { showToast('Selecciona ambas alianzas', 'error'); return; } if (selectedPlayers.length === 0) { showToast('Selecciona al menos 1 jugador', 'error'); return; } try { var { data: duel, error } = await supabase.from('duels').insert({ alliance_a_id: myAlliance, alliance_b_id: rivalAlliance, status: 'pending' }).select('id').single(); if (error) throw error; showToast('Duelo creado', 'success'); window.location.href = 'duel-manager.html'; } catch(e) { showToast('Error: ' + e.message, 'error'); } }
function saveTeam() { showToast('Equipo guardado', 'success'); }
requireAdmin();
loadAlliances();
</script>
</body>
</html>
