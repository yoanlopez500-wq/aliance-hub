<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gestor de Duelos - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#9876;&#65039; Gestor de Duelos</h1>
<div id="duels-list">Cargando...</div>
</div>
<script>
async function loadDuels() {
    try {
        var { data, error } = await supabase.from('matches').select('*, alliances(name, tag)').eq('match_type', 'duel').order('created_at', { ascending: false });
        if (error) throw error;
        var container = document.getElementById('duels-list');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin duelos registrados</div>'; return; }
        container.innerHTML = '<div class="space-y-3">' + data.map(function(d) {
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between"><h3 class="font-bold">' + (d.name || 'Duelo') + '</h3>' + getStatusBadge(d.status) + '</div><p class="text-sm" style="color:#9fa8da;">Alianza: ' + (d.alliances ? d.alliances.name : 'N/A') + ' [' + (d.alliances ? d.alliances.tag : '-') + ']</p><p class="text-xs" style="color:#9fa8da;">' + formatDate(d.created_at) + '</p></div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Duels]', e); document.getElementById('duels-list').innerHTML = '<div class="text-center py-8 text-red-400">Error</div>'; }
}
requireAdmin();
loadDuels();
</script>
</body>
</html>
