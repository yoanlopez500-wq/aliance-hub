<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes de Jugadores - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=3"></script>
    <script src="../assets/js/base.js?v=3"></script>
    <script src="../assets/js/auth.js?v=3"></script>
    <style>
        .modal{display:none}.modal.active{display:flex}
        .report-card{transition:background .15s}
        .report-card:hover{background:#f8fafc}
        .evidence-img{cursor:pointer;transition:transform .15s;border-radius:6px;border:1px solid #e2e8f0}
        .evidence-img:hover{transform:scale(1.05);border-color:#f59e0b}
        .status-pending{background:#fef3c7;color:#92400e}
        .status-investigating{background:#dbeafe;color:#1e40af}
        .status-resolved{background:#d1fae5;color:#065f46}
        .status-dismissed{background:#f1f5f9;color:#64748b}
        .type-tag{font-size:10px;padding:2px 8px;border-radius:999px;background:#f1f5f9;color:#475569;font-weight:bold;white-space:nowrap}
    </style>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🚨 Reportes de Jugadores</h1>
                <p class="text-slate-500 text-sm">Gestiona reportes enviados por jugadores en las partidas</p>
            </div>
            <div class="flex items-center gap-2 text-sm">
                <span class="px-2 py-1 rounded bg-yellow-100 text-yellow-700 font-bold" id="count-pending">0 pendientes</span>
            </div>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-xl border border-slate-200 p-3 mb-4">
            <div class="flex flex-wrap gap-2">
                <select id="filter-status" onchange="loadReports()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">
                    <option value="all">Todos los estados</option>
                    <option value="pending" selected>Pendientes</option>
                    <option value="investigating">Investigando</option>
                    <option value="resolved">Resueltos</option>
                    <option value="dismissed">Descartados</option>
                </select>
                <select id="filter-type" onchange="loadReports()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">
                    <option value="all">Todos los tipos</option>
                    <option value="multis">Multi-cuentas</option>
                    <option value="team_kill">Team Kill</option>
                    <option value="abandono">Abandono</option>
                    <option value="toxico">Toxico</option>
                    <option value="bugs">Bugs/Exploits</option>
                    <option value="colusion">Colusion</option>
                    <option value="spam">Spam</option>
                    <option value="otro">Otro</option>
                </select>
                <button onclick="loadReports()" class="px-3 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200">🔄 Actualizar</button>
            </div>
        </div>

        <!-- Lista de reportes -->
        <div id="reports-list" class="space-y-3">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <!-- Modal: Ver reporte completo + acciones -->
    <div id="report-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="p-5 border-b flex items-center justify-between bg-gradient-to-r from-red-700 to-red-900 rounded-t-2xl">
                <h2 class="text-lg font-bold text-white">🚨 Gestionar Reporte</h2>
                <button onclick="closeReportModal()" class="text-slate-400 hover:text-white text-xl">✕</button>
            </div>
            <div class="p-5 space-y-4">
                <input type="hidden" id="rm-report-id">
                <input type="hidden" id="rm-reported-id">
                <input type="hidden" id="rm-match-id">

                <!-- Info del reporte -->
                <div class="bg-slate-50 rounded-lg p-3">
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div><span class="text-slate-500">Partida:</span> <a id="rm-match-link" href="#" target="_blank" class="font-bold text-amber-600 hover:underline">-</a></div>
                        <div><span class="text-slate-500">Fecha:</span> <span id="rm-date" class="font-medium">-</span></div>
                        <div><span class="text-slate-500">Reporta:</span> <span id="rm-reporter" class="font-medium">-</span></div>
                        <div><span class="text-slate-500">Reportado:</span> <a id="rm-reported-link" href="#" target="_blank" class="font-bold text-red-600 hover:underline">-</a></div>
                        <div><span class="text-slate-500">Tipo:</span> <span id="rm-type" class="font-medium">-</span></div>
                        <div><span class="text-slate-500">Estado:</span> <span id="rm-status" class="font-medium">-</span></div>
                    </div>
                </div>

                <!-- Descripcion -->
                <div>
                    <label class="text-xs font-bold text-slate-700 uppercase">Descripcion del incidente</label>
                    <p id="rm-description" class="text-sm text-slate-700 mt-1 bg-slate-50 rounded-lg p-3">-</p>
                </div>

                <!-- Evidencias -->
                <div id="rm-evidence-section">
                    <label class="text-xs font-bold text-slate-700 uppercase">Evidencias</label>
                    <div id="rm-evidence-images" class="flex flex-wrap gap-2 mt-2"></div>
                </div>

                <!-- Respuesta al jugador -->
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Respuesta para el jugador (opcional)</label>
                    <textarea id="rm-response" rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" placeholder="Gracias por tu reporte. Hemos investigado y..."></textarea>
                </div>

                <!-- Botones de accion -->
                <div class="flex flex-wrap gap-2 pt-2">
                    <button onclick="applyStrikeFromReport()" class="px-4 py-2 bg-red-600 text-white rounded-lg font-bold text-sm hover:bg-red-500">⚡ Aplicar Strike</button>
                    <button onclick="updateReportStatus('investigating')" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg font-bold text-sm hover:bg-blue-200">🔍 Investigar</button>
                    <button onclick="updateReportStatus('resolved')" class="px-4 py-2 bg-green-500 text-white rounded-lg font-bold text-sm hover:bg-green-400">✅ Resolver</button>
                    <button onclick="updateReportStatus('dismissed')" class="px-4 py-2 bg-slate-200 text-slate-600 rounded-lg font-bold text-sm hover:bg-slate-300">🗑️ Descartar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Aplicar Strike -->
    <div id="strike-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-5 border-b flex items-center justify-between bg-gradient-to-r from-red-700 to-red-900 rounded-t-2xl">
                <h2 class="text-lg font-bold text-white">⚡ Aplicar Strike</h2>
                <button onclick="closeStrikeModal()" class="text-slate-400 hover:text-white text-xl">✕</button>
            </div>
            <form id="strike-form" class="p-5 space-y-4">
                <input type="hidden" id="sm-player-id">
                <input type="hidden" id="sm-report-id">
                <div class="bg-slate-50 rounded-lg p-3">
                    <p class="text-sm font-medium text-slate-700">Jugador: <span id="sm-player-name" class="font-bold">-</span></p>
                    <p class="text-xs text-slate-500">Partida: <span id="sm-match-name" class="font-bold">-</span></p>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Tipo de Strike *</label>
                    <select id="sm-strike-type" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-red-500 outline-none text-sm"><option value="">-- Seleccionar tipo --</option></select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Motivo *</label>
                    <textarea id="sm-reason" required rows="2" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-red-500 outline-none text-sm"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-red-600 text-white font-bold py-2.5 rounded-lg hover:bg-red-500 text-sm">⚡ Aplicar Strike</button>
                    <button type="button" onclick="closeStrikeModal()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg font-bold text-sm hover:bg-slate-300">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lightbox para imagenes -->
    <div id="lightbox" class="modal fixed inset-0 bg-black/90 z-[60] items-center justify-center p-4" onclick="closeLightbox()">
        <img id="lightbox-img" class="max-w-full max-h-[90vh] rounded-lg" onclick="event.stopPropagation()">
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-2xl hover:text-slate-300">✕</button>
    </div>

    <script>
        requireAdmin();

        var allReports = [];
        var strikeTypes = [];
        var matchesMap = {};
        var playersMap = {};

        var typeLabels = {
            multis: '👥 Multi-cuentas',
            team_kill: '⚔️ Team Kill',
            abandono: '🏳️ Abandono',
            toxico: '💬 Toxico',
            bugs: '🐛 Bugs/Exploits',
            colusion: '🤝 Colusion',
            spam: '📢 Spam',
            otro: '❓ Otro'
        };

        var statusLabels = {
            pending: { text: 'Pendiente', class: 'status-pending' },
            investigating: { text: 'Investigando', class: 'status-investigating' },
            resolved: { text: 'Resuelto', class: 'status-resolved' },
            dismissed: { text: 'Descartado', class: 'status-dismissed' }
        };

        async function init() {
            await loadStrikeTypes();
            loadReports();
        }

        async function loadStrikeTypes() {
            var { data: types } = await supabase.from('strike_types').select('*').eq('is_active', true).order('severity');
            strikeTypes = types || [];
            var options = strikeTypes.map(function(t) { var sev = t.severity === 1 ? 'Leve' : t.severity === 2 ? 'Medio' : 'Grave'; return '<option value="' + t.id + '">' + t.code + ' - ' + t.name + ' (' + sev + ')</option>'; }).join('');
            document.getElementById('sm-strike-type').innerHTML = '<option value="">-- Seleccionar tipo --</option>' + options;
        }

        async function loadReports() {
            showLoading('reports-list');
            var statusFilter = document.getElementById('filter-status').value;
            var typeFilter = document.getElementById('filter-type').value;

            var query = supabase.from('player_reports').select('*').order('created_at', { ascending: false });
            if (statusFilter !== 'all') query = query.eq('status', statusFilter);
            if (typeFilter !== 'all') query = query.eq('report_type', typeFilter);

            var { data: reports, error } = await query;
            if (error) { document.getElementById('reports-list').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + error.message + '</div>'; return; }
            allReports = reports || [];

            // Contar pendientes
            var pendingCount = allReports.filter(function(r) { return r.status === 'pending'; }).length;
            document.getElementById('count-pending').textContent = pendingCount + ' pendiente' + (pendingCount !== 1 ? 's' : '');

            if (allReports.length === 0) {
                document.getElementById('reports-list').innerHTML = '<div class="text-center py-12 bg-white rounded-xl border border-slate-200"><div class="text-3xl mb-2">📭</div><p class="text-slate-400">Sin reportes en este filtro</p></div>';
                return;
            }

            // Cargar datos relacionados
            var matchIds = allReports.map(function(r) { return r.match_id; }).filter(function(v, i, a) { return v && a.indexOf(v) === i; });
            var playerIds = [];
            allReports.forEach(function(r) {
                if (r.player_id) playerIds.push(r.player_id);
                if (r.reported_player_id) playerIds.push(r.reported_player_id);
            });
            playerIds = playerIds.filter(function(v, i, a) { return a.indexOf(v) === i; });

            var promises = [];
            if (matchIds.length > 0) promises.push(supabase.from('matches').select('id, name').in('id', matchIds)));
            else promises.push(Promise.resolve({ data: [] }));
            if (playerIds.length > 0) promises.push(supabase.from('players').select('id, current_username').in('id', playerIds)));
            else promises.push(Promise.resolve({ data: [] }));

            var results = await Promise.all(promises);
            matchesMap = {}; (results[0].data || []).forEach(function(m) { matchesMap[m.id] = m; });
            playersMap = {}; (results[1].data || []).forEach(function(p) { playersMap[p.id] = p; });

            renderReports(allReports);
        }

        function renderReports(reports) {
            var container = document.getElementById('reports-list');
            container.innerHTML = reports.map(function(r) {
                var st = statusLabels[r.status] || statusLabels.pending;
                var match = matchesMap[r.match_id] || {};
                var reporter = playersMap[r.player_id] || {};
                var reported = playersMap[r.reported_player_id] || {};
                var hasEvidence = r.evidence_urls && r.evidence_urls.length > 0;
                return '<div class="report-card bg-white rounded-xl border border-slate-200 p-4 cursor-pointer" onclick="openReportModal(\'' + r.id + '\')">' +
                    '<div class="flex flex-col sm:flex-row sm:items-start gap-3">' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex items-center gap-2 flex-wrap mb-1">' +
                                '<span class="px-2 py-0.5 rounded text-xs font-bold ' + st.class + '">' + st.text + '</span>' +
                                '<span class="type-tag">' + (typeLabels[r.report_type] || r.report_type) + '</span>' +
                                (hasEvidence ? '<span class="text-xs text-blue-600">📷 ' + r.evidence_urls.length + '</span>' : '') +
                            '</div>' +
                            '<p class="text-sm text-slate-700 line-clamp-2">' + r.description + '</p>' +
                            '<div class="flex flex-wrap gap-3 mt-1 text-xs text-slate-400">' +
                                '<span>🎮 ' + (match.name || 'Partida') + '</span>' +
                                '<span>👤 ' + (reported.current_username || r.reported_player_name || '?') + ' reportado por ' + (reporter.current_username || r.player_name || '?') + '</span>' +
                                '<span>📅 ' + formatDateTime(r.created_at) + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="flex-shrink-0 self-start">' +
                            '<span class="text-xs text-slate-400">▶</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function openReportModal(reportId) {
            var r = allReports.find(function(x) { return x.id === reportId; });
            if (!r) return;
            var match = matchesMap[r.match_id] || {};
            var st = statusLabels[r.status] || statusLabels.pending;

            document.getElementById('rm-report-id').value = r.id;
            document.getElementById('rm-reported-id').value = r.reported_player_id || '';
            document.getElementById('rm-match-id').value = r.match_id || '';
            document.getElementById('rm-match-link').textContent = match.name || 'Partida';
            document.getElementById('rm-match-link').href = 'match-detail.html?id=' + r.match_id;
            document.getElementById('rm-date').textContent = formatDateTime(r.created_at);
            document.getElementById('rm-reporter').textContent = (playersMap[r.player_id] ? playersMap[r.player_id].current_username : r.player_name) || 'Anonimo';
            document.getElementById('rm-reported-link').textContent = (playersMap[r.reported_player_id] ? playersMap[r.reported_player_id].current_username : r.reported_player_name) || '?';
            document.getElementById('rm-reported-link').href = '../player.html?id=' + r.reported_player_id;
            document.getElementById('rm-type').textContent = typeLabels[r.report_type] || r.report_type;
            document.getElementById('rm-status').innerHTML = '<span class="px-2 py-0.5 rounded text-xs font-bold ' + st.class + '">' + st.text + '</span>';
            document.getElementById('rm-description').textContent = r.description || 'Sin descripcion';
            document.getElementById('rm-response').value = r.admin_response || '';

            // Evidencias
            var evContainer = document.getElementById('rm-evidence-images');
            if (r.evidence_urls && r.evidence_urls.length > 0) {
                document.getElementById('rm-evidence-section').classList.remove('hidden');
                evContainer.innerHTML = r.evidence_urls.map(function(url, i) {
                    return '<img src="' + url + '" class="evidence-img w-24 h-24 object-cover" onclick="openLightbox(\'' + url + '\')">';
                }).join('');
            } else {
                document.getElementById('rm-evidence-section').classList.add('hidden');
            }

            document.getElementById('report-modal').classList.add('active');
        }

        function closeReportModal() { document.getElementById('report-modal').classList.remove('active'); }

        async function updateReportStatus(newStatus) {
            var reportId = document.getElementById('rm-report-id').value;
            var response = document.getElementById('rm-response').value.trim();
            if (!reportId) return;

            try {
                var sessionData = await supabase.auth.getSession();
                var adminId = sessionData.data.session ? sessionData.data.session.user.id : null;
                var updateData = { status: newStatus };
                if (response) updateData.admin_response = response;
                if (newStatus === 'resolved' || newStatus === 'dismissed') {
                    updateData.resolved_at = new Date().toISOString();
                    updateData.resolved_by = adminId;
                }
                var { error } = await supabase.from('player_reports').update(updateData).eq('id', reportId);
                if (error) throw error;
                showToast('Reporte ' + (newStatus === 'resolved' ? 'resuelto' : newStatus === 'dismissed' ? 'descartado' : 'actualizado'), 'success');
                closeReportModal();
                loadReports();
            } catch(e) { showToast('Error: ' + e.message, 'error'); }
        }

        function applyStrikeFromReport() {
            var reportedId = document.getElementById('rm-reported-id').value;
            var reportedName = document.getElementById('rm-reported-link').textContent;
            var matchName = document.getElementById('rm-match-link').textContent;
            var reportId = document.getElementById('rm-report-id').value;
            var matchId = document.getElementById('rm-match-id').value;

            if (!reportedId) { showToast('No hay jugador para sancionar', 'warning'); return; }

            document.getElementById('sm-player-id').value = reportedId;
            document.getElementById('sm-report-id').value = reportId;
            document.getElementById('sm-player-name').textContent = reportedName;
            document.getElementById('sm-match-name').textContent = matchName;
            document.getElementById('sm-reason').value = '';
            document.getElementById('strike-modal').classList.add('active');
        }

        function closeStrikeModal() { document.getElementById('strike-modal').classList.remove('active'); }

        document.getElementById('strike-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var playerId = parseInt(document.getElementById('sm-player-id').value);
            var reportId = document.getElementById('sm-report-id').value;
            var matchId = document.getElementById('rm-match-id').value;
            var typeId = document.getElementById('sm-strike-type').value;
            var reason = document.getElementById('sm-reason').value.trim();
            if (!typeId || !reason) { showToast('Completa todos los campos', 'warning'); return; }

            try {
                var sessionData = await supabase.auth.getSession();
                var adminId = sessionData.data.session ? sessionData.data.session.user.id : null;

                // Insertar strike
                var { data: strikeData, error: strikeError } = await supabase.from('player_strikes').insert({
                    player_id: playerId,
                    match_id: matchId || null,
                    strike_type_id: typeId,
                    reason: reason,
                    applied_by: adminId
                }).select();
                if (strikeError) throw strikeError;

                // Marcar reporte como resuelto con strike aplicado
                var { error: updateError } = await supabase.from('player_reports').update({
                    status: 'resolved',
                    strike_applied: true,
                    strike_id: strikeData[0].id,
                    resolved_at: new Date().toISOString(),
                    resolved_by: adminId,
                    admin_response: document.getElementById('rm-response').value.trim() || 'Se ha aplicado una sancion al jugador reportado.'
                }).eq('id', reportId);
                if (updateError) throw updateError;

                showToast('Strike aplicado y reporte resuelto', 'success');
                closeStrikeModal();
                closeReportModal();
                loadReports();
            } catch(e) { showToast('Error: ' + e.message, 'error'); }
        });

        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        init();
    </script>
</body>
</html>
