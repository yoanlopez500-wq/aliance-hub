<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Invitar Admin V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=27"></script>
    <script src="../assets/js/base.js?v=27"></script>
    <script src="../assets/js/components.js?v=27"></script>
    <script src="../assets/js/auth.js?v=27"></script>
    <meta name="theme-color" content="#0a0e27">
    <style>body{background:#0a0e27;color:#e8eaf6;font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-2">&#127915; Invitar Administrador</h1>
        <p class="text-sm mb-6" style="color:#9fa8da;">Genera codigos de invitacion para nuevos admins</p>

        <div class="rounded-xl p-6 mb-6" style="background:#11183a;border:1px solid #1a237e;">
            <h2 class="font-bold mb-4">Generar Nuevo Codigo</h2>
            <div class="flex gap-3 flex-wrap">
                <select id="invite-role" class="px-3 py-2 rounded-lg border text-sm outline-none" style="background:#0a0e27;border-color:#1a237e;color:#e8eaf6;">
                    <option value="alliance_leader">&#127988; Lider de Alianza</option>
                    <option value="moderator">&#128737; Moderador</option>
                    <option value="event_admin">&#128202; Event Admin</option>
                    <option value="superadmin">&#128081; Superadmin</option>
                </select>
                <button onclick="generateInvite()" class="px-6 py-2 rounded-lg font-bold transition hover:opacity-90" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Generar Codigo</button>
            </div>
        </div>

        <h2 class="font-bold mb-4">Codigos Generados</h2>
        <div id="invites-list" class="rounded-xl overflow-hidden" style="background:#11183a;border:1px solid #1a237e;">
            <div class="text-center py-8" style="color:#9fa8da;">Cargando...</div>
        </div>
    </div>

    <script>
        requireAdmin();
        requireMinRole('event_admin');

        async function loadInvites() {
            try {
                var { data: invites, error } = await supabase.from('admin_invites').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                var container = document.getElementById('invites-list');
                if (!invites || invites.length === 0) {
                    container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin codigos generados</div>';
                    return;
                }

                container.innerHTML = '<table class="w-full text-sm"><thead><tr style="background:rgba(255,255,255,0.03);"><th class="text-left p-3" style="color:#9fa8da;">Codigo</th><th class="text-left p-3" style="color:#9fa8da;">Rol</th><th class="text-left p-3" style="color:#9fa8da;">Estado</th><th class="text-left p-3" style="color:#9fa8da;">Creado</th><th class="text-left p-3" style="color:#9fa8da;">Expira</th></tr></thead><tbody>' +
                    invites.map(function(inv) {
                        var statusBadge = inv.used
                            ? '<span class="px-2 py-1 rounded text-xs font-bold" style="background:rgba(76,175,80,0.15);color:#4caf50;">Usado</span>'
                            : new Date(inv.expires_at) < new Date()
                                ? '<span class="px-2 py-1 rounded text-xs font-bold" style="background:rgba(198,40,40,0.15);color:#ef5350;">Expirado</span>'
                                : '<span class="px-2 py-1 rounded text-xs font-bold" style="background:rgba(255,143,0,0.15);color:#ff8f00;">Activo</span>';

                        return '<tr style="border-bottom:1px solid #1a237e;">' +
                            '<td class="p-3 font-mono font-bold" style="color:#ff8f00;">' + inv.code + '</td>' +
                            '<td class="p-3">' + inv.role + '</td>' +
                            '<td class="p-3">' + statusBadge + '</td>' +
                            '<td class="p-3 text-xs" style="color:#9fa8da;">' + formatDate(inv.created_at) + '</td>' +
                            '<td class="p-3 text-xs" style="color:#9fa8da;">' + formatDate(inv.expires_at) + '</td>' +
                        '</tr>';
                    }).join('') + '</tbody></table>';
            } catch(e) { console.error('[Invites]', e); document.getElementById('invites-list').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
        }

        async function generateInvite() {
            var role = document.getElementById('invite-role').value;
            try {
                var code = 'AH' + Math.random().toString(36).substring(2, 8).toUpperCase();
                var expiresAt = new Date();
                expiresAt.setDate(expiresAt.getDate() + 7);

                var { data: { session } } = await supabase.auth.getSession();
                var { error } = await supabase.from('admin_invites').insert({
                    code: code,
                    role: role,
                    created_by: session ? session.user.id : null,
                    expires_at: expiresAt.toISOString(),
                    used: false
                });
                if (error) throw error;
                showToast('Codigo generado: ' + code, 'success');
                loadInvites();
            } catch(e) { showToast('Error: ' + e.message, 'error'); }
        }

        loadInvites();
    </script>
</body>
</html>
