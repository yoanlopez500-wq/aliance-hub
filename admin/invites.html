<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitar Admin V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js?v=15"></script>
    <script src="../assets/js/base.js?v=15"></script>
    <script src="../assets/js/auth.js?v=15"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">🎟️ Invitar Administrador</h1>
        <p class="text-slate-500 mb-6">Genera códigos de invitación para nuevos admins</p>

        <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
            <h2 class="font-bold text-slate-800 mb-4">Generar Nuevo Código</h2>
            <div class="flex gap-3 flex-wrap">
                <select id="invite-role" class="px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    <option value="alliance_leader">🏴 Líder de Alianza</option>
                    <option value="moderator">🛡️ Moderador</option>
                    <option value="event_admin">📊 Event Admin</option>
                    <option value="superadmin">👑 Superadmin</option>
                </select>
                <button onclick="generateInvite()" class="px-6 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold hover:bg-amber-400 transition">Generar Código</button>
            </div>
        </div>

        <h2 class="font-bold text-slate-800 mb-4">Códigos Generados</h2>
        <div id="invites-list" class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <script>
        requireAdmin();
        requireMinRole('event_admin');

        async function loadInvites() {
            var { data: invites } = await supabase
                .from('admin_invites')
                .select('*, creator:created_by(email), user:used_by(email)')
                .order('created_at', { ascending: false });

            var container = document.getElementById('invites-list');
            if (!invites || invites.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">Sin códigos generados</div>';
                return;
            }

            container.innerHTML = '<table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="text-left p-3">Código</th><th class="text-left p-3">Rol</th><th class="text-left p-3">Estado</th><th class="text-left p-3">Creado</th><th class="text-left p-3">Expira</th></tr></thead><tbody>' +
                invites.map(function(inv) {
                    var statusBadge = inv.used 
                        ? '<span class="px-2 py-1 rounded text-xs bg-green-100 text-green-700">Usado</span>'
                        : new Date(inv.expires_at) < new Date() 
                            ? '<span class="px-2 py-1 rounded text-xs bg-red-100 text-red-700">Expirado</span>'
                            : '<span class="px-2 py-1 rounded text-xs bg-amber-100 text-amber-700">Activo</span>';

                    return '<tr class="border-b hover:bg-slate-50">' +
                        '<td class="p-3 font-mono font-bold text-amber-700">' + inv.code + '</td>' +
                        '<td class="p-3">' + getRoleBadge(inv.role) + '</td>' +
                        '<td class="p-3">' + statusBadge + '</td>' +
                        '<td class="p-3 text-slate-500">' + formatDate(inv.created_at) + '</td>' +
                        '<td class="p-3 text-slate-500">' + formatDate(inv.expires_at) + '</td>' +
                    '</tr>';
                }).join('') + '</tbody></table>';
        }

        async function generateInvite() {
            var role = document.getElementById('invite-role').value;
            var { data, error } = await supabase.rpc('create_invite_code', { p_role: role });

            if (error) showToast('Error: ' + error.message, 'error');
            else { showToast('Código generado: ' + data, 'success'); loadInvites(); }
        }

        loadInvites();
    </script>
</body>
</html>
