<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Códigos de Invitación - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/ui-utils.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="../manifest.json">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🔑 Códigos de Invitación</h1>
                <p class="text-slate-500">Crea códigos para invitar nuevos admins</p>
            </div>
            <button onclick="createCode()" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg font-bold hover:bg-amber-400 transition">
                ➕ Generar Código
            </button>
        </div>

        <div id="new-code-section" class="hidden bg-green-50 border border-green-200 rounded-xl p-6 mb-6">
            <h3 class="font-bold text-green-800 mb-2">✅ Código Generado</h3>
            <div class="flex items-center gap-3">
                <code id="new-code" class="bg-white px-4 py-2 rounded-lg font-mono text-xl text-green-700 border border-green-300"></code>
                <button onclick="copyCode()" class="px-3 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-400">📋 Copiar</button>
            </div>
            <p class="text-green-600 text-sm mt-2">Comparte este código. Expira en 7 días.</p>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h2 class="font-bold text-slate-800 mb-4">Historial de Códigos</h2>
            <div id="codes-list" class="overflow-x-auto">
                <div class="text-center text-slate-400 py-4">Cargando...</div>
            </div>
        </div>
    </div>

    <script>
        requireAdmin();

        async function loadCodes() {
            const { data: codes, error } = await supabase
                .from('admin_invites')
                .select('*, used_by:used_by(email)')
                .order('created_at', { ascending: false });

            const container = document.getElementById('codes-list');
            if (error) {
                container.innerHTML = '<div class="text-red-500">Error cargando códigos</div>';
                return;
            }

            if (!codes || codes.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-4">Sin códigos generados aún</div>';
                return;
            }

            container.innerHTML = `
                <table class="w-full text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="text-left p-2">Código</th>
                            <th class="text-left p-2">Estado</th>
                            <th class="text-left p-2">Expira</th>
                            <th class="text-left p-2">Usado por</th>
                            <th class="text-left p-2">Fecha</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${codes.map(c => {
                            const isExpired = new Date(c.expires_at) < new Date();
                            const status = c.used ? '✅ Usado' : isExpired ? '❌ Expirado' : '🟢 Activo';
                            const statusClass = c.used ? 'text-green-600' : isExpired ? 'text-red-500' : 'text-green-600';
                            return `
                                <tr class="border-b hover:bg-slate-50">
                                    <td class="p-2 font-mono font-bold">${c.code}</td>
                                    <td class="p-2 ${statusClass}">${status}</td>
                                    <td class="p-2 text-slate-500">${formatDate(c.expires_at)}</td>
                                    <td class="p-2 text-slate-500">${c.used_by?.email || '-'}</td>
                                    <td class="p-2 text-slate-500 text-xs">${formatDate(c.created_at)}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        async function createCode() {
            const btn = document.querySelector('button[onclick="createCode()"]');
            btn.disabled = true;
            btn.textContent = 'Generando...';

            try {
                const { data, error } = await supabase.rpc('create_invite_code');
                if (error) throw error;

                document.getElementById('new-code').textContent = data;
                document.getElementById('new-code-section').classList.remove('hidden');
                showToast('Código generado: ' + data, 'success');
                loadCodes();

            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '➕ Generar Código';
            }
        }

        function copyCode() {
            const code = document.getElementById('new-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('Código copiado al portapapeles', 'success');
            });
        }

        loadCodes();
    </script>
</body>
</html>
