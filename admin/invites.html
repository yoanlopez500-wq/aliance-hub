<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Invitaciones - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#127381; Invitaciones</h1>
<div class="rounded-xl p-5 mb-6" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="font-bold mb-3">&#10133; Crear Invitacion</h2>
<div class="flex gap-2">
<select id="invite-role" class="px-3 py-2 rounded-lg text-sm" style="background:rgba(255,255,255,0.05);border:1px solid #1a237e;color:#e8eaf6;"><option value="alliance_leader">Lider de Alianza</option><option value="moderator">Moderador</option><option value="event_admin">Admin Eventos</option></select>
<button onclick="createInvite()" class="px-4 py-2 rounded-lg font-bold text-sm" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white;">Generar Codigo</button>
</div>
<div id="invite-result" class="hidden mt-3 p-3 rounded-lg" style="background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.2);"></div>
</div>
<div id="invites-list">Cargando...</div>
</div>
<script>
async function loadInvites() {
    try {
        var { data, error } = await supabase.from('admin_invites').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        var container = document.getElementById('invites-list');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin invitaciones</div>'; return; }
        container.innerHTML = '<div class="overflow-x-auto rounded-xl" style="background:#11183a;border:1px solid #1a237e;"><table class="w-full text-sm"><thead><tr style="background:rgba(255,255,255,0.02);"><th class="text-left p-3" style="color:#9fa8da;">Codigo</th><th class="text-left p-3" style="color:#9fa8da;">Rol</th><th class="text-left p-3" style="color:#9fa8da;">Estado</th><th class="text-left p-3" style="color:#9fa8da;">Creada</th></tr></thead><tbody>' + data.map(function(i) {
            var statusBadge = i.used ? '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(76,175,80,0.15);color:#4caf50;">USADA</span>' : '<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:rgba(33,150,243,0.15);color:#2196f3;">ACTIVA</span>';
            return '<tr style="border-bottom:1px solid #1a237e;"><td class="p-3 font-mono">' + i.code + '</td><td class="p-3">' + i.role + '</td><td class="p-3">' + statusBadge + '</td><td class="p-3" style="color:#9fa8da;">' + formatDate(i.created_at) + '</td></tr>';
        }).join('') + '</tbody></table></div>';
    } catch(e) { console.error('[Invites]', e); document.getElementById('invites-list').innerHTML = '<div class="text-center py-8 text-red-400">Error</div>'; }
}
async function createInvite() {
    var role = document.getElementById('invite-role').value;
    try {
        var code = Math.random().toString(36).substring(2, 8).toUpperCase();
        var { error } = await supabase.from('admin_invites').insert({ code: code, role: role });
        if (error) throw error;
        var result = document.getElementById('invite-result');
        result.classList.remove('hidden');
        result.innerHTML = '<p style="color:#4caf50;">&#10003; Codigo generado: <strong class="font-mono text-lg">' + code + '</strong></p>';
        loadInvites();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
requireAdmin();
loadInvites();
</script>
</body>
</html>
