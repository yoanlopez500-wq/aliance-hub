<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Miembros de Alianza - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#128101; Miembros de Alianza</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Gestion de miembros y sus alianzas.</p>
<div class="flex gap-2 mb-4">
<select id="filter-alliance" onchange="loadMembers()" class="px-3 py-2 rounded-lg border text-sm"><option value="">Todas las alianzas</option></select>
<input type="text" id="search-member" placeholder="Buscar miembro..." class="flex-1 px-3 py-2 rounded-lg border text-sm" oninput="filterMembers(this.value)">
</div>
<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr style="background:#11183a;"><th class="text-left p-3">Jugador</th><th class="text-left p-3">Alianza</th><th class="text-right p-3">Kills</th><th class="text-right p-3">Deaths</th><th class="text-left p-3">Estado</th><th class="text-left p-3">Acciones</th></tr></thead><tbody id="members-tbody"><tr><td colspan="6" class="text-center py-8" style="color:#9fa8da;">Cargando...</td></tr></tbody></table></div>
</div>
<script>
var allMembers = [];
async function loadMembers() {
    try {
        var allianceFilter = document.getElementById('filter-alliance').value;
        var { data: alliances } = await supabase.from('alliances').select('id, name').order('name');
        var select = document.getElementById('filter-alliance');
        if (alliances) select.innerHTML = '<option value="">Todas las alianzas</option>' + alliances.map(function(a) { return '<option value="' + a.id + '">' + a.name + '</option>'; }).join('');
        var q = supabase.from('players').select('*, alliances(name, tag)').order('current_username');
        if (allianceFilter) q = q.eq('current_alliance_id', allianceFilter);
        var { data, error } = await q;
        if (error) throw error;
        allMembers = data || [];
        renderMembers(allMembers);
    } catch(e) { console.error('[Members]', e); }
}
function renderMembers(data) {
    var tbody = document.getElementById('members-tbody');
    if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8" style="color:#9fa8da;">Sin miembros</td></tr>'; return; }
    tbody.innerHTML = data.map(function(p) { return '<tr style="border-bottom:1px solid #1a237e;"><td class="p-3 font-medium">' + p.current_username + '</td><td class="p-3" style="color:#9fa8da;">' + (p.alliances ? p.alliances.name : '-') + '</td><td class="p-3 text-right">' + (p.total_kills || 0) + '</td><td class="p-3 text-right">' + (p.total_deaths || 0) + '</td><td class="p-3">' + getStatusBadgePlayer(p.status) + '</td><td class="p-3"><a href="../player.html?id=' + p.id + '" class="text-xs font-bold" style="color:#ff8f00;">Ver</a></td></tr>'; }).join('');
}
function filterMembers(query) { var q = query.toLowerCase(); var filtered = allMembers.filter(function(p) { return (p.current_username || '').toLowerCase().includes(q); }); renderMembers(filtered); }
requireAdmin();
loadMembers();
</script>
</body>
</html>
