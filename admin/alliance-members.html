<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Miembros de Alianza - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128101; Miembros de Alianza</h1>
<div id="members-list">Cargando...</div>
</div>
<script>
async function loadMembers() {
    try {
        var { data, error } = await supabase.from('alliance_memberships').select('*, players(current_username, total_kills, total_deaths, status), alliances(name)').order('joined_at', { ascending: false });
        if (error) throw error;
        var container = document.getElementById('members-list');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin miembros</div>'; return; }
        container.innerHTML = '<div class="grid md:grid-cols-2 gap-4">' + data.map(function(m) {
            var p = m.players || {};
            var kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills || '0';
            return '<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg flex items-center justify-center font-bold" style="background:linear-gradient(135deg,#1a237e,#283593);">' + (p.current_username ? p.current_username.charAt(0).toUpperCase() : '?') + '</div><div class="flex-1"><p class="font-bold">' + (p.current_username || 'Jugador ' + m.player_id) + '</p><p class="text-xs" style="color:#9fa8da;">' + (m.alliances ? m.alliances.name : 'Alianza ' + m.alliance_id) + '</p></div><div class="text-right"><p class="font-bold" style="color:#ff8f00;">' + kd + ' K/D</p><p class="text-xs" style="color:#9fa8da;">' + (p.total_kills || 0) + 'K / ' + (p.total_deaths || 0) + 'D</p></div></div></div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Members]', e); document.getElementById('members-list').innerHTML = '<div class="text-center py-8 text-red-400">Error</div>'; }
}
requireAdmin();
loadMembers();
</script>
</body>
</html>
