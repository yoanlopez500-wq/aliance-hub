<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Chat Reports - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=18"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=18"></script>
<script src="../assets/js/base.js?v=18"></script>
<script src="../assets/js/components.js?v=18"></script>
<script src="../assets/js/auth.js?v=18"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128172; Chat Reports</h1>
<div id="chat-reports-list">Cargando...</div>
</div>
<script>
var allPlayers = {};

async function loadPlayersMap() {
    try { var { data } = await supabase.from('players').select('id, current_username'); (data || []).forEach(function(p) { allPlayers[p.id] = p.current_username; }); } catch(e) { console.error('[ChatReports] Error cargando players:', e); }
}

async function loadChatReports() {
    try {
        await loadPlayersMap();
        var { data, error } = await supabase.from('chat_reports').select('*').order('created_at', { ascending: false }).limit(50);
        if (error) throw error;
        var list = document.getElementById('chat-reports-list');
        if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay reportes de chat</div>'; return; }
        list.innerHTML = '<div class="space-y-3">' + data.map(function(r) { var playerName = allPlayers[r.player_id] || 'Jugador ' + r.player_id; return '<div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between"><div><h3 class="font-bold">Reporte de ' + playerName + '</h3><p class="text-sm" style="color:#9fa8da;">' + r.reason + '</p></div><span class="text-xs" style="color:#9fa8da;">' + formatDate(r.created_at) + '</span></div></div>'; }).join('') + '</div>';
    } catch(e) { console.error('[ChatReports]', e); }
}
requireAdmin();
loadChatReports();
</script>
</body>
</html>
