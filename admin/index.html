<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">📊 Dashboard V2</h1>
            <p class="text-slate-500" id="welcome-text">Cargando...</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl p-5 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-slate-500 uppercase">Partidas</p>
                        <p class="text-3xl font-bold text-amber-600" id="d-matches">-</p>
                    </div>
                    <div class="text-3xl">🎮</div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-slate-500 uppercase">Jugadores</p>
                        <p class="text-3xl font-bold text-blue-600" id="d-players">-</p>
                    </div>
                    <div class="text-3xl">👤</div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-slate-500 uppercase">Alianzas</p>
                        <p class="text-3xl font-bold text-green-600" id="d-alliances">-</p>
                    </div>
                    <div class="text-3xl">🏴</div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-slate-500 uppercase">Reportes</p>
                        <p class="text-3xl font-bold text-red-500" id="d-reports">-</p>
                    </div>
                    <div class="text-3xl">🚩</div>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl border border-slate-200 p-5">
                <h2 class="font-bold text-slate-800 mb-4">🎮 Últimas Partidas</h2>
                <div id="recent-matches" class="space-y-3">
                    <div class="text-center py-4 text-slate-400 text-sm">Cargando...</div>
                </div>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 p-5">
                <h2 class="font-bold text-slate-800 mb-4">🚩 Reportes Pendientes</h2>
                <div id="pending-reports" class="space-y-3">
                    <div class="text-center py-4 text-slate-400 text-sm">Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        requireAdmin();

        async function initDashboard() {
            var admin = await getAdminRole();
            if (admin) {
                document.getElementById('welcome-text').textContent = 'Bienvenido, ' + (admin.display_name || 'Admin');
            }

            var [{ count: mc }, { count: pc }, { count: ac }, { count: rc }] = await Promise.all([
                supabase.from('matches').select('*', { count: 'exact', head: true }),
                supabase.from('players').select('*', { count: 'exact', head: true }),
                supabase.from('alliances').select('*', { count: 'exact', head: true }),
                supabase.from('chat_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending')
            ]);

            document.getElementById('d-matches').textContent = mc || 0;
            document.getElementById('d-players').textContent = pc || 0;
            document.getElementById('d-alliances').textContent = ac || 0;
            document.getElementById('d-reports').textContent = rc || 0;

            var { data: recentMatches } = await supabase
                .from('matches')
                .select('*, alliances(name, tag)')
                .order('created_at', { ascending: false })
                .limit(5);

            var container = document.getElementById('recent-matches');
            if (!recentMatches || recentMatches.length === 0) {
                container.innerHTML = '<div class="text-center py-4 text-slate-400 text-sm">Sin partidas</div>';
            } else {
                container.innerHTML = recentMatches.map(function(m) {
                    return '<div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">' +
                        '<div>' +
                            '<p class="font-medium text-slate-800">' + m.name + '</p>' +
                            '<p class="text-xs text-slate-500">' + getStatusBadge(m.status) + ' ' + formatDate(m.created_at) + '</p>' +
                        '</div>' +
                        '<a href="matches.html" class="text-amber-600 text-sm font-bold hover:text-amber-700">Ver →</a>' +
                    '</div>';
                }).join('');
            }

            var { data: reports } = await supabase
                .from('chat_reports')
                .select('*')
                .eq('status', 'pending')
                .order('reported_at', { ascending: false })
                .limit(5);

            var rContainer = document.getElementById('pending-reports');
            if (!reports || reports.length === 0) {
                rContainer.innerHTML = '<div class="text-center py-4 text-slate-400 text-sm">Sin reportes pendientes</div>';
            } else {
                rContainer.innerHTML = reports.map(function(r) {
                    return '<div class="flex items-center justify-between p-3 bg-red-50 rounded-lg border border-red-100">' +
                        '<div>' +
                            '<p class="font-medium text-slate-800">' + r.reason + '</p>' +
                            <parameter name="chat-reports-content">../chat-reports.html</parameter>
                            '<p class="text-xs text-slate-500">Por: ' + r.reporter_name + ' • ' + formatDate(r.reported_at) + '</p>' +
                        '</div>' +
                        '<span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">Pendiente</span>' +
                    '</div>';
                }).join('');
            }
        }

        initDashboard();
    </script>
</body>
</html>
