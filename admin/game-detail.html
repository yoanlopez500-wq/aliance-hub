<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Game Detail - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=18"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=18"></script>
<script src="../assets/js/base.js?v=18"></script>
<script src="../assets/js/components.js?v=18"></script>
<script src="../assets/js/auth.js?v=18"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div id="game-header">Cargando...</div>
<div id="game-form" class="hidden mt-6">
<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9998; Editar Game</h2>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Nombre *</label><input type="text" id="g-name" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Alianza</label><select id="g-alliance" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="">Seleccionar...</option></select></div>
</div>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Estado</label><select id="g-status" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="draft">Borrador</option><option value="open">Abierta</option><option value="in_progress">En curso</option><option value="finished">Finalizada</option></select></div>
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Tipo</label><select id="g-type" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="internal">Interna</option><option value="duel">Duelo</option><option value="public_31">Publica 31</option><option value="public_500">Evento 500</option></select></div>
</div>
<div class="mb-4"><label class="block text-sm mb-1" style="color:#9fa8da;">URL del PDF de reglas (opcional)</label><input type="url" id="g-rules-url" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="https://drive.google.com/..."></div>
<div class="flex gap-2"><button onclick="saveGame()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Guardar</button><button onclick="cancelEdit()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Cancelar</button></div>
</div></div>
</div>
<script>
var currentGameId = null;
var currentGame = null;
var allAlliances = [];

async function loadAlliancesDropdown() {
    try { var { data } = await supabase.from('alliances').select('id, name').order('name'); allAlliances = data || []; var select = document.getElementById('g-alliance'); select.innerHTML = '<option value="">Seleccionar...</option>' + allAlliances.map(function(a) { return '<option value="' + a.id + '">' + a.name + '</option>'; }).join(''); if (currentGame) document.getElementById('g-alliance').value = currentGame.alliance_id || ''; } catch(e) { console.error('[GameDetail] Error cargando alliances:', e); }
}

function getAllianceName(allianceId) {
    if (!allianceId || !allAlliances.length) return null;
    return allAlliances.find(function(x) { return x.id === allianceId; });
}

async function loadGame() {
    var params = new URLSearchParams(window.location.search);
    var gameId = params.get('id');
    var action = params.get('action');
    if (action === 'new') { showCreateForm(); return; }
    if (!gameId) { document.getElementById('game-header').innerHTML = '<div class="text-center py-8 text-red-400">ID no especificado</div>'; return; }
    currentGameId = gameId;
    try {
        var { data, error } = await supabase.from('matches').select('*').eq('id', gameId).single();
        if (error) throw error;
        currentGame = data;
        var alliance = getAllianceName(data.alliance_id);
        document.getElementById('game-header').innerHTML = '<div class="flex items-center justify-between"><div><h1 class="text-2xl font-bold">&#127918; ' + (data.name || 'Game') + '</h1><p class="text-sm" style="color:#9fa8da;">' + (alliance ? alliance.name : 'Sin alianza') + ' | ' + getTypeBadge(data.match_type) + ' ' + getStatusBadge(data.status) + '</p></div><button onclick="showEditForm()" class="px-3 py-1.5 rounded-lg text-xs font-bold" style="background:#1a237e;color:#e8eaf6;">Editar</button></div>';
        document.getElementById('game-form').classList.add('hidden');
        loadAlliancesDropdown();
    } catch(e) { console.error('[GameDetail]', e); document.getElementById('game-header').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}

function showCreateForm() { document.getElementById('game-header').innerHTML = '<h1 class="text-2xl font-bold">&#10133; Nuevo Game</h1>'; document.getElementById('game-form').classList.remove('hidden'); loadAlliancesDropdown(); }
function showEditForm() { if (!currentGame) return; document.getElementById('game-form').classList.remove('hidden'); document.getElementById('g-name').value = currentGame.name || ''; document.getElementById('g-status').value = currentGame.status || 'draft'; document.getElementById('g-type').value = currentGame.match_type || 'internal'; document.getElementById('g-rules-url').value = currentGame.rules_url || ''; }
function cancelEdit() { document.getElementById('game-form').classList.add('hidden'); }
async function saveGame() {
    var name = document.getElementById('g-name').value.trim();
    var allianceId = document.getElementById('g-alliance').value || null;
    var status = document.getElementById('g-status').value;
    var type = document.getElementById('g-type').value;
    var rulesUrl = document.getElementById('g-rules-url').value.trim() || null;
    if (!name) { showToast('Nombre obligatorio', 'error'); return; }
    try { if (currentGameId) { var { error } = await supabase.from('matches').update({ name, alliance_id: allianceId, status, match_type: type, rules_url: rulesUrl }).eq('id', currentGameId); } else { var { data: newGame, error } = await supabase.from('matches').insert({ name, alliance_id: allianceId, status, match_type: type, rules_url: rulesUrl }).select('id').single(); if (newGame) currentGameId = newGame.id; } if (error) throw error; showToast('Guardado', 'success'); if (!currentGame) window.location.href = 'game-detail.html?id=' + currentGameId; else { cancelEdit(); loadGame(); } } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
requireAdmin();
loadGame();
</script>
</body>
</html>
