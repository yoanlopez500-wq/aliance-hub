<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Detalle de Partida - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div id="match-detail">Cargando...</div>
</div>
<script>
var urlParams = new URLSearchParams(window.location.search);
var matchId = urlParams.get('id');
async function loadMatch() {
    if (!matchId) { document.getElementById('match-detail').innerHTML = '<div class="text-center py-8 text-red-400">ID de partida no especificado</div>'; return; }
    try {
        var { data, error } = await supabase.from('matches').select('*, alliances(name, tag)').eq('id', matchId).single();
        if (error) throw error;
        if (!data) { document.getElementById('match-detail').innerHTML = '<div class="text-center py-8 text-red-400">Partida no encontrada</div>'; return; }
        document.getElementById('match-detail').innerHTML = '<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;"><h1 class="text-2xl font-bold mb-2">' + data.name + '</h1><div class="flex gap-2 mb-4">' + getStatusBadge(data.status) + ' ' + getTypeBadge(data.match_type) + '</div><div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm"><div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">ID Juego</p><p class="font-bold">' + (data.game_id || '-') + '</p></div><div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Max Jugadores</p><p class="font-bold">' + (data.max_players || '-') + '</p></div><div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Alianza</p><p class="font-bold">' + (data.alliances ? data.alliances.name : 'Ninguna') + '</p></div><div class="rounded-lg p-3" style="background:#0a0e27;"><p class="text-xs" style="color:#9fa8da;">Creada</p><p class="font-bold">' + formatDate(data.created_at) + '</p></div></div>' + (data.description ? '<div class="mt-4 p-3 rounded-lg text-sm" style="background:#0a0e27;color:#9fa8da;">' + data.description + '</div>' : '') + '</div>';
    } catch(e) { console.error('[GameDetail]', e); document.getElementById('match-detail').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
}
requireAdmin();
loadMatch();
</script>
</body>
</html>
