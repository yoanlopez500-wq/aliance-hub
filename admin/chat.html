<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Chat Admin - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-4xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#128172; Chat de Admin</h1>
<div class="rounded-xl p-4 mb-4" style="background:#11183a;border:1px solid #1a237e;max-height:500px;overflow-y:auto;" id="chat-messages"></div>
<div class="flex gap-2">
<input type="text" id="chat-input" class="flex-1 px-3 py-2 rounded-lg border text-sm" style="background:#11183a;border-color:#1a237e;color:#e8eaf6;" placeholder="Escribe un mensaje...">
<button onclick="sendMessage()" class="px-4 py-2 rounded-lg font-bold text-sm" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:white;">Enviar</button>
</div>
</div>
<script>
async function loadMessages() {
    try {
        var { data, error } = await supabase.from('alliance_chat').select('*, players(current_username)').order('sent_at', { ascending: false }).limit(50);
        if (error) throw error;
        var container = document.getElementById('chat-messages');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center" style="color:#9fa8da;">Sin mensajes</div>'; return; }
        container.innerHTML = data.reverse().map(function(m) {
            return '<div class="mb-2"><span class="font-bold text-sm" style="color:#ff8f00;">' + (m.players ? m.players.current_username : 'Admin') + ':</span> <span class="text-sm" style="color:#e8eaf6;">' + m.message + '</span><span class="text-xs ml-2" style="color:#9fa8da;">' + formatDate(m.sent_at) + '</span></div>';
        }).join('');
        container.scrollTop = container.scrollHeight;
    } catch(e) { console.error('[Chat]', e); }
}
async function sendMessage() {
    var input = document.getElementById('chat-input');
    var text = input.value.trim();
    if (!text) return;
    try {
        var { error } = await supabase.from('alliance_chat').insert({ message: text });
        if (error) throw error;
        input.value = '';
        loadMessages();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}
requireAdmin();
loadMessages();
</script>
</body>
</html>
