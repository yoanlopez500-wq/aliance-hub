<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Partidas - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=27"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=27"></script>
<script src="../assets/js/base.js?v=27"></script>
<script src="../assets/js/components.js?v=27"></script>
<script src="../assets/js/auth.js?v=27"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-6">&#127918; Partidas</h1>
<div class="flex gap-2 mb-4">
<select id="filter-type" onchange="loadGames()" class="px-3 py-2 rounded-lg text-sm" style="background:#11183a;border:1px solid #1a237e;color:#e8eaf6;"><option value="">Todos los tipos</option><option value="internal">Interna</option><option value="duel">Duelo</option><option value="public_31">Publica 31</option><option value="public_500">Evento 500</option><option value="public_quick">Rapida</option></select>
<select id="filter-status" onchange="loadGames()" class="px-3 py-2 rounded-lg text-sm" style="background:#11183a;border:1px solid #1a237e;color:#e8eaf6;"><option value="">Todos los estados</option><option value="open">Abierta</option><option value="in_progress">En curso</option><option value="finished">Finalizada</option></select>
</div>
<div id="games-list">Cargando...</div>
</div>
<script>
async function loadGames() {
    try {
        var type = document.getElementById('filter-type').value;
        var status = document.getElementById('filter-status').value;
        var q = supabase.from('matches').select('*, alliances(name, tag)').order('created_at', { ascending: false });
        if (type) q = q.eq('match_type', type);
        if (status) q = q.eq('status', status);
        var { data, error } = await q;
        if (error) throw error;
        var container = document.getElementById('games-list');
        if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-8" style="color:#9fa8da;">Sin partidas</div>'; return; }
        container.innerHTML = '<div class="space-y-3">' + data.map(function(m) {
            return '<a href="game-detail.html?id=' + m.id + '" class="block rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between"><h3 class="font-bold">' + m.name + '</h3><div class="flex gap-1">' + getStatusBadge(m.status) + ' ' + getTypeBadge(m.match_type) + '</div></div><p class="text-sm" style="color:#9fa8da;">Alianza: ' + (m.alliances ? m.alliances.name : 'N/A') + '</p><p class="text-xs" style="color:#9fa8da;">' + formatDate(m.created_at) + '</p></a>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Games]', e); document.getElementById('games-list').innerHTML = '<div class="text-center py-8 text-red-400">Error</div>'; }
}
requireAdmin();
loadGames();
</script>
</body>
</html>
