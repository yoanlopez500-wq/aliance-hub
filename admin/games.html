<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Games - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/theme.js?v=16"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js?v=16"></script>
<script src="../assets/js/base.js?v=16"></script>
<script src="../assets/js/auth.js?v=16"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;} input,select{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}</style>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div class="flex items-center justify-between mb-6"><div><h1 class="text-2xl font-bold">&#127918; Games</h1><p class="text-sm" style="color:#9fa8da;">Gestion de games y partidas.</p></div><button onclick="openGameModal()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">&#10133; Nuevo Game</button></div>
<div class="flex gap-2 mb-4"><button onclick="filterGames('all')" class="filter-btn px-3 py-1.5 text-sm rounded-lg" data-filter="all">Todos</button><button onclick="filterGames('in_progress')" class="filter-btn px-3 py-1.5 text-sm rounded-lg bg-white text-slate-600 border border-slate-200" data-filter="in_progress">En curso</button><button onclick="filterGames('finished')" class="filter-btn px-3 py-1.5 text-sm rounded-lg" data-filter="finished">Finalizados</button></div>
<div id="games-list" class="space-y-3">Cargando...</div>
</div>
<script>
var allGames = [];
async function loadGames() {
    try { var { data, error } = await supabase.from('matches').select('*, alliances(name, tag)').order('created_at', { ascending: false }).limit(50); if (error) throw error; allGames = data || []; renderGames(allGames); } catch(e) { console.error('[Games]', e); }
}
function renderGames(data) {
    var list = document.getElementById('games-list');
    if (!data || data.length === 0) { list.innerHTML = '<div class="text-center py-8 rounded-xl" style="background:#11183a;border:1px solid #1a237e;color:#9fa8da;">No hay games</div>'; return; }
    list.innerHTML = data.map(function(g) { return '<a href="game-detail.html?id=' + g.id + '" class="block rounded-xl p-4 transition hover:opacity-90" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between"><div><h3 class="font-bold">' + (g.name || 'Game') + '</h3><p class="text-xs" style="color:#9fa8da;">' + (g.alliances ? g.alliances.name : 'Sin alianza') + '</p></div>' + getStatusBadge(g.status) + '</div></a>'; }).join('');
}
function filterGames(status) { document.querySelectorAll('.filter-btn').forEach(function(b) { b.style.background = b.dataset.filter === status ? '#fff' : ''; b.style.color = b.dataset.filter === status ? '#0f172a' : ''; }); if (status === 'all') renderGames(allGames); else renderGames(allGames.filter(function(g) { return g.status === status; })); }
function openGameModal() { window.location.href = 'game-detail.html?action=new'; }
requireAdmin();
loadGames();
</script>
</body>
</html>
