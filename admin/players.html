<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <style>
        .modal { display: none; } .modal.active { display: flex; }
        .strike-badge { display: inline-flex; align-items: center; gap: 2px; padding: 1px 6px; border-radius: 999px; font-size: 10px; font-weight: bold; }
        .strike-l { background: #fef3c7; color: #92400e; }
        .strike-m { background: #ffedd5; color: #9a3412; }
        .strike-g { background: #fee2e2; color: #991b1b; }
        .rep-clean { color: #16a34a; }
        .rep-warn { color: #ca8a04; }
        .rep-bad { color: #dc2626; }
    </style>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div><h1 class="text-2xl font-bold text-slate-800">👤 Gestion de Jugadores</h1><p class="text-slate-500">Editar, ver perfil social con strikes, ban/unban</p></div>
            <button onclick="openPlayerModal()" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg font-bold hover:bg-amber-400 transition">➕ Nuevo</button>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
            <div class="flex gap-3 flex-wrap">
                <input type="text" id="search" placeholder="Buscar por username o ID..." class="flex-1 px-4 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" onkeyup="searchPlayers()">
                <select id="filter-alliance" onchange="searchPlayers()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm"><option value="">Todas las alianzas</option></select>
                <select id="filter-status" onchange="searchPlayers()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm"><option value="">Todos los estados</option><option value="active">Activos</option><option value="banned">Baneados</option><option value="suspended">Suspendidos</option></select>
            </div>
        </div>
        <div id="players-desktop" class="hidden md:block overflow-x-auto"><div class="text-center py-8 text-slate-400">Cargando...</div></div>
        <div id="players-mobile" class="md:hidden space-y-3"><div class="text-center py-8 text-slate-400">Cargando...</div></div>
    </div>

    <!-- Modal: Editar Jugador -->
    <div id="player-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b"><h2 class="text-xl font-bold" id="modal-title">Editar Jugador</h2></div>
            <form id="player-form" class="p-6 space-y-4">
                <input type="hidden" id="player-id">
                <div><label class="block text-sm font-medium text-slate-700 mb-1">ID del jugador *</label><input type="number" id="edit-id" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: 99702975"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Username *</label><input type="text" id="edit-username" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Alianza</label><select id="edit-alliance" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"><option value="">-- Sin alianza --</option></select></div>
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Bajas</label><input type="number" id="edit-kills" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Muertes</label><input type="number" id="edit-deaths" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Partidas</label><input type="number" id="edit-games" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                </div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Estado</label><select id="edit-status" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"><option value="active">Activo</option><option value="banned">Baneado</option><option value="suspended">Suspendido</option></select></div>
                <div class="flex gap-3 pt-4"><button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Guardar</button><button type="button" onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button></div>
            </form>
        </div>
    </div>

    <!-- Modal: Perfil Social del Jugador -->
    <div id="profile-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-5 border-b flex items-center justify-between bg-gradient-to-r from-slate-800 to-slate-900 rounded-t-2xl">
                <h2 class="text-lg font-bold text-white" id="prof-title">👤 Perfil</h2>
                <button onclick="closeProfileModal()" class="text-slate-400 hover:text-white text-xl">✕</button>
            </div>
            <div class="p-5 space-y-4" id="prof-content"><div class="text-center py-4 text-slate-400">Cargando...</div></div>
        </div>
    </div>

    <script>
        requireAdmin();
        var allPlayers = [], alliances = [], strikesCache = {};

        async function loadData() {
            try {
                var [{ data: players, error: pErr }, { data: alli, error: aErr }] = await Promise.all([
                    supabase.schema('v2').from('players').select('*, alliance:alliances!players_current_alliance_id_fkey(name, tag)').order('current_username'),
                    supabase.schema('v2').from('alliances').select('id, name, tag').order('name')
                ]);
                if (pErr) throw pErr; if (aErr) throw aErr;
                allPlayers = players || []; alliances = alli || [];

                // Load strikes for all players
                if (allPlayers.length > 0) {
                    var pids = allPlayers.map(function(p) { return p.id; });
                    var { data: strikes } = await supabase.schema('v2').from('player_strikes')
                        .select('player_id, type:strike_types!player_strikes_strike_type_id_fkey(name, severity, code), is_active')
                        .in('player_id', pids).eq('is_active', true);
                    (strikes || []).forEach(function(s) {
                        if (!strikesCache[s.player_id]) strikesCache[s.player_id] = [];
                        strikesCache[s.player_id].push(s);
                    });
                }

                document.getElementById('edit-alliance').innerHTML = '<option value="">-- Sin alianza --</option>' + alliances.map(function(a) { return '<option value="' + a.id + '">' + a.name + ' [' + a.tag + ']</option>'; }).join('');
                document.getElementById('filter-alliance').innerHTML = '<option value="">Todas las alianzas</option>' + alliances.map(function(a) { return '<option value="' + a.id + '">' + a.name + '</option>'; }).join('');
                renderPlayers(allPlayers);
            } catch (e) { document.getElementById('players-desktop').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; document.getElementById('players-mobile').innerHTML = '<div class="text-center py-8 text-red-400">Error: ' + e.message + '</div>'; }
        }

        function renderStrikeBadges(pid) {
            var strikes = strikesCache[pid] || [];
            if (!strikes.length) return '';
            return '<div class="flex gap-1 mt-1 flex-wrap">' + strikes.map(function(s) {
                var c = s.type?.severity===1?'strike-l':s.type?.severity===2?'strike-m':'strike-g';
                var i = s.type?.severity===1?'⚠️':s.type?.severity===2?'🚫':'⛔';
                return '<span class="strike-badge '+c+'" title="'+(s.type?.name||'')+'">'+i+' '+(s.type?.code||'?')+'</span>';
            }).join('') + '</div>';
        }

        function renderReputation(rep) {
            if (!rep || rep >= 95) return '<span class="text-xs rep-clean font-bold">✅ '+rep+'/100</span>';
            if (rep >= 70) return '<span class="text-xs rep-warn font-bold">⚠️ '+rep+'/100</span>';
            return '<span class="text-xs rep-bad font-bold">⛔ '+rep+'/100</span>';
        }

        function renderPlayers(players) {
            var containerD = document.getElementById('players-desktop');
            var containerM = document.getElementById('players-mobile');
            if (players.length === 0) { containerD.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">Sin jugadores</div>'; containerM.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">Sin jugadores</div>'; return; }

            containerD.innerHTML = '<table class="w-full text-sm bg-white rounded-xl border border-slate-200 overflow-hidden"><thead class="bg-slate-50"><tr><th class="text-left p-3">Jugador</th><th class="text-left p-3">Alianza</th><th class="text-right p-3">Bajas</th><th class="text-right p-3">Muertes</th><th class="text-right p-3">KD</th><th class="text-left p-3">Rep</th><th class="p-3">Acciones</th></tr></thead><tbody>' + players.map(function(p) {
                var kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills || 0;
                return '<tr class="border-b hover:bg-slate-50"><td class="p-3"><p class="font-medium">' + p.current_username + '</p><p class="text-xs text-slate-500">ID: ' + p.id + '</p>' + renderStrikeBadges(p.id) + '</td><td class="p-3">' + (p.alliance ? p.alliance.tag : '-') + '</td><td class="p-3 text-right text-green-600">' + (p.total_kills || 0) + '</td><td class="p-3 text-right text-red-500">' + (p.total_deaths || 0) + '</td><td class="p-3 text-right font-bold ' + (kd >= 1 ? 'text-green-600' : 'text-orange-500') + '">' + kd + '</td><td class="p-3">' + renderReputation(p.reputation_score) + '</td><td class="p-3"><button onclick="editPlayer(' + p.id + ')" class="text-amber-600 hover:text-amber-700 font-bold text-xs mr-2">✏️</button><button onclick="viewProfile(' + p.id + ')" class="text-blue-600 hover:text-blue-700 font-bold text-xs">👤</button></td></tr>';
            }).join('') + '</tbody></table>';

            containerM.innerHTML = players.map(function(p) {
                var kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills || 0;
                return '<div class="bg-white rounded-xl border border-slate-200 p-4"><div class="flex items-center justify-between mb-2"><div><p class="font-bold text-slate-800">' + p.current_username + '</p><p class="text-xs text-slate-500">ID: ' + p.id + ' • ' + (p.alliance ? p.alliance.tag : 'Sin alianza') + '</p>' + renderStrikeBadges(p.id) + '</div>' + getStatusBadge(p.status) + '</div><div class="grid grid-cols-3 gap-2 text-sm text-center mb-3"><div class="bg-green-50 rounded p-2"><p class="text-green-600 font-bold">' + (p.total_kills || 0) + '</p><p class="text-[10px] text-green-400">Bajas</p></div><div class="bg-red-50 rounded p-2"><p class="text-red-500 font-bold">' + (p.total_deaths || 0) + '</p><p class="text-[10px] text-red-400">Muertes</p></div><div class="bg-slate-50 rounded p-2"><p class="font-bold ' + (kd >= 1 ? 'text-green-600' : 'text-orange-500') + '">' + kd + '</p><p class="text-[10px] text-slate-400">KD</p></div></div><div class="mb-2 text-center">' + renderReputation(p.reputation_score) + '</div><div class="flex gap-2"><button onclick="editPlayer(' + p.id + ')" class="flex-1 py-2 bg-amber-100 text-amber-700 rounded-lg text-xs font-bold">✏️ Editar</button><button onclick="viewProfile(' + p.id + ')" class="flex-1 py-2 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold">👤 Perfil</button></div></div>';
            }).join('');
        }

        async function viewProfile(id) {
            document.getElementById('prof-content').innerHTML = '<div class="text-center py-4 text-slate-400">Cargando...</div>';
            document.getElementById('profile-modal').classList.add('active');
            var [{data:player},{data:strikes},{data:results}] = await Promise.all([
                supabase.schema('v2').from('players').select('*,alliance:alliances!players_current_alliance_id_fkey(name,tag)').eq('id',id).single(),
                supabase.schema('v2').from('player_strikes').select('*,type:strike_types!player_strikes_strike_type_id_fkey(name,severity,code,legend),match:matches!player_strikes_match_id_fkey(name)').eq('player_id',id).order('applied_at',{ascending:false}),
                supabase.schema('v2').from('match_results').select('*,match:matches!match_results_match_id_fkey(name)').eq('player_id',id).order('created_at',{ascending:false})
            ]);
            if(!player){document.getElementById('prof-content').innerHTML='<div class="text-center text-red-500">Jugador no encontrado</div>';return;}
            var kd=player.total_deaths>0?(player.total_kills/player.total_deaths).toFixed(2):player.total_kills||0;
            var rc=player.reputation_score>=95?'rep-clean':player.reputation_score>=70?'rep-warn':'rep-bad';
            var rl=player.reputation_score>=95?'✅ Reputacion Limpia':player.reputation_score>=70?'⚠️ Advertencia':'⛔ Reputacion Baja';
            var as=(strikes||[]).filter(function(s){return s.is_active;});
            var sh='';if(as.length>0){sh='<div class="mb-3"><p class="text-xs font-bold text-slate-700 mb-1">⚡ Strikes Activos</p><div class="flex gap-1 flex-wrap">'+as.map(function(s){var c=s.type?.severity===1?'strike-l':s.type?.severity===2?'strike-m':'strike-g';var i=s.type?.severity===1?'⚠️':s.type?.severity===2?'🚫':'⛔';return'<span class="strike-badge '+c+'">'+i+' '+(s.type?.name||'?')+'</span>';}).join('')+'</div></div>';}
            var hh='';if(strikes&&strikes.length>0){hh='<div class="border-t pt-3"><p class="text-xs font-bold text-slate-700 mb-2">📋 Historial de Strikes</p><div class="space-y-2">'+strikes.map(function(s){var sc='sev-'+(s.type?.severity||1);var sb=s.is_active?'<span class="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">ACTIVO</span>':'<span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">Removido</span>';return'<div class="text-xs border-l-4 '+sc+' bg-slate-50 rounded p-2"><div class="flex items-center gap-1 mb-1">'+sb+'<span class="font-bold">'+(s.type?.name||'?')+'</span></div><p class="text-slate-600">'+s.reason+'</p><p class="text-slate-400 mt-1">🎮 '+(s.match?.name||'General')+' • 📅 '+formatDate(s.applied_at)+'</p></div>';}).join('')+'</div></div>';}
            var rh='';if(results&&results.length>0){rh='<div class="border-t pt-3"><p class="text-xs font-bold text-slate-700 mb-2">📊 Resultados Recientes</p><div class="space-y-1">'+results.slice(0,5).map(function(r){return'<div class="text-xs flex justify-between bg-slate-50 rounded p-2"><span>'+(r.match?.name||'?')+'</span><span class="font-bold '+(r.sanctioned?'text-red-500':'text-green-600')+'">'+(r.kills||0)+'/'+(r.deaths||0)+' KD:'+(r.kd_ratio||0)+'</span></div>';}).join('')+'</div></div>';}
            document.getElementById('prof-title').textContent='👤 '+player.current_username;
            document.getElementById('prof-content').innerHTML='<div class="text-center mb-4"><p class="text-2xl font-bold text-slate-800">'+player.current_username+'</p><p class="text-xs text-slate-500">ID: '+player.id+(player.alliance?' • 🏴 '+player.alliance.name:'')+'</p><div class="flex justify-center gap-4 mt-2 text-sm"><span class="text-green-600 font-bold">Bajas: '+(player.total_kills||0)+'</span><span class="text-red-500 font-bold">Muertes: '+(player.total_deaths||0)+'</span><span class="font-bold '+(kd>=1?'text-green-600':'text-orange-500')+'">KD: '+kd+'</span></div><p class="text-sm font-bold '+rc+' mt-2">'+rl+' ('+player.reputation_score+'/100)</p></div>'+sh+hh+rh;
        }
        function closeProfileModal(){document.getElementById('profile-modal').classList.remove('active');}

        function searchPlayers() {
            var q = document.getElementById('search').value.toLowerCase();
            var allianceFilter = document.getElementById('filter-alliance').value;
            var statusFilter = document.getElementById('filter-status').value;
            var filtered = allPlayers.filter(function(p) { return (p.current_username.toLowerCase().includes(q) || p.id.toString().includes(q)); });
            if (allianceFilter) filtered = filtered.filter(function(p) { return p.current_alliance_id === allianceFilter; });
            if (statusFilter) filtered = filtered.filter(function(p) { return p.status === statusFilter; });
            renderPlayers(filtered);
        }

        function openPlayerModal() { document.getElementById('player-form').reset(); document.getElementById('player-id').value = ''; document.getElementById('edit-id').disabled = false; document.getElementById('modal-title').textContent = 'Nuevo Jugador'; document.getElementById('player-modal').classList.add('active'); }
        function editPlayer(id) { var p = allPlayers.find(function(x) { return x.id === id; }); if (!p) return; document.getElementById('player-id').value = p.id; document.getElementById('edit-id').value = p.id; document.getElementById('edit-id').disabled = true; document.getElementById('edit-username').value = p.current_username; document.getElementById('edit-alliance').value = p.current_alliance_id || ''; document.getElementById('edit-kills').value = p.total_kills || 0; document.getElementById('edit-deaths').value = p.total_deaths || 0; document.getElementById('edit-games').value = p.games_played || 0; document.getElementById('edit-status').value = p.status || 'active'; document.getElementById('modal-title').textContent = 'Editar: ' + p.current_username; document.getElementById('player-modal').classList.add('active'); }
        function closeModal() { document.getElementById('player-modal').classList.remove('active'); }

        document.getElementById('player-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var id = document.getElementById('player-id').value;
            var data = { id: parseInt(document.getElementById('edit-id').value), current_username: document.getElementById('edit-username').value.trim(), current_alliance_id: document.getElementById('edit-alliance').value || null, total_kills: parseInt(document.getElementById('edit-kills').value) || 0, total_deaths: parseInt(document.getElementById('edit-deaths').value) || 0, games_played: parseInt(document.getElementById('edit-games').value) || 0, status: document.getElementById('edit-status').value, last_seen: new Date().toISOString() };
            var result = id ? await supabase.schema('v2').from('players').update(data).eq('id', id) : await supabase.schema('v2').from('players').insert([data]);
            if (result.error) showToast('Error: ' + result.error.message, 'error');
            else { showToast(id ? 'Jugador actualizado' : 'Jugador creado', 'success'); closeModal(); loadData(); }
        });

        loadData();
    </script>
</body>
</html>
