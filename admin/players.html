<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
<!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="../manifest.json">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">👤 Gestión de Jugadores</h1>
                <p class="text-slate-500">Editar, registrar, expulsar jugadores de partidas</p>
            </div>
            <button onclick="openPlayerModal()" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg font-bold hover:bg-amber-400 transition">
                ➕ Nuevo Jugador
            </button>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
            <div class="flex gap-3">
                <input type="text" id="search" placeholder="Buscar por username o ID..." 
                    class="flex-1 px-4 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"
                    onkeyup="searchPlayers()">
                <select id="filter-alliance" onchange="searchPlayers()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">
                    <option value="">Todas las alianzas</option>
                </select>
            </div>
        </div>

        <div id="players-list" class="overflow-x-auto">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <div id="player-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b">
                <h2 class="text-xl font-bold" id="modal-title">Editar Jugador</h2>
            </div>
            <form id="player-form" class="p-6 space-y-4">
                <input type="hidden" id="player-id">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ID del jugador (número del juego) *</label>
                    <input type="number" id="edit-id" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"
                        placeholder="Ej: 99702975">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username *</label>
                    <input type="text" id="edit-username" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Alianza</label>
                    <select id="edit-alliance" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                        <option value="">-- Sin alianza --</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Bajas</label>
                        <input type="number" id="edit-kills" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Muertes</label>
                        <input type="number" id="edit-deaths" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Partidas</label>
                        <input type="number" id="edit-games" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    </div>
                </div>
                <div class="border-t pt-4 mt-4">
                    <h3 class="font-bold text-slate-800 mb-3">🎮 Gestionar Partidas</h3>
                    <div id="player-games-list" class="space-y-2 max-h-40 overflow-y-auto">
                        <p class="text-sm text-slate-400">Cargando partidas...</p>
                    </div>
                    <div class="mt-3 flex gap-2">
                        <select id="add-game-select" class="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-sm">
                            <option value="">-- Añadir a partida --</option>
                        </select>
                        <button type="button" onclick="addPlayerToGame()" class="px-3 py-2 bg-green-500 text-white rounded-lg text-sm font-bold hover:bg-green-400">Añadir</button>
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Guardar</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        requireAdmin();

        let allPlayers = [];
        let alliances = [];
        let allGames = [];
        let currentPlayerId = null;

        async function loadData() {
            const [{ data: players }, { data: alli }, { data: games }] = await Promise.all([
                supabase.from('players').select('*, alliances(name, tag)').order('current_username'),
                supabase.from('alliances').select('id, name, tag').order('name'),
                supabase.from('games').select('id, name, game_id, status').neq('status', 'archived').order('name')
            ]);

            allPlayers = players || [];
            alliances = alli || [];
            allGames = games || [];

            const allianceSelect = document.getElementById('edit-alliance');
            allianceSelect.innerHTML = '<option value="">-- Sin alianza --</option>' +
                alliances.map(a => `<option value="${a.id}">${a.name} [${a.tag}]</option>`).join('');

            const filterAlliance = document.getElementById('filter-alliance');
            filterAlliance.innerHTML = '<option value="">Todas las alianzas</option>' +
                alliances.map(a => `<option value="${a.id}">${a.name}</option>`).join('');

            renderPlayers(allPlayers);
        }

        function renderPlayers(players) {
            const container = document.getElementById('players-list');
            if (players.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">Sin jugadores</div>';
                return;
            }

            container.innerHTML = `
                <table class="w-full text-sm bg-white rounded-xl border border-slate-200 overflow-hidden">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="text-left p-3">ID</th>
                            <th class="text-left p-3">Username</th>
                            <th class="text-left p-3">Alianza</th>
                            <th class="text-right p-3">Bajas</th>
                            <th class="text-right p-3">Muertes</th>
                            <th class="text-right p-3">KD</th>
                            <th class="text-right p-3">Partidas</th>
                            <th class="p-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${players.map(p => {
                            const kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills;
                            return `
                                <tr class="border-b hover:bg-slate-50">
                                    <td class="p-3 text-slate-500">${p.id}</td>
                                    <td class="p-3 font-medium">${p.current_username}</td>
                                    <td class="p-3">${p.alliances ? p.alliances.tag : '-'}</td>
                                    <td class="p-3 text-right text-green-600">${p.total_kills?.toLocaleString() || 0}</td>
                                    <td class="p-3 text-right text-red-500">${p.total_deaths?.toLocaleString() || 0}</td>
                                    <td class="p-3 text-right font-bold ${kd >= 1 ? 'text-green-600' : 'text-orange-500'}">${kd}</td>
                                    <td class="p-3 text-right">${p.games_played || 0}</td>
                                    <td class="p-3">
                                        <button onclick="editPlayer(${p.id})" class="text-amber-600 hover:text-amber-700 font-bold text-sm mr-2">Editar</button>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function searchPlayers() {
            const q = document.getElementById('search').value.toLowerCase();
            const allianceFilter = document.getElementById('filter-alliance').value;

            let filtered = allPlayers.filter(p => 
                p.current_username.toLowerCase().includes(q) ||
                p.id.toString().includes(q)
            );

            if (allianceFilter) {
                filtered = filtered.filter(p => p.current_alliance_id === allianceFilter);
            }

            renderPlayers(filtered);
        }

        function openPlayerModal() {
            document.getElementById('player-form').reset();
            document.getElementById('player-id').value = '';
            document.getElementById('edit-id').disabled = false;
            document.getElementById('modal-title').textContent = 'Nuevo Jugador';
            document.getElementById('player-games-list').innerHTML = '<p class="text-sm text-slate-400">Jugador nuevo - guarda primero para gestionar partidas</p>';
            document.getElementById('add-game-select').innerHTML = '<option value="">-- Selecciona partida --</option>' +
                allGames.map(g => `<option value="${g.id}">${g.name} (${g.status})</option>`).join('');

            document.getElementById('player-modal').classList.remove('hidden');
            document.getElementById('player-modal').classList.add('flex');
        }

        async function editPlayer(id) {
            const p = allPlayers.find(x => x.id === id);
            if (!p) return;

            currentPlayerId = id;

            document.getElementById('player-id').value = p.id;
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-id').disabled = true;
            document.getElementById('edit-username').value = p.current_username;
            document.getElementById('edit-alliance').value = p.current_alliance_id || '';
            document.getElementById('edit-kills').value = p.total_kills || 0;
            document.getElementById('edit-deaths').value = p.total_deaths || 0;
            document.getElementById('edit-games').value = p.games_played || 0;
            document.getElementById('modal-title').textContent = 'Editar Jugador';

            await loadPlayerGames(id);

            const { data: regs } = await supabase.from('registrations').select('game_id').eq('player_id', id);
            const registeredIds = (regs || []).map(r => r.game_id);
            const availableGames = allGames.filter(g => !registeredIds.includes(g.id));
            document.getElementById('add-game-select').innerHTML = '<option value="">-- Añadir a partida --</option>' +
                availableGames.map(g => `<option value="${g.id}">${g.name} (${g.status})</option>`).join('');

            document.getElementById('player-modal').classList.remove('hidden');
            document.getElementById('player-modal').classList.add('flex');
        }

        async function loadPlayerGames(playerId) {
            const container = document.getElementById('player-games-list');

            const { data: regs } = await supabase
                .from('registrations')
                .select('*, games(name, status)')
                .eq('player_id', playerId)
                .order('registered_at', { ascending: false });

            if (!regs || regs.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-400">No registrado en ninguna partida</p>';
                return;
            }

            container.innerHTML = regs.map(r => `
                <div class="flex items-center justify-between p-2 bg-slate-50 rounded">
                    <div>
                        <span class="font-medium text-sm">${r.games.name}</span>
                        <span class="text-xs text-slate-500">${r.games.status}</span>
                    </div>
                    <button onclick="removeFromGame(${r.id})" class="text-red-500 hover:text-red-700 text-sm">❌ Expulsar</button>
                </div>
            `).join('');
        }

        async function addPlayerToGame() {
            const gameId = document.getElementById('add-game-select').value;
            if (!gameId || !currentPlayerId) {
                showToast('Selecciona una partida', 'warning');
                return;
            }

            const { error } = await supabase.from('registrations').insert({
                game_id: gameId,
                player_id: currentPlayerId,
                username: document.getElementById('edit-username').value,
                accepted_rules: true
            });

            if (error) {
                showToast('Error: ' + error.message, 'error');
            } else {
                showToast('Jugador añadido a la partida', 'success');
                loadPlayerGames(currentPlayerId);
                const { data: regs } = await supabase.from('registrations').select('game_id').eq('player_id', currentPlayerId);
                const registeredIds = (regs || []).map(r => r.game_id);
                const availableGames = allGames.filter(g => !registeredIds.includes(g.id));
                document.getElementById('add-game-select').innerHTML = '<option value="">-- Añadir a partida --</option>' +
                    availableGames.map(g => `<option value="${g.id}">${g.name} (${g.status})</option>`).join('');
            }
        }

        async function removeFromGame(regId) {
            if (!confirmAction('¿Expulsar a este jugador de la partida?')) return;

            const { error } = await supabase.from('registrations').delete().eq('id', regId);
            if (error) {
                showToast('Error: ' + error.message, 'error');
            } else {
                showToast('Jugador expulsado', 'success');
                loadPlayerGames(currentPlayerId);
            }
        }

        function closeModal() {
            document.getElementById('player-modal').classList.add('hidden');
            document.getElementById('player-modal').classList.remove('flex');
            currentPlayerId = null;
        }

        document.getElementById('player-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = document.getElementById('player-id').value;
            const playerId = parseInt(document.getElementById('edit-id').value);
            const data = {
                id: playerId,
                current_username: document.getElementById('edit-username').value.trim(),
                current_alliance_id: document.getElementById('edit-alliance').value || null,
                total_kills: parseInt(document.getElementById('edit-kills').value) || 0,
                total_deaths: parseInt(document.getElementById('edit-deaths').value) || 0,
                games_played: parseInt(document.getElementById('edit-games').value) || 0,
                last_seen: new Date().toISOString()
            };

            let result;
            if (id) {
                result = await supabase.from('players').update({
                    current_username: data.current_username,
                    current_alliance_id: data.current_alliance_id,
                    total_kills: data.total_kills,
                    total_deaths: data.total_deaths,
                    games_played: data.games_played,
                    last_seen: data.last_seen
                }).eq('id', id);
            } else {
                result = await supabase.from('players').insert([data]);
            }

            if (result.error) {
                showToast('Error: ' + result.error.message, 'error');
            } else {
                showToast(id ? 'Jugador actualizado' : 'Jugador creado', 'success');
                closeModal();
                loadData();
            }
        });

        loadData();
    </script>
</body>
</html>
