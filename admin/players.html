<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <style>.modal { display: none; } .modal.active { display: flex; }</style>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">👤 Gestión de Jugadores</h1>
                <p class="text-slate-500">Editar, strikes, ban/unban, gestionar partidas</p>
            </div>
            <button onclick="openPlayerModal()" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg font-bold hover:bg-amber-400 transition">➕ Nuevo</button>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
            <div class="flex gap-3 flex-wrap">
                <input type="text" id="search" placeholder="Buscar por username o ID..." 
                    class="flex-1 px-4 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"
                    onkeyup="searchPlayers()">
                <select id="filter-alliance" onchange="searchPlayers()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">
                    <option value="">Todas las alianzas</option>
                </select>
                <select id="filter-status" onchange="searchPlayers()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">
                    <option value="">Todos los estados</option>
                    <option value="active">Activos</option>
                    <option value="banned">Baneados</option>
                    <option value="suspended">Suspendidos</option>
                </select>
            </div>
        </div>

        <div id="players-list" class="overflow-x-auto">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <div id="player-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b">
                <h2 class="text-xl font-bold" id="modal-title">Editar Jugador</h2>
            </div>
            <form id="player-form" class="p-6 space-y-4">
                <input type="hidden" id="player-id">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ID del jugador *</label>
                    <input type="number" id="edit-id" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: 99702975">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username *</label>
                    <input type="text" id="edit-username" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Alianza</label>
                    <select id="edit-alliance" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                        <option value="">-- Sin alianza --</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Bajas</label><input type="number" id="edit-kills" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Muertes</label><input type="number" id="edit-deaths" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Partidas</label><input type="number" id="edit-games" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Strikes</label>
                    <input type="number" id="edit-strikes" min="0" max="10" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
                    <select id="edit-status" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                        <option value="active">Activo</option>
                        <option value="banned">Baneado</option>
                        <option value="suspended">Suspendido</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Guardar</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        requireAdmin();

        var allPlayers = [];
        var alliances = [];

        async function loadData() {
            var [{ data: players }, { data: alli }] = await Promise.all([
                supabase.from('players').select('*, alliances(name, tag)').order('current_username'),
                supabase.from('alliances').select('id, name, tag').order('name')
            ]);

            allPlayers = players || [];
            alliances = alli || [];

            var allianceSelect = document.getElementById('edit-alliance');
            allianceSelect.innerHTML = '<option value="">-- Sin alianza --</option>' +
                alliances.map(function(a) { return '<option value="' + a.id + '">' + a.name + ' [' + a.tag + ']</option>'; }).join('');

            var filterAlliance = document.getElementById('filter-alliance');
            filterAlliance.innerHTML = '<option value="">Todas las alianzas</option>' +
                alliances.map(function(a) { return '<option value="' + a.id + '">' + a.name + '</option>'; }).join('');

            renderPlayers(allPlayers);
        }

        function renderPlayers(players) {
            var container = document.getElementById('players-list');
            if (players.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">Sin jugadores</div>';
                return;
            }

            container.innerHTML = '<table class="w-full text-sm bg-white rounded-xl border border-slate-200 overflow-hidden">' +
                '<thead class="bg-slate-50"><tr><th class="text-left p-3">ID</th><th class="text-left p-3">Username</th><th class="text-left p-3">Alianza</th><th class="text-right p-3">Bajas</th><th class="text-right p-3">Muertes</th><th class="text-right p-3">KD</th><th class="text-right p-3">Strikes</th><th class="text-left p-3">Estado</th><th class="p-3">Acciones</th></tr></thead>' +
                '<tbody>' + players.map(function(p) {
                    var kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills;
                    var statusClass = p.status === 'active' ? '' : 'bg-red-50';
                    return '<tr class="border-b hover:bg-slate-50 ' + statusClass + '">' +
                        '<td class="p-3 text-slate-500">' + p.id + '</td>' +
                        '<td class="p-3 font-medium">' + p.current_username + '</td>' +
                        '<td class="p-3">' + (p.alliances ? p.alliances.tag : '-') + '</td>' +
                        '<td class="p-3 text-right text-green-600">' + (p.total_kills?.toLocaleString() || 0) + '</td>' +
                        '<td class="p-3 text-right text-red-500">' + (p.total_deaths?.toLocaleString() || 0) + '</td>' +
                        '<td class="p-3 text-right font-bold ' + (kd >= 1 ? 'text-green-600' : 'text-orange-500') + '">' + kd + '</td>' +
                        '<td class="p-3 text-right font-bold ' + ((p.strikes || 0) >= 2 ? 'text-red-600' : 'text-slate-600') + '">' + (p.strikes || 0) + '</td>' +
                        '<td class="p-3">' + getStatusBadge(p.status) + '</td>' +
                        '<td class="p-3"><button onclick="editPlayer(' + p.id + ')" class="text-amber-600 hover:text-amber-700 font-bold text-sm mr-2">Editar</button></td>' +
                    '</tr>';
                }).join('') + '</tbody></table>';
        }

        function searchPlayers() {
            var q = document.getElementById('search').value.toLowerCase();
            var allianceFilter = document.getElementById('filter-alliance').value;
            var statusFilter = document.getElementById('filter-status').value;

            var filtered = allPlayers.filter(function(p) {
                return (p.current_username.toLowerCase().includes(q) || p.id.toString().includes(q));
            });

            if (allianceFilter) filtered = filtered.filter(function(p) { return p.current_alliance_id === allianceFilter; });
            if (statusFilter) filtered = filtered.filter(function(p) { return p.status === statusFilter; });

            renderPlayers(filtered);
        }

        function openPlayerModal() {
            document.getElementById('player-form').reset();
            document.getElementById('player-id').value = '';
            document.getElementById('edit-id').disabled = false;
            document.getElementById('modal-title').textContent = 'Nuevo Jugador';
            document.getElementById('player-modal').classList.add('active');
        }

        function editPlayer(id) {
            var p = allPlayers.find(function(x) { return x.id === id; });
            if (!p) return;

            document.getElementById('player-id').value = p.id;
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-id').disabled = true;
            document.getElementById('edit-username').value = p.current_username;
            document.getElementById('edit-alliance').value = p.current_alliance_id || '';
            document.getElementById('edit-kills').value = p.total_kills || 0;
            document.getElementById('edit-deaths').value = p.total_deaths || 0;
            document.getElementById('edit-games').value = p.games_played || 0;
            document.getElementById('edit-strikes').value = p.strikes || 0;
            document.getElementById('edit-status').value = p.status || 'active';
            document.getElementById('modal-title').textContent = 'Editar Jugador';
            document.getElementById('player-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('player-modal').classList.remove('active');
        }

        document.getElementById('player-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            var id = document.getElementById('player-id').value;
            var data = {
                id: parseInt(document.getElementById('edit-id').value),
                current_username: document.getElementById('edit-username').value.trim(),
                current_alliance_id: document.getElementById('edit-alliance').value || null,
                total_kills: parseInt(document.getElementById('edit-kills').value) || 0,
                total_deaths: parseInt(document.getElementById('edit-deaths').value) || 0,
                games_played: parseInt(document.getElementById('edit-games').value) || 0,
                strikes: parseInt(document.getElementById('edit-strikes').value) || 0,
                status: document.getElementById('edit-status').value,
                last_seen: new Date().toISOString()
            };

            var result;
            if (id) {
                result = await supabase.from('players').update(data).eq('id', id);
            } else {
                result = await supabase.from('players').insert([data]);
            }

            if (result.error) showToast('Error: ' + result.error.message, 'error');
            else { showToast(id ? 'Jugador actualizado' : 'Jugador creado', 'success'); closeModal(); loadData(); }
        });

        loadData();
    </script>
</body>
</html>
