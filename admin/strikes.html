        async function init() {
            var admin = await getAdminRole();
            isSuperAdmin = (admin && admin.role === 'superadmin');
            if (isSuperAdmin) document.getElementById('btn-new-strike-type').classList.remove('hidden');

            loadRulesUrl();
            loadStrikeTypes();
            loadMatchesForSelect();
            loadStrikeHistory();
        }
