<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligas V2 - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/base.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/pwa-utils.js"></script>
    <style>.modal { display: none; } .modal.active { display: flex; }</style>
    <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-900 min-h-screen" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🏆 Ligas V2</h1>
                <p class="text-slate-500">Crear ligas, jornadas y gestionar standings</p>
            </div>
            <button onclick="openLeagueModal()" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg font-bold hover:bg-amber-400 transition">➕ Nueva Liga</button>
        </div>

        <div id="leagues-list" class="space-y-4">
            <div class="text-center py-8 text-slate-400">Cargando...</div>
        </div>
    </div>

    <div id="league-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6">
            <h2 class="text-xl font-bold mb-4" id="modal-title">Nueva Liga</h2>
            <form id="league-form" class="space-y-4">
                <input type="hidden" id="league-id">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre *</label>
                    <input type="text" id="l-name" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: Liga Interna Primavera 2026">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Temporada *</label>
                    <input type="text" id="l-season" required class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none" placeholder="Ej: Primavera 2026">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Inicio</label>
                        <input type="date" id="l-start" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Fin</label>
                        <input type="date" id="l-end" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400">Guardar</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-300">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        requireAdmin();
        requireMinRole('event_admin');

        async function loadLeagues() {
            var { data: leagues } = await supabase
                .from('leagues')
                .select('*, matches(count), league_schedule(*)')
                .order('created_at', { ascending: false });

            var container = document.getElementById('leagues-list');
            if (!leagues || leagues.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400 bg-white rounded-xl border">Sin ligas</div>';
                return;
            }

            container.innerHTML = leagues.map(function(l) {
                var statusBadge = l.status === 'active' 
                    ? '<span class="px-2 py-1 rounded text-xs bg-green-100 text-green-700">Activa</span>'
                    : l.status === 'completed' 
                        ? '<span class="px-2 py-1 rounded text-xs bg-purple-100 text-purple-700">Completada</span>'
                        : '<span class="px-2 py-1 rounded text-xs bg-red-100 text-red-700">Cancelada</span>';

                return '<div class="bg-white rounded-xl border border-slate-200 p-5">' +
                    '<div class="flex items-center justify-between">' +
                        '<div>' +
                            '<div class="flex items-center gap-2 mb-1">' + statusBadge + '</div>' +
                            '<h3 class="font-bold text-slate-800 text-lg">' + l.name + '</h3>' +
                            '<p class="text-sm text-slate-500">Temporada: ' + l.season + '</p>' +
                            '<p class="text-xs text-slate-400">' + formatDate(l.start_date) + ' - ' + formatDate(l.end_date) + '</p>' +
                        '</div>' +
                        '<div class="text-right">' +
                            '<div class="text-2xl font-bold text-amber-600">' + (l.matches?.count || 0) + '</div>' +
                            '<div class="text-xs text-slate-500">partidas</div>' +
                            '<div class="text-lg font-bold text-blue-600 mt-1">' + (l.league_schedule?.length || 0) + '</div>' +
                            '<div class="text-xs text-slate-500">jornadas</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function openLeagueModal() {
            document.getElementById('league-form').reset();
            document.getElementById('league-id').value = '';
            document.getElementById('modal-title').textContent = 'Nueva Liga';
            document.getElementById('league-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('league-modal').classList.remove('active'); }

        document.getElementById('league-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            var data = {
                name: document.getElementById('l-name').value.trim(),
                season: document.getElementById('l-season').value.trim(),
                start_date: document.getElementById('l-start').value || null,
                end_date: document.getElementById('l-end').value || null
            };

            var result = await supabase.from('leagues').insert([data]);
            if (result.error) showToast('Error: ' + result.error.message, 'error');
            else { showToast('Liga creada', 'success'); closeModal(); loadLeagues(); }
        });

        loadLeagues();
    </script>
</body>
</html>
