<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Alliance Hub</title>
    <script>
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License

        // PROTECCIÓN ANTI-BUCLE: Si ya estamos en un redirect, no hacer nada
        if (location.search.includes('?p=') || location.search.includes('&q=')) {
            // Ya estamos en el proceso de redirect, salir
        } else if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            // Localhost: no redirigir
        } else {
            // Detectar segmentos de path a conservar (para GitHub Pages project sites)
            var pathSegmentsToKeep = 0;
            var path = location.pathname;
            var parts = path.split('/').filter(function(p) { return p.length > 0; });

            // Si hay al menos un segmento y no parece ser una página (.html)
            if (parts.length >= 1 && !parts[0].includes('.') && parts[0].length > 0) {
                pathSegmentsToKeep = 1;
            }

            var l = window.location;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
                l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        }
    </script>
</head>
<body></body>
</html>
