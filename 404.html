<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Alliance Hub V2</title>
<script type="text/javascript">
// Solo redirigir rutas SPA (sin extension de archivo)
// Si es un archivo (.html, .js, .css, etc.), mostrar 404 real
var l = window.location;
var path = l.pathname;
var lastSegment = path.split('/').pop();

// Si la ruta termina con una extension de archivo conocida, NO redirigir
if (lastSegment && lastSegment.indexOf('.') !== -1) {
    // Es un archivo estatico que no existe - mostrar 404 real
    document.title = '404 - Not Found';
} else {
    // Es una ruta SPA - redirigir a index.html con el path
    var pathSegmentsToKeep = 1;
    l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
    );
}
</script></head>
<body>
<h1>404 - Pagina no encontrada</h1>
<p><a href="/">Volver al inicio</a></p>
</body>
</html>
