<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Rankings - Alliance Hub</title>
<script src="assets/js/theme.js?v=16"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=16"></script>
<script src="assets/js/base.js?v=16"></script>
<script src="assets/js/auth.js?v=16"></script>
<script src="assets/js/pwa-utils.js?v=16"></script>
<meta name="theme-color" content="#0a0e27">
<style>.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}.kill-nullified{text-decoration:line-through;opacity:.5}</style>
</head>
<body class="bg-ah-bg min-h-screen text-ah-text" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold text-ah-text mb-2">&#127942; Rankings</h1>
<p class="text-sm text-ah-muted mb-6">Estadisticas globales, por alianza, por liga y duelos</p>
<div class="flex gap-1 overflow-x-auto pb-2 mb-6 scrollbar-hide border-b border-ah-border">
<button onclick="showTab('players')" id="tab-players" class="px-4 py-3 text-sm font-bold text-ah-accent border-b-2 border-ah-accent whitespace-nowrap">&#128100; Jugadores</button>
<button onclick="showTab('alliances')" id="tab-alliances" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#127988; Alianzas</button>
<button onclick="showTab('leagues')" id="tab-leagues" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#127942; Ligas</button>
<button onclick="showTab('duels')" id="tab-duels" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#9876;&#65039; Duelos</button>
<button onclick="showTab('strikes')" id="tab-strikes" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#9888;&#65039; Strikes</button>
</div>
<div id="error-banner" class="hidden mb-4 p-3 rounded-lg text-sm font-bold" style="background:rgba(198,40,40,0.15);color:#ef5350;"></div>
<div id="players-ranking">
<div class="flex gap-2 mb-4"><select id="filter-alliance" onchange="loadData()" class="px-3 py-2 rounded-lg text-sm border-ah-border bg-ah-card text-ah-text"><option value="">Todas las alianzas</option></select></div>
<div class="overflow-x-auto bg-ah-card rounded-xl border border-ah-border">
<table class="w-full text-sm"><thead class="bg-ah-card/50"><tr><th class="text-left p-3 text-ah-muted">#</th><th class="text-left p-3 text-ah-muted">Jugador</th><th class="text-left p-3 text-ah-muted">Alianza</th><th class="text-right p-3 text-ah-muted">Partidas</th><th class="text-right p-3 text-ah-muted">Bajas</th><th class="text-right p-3 text-ah-muted">Muertes</th><th class="text-right p-3 text-ah-muted">KD</th><th class="text-right p-3 text-ah-muted">&#9889;</th></tr></thead><tbody id="players-tbody"><tr><td colspan="8" class="text-center py-8 text-ah-muted/70">Cargando...</td></tr></tbody></table>
</div></div>
<div id="alliances-ranking" class="hidden"><div id="alliances-list" class="text-center py-8 text-ah-muted/70">Cargando...</div></div>
<div id="leagues-ranking" class="hidden"><div class="text-center py-8 text-ah-muted/70">Ligas proximamente</div></div>
<div id="duels-ranking" class="hidden"><div id="duels-list" class="text-center py-8 text-ah-muted/70">Cargando...</div></div>
<div id="strikes-ranking" class="hidden">
<div class="overflow-x-auto bg-ah-card rounded-xl border border-ah-border">
<table class="w-full text-sm"><thead class="bg-ah-card/50"><tr><th class="text-left p-3 text-ah-muted">Jugador</th><th class="text-left p-3 text-ah-muted">Alianza</th><th class="text-right p-3 text-ah-muted">Strikes</th><th class="text-left p-3 text-ah-muted">Estado</th><th class="text-left p-3 text-ah-muted">Ultimo No-Show</th></tr></thead><tbody id="strikes-tbody"><tr><td colspan="5" class="text-center py-8 text-ah-muted/70">Cargando...</td></tr></tbody></table>
</div></div>
</div>
<script>
var nullifiedCache = {};
var sanctionsCache = {};
var strikesCache = {};
var allianceMap = {};
function showError(msg) { var el = document.getElementById('error-banner'); el.textContent = msg; el.classList.remove('hidden'); }
function getAllianceTag(aid) { return allianceMap[aid]?.tag || '-'; }
function effectiveKills(player) {
    var sanc = sanctionsCache[player.id];
    if (sanc && sanc.kills_after != null) return Math.round(sanc.kills_after);
    var total = player.total_kills || 0;
    var nullified = nullifiedCache[player.id] || 0;
    var killsWN = Math.max(0, total - nullified);
    var strikes = strikesCache[player.id] || 0;
    if (strikes === 1) return Math.round(killsWN * 0.9);
    if (strikes === 2) return Math.round(killsWN * 0.7);
    if (strikes >= 3) return Math.round(killsWN * 0.5);
    return killsWN;
}
function getPenaltyPct(player) {
    var sanc = sanctionsCache[player.id];
    if (sanc && sanc.penalty_pct != null) return sanc.penalty_pct;
    var strikes = strikesCache[player.id] || 0;
    if (strikes === 1) return 10;
    if (strikes === 2) return 30;
    if (strikes >= 3) return 50;
    return 0;
}
async function loadSanctions() {
    try {
        var res = await supabase.from('player_sanctions').select('player_id, kills_after, penalty_pct').order('created_at', { ascending: false });
        if (res.error) throw res.error;
        sanctionsCache = {};
        (res.data || []).forEach(function(s) { if (!sanctionsCache[s.player_id]) sanctionsCache[s.player_id] = { kills_after: s.kills_after, penalty_pct: s.penalty_pct || 0 }; });
    } catch(e) { console.error('[Rankings] Error sanciones:', e); sanctionsCache = {}; }
}
async function loadData() {
    try { var res = await supabase.from('alliances').select('id, name, tag').order('name'); if (res.error) throw res.error; allianceMap = {}; document.getElementById('filter-alliance').innerHTML = '<option value="">Todas las alianzas</option>' + (res.data || []).map(function(a) { allianceMap[a.id] = { name: a.name, tag: a.tag }; return '<option value="' + a.id + '">' + a.name + '</option>'; }).join(''); } catch(e) { console.error('[Rankings] Error alianzas:', e); showError('Error alianzas: ' + e.message); }
    try { var res = await supabase.from('match_nullified_kills').select('player_id, kills_nullified'); if (res.error) throw res.error; nullifiedCache = {}; (res.data || []).forEach(function(r) { nullifiedCache[r.player_id] = (nullifiedCache[r.player_id] || 0) + r.kills_nullified; }); } catch(e) { console.error('[Rankings] Error nullified:', e); nullifiedCache = {}; }
    await loadSanctions();
    try { var res = await supabase.from('player_strikes').select('player_id').eq('is_active', true); if (res.error) throw res.error; strikesCache = {}; (res.data || []).forEach(function(s) { strikesCache[s.player_id] = (strikesCache[s.player_id] || 0) + 1; }); } catch(e) { console.error('[Rankings] Error strikes:', e); strikesCache = {}; }
    try { await loadRankings(); } catch(e) { console.error('[Rankings] jugadores:', e); }
    try { await loadAlliances(); } catch(e) { console.error('[Rankings] alianzas:', e); }
    try { await loadDuels(); } catch(e) { console.error('[Rankings] duelos:', e); }
    try { await loadStrikes(); } catch(e) { console.error('[Rankings] strikes:', e); }
}
async function loadRankings() {
    try { var af = document.getElementById('filter-alliance').value; var q = supabase.from('players').select('id, current_username, current_alliance_id, total_kills, total_deaths, games_played, status, last_seen'); if (af) q = q.eq('current_alliance_id', af); var res = await q.order('total_kills', { ascending: false }).limit(100); if (res.error) throw res.error; var players = res.data || []; players.sort(function(a, b) { return effectiveKills(b) - effectiveKills(a); }); var tbody = document.getElementById('players-tbody'); tbody.innerHTML = players.map(function(p, i) { var eff = effectiveKills(p); var penalty = getPenaltyPct(p); var killClass = penalty > 0 ? 'text-ah-muted kill-nullified' : ''; var badge = penalty > 0 ? '<span class="text-[10px] px-1 py-0.5 rounded font-bold ml-1" style="background:rgba(198,40,40,0.2);color:#ef5350">-' + penalty + '%</span>' : ''; return '<tr class="border-b border-ah-border hover:bg-ah-card/50"><td class="p-3 font-bold text-ah-muted">' + (i+1) + '</td><td class="p-3 font-medium text-ah-text"><a href="player.html?id=' + p.id + '" class="hover:text-ah-accent">' + p.current_username + '</a>' + badge + '</td><td class="p-3 text-ah-muted">' + getAllianceTag(p.current_alliance_id) + '</td><td class="p-3 text-right text-ah-muted">' + (p.games_played || 0) + '</td><td class="p-3 text-right font-bold ' + (eff > 0 ? 'text-green-400' : 'text-ah-muted') + ' ' + killClass + '">' + eff + '</td><td class="p-3 text-right text-ah-muted">' + (p.total_deaths || 0) + '</td><td class="p-3 text-right font-bold">' + (p.total_deaths > 0 ? (eff / p.total_deaths).toFixed(2) : (eff > 0 ? eff.toFixed(2) : '0')) + '</td><td class="p-3 text-right">' + (penalty > 0 ? '<span title="Penalizacion por strikes/sanciones" class="text-red-400">&#9889;</span>' : '') + '</td></tr>'; }).join(''); } catch(e) { console.error('[Rankings] jugadores:', e); document.getElementById('players-tbody').innerHTML = '<tr><td colspan="8" class="text-center py-8 text-red-400">Error: ' + e.message + '</td></tr>'; }
}
async function loadAlliances() { document.getElementById('alliances-list').innerHTML = '<div class="text-center py-8 text-ah-muted/70">Proximamente</div>'; }
async function loadDuels() { try { var res = await supabase.from('duels').select('*, alliance_a:alliances!duels_alliance_a_id_fkey(name, tag), alliance_b:alliances!duels_alliance_b_id_fkey(name, tag)').eq('status', 'finished').order('created_at', { ascending: false }).limit(20); if (res.error) throw res.error; var c = document.getElementById('duels-list'); if (!res.data || res.data.length === 0) { c.innerHTML = '<div class="text-center py-8 text-ah-muted/70 bg-ah-card rounded-xl border border-ah-border">Sin duelos finalizados</div>'; return; } c.innerHTML = res.data.map(function(d) { return '<div class="bg-ah-card rounded-xl border border-ah-border p-5"><div class="flex items-center justify-between"><div class="flex-1 text-center"><div class="font-bold text-ah-text">' + (d.alliance_a?.name || 'Alianza A') + '</div><div class="text-xs text-ah-muted">[' + (d.alliance_a?.tag || '-') + ']</div></div><div class="px-4"><div class="text-2xl font-bold text-ah-accent">VS</div><div class="text-xs text-ah-muted/70">' + formatDate(d.created_at) + '</div></div><div class="flex-1 text-center"><div class="font-bold text-ah-text">' + (d.alliance_b?.name || 'Alianza B') + '</div><div class="text-xs text-ah-muted">[' + (d.alliance_b?.tag || '-') + ']</div></div></div></div>'; }).join(''); } catch(e) { console.error('[Rankings] duelos:', e); document.getElementById('duels-list').innerHTML = '<div class="text-center py-8 text-red-400">Error duelos</div>'; } }
async function loadStrikes() {
    try { var res = await supabase.from('player_strikes').select('player_id, is_active, players!inner(id, current_username, current_alliance_id, status, last_seen)').eq('is_active', true).limit(200); if (res.error) throw res.error; var tbody = document.getElementById('strikes-tbody'); if (!res.data || res.data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-ah-muted/70">Sin strikes registrados</td></tr>'; return; } var counts = {}; res.data.forEach(function(s) { var pid = s.player_id; if (!counts[pid]) counts[pid] = { count: 0, player: s.players }; counts[pid].count++; }); var rows = Object.values(counts).sort(function(a, b) { return b.count - a.count; }).slice(0, 50); tbody.innerHTML = rows.map(function(r) { return '<tr class="border-b border-ah-border hover:bg-ah-card/50"><td class="p-3 font-medium text-ah-text">' + (r.player.current_username || '?') + '</td><td class="p-3 text-ah-muted">' + getAllianceTag(r.player.current_alliance_id) + '</td><td class="p-3 text-right font-bold text-red-400">' + r.count + '</td><td class="p-3">' + getStatusBadgePlayer(r.player.status) + '</td><td class="p-3 text-ah-muted/70 text-xs">' + formatDate(r.player.last_seen) + '</td></tr>'; }).join(''); } catch(e) { console.error('[Rankings] strikes:', e); document.getElementById('strikes-tbody').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-400">Error cargando strikes: ' + e.message + '</td></tr>'; }
}
function showTab(tab) { ['players', 'alliances', 'leagues', 'duels', 'strikes'].forEach(function(t) { document.getElementById(t + '-ranking').classList.toggle('hidden', t !== tab); var btn = document.getElementById('tab-' + t); btn.className = t === tab ? 'px-4 py-3 text-sm font-bold text-ah-accent border-b-2 border-ah-accent whitespace-nowrap' : 'px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap'; }); }
loadData();
</script>
</body>
</html>
