<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Rankings - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/theme.js?v=19"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=19"></script>
<script src="assets/js/base.js?v=19"></script>
<script src="assets/js/roles-data.js?v=19"></script>
<script src="assets/js/auth-core.js?v=19"></script>
<script src="assets/js/db-schema.js?v=19"></script>
<script src="assets/js/messaging.js?v=19"></script>
<script src="assets/js/notifications.js?v=19"></script>
<script src="assets/js/nav-engine.js?v=19"></script>
<script src="assets/js/training.js?v=19"></script>
<script src="assets/js/components.js?v=19"></script>
<meta name="theme-color" content="#0a0e27">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}</style>
</head>
<body class="min-h-screen" data-role="public">
<div id="admin-nav"></div>

<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold mb-2">&#127942; Rankings Globales</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Top jugadores por kills netas. Penalizaciones por strikes aplicadas automaticamente. Excluye partidas internas.</p>

<div class="mb-6">
<select id="filter-alliance" onchange="loadRankings()" class="px-4 py-2 rounded-lg text-sm" style="background:#11183a;border:1px solid #1a237e;color:#e8eaf6;">
<option value="">Todas las alianzas</option>
</select>
</div>

<div class="rounded-xl overflow-x-auto" style="background:#11183a;border:1px solid #1a237e;">
<table class="w-full text-sm"><thead><tr style="background:rgba(255,255,255,0.03);"><th class="text-left p-3" style="color:#9fa8da;">#</th><th class="text-left p-3" style="color:#9fa8da;">Jugador</th><th class="text-left p-3" style="color:#9fa8da;">Alianza</th><th class="text-right p-3" style="color:#9fa8da;">Partidas</th><th class="text-right p-3" style="color:#9fa8da;">Bajas (netas)</th><th class="text-right p-3" style="color:#9fa8da;">Muertes</th><th class="text-right p-3" style="color:#9fa8da;">KD</th><th class="text-right p-3" style="color:#9fa8da;"></th></tr></thead>
<tbody id="players-tbody"></tbody></table>
</div>
</div>

<script>
// ============================================================
// v19: Rankings filtrados excluyendo partidas 'internal'
// ============================================================

var allianceMap = {};

function effectiveKills(p) {
    return Math.max(0, (p.total_kills || 0) - Math.floor((p.total_kills || 0) * (getPenaltyPct(p) / 100)));
}

function getPenaltyPct(p) {
    return 0; // placeholder
}

function getAllianceTag(aid) {
    if (!aid) return '-';
    var a = allianceMap[aid];
    return a ? '<a href="alliance.html?id=' + aid + '" style="color:#42a5f5;">' + a.tag + '</a>' : '-';
}

async function loadAlliances() {
    try {
        var ac = DB.tableCols('alliances');
        var { data, error } = await supabase.from('alliances').select([ac.id, ac.name, ac.tag].join(', '));
        if (error) throw error;
        allianceMap = {}; (data || []).forEach(function(a) { allianceMap[a[ac.id]] = a; });
        var sel = document.getElementById('filter-alliance');
        sel.innerHTML = '<option value="">Todas las alianzas</option>' + (data || []).map(function(a) {
            return '<option value="' + a[ac.id] + '">' + a[ac.name] + ' [' + a[ac.tag] + ']</option>';
        }).join('');
    } catch(e) { console.error('[Rankings] alianzas:', e); }
}

async function loadRankings() {
    try {
        var af = document.getElementById('filter-alliance').value;
        var pc = DB.tableCols('players');

        // v19: Query match_results JOIN matches, excluding internal matches from global ranking
        var q = supabase.from('match_results')
            .select('player_id, kills, deaths, matches!inner(match_type, alliance_id)')
            .neq('matches.match_type', 'internal');

        var res = await q;
        if (res.error) throw res.error;

        // Aggregate by player from filtered results
        var playerStats = {};
        (res.data || []).forEach(function(r) {
            var pid = r.player_id;
            if (!playerStats[pid]) playerStats[pid] = { kills: 0, deaths: 0, games: 0 };
            playerStats[pid].kills += (r.kills || 0);
            playerStats[pid].deaths += (r.deaths || 0);
            playerStats[pid].games += 1;
        });

        // Get player details
        var playerIds = Object.keys(playerStats).map(Number);
        var playersData = [];
        if (playerIds.length > 0) {
            var pq = DB.from('players').select([pc.id, pc.username, pc.allianceId, pc.gamesPlayed].join(', ')).in(pc.id, playerIds);
            if (af) pq = pq.eq(pc.allianceId, af);
            var pres = await pq;
            if (!pres.error && pres.data) {
                playersData = pres.data.map(function(p) {
                    var stats = playerStats[p[pc.id]] || { kills: 0, deaths: 0, games: 0 };
                    p[pc.kills] = stats.kills;
                    p[pc.deaths] = stats.deaths;
                    p[pc.gamesPlayed] = stats.games;
                    return p;
                });
            }
        }

        playersData.sort(function(a, b) { return effectiveKills(b) - effectiveKills(a); });
        var tbody = document.getElementById('players-tbody');
        if (playersData.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8" style="color:#9fa8da;">Sin datos de rankings publicos</td></tr>'; return; }

        tbody.innerHTML = playersData.map(function(p, i) {
            var eff = effectiveKills(p);
            var penalty = getPenaltyPct(p);
            var killClass = penalty > 0 ? 'kill-nullified' : '';
            var badge = penalty > 0 ? '<span class="text-[10px] px-1 py-0.5 rounded font-bold ml-1" style="background:rgba(198,40,40,0.2);color:#ef5350">-' + penalty + '%</span>' : '';
            return '<tr style="border-bottom:1px solid #1a237e;"><td class="p-3 font-bold" style="color:#9fa8da;">' + (i+1) + '</td><td class="p-3 font-medium"><a href="player.html?id=' + p[pc.id] + '" style="color:#ff8f00;">' + p[pc.username] + '</a>' + badge + '</td><td class="p-3" style="color:#9fa8da;">' + getAllianceTag(p[pc.allianceId]) + '</td><td class="p-3 text-right" style="color:#9fa8da;">' + (p[pc.gamesPlayed] || 0) + '</td><td class="p-3 text-right font-bold ' + killClass + '" style="color:' + (eff > 0 ? '#4caf50' : '#9fa8da') + ';">' + eff + '</td><td class="p-3 text-right" style="color:#9fa8da;">' + (p[pc.deaths] || 0) + '</td><td class="p-3 text-right font-bold">' + (p[pc.deaths] > 0 ? (eff / p[pc.deaths]).toFixed(2) : (eff > 0 ? eff.toFixed(2) : '0')) + '</td><td class="p-3 text-right">' + (penalty > 0 ? '<span title="Penalizacion por strikes/sanciones" style="color:#ef5350;">&#9889;</span>' : '') + '</td></tr>';
        }).join('');
    } catch(e) { console.error('[Rankings] jugadores:', e); document.getElementById('players-tbody').innerHTML = '<tr><td colspan="8" class="text-center py-8" style="color:#ef5350;">Error: ' + e.message + '</td></tr>'; }
}

loadAlliances().then(loadRankings);
</script>
</body>
</html>
