<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Rankings - Alliance Hub</title>
<script src="assets/js/theme.js?v=17"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=17"></script>
<script src="assets/js/base.js?v=17"></script>
<script src="assets/js/auth.js?v=17"></script>
<script src="assets/js/pwa-utils.js?v=17"></script>
<meta name="theme-color" content="#0a0e27">
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
input,select,textarea{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}
input:focus,select:focus,textarea:focus{border-color:#ff6f00!important;outline:none!important;}
.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
.kill-nullified{text-decoration:line-through;opacity:.5}
.bg-ah-card{background:#11183a!important}
.border-ah-border{border-color:#1a237e!important}
.text-ah-accent{color:#ff8f00!important}
.text-ah-muted{color:#9fa8da!important}
.bg-ah-bg{background:#0a0e27!important}
.text-ah-text{color:#e8eaf6!important}
</style>
</head>
<body class="bg-ah-bg min-h-screen text-ah-text" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold text-ah-text mb-2">&#127942; Rankings</h1>
<p class="text-sm text-ah-muted mb-6">Estadisticas globales, por alianza, por liga y duelos</p>
<div class="flex gap-1 overflow-x-auto pb-2 mb-6 scrollbar-hide border-b border-ah-border">
<button onclick="showTab('players')" id="tab-players" class="px-4 py-3 text-sm font-bold text-ah-accent border-b-2 whitespace-nowrap" style="border-color:#ff8f00;">&#128100; Jugadores</button>
<button onclick="showTab('alliances')" id="tab-alliances" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#127988; Alianzas</button>
<button onclick="showTab('leagues')" id="tab-leagues" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#127942; Ligas</button>
<button onclick="showTab('duels')" id="tab-duels" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#9876;&#65039; Duelos</button>
<button onclick="showTab('strikes')" id="tab-strikes" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap">&#9888;&#65039; Strikes</button>
</div>
<div id="error-banner" class="hidden mb-4 p-3 rounded-lg text-sm font-bold" style="background:rgba(198,40,40,0.15);color:#ef5350;"></div>
<div id="players-ranking">
<div class="flex gap-2 mb-4"><select id="filter-alliance" onchange="loadRankings()" class="px-3 py-2 rounded-lg text-sm border bg-ah-card text-ah-text" style="border-color:#1a237e;"><option value="">Todas las alianzas</option></select></div>
<div class="overflow-x-auto rounded-xl" style="background:#11183a;border:1px solid #1a237e;">
<table class="w-full text-sm"><thead><tr style="background:rgba(255,255,255,0.02);"><th class="text-left p-3 text-ah-muted">#</th><th class="text-left p-3 text-ah-muted">Jugador</th><th class="text-left p-3 text-ah-muted">Alianza</th><th class="text-right p-3 text-ah-muted">Partidas</th><th class="text-right p-3 text-ah-muted">Bajas</th><th class="text-right p-3 text-ah-muted">Muertes</th><th class="text-right p-3 text-ah-muted">KD</th><th class="text-right p-3 text-ah-muted">&#9889;</th></tr></thead><tbody id="players-tbody"><tr><td colspan="8" class="text-center py-8 text-ah-muted">Cargando...</td></tr></tbody></table>
</div></div>
<div id="alliances-ranking" class="hidden"><div id="alliances-list" class="text-center py-8 text-ah-muted">Cargando...</div></div>
<div id="leagues-ranking" class="hidden"><div class="text-center py-8 text-ah-muted">Ligas proximamente</div></div>
<div id="duels-ranking" class="hidden"><div id="duels-list" class="text-center py-8 text-ah-muted">Cargando...</div></div>
<div id="strikes-ranking" class="hidden">
<div class="overflow-x-auto rounded-xl" style="background:#11183a;border:1px solid #1a237e;">
<table class="w-full text-sm"><thead><tr style="background:rgba(255,255,255,0.02);"><th class="text-left p-3 text-ah-muted">Jugador</th><th class="text-left p-3 text-ah-muted">Alianza</th><th class="text-right p-3 text-ah-muted">Strikes</th><th class="text-left p-3 text-ah-muted">Estado</th><th class="text-left p-3 text-ah-muted">Ultimo No-Show</th></tr></thead><tbody id="strikes-tbody"><tr><td colspan="5" class="text-center py-8 text-ah-muted">Cargando...</td></tr></tbody></table>
</div></div>
</div>
<script>
var nullifiedCache = {};
var sanctionsCache = {};
var strikesCache = {};
var allianceMap = {};

function showError(msg) { var el = document.getElementById('error-banner'); el.textContent = msg; el.classList.remove('hidden'); }
function getAllianceTag(aid) { return (allianceMap[aid] && allianceMap[aid].tag) ? allianceMap[aid].tag : '-'; }

function effectiveKills(player) {
    var sanc = sanctionsCache[player.id];
    if (sanc && sanc.kills_after != null) return Math.round(sanc.kills_after);
    var total = player.total_kills || 0;
    var nullified = nullifiedCache[player.id] || 0;
    var killsWN = Math.max(0, total - nullified);
    var strikes = strikesCache[player.id] || 0;
    if (strikes === 1) return Math.round(killsWN * 0.9);
    if (strikes === 2) return Math.round(killsWN * 0.7);
    if (strikes >= 3) return Math.round(killsWN * 0.5);
    return killsWN;
}

function getPenaltyPct(player) {
    var sanc = sanctionsCache[player.id];
    if (sanc && sanc.penalty_pct != null) return sanc.penalty_pct;
    var strikes = strikesCache[player.id] || 0;
    if (strikes === 1) return 10;
    if (strikes === 2) return 30;
    if (strikes >= 3) return 50;
    return 0;
}

async function loadSanctions() {
    try {
        var res = await supabase.from('player_sanctions').select('player_id, kills_after, penalty_pct').order('created_at', { ascending: false });
        if (res.error) throw res.error;
        sanctionsCache = {};
        (res.data || []).forEach(function(s) { if (!sanctionsCache[s.player_id]) sanctionsCache[s.player_id] = { kills_after: s.kills_after, penalty_pct: s.penalty_pct || 0 }; });
    } catch(e) { console.error('[Rankings] Error sanciones:', e); sanctionsCache = {}; }
}

async function loadData() {
    try {
        var res = await supabase.from('alliances').select('id, name, tag').order('name');
        if (res.error) throw res.error;
        allianceMap = {};
        document.getElementById('filter-alliance').innerHTML = '<option value="">Todas las alianzas</option>' +
            (res.data || []).map(function(a) { allianceMap[a.id] = { name: a.name, tag: a.tag }; return '<option value="' + a.id + '">' + a.name + '</option>'; }).join('');
    } catch(e) { console.error('[Rankings] Error alianzas:', e); }

    try {
        var res2 = await supabase.from('match_nullified_kills').select('player_id, kills_nullified');
        if (res2.error) throw res2.error;
        nullifiedCache = {};
        (res2.data || []).forEach(function(r) { nullifiedCache[r.player_id] = (nullifiedCache[r.player_id] || 0) + r.kills_nullified; });
    } catch(e) { console.error('[Rankings] Error nullified:', e); nullifiedCache = {}; }

    await loadSanctions();

    try {
        var res3 = await supabase.from('player_strikes').select('player_id').eq('is_active', true);
        if (res3.error) throw res3.error;
        strikesCache = {};
        (res3.data || []).forEach(function(s) { strikesCache[s.player_id] = (strikesCache[s.player_id] || 0) + 1; });
    } catch(e) { console.error('[Rankings] Error strikes:', e); strikesCache = {}; }

    try { await loadRankings(); } catch(e) { console.error('[Rankings] jugadores:', e); }
    try { await loadAlliances(); } catch(e) { console.error('[Rankings] alianzas:', e); }
    try { await loadDuels(); } catch(e) { console.error('[Rankings] duelos:', e); }
    try { await loadStrikes(); } catch(e) { console.error('[Rankings] strikes:', e); }
}

async function loadRankings() {
    try {
        var af = document.getElementById('filter-alliance').value;
        var q = supabase.from('players').select('id, current_username, current_alliance_id, total_kills, total_deaths, games_played, status, last_seen');
        if (af) q = q.eq('current_alliance_id', af);
        var res = await q.order('total_kills', { ascending: false }).limit(100);
        if (res.error) throw res.error;
        var players = res.data || [];
        players.sort(function(a, b) { return effectiveKills(b) - effectiveKills(a); });
        var tbody = document.getElementById('players-tbody');
        tbody.innerHTML = players.map(function(p, i) {
            var eff = effectiveKills(p);
            var penalty = getPenaltyPct(p);
            var killClass = penalty > 0 ? 'kill-nullified' : '';
            var badge = penalty > 0 ? '<span class="text-[10px] px-1 py-0.5 rounded font-bold ml-1" style="background:rgba(198,40,40,0.2);color:#ef5350">-' + penalty + '%</span>' : '';
            return '<tr style="border-bottom:1px solid #1a237e;"><td class="p-3 font-bold text-ah-muted">' + (i+1) + '</td><td class="p-3 font-medium"><a href="player.html?id=' + p.id + '" style="color:#ff8f00;">' + p.current_username + '</a>' + badge + '</td><td class="p-3 text-ah-muted">' + getAllianceTag(p.current_alliance_id) + '</td><td class="p-3 text-right text-ah-muted">' + (p.games_played || 0) + '</td><td class="p-3 text-right font-bold ' + killClass + '" style="color:' + (eff > 0 ? '#4caf50' : '#9fa8da') + ';">' + eff + '</td><td class="p-3 text-right text-ah-muted">' + (p.total_deaths || 0) + '</td><td class="p-3 text-right font-bold">' + (p.total_deaths > 0 ? (eff / p.total_deaths).toFixed(2) : (eff > 0 ? eff.toFixed(2) : '0')) + '</td><td class="p-3 text-right">' + (penalty > 0 ? '<span title="Penalizacion por strikes/sanciones" style="color:#ef5350;">&#9889;</span>' : '') + '</td></tr>';
        }).join('');
    } catch(e) { console.error('[Rankings] jugadores:', e); document.getElementById('players-tbody').innerHTML = '<tr><td colspan="8" class="text-center py-8 text-red-400">Error: ' + e.message + '</td></tr>'; }
}

async function loadAlliances() {
    try {
        var res = await supabase.from('alliances').select('id, name, tag, member_count, total_kills').order('total_kills', { ascending: false }).limit(50);
        if (res.error) throw res.error;
        var c = document.getElementById('alliances-list');
        if (!res.data || res.data.length === 0) { c.innerHTML = '<div class="text-center py-8 text-ah-muted">Sin alianzas registradas</div>'; return; }
        c.innerHTML = '<div class="grid md:grid-cols-2 gap-4">' + res.data.map(function(a, i) {
            return '<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center gap-3"><div class="text-2xl font-bold" style="color:#ff8f00;">#' + (i+1) + '</div><div class="flex-1"><h3 class="font-bold text-lg">' + a.name + '</h3><p class="text-xs text-ah-muted">[' + (a.tag || '-') + ']</p></div></div><div class="grid grid-cols-2 gap-3 mt-3"><div class="rounded-lg p-2 text-center" style="background:#0a0e27;"><p class="text-xs text-ah-muted">Miembros</p><p class="font-bold">' + (a.member_count || 0) + '</p></div><div class="rounded-lg p-2 text-center" style="background:#0a0e27;"><p class="text-xs text-ah-muted">Bajas</p><p class="font-bold" style="color:#4caf50;">' + (a.total_kills || 0) + '</p></div></div></div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Rankings] alianzas:', e); document.getElementById('alliances-list').innerHTML = '<div class="text-center py-8 text-red-400">Error alianzas</div>'; }
}

// v17 FIX: Usa tabla 'matches' con match_type='duel' en lugar de tabla 'duels' que no existe
async function loadDuels() {
    try {
        var res = await supabase.from('matches')
            .select('id, name, alliance_id, status, match_type, created_at')
            .eq('match_type', 'duel')
            .order('created_at', { ascending: false })
            .limit(20);
        if (res.error) throw res.error;
        var c = document.getElementById('duels-list');
        if (!res.data || res.data.length === 0) { c.innerHTML = '<div class="text-center py-8 text-ah-muted" style="background:#11183a;border:1px solid #1a237e;border-radius:0.75rem;">Sin duelos finalizados</div>'; return; }

        // Cargar info de alianzas
        var allianceIds = res.data.map(function(d) { return d.alliance_id; }).filter(function(v) { return !!v; });
        var alliancesData = {};
        if (allianceIds.length > 0) {
            try {
                var aRes = await supabase.from('alliances').select('id, name, tag').in('id', allianceIds);
                if (aRes.data) aRes.data.forEach(function(a) { alliancesData[a.id] = a; });
            } catch(e) {}
        }

        c.innerHTML = res.data.map(function(d) {
            var alli = alliancesData[d.alliance_id] || {};
            var statusBadge = d.status === 'finished' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold" style="background:rgba(76,175,80,0.2);color:#4caf50;">FINALIZADO</span>' :
                              d.status === 'in_progress' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold" style="background:rgba(33,150,243,0.2);color:#2196f3;">EN CURSO</span>' :
                              '<span class="text-[10px] px-2 py-0.5 rounded font-bold" style="background:rgba(255,143,0,0.2);color:#ff8f00;">' + (d.status || 'ABIERTO') + '</span>';
            return '<div class="rounded-xl p-5 mb-3" style="background:#11183a;border:1px solid #1a237e;"><div class="flex items-center justify-between mb-2"><div class="font-bold">' + (d.name || 'Duelo') + '</div>' + statusBadge + '</div><div class="text-xs text-ah-muted">Alianza: ' + (alli.name || 'N/A') + (alli.tag ? ' [' + alli.tag + ']' : '') + ' | ' + formatDate(d.created_at) + '</div></div>';
        }).join('');
    } catch(e) { console.error('[Rankings] duelos:', e); document.getElementById('duels-list').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando duelos: ' + (e.message || e) + '</div>'; }
}

async function loadStrikes() {
    try {
        var res = await supabase.from('player_strikes').select('player_id, is_active, players!inner(id, current_username, current_alliance_id, status, last_seen)').eq('is_active', true).limit(200);
        if (res.error) throw res.error;
        var tbody = document.getElementById('strikes-tbody');
        if (!res.data || res.data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-ah-muted">Sin strikes registrados</td></tr>'; return; }
        var counts = {};
        res.data.forEach(function(s) {
            var pid = s.player_id;
            if (!counts[pid]) counts[pid] = { count: 0, player: s.players };
            counts[pid].count++;
        });
        var rows = Object.values(counts).sort(function(a, b) { return b.count - a.count; }).slice(0, 50);
        tbody.innerHTML = rows.map(function(r) {
            return '<tr style="border-bottom:1px solid #1a237e;"><td class="p-3 font-medium">' + (r.player.current_username || '?') + '</td><td class="p-3 text-ah-muted">' + getAllianceTag(r.player.current_alliance_id) + '</td><td class="p-3 text-right font-bold" style="color:#ef5350;">' + r.count + '</td><td class="p-3">' + getStatusBadgePlayer(r.player.status) + '</td><td class="p-3 text-ah-muted text-xs">' + formatDate(r.player.last_seen) + '</td></tr>';
        }).join('');
    } catch(e) { console.error('[Rankings] strikes:', e); document.getElementById('strikes-tbody').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-400">Error cargando strikes: ' + (e.message || e) + '</td></tr>'; }
}

function showTab(tab) {
    ['players', 'alliances', 'leagues', 'duels', 'strikes'].forEach(function(t) {
        document.getElementById(t + '-ranking').classList.toggle('hidden', t !== tab);
        var btn = document.getElementById('tab-' + t);
        if (t === tab) {
            btn.className = 'px-4 py-3 text-sm font-bold whitespace-nowrap border-b-2 text-ah-accent';
            btn.style.borderColor = '#ff8f00';
        } else {
            btn.className = 'px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap';
            btn.style.borderColor = 'transparent';
        }
    });
}

loadData();
</script>
</body>
</html>
