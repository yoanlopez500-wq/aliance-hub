<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
input,select,textarea{background:#11183a!important;border-color:#1a237e!important;color:#e8eaf6!important;}
input:focus,select:focus,textarea:focus{border-color:#ff6f00!important;outline:none!important;}
.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
.kill-nullified{text-decoration:line-through;opacity:.5}
.bg-ah-card{background:#11183a!important}
.border-ah-border{border-color:#1a237e!important}
.text-ah-accent{color:#ff8f00!important}
.text-ah-muted{color:#9fa8da!important}
.bg-ah-bg{background:#0a0e27!important}
.text-ah-text{color:#e8eaf6!important}

</head>
<body class="bg-ah-bg min-h-screen text-ah-text" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-3xl font-bold text-ah-text mb-2">&#127942; Rankings</h1>
<p class="text-sm text-ah-muted mb-6">Estadisticas globales, por alianza, por liga y duelos</p>
<div class="flex gap-1 overflow-x-auto pb-2 mb-6 scrollbar-hide border-b border-ah-border">
<button onclick="showTab('players')" id="tab-players" class="px-4 py-3 text-sm font-bold text-ah-accent border-b-2 whitespace-nowrap min-w-[80px]" style="border-color:#ff8f00;">&#128100; Jugadores</button>
<button onclick="showTab('alliances')" id="tab-alliances" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap min-w-[80px]">&#127988; Alianzas</button>
<button onclick="showTab('leagues')" id="tab-leagues" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap min-w-[80px]">&#127942; Ligas</button>
<button onclick="showTab('duels')" id="tab-duels" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap min-w-[80px]">&#9876;&#65039; Duelos</button>
<button onclick="showTab('strikes')" id="tab-strikes" class="px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap min-w-[80px]">&#9888;&#65039; Strikes</button>
</div>
<div id="error-banner" class="hidden mb-4 p-3 rounded-lg text-sm font-bold bg-red-500/15 text-red-400"></div>
<div id="players-ranking">
<div class="flex gap-2 mb-4"><select id="filter-alliance" onchange="loadRankings()" class="px-3 py-2 rounded-lg text-sm border bg-ah-card text-ah-text border-indigo-900 min-h-[44px]"><option value="">Todas las alianzas</option></select></div>
<div class="overflow-x-auto rounded-xl bg-slate-900 border border-indigo-900">
<table class="w-full text-sm min-w-full"><thead><tr class="bg-white/[0.02]"><th class="text-left p-3 text-ah-muted">#</th><th class="text-left p-3 text-ah-muted">Jugador</th><th class="text-left p-3 text-ah-muted">Alianza</th><th class="text-right p-3 text-ah-muted">Partidas</th><th class="text-right p-3 text-ah-muted">Bajas</th><th class="text-right p-3 text-ah-muted">Muertes</th><th class="text-right p-3 text-ah-muted">KD</th><th class="text-right p-3 text-ah-muted">&#9889;</th></tr></thead><tbody id="players-tbody"><tr><td colspan="8" class="text-center py-8 text-ah-muted">Cargando...</td></tr></tbody></table>
</div></div>
<div id="alliances-ranking" class="hidden"><div id="alliances-list" class="text-center py-8 text-ah-muted">Cargando...</div></div>
<div id="leagues-ranking" class="hidden"><div class="text-center py-8 text-ah-muted">Ligas proximamente</div></div>
<div id="duels-ranking" class="hidden"><div id="duels-list" class="text-center py-8 text-ah-muted">Cargando...</div></div>
<div id="strikes-ranking" class="hidden">
<div class="overflow-x-auto rounded-xl bg-slate-900 border border-indigo-900">
<table class="w-full text-sm min-w-full"><thead><tr class="bg-white/[0.02]"><th class="text-left p-3 text-ah-muted">Jugador</th><th class="text-left p-3 text-ah-muted">Alianza</th><th class="text-right p-3 text-ah-muted">Strikes</th><th class="text-left p-3 text-ah-muted">Estado</th><th class="text-left p-3 text-ah-muted">Ultimo No-Show</th></tr></thead><tbody id="strikes-tbody"><tr><td colspan="5" class="text-center py-8 text-ah-muted">Cargando...</td></tr></tbody></table>
</div></div>
</div>
<script>
var nullifiedCache = {};
var sanctionsCache = {};
var strikesCache = {};
var allianceMap = {};

function showError(msg) { var el = document.getElementById('error-banner'); el.textContent = msg; el.classList.remove('hidden'); }
function getAllianceTag(aid) { return (allianceMap[aid] && allianceMap[aid].tag) ? allianceMap[aid].tag : '-'; }

function effectiveKills(player) {
    var pc = DB.tableCols('players');
    var sanc = sanctionsCache[player[pc.id]];
    if (sanc && sanc.kills_after != null) return Math.round(sanc.kills_after);
    var total = player[pc.kills] || 0;
    var nullified = nullifiedCache[player[pc.id]] || 0;
    var killsWN = Math.max(0, total - nullified);
    var strikes = strikesCache[player[pc.id]] || 0;
    if (strikes === 1) return Math.round(killsWN * 0.9);
    if (strikes === 2) return Math.round(killsWN * 0.7);
    if (strikes >= 3) return Math.round(killsWN * 0.5);
    return killsWN;
}

function getPenaltyPct(player) {
    var pc = DB.tableCols('players');
    var sanc = sanctionsCache[player[pc.id]];
    if (sanc && sanc.penalty_pct != null) return sanc.penalty_pct;
    var strikes = strikesCache[player[pc.id]] || 0;
    if (strikes === 1) return 10;
    if (strikes === 2) return 30;
    if (strikes >= 3) return 50;
    return 0;
}

async function loadSanctions() {
    try {
        var sc = DB.tableCols('playerSanctions');
        var res = await DB.from('playerSanctions').select([sc.playerId, sc.killsAfter, sc.penaltyPct].join(', ')).order(sc.createdAt, { ascending: false });
        if (res.error) throw res.error;
        sanctionsCache = {};
        (res.data || []).forEach(function(s) { if (!sanctionsCache[s[sc.playerId]]) sanctionsCache[s[sc.playerId]] = { kills_after: s[sc.killsAfter], penalty_pct: s[sc.penaltyPct] || 0 }; });
    } catch(e) { console.error('[Rankings] Error sanciones:', e); sanctionsCache = {}; }
}

async function loadData() {
    try {
        var ac = DB.tableCols('alliances');
        var res = await DB.from('alliances').select([ac.id, ac.name, ac.tag].join(', ')).order(ac.name);
        if (res.error) throw res.error;
        allianceMap = {};
        document.getElementById('filter-alliance').innerHTML = '<option value="">Todas las alianzas</option>' +
            (res.data || []).map(function(a) { allianceMap[a[ac.id]] = { name: a[ac.name], tag: a[ac.tag] }; return '<option value="' + a[ac.id] + '">' + a[ac.name] + '</option>'; }).join('');
    } catch(e) { console.error('[Rankings] Error alianzas:', e); }

    try {
        var nkc = DB.tableCols('matchNullifiedKills');
        var res2 = await DB.from('matchNullifiedKills').select([nkc.playerId, nkc.killsNullified].join(', '));
        if (res2.error) throw res2.error;
        nullifiedCache = {};
        (res2.data || []).forEach(function(r) { nullifiedCache[r[nkc.playerId]] = (nullifiedCache[r[nkc.playerId]] || 0) + r[nkc.killsNullified]; });
    } catch(e) { console.error('[Rankings] Error nullified:', e); nullifiedCache = {}; }

    await loadSanctions();

    try {
        var stc = DB.tableCols('playerStrikes');
        var res3 = await DB.from('playerStrikes').select(stc.playerId).eq(stc.isActive, true);
        if (res3.error) throw res3.error;
        strikesCache = {};
        (res3.data || []).forEach(function(s) { strikesCache[s[stc.playerId]] = (strikesCache[s[stc.playerId]] || 0) + 1; });
    } catch(e) { console.error('[Rankings] Error strikes:', e); strikesCache = {}; }

    try { await loadRankings(); } catch(e) { console.error('[Rankings] jugadores:', e); }
    try { await loadAlliances(); } catch(e) { console.error('[Rankings] alianzas:', e); }
    try { await loadDuels(); } catch(e) { console.error('[Rankings] duelos:', e); }
    try { await loadStrikes(); } catch(e) { console.error('[Rankings] strikes:', e); }
}

async function loadRankings() {
    try {
        var af = document.getElementById('filter-alliance').value;
        var pc = DB.tableCols('players');
        var mc = DB.tableCols('matches');
        var rc = DB.tableCols('matchResults');

        var q = supabase.from('match_results')
            .select('player_id, kills, deaths, matches!inner(match_type, alliance_id)')
            .neq('matches.match_type', 'internal');

        var res = await q;
        if (res.error) throw res.error;

        var playerStats = {};
        (res.data || []).forEach(function(r) {
            var pid = r.player_id;
            if (!playerStats[pid]) playerStats[pid] = { kills: 0, deaths: 0, games: 0 };
            playerStats[pid].kills += (r.kills || 0);
            playerStats[pid].deaths += (r.deaths || 0);
            playerStats[pid].games += 1;
        });

        var playerIds = Object.keys(playerStats).map(Number);
        var playersData = [];
        if (playerIds.length > 0) {
            var pq = DB.from('players').select([pc.id, pc.currentUsername, pc.currentAllianceId, pc.gamesPlayed].join(', ')).in(pc.id, playerIds);
            if (af) pq = pq.eq(pc.currentAllianceId, af);
            var pres = await pq;
            if (!pres.error && pres.data) {
                playersData = pres.data.map(function(p) {
                    var stats = playerStats[p[pc.id]] || { kills: 0, deaths: 0, games: 0 };
                    p[pc.kills] = stats.kills;
                    p[pc.deaths] = stats.deaths;
                    p[pc.gamesPlayed] = stats.games;
                    return p;
                });
            }
        }

        playersData.sort(function(a, b) { return effectiveKills(b) - effectiveKills(a); });
        var tbody = document.getElementById('players-tbody');
        if (playersData.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-ah-muted">Sin datos de rankings publicos</td></tr>'; return; }

        tbody.innerHTML = playersData.map(function(p, i) {
            var eff = effectiveKills(p);
            var penalty = getPenaltyPct(p);
            var killClass = penalty > 0 ? 'kill-nullified' : '';
            var badge = penalty > 0 ? '<span class="text-[10px] px-1 py-0.5 rounded font-bold ml-1 bg-red-500/20 text-red-400">-' + penalty + '%</span>' : '';
            return '<tr class="border-b border-indigo-900"><td class="p-3 font-bold text-ah-muted">' + (i+1) + '</td><td class="p-3 font-medium"><a href="player.html?id=' + p[pc.id] + '" class="text-amber-400">' + p[pc.currentUsername] + '</a>' + badge + '</td><td class="p-3 text-ah-muted">' + getAllianceTag(p[pc.currentAllianceId]) + '</td><td class="p-3 text-right text-ah-muted">' + (p[pc.gamesPlayed] || 0) + '</td><td class="p-3 text-right font-bold ' + killClass + ' ' + (eff > 0 ? 'text-green-500' : 'text-ah-muted') + ';">' + eff + '</td><td class="p-3 text-right text-ah-muted">' + (p[pc.deaths] || 0) + '</td><td class="p-3 text-right font-bold">' + (p[pc.deaths] > 0 ? (eff / p[pc.deaths]).toFixed(2) : (eff > 0 ? eff.toFixed(2) : '0')) + '</td><td class="p-3 text-right">' + (penalty > 0 ? '<span title="Penalizacion por strikes/sanciones" class="text-red-400">&#9889;</span>' : '') + '</td></tr>';
        }).join('');
    } catch(e) { console.error('[Rankings] jugadores:', e); document.getElementById('players-tbody').innerHTML = '<tr><td colspan="8" class="text-center py-8 text-red-400">Error: ' + e.message + '</td></tr>'; }
}

async function loadAlliances() {
    try {
        var ac = DB.tableCols('alliances');
        var pc = DB.tableCols('players');
        var res = await DB.from('alliances').select(DB.select('alliances', 'basic'));
        if (res.error) throw res.error;

        var playersRes = await DB.from('players').select([pc.currentAllianceId, pc.kills].join(', '));
        var playerStats = {};
        if (!playersRes.error && playersRes.data) {
            playersRes.data.forEach(function(p) {
                if (!p[pc.currentAllianceId]) return;
                if (!playerStats[p[pc.currentAllianceId]]) playerStats[p[pc.currentAllianceId]] = { count: 0, kills: 0 };
                playerStats[p[pc.currentAllianceId]].count++;
                playerStats[p[pc.currentAllianceId]].kills += (p[pc.kills] || 0);
            });
        }

        var c = document.getElementById('alliances-list');
        if (!res.data || res.data.length === 0) { c.innerHTML = '<div class="text-center py-8 text-ah-muted">Sin alianzas registradas</div>'; return; }

        var sorted = res.data.map(function(a) {
            var stats = playerStats[a[ac.id]] || { count: 0, kills: 0 };
            return { id: a[ac.id], name: a[ac.name], tag: a[ac.tag], description: a[ac.description], member_count: stats.count, total_kills: stats.kills };
        }).sort(function(a, b) { return b.total_kills - a.total_kills; });

        c.innerHTML = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' + sorted.map(function(a, i) {
            return '<div class="rounded-xl p-5 bg-slate-900 border border-indigo-900"><div class="flex items-center gap-3"><div class="text-2xl font-bold text-amber-400">#' + (i+1) + '</div><div class="flex-1"><h3 class="font-bold text-lg">' + a.name + '</h3><p class="text-xs text-ah-muted">[' + (a.tag || '-') + ']</p></div></div><div class="grid grid-cols-2 gap-3 mt-3"><div class="rounded-lg p-2 text-center bg-slate-950"><p class="text-xs text-ah-muted">Miembros</p><p class="font-bold">' + (a.member_count || 0) + '</p></div><div class="rounded-lg p-2 text-center bg-slate-950"><p class="text-xs text-ah-muted">Bajas</p><p class="font-bold text-green-500">' + (a.total_kills || 0).toLocaleString() + '</p></div></div></div>';
        }).join('') + '</div>';
    } catch(e) { console.error('[Rankings] alianzas:', e); document.getElementById('alliances-list').innerHTML = '<div class="text-center py-8 text-red-400">Error alianzas: ' + (e.message || e) + '</div>'; }
}

async function loadDuels() {
    try {
        var mc = DB.tableCols('matches');
        var ac = DB.tableCols('alliances');
        var res = await DB.from('matches')
            .select([mc.id, mc.name, mc.allianceId, mc.status, mc.matchType, mc.createdAt].join(', '))
            .eq(mc.matchType, 'duel')
            .order(mc.createdAt, { ascending: false })
            .limit(20);
        if (res.error) throw res.error;
        var c = document.getElementById('duels-list');
        if (!res.data || res.data.length === 0) { c.innerHTML = '<div class="text-center py-8 text-ah-muted bg-slate-900 border border-indigo-900 rounded-xl">Sin duelos finalizados</div>'; return; }

        var allianceIds = res.data.map(function(d) { return d[mc.allianceId]; }).filter(function(v) { return !!v; });
        var alliancesData = {};
        if (allianceIds.length > 0) {
            try {
                var aRes = await DB.from('alliances').select([ac.id, ac.name, ac.tag].join(', ')).in(ac.id, allianceIds);
                if (aRes.data) aRes.data.forEach(function(a) { alliancesData[a[ac.id]] = a; });
            } catch(e) {}
        }

        c.innerHTML = res.data.map(function(d) {
            var alli = alliancesData[d[mc.allianceId]] || {};
            var statusBadge = d[mc.status] === 'finished' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold bg-green-500/20 text-green-500">FINALIZADO</span>' :
                              d[mc.status] === 'in_progress' ? '<span class="text-[10px] px-2 py-0.5 rounded font-bold bg-blue-500/20 text-blue-500">EN CURSO</span>' :
                              '<span class="text-[10px] px-2 py-0.5 rounded font-bold bg-amber-500/20 text-amber-400">' + (d[mc.status] || 'ABIERTO') + '</span>';
            return '<div class="rounded-xl p-5 mb-3 bg-slate-900 border border-indigo-900"><div class="flex items-center justify-between mb-2"><div class="font-bold">' + (d[mc.name] || 'Duelo') + '</div>' + statusBadge + '</div><div class="text-xs text-ah-muted">Alianza: ' + (alli[ac.name] || 'N/A') + (alli[ac.tag] ? ' [' + alli[ac.tag] + ']' : '') + ' | ' + formatDate(d[mc.createdAt]) + '</div></div>';
        }).join('');
    } catch(e) { console.error('[Rankings] duelos:', e); document.getElementById('duels-list').innerHTML = '<div class="text-center py-8 text-red-400">Error cargando duelos: ' + (e.message || e) + '</div>'; }
}

async function loadStrikes() {
    try {
        var stc = DB.tableCols('playerStrikes');
        var res = await DB.from('playerStrikes')
            .select(stc.playerId + ', ' + stc.isActive + ', players!inner(id, current_username, current_alliance_id, status, last_seen)')
            .eq(stc.isActive, true)
            .limit(200);
        if (res.error) throw res.error;
        var tbody = document.getElementById('strikes-tbody');
        if (!res.data || res.data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-ah-muted">Sin strikes registrados</td></tr>'; return; }
        var counts = {};
        res.data.forEach(function(s) {
            var pid = s[stc.playerId];
            if (!counts[pid]) counts[pid] = { count: 0, player: s.players };
            counts[pid].count++;
        });
        var rows = Object.values(counts).sort(function(a, b) { return b.count - a.count; }).slice(0, 50);
        tbody.innerHTML = rows.map(function(r) {
            return '<tr class="border-b border-indigo-900"><td class="p-3 font-medium">' + (r.player.current_username || '?') + '</td><td class="p-3 text-ah-muted">' + getAllianceTag(r.player.current_alliance_id) + '</td><td class="p-3 text-right font-bold text-red-400">' + r.count + '</td><td class="p-3">' + getStatusBadgePlayer(r.player.status) + '</td><td class="p-3 text-ah-muted text-xs">' + formatDate(r.player.last_seen) + '</td></tr>';
        }).join('');
    } catch(e) { console.error('[Rankings] strikes:', e); document.getElementById('strikes-tbody').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-400">Error cargando strikes: ' + (e.message || e) + '</td></tr>'; }
}

function showTab(tab) {
    ['players', 'alliances', 'leagues', 'duels', 'strikes'].forEach(function(t) {
        document.getElementById(t + '-ranking').classList.toggle('hidden', t !== tab);
        var btn = document.getElementById('tab-' + t);
        if (t === tab) {
            btn.className = 'px-4 py-3 text-sm font-bold whitespace-nowrap border-b-2 text-ah-accent min-w-[80px]';
            btn.style.borderColor = '#ff8f00';
        } else {
            btn.className = 'px-4 py-3 text-sm font-bold text-ah-muted hover:text-ah-text whitespace-nowrap min-w-[80px]';
            btn.style.borderColor = 'transparent';
        }
    });
}

loadData();
</script>
