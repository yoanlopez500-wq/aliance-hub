<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/ui-utils.js"></script>
    <script src="assets/js/pwa-utils.js"></script>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alliance Hub">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg">
    <link rel="manifest" href="manifest.json"">

</head>
<body class="bg-slate-900 min-h-screen" data-role="public">
    <div id="admin-nav"></div>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">🏆 Rankings</h1>
        <p class="text-slate-500 mb-6">Estadísticas globales de jugadores</p>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 border-b border-slate-200">
            <button onclick="showTab('players')" id="tab-players" class="px-4 py-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500">Jugadores</button>
            <button onclick="showTab('alliances')" id="tab-alliances" class="px-4 py-3 text-sm font-bold text-slate-500 hover:text-slate-700">Alianzas</button>
        </div>

        <!-- Filtros -->
        <div class="flex gap-3 mb-4 flex-wrap">
            <select id="filter-alliance" onchange="loadRankings()" class="px-3 py-2 rounded-lg border border-slate-300 text-sm">
                <option value="">Todas las alianzas</option>
            </select>
        </div>

        <!-- Tabla jugadores -->
        <div id="players-ranking">
            <div class="overflow-x-auto bg-white rounded-xl border border-slate-200">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="text-left p-3 w-12">#</th>
                            <th class="text-left p-3">Jugador</th>
                            <th class="text-left p-3">Alianza</th>
                            <th class="text-right p-3">Partidas</th>
                            <th class="text-right p-3">Bajas</th>
                            <th class="text-right p-3">Muertes</th>
                            <th class="text-right p-3">KD Global</th>
                        </tr>
                    </thead>
                    <tbody id="players-tbody">
                        <tr><td colspan="7" class="text-center py-8 text-slate-400">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tabla alianzas (hidden por defecto) -->
        <div id="alliances-ranking" class="hidden">
            <div class="overflow-x-auto bg-white rounded-xl border border-slate-200">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="text-left p-3 w-12">#</th>
                            <th class="text-left p-3">Alianza</th>
                            <th class="text-left p-3">Tag</th>
                            <th class="text-right p-3">Jugadores</th>
                            <th class="text-right p-3">Bajas</th>
                            <th class="text-right p-3">Muertes</th>
                            <th class="text-right p-3">KD</th>
                        </tr>
                    </thead>
                    <tbody id="alliances-tbody">
                        <tr><td colspan="7" class="text-center py-8 text-slate-400">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            const { data: alliances } = await supabase.from('alliances').select('id, name').order('name');
            const filter = document.getElementById('filter-alliance');
            filter.innerHTML = '<option value="">Todas las alianzas</option>' +
                (alliances || []).map(a => `<option value="${a.id}">${a.name}</option>`).join('');

            loadRankings();
        }

        async function loadRankings() {
            const allianceFilter = document.getElementById('filter-alliance').value;

            // Jugadores
            let query = supabase.from('players').select('*, alliances(name, tag)').gt('total_deaths', 0);
            if (allianceFilter) query = query.eq('current_alliance_id', allianceFilter);

            const { data: players } = await query.order('total_kills', { ascending: false }).limit(100);

            const tbody = document.getElementById('players-tbody');
            if (!players || players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-slate-400">Sin datos</td></tr>';
            } else {
                tbody.innerHTML = players.map((p, i) => {
                    const kd = p.total_deaths > 0 ? (p.total_kills / p.total_deaths).toFixed(2) : p.total_kills;
                    return `
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-3 font-bold ${i < 3 ? 'text-amber-600' : 'text-slate-400'}">${i + 1}</td>
                            <td class="p-3">
                                <a href="player.html?id=${p.id}" class="font-medium text-slate-800 hover:text-amber-600">${p.current_username}</a>
                            </td>
                            <td class="p-3 text-slate-500">${p.alliances?.tag || '-'}</td>
                            <td class="p-3 text-right">${p.games_played || 0}</td>
                            <td class="p-3 text-right text-green-600 font-bold">${p.total_kills?.toLocaleString()}</td>
                            <td class="p-3 text-right text-red-500">${p.total_deaths?.toLocaleString()}</td>
                            <td class="p-3 text-right font-bold ${kd >= 1 ? 'text-green-600' : 'text-orange-500'}">${kd}</td>
                        </tr>
                    `;
                }).join('');
            }

            // Alianzas (agregado simple)
            const { data: allianceStats } = await supabase
                .from('players')
                .select('current_alliance_id, alliances(name, tag), total_kills, total_deaths')
                .not('current_alliance_id', 'is', null);

            const grouped = {};
            (allianceStats || []).forEach(p => {
                const id = p.current_alliance_id;
                if (!grouped[id]) grouped[id] = { name: p.alliances.name, tag: p.alliances.tag, kills: 0, deaths: 0, players: 0 };
                grouped[id].kills += p.total_kills || 0;
                grouped[id].deaths += p.total_deaths || 0;
                grouped[id].players++;
            });

            const sorted = Object.values(grouped).sort((a, b) => {
                const kda = a.deaths > 0 ? a.kills / a.deaths : a.kills;
                const kdb = b.deaths > 0 ? b.kills / b.deaths : b.kills;
                return kdb - kda;
            });

            const atbody = document.getElementById('alliances-tbody');
            atbody.innerHTML = sorted.map((a, i) => {
                const kd = a.deaths > 0 ? (a.kills / a.deaths).toFixed(2) : a.kills;
                return `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-3 font-bold ${i < 3 ? 'text-amber-600' : 'text-slate-400'}">${i + 1}</td>
                        <td class="p-3 font-medium">${a.name}</td>
                        <td class="p-3 text-slate-500">${a.tag}</td>
                        <td class="p-3 text-right">${a.players}</td>
                        <td class="p-3 text-right text-green-600 font-bold">${a.kills.toLocaleString()}</td>
                        <td class="p-3 text-right text-red-500">${a.deaths.toLocaleString()}</td>
                        <td class="p-3 text-right font-bold ${kd >= 1 ? 'text-green-600' : 'text-orange-500'}">${kd}</td>
                    </tr>
                `;
            }).join('');
        }

        function showTab(tab) {
            document.getElementById('players-ranking').classList.toggle('hidden', tab !== 'players');
            document.getElementById('alliances-ranking').classList.toggle('hidden', tab !== 'alliances');

            document.getElementById('tab-players').className = tab === 'players' 
                ? 'px-4 py-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500'
                : 'px-4 py-3 text-sm font-bold text-slate-500 hover:text-slate-700';
            document.getElementById('tab-alliances').className = tab === 'alliances'
                ? 'px-4 py-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500'
                : 'px-4 py-3 text-sm font-bold text-slate-500 hover:text-slate-700';
        }

        loadData();
    </script>
</body>
</html>
